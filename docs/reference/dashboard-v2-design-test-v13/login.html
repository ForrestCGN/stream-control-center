<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Dashboard v2 – Login</title>
  <link rel="stylesheet" href="./assets/dashboard-v2-design-test-v13.css">
</head>
<body class="login-page">
  <div class="cgn-galaxy" aria-hidden="true">
    <div class="bg-wash bg-wash-a"></div>
    <div class="bg-wash bg-wash-b"></div>
    <div class="bg-core"></div>
    <div class="stars"></div>
    <div class="dot-grid"></div>
  </div>

  <main class="login-wrap">
    <section class="login-card cgn-card">
      <p class="cgn-eyebrow">ForrestCGN Control Center</p>
      <h1>Mit Twitch anmelden</h1>
      <p>
        Twitch bestätigt nur, wer du bist. Was du im Dashboard darfst,
        entscheidet die lokale Rollen- und Rechteverwaltung.
      </p>

      <button class="twitch-login">
        <span>▣</span>
        Mit Twitch anmelden
      </button>

      <div class="login-hints">
        <div class="cgn-toast">
          <strong>Zugriff ausstehend</strong>
          <span>Nach dem ersten Login muss ein Owner/Admin deinen Dashboard-Zugang freigeben.</span>
        </div>
        <div class="login-state">
          <span class="cgn-chip cgn-chip--ok">Twitch OAuth</span>
          <span class="cgn-chip cgn-chip--warn">Lokale Rolle nötig</span>
        </div>
      </div>
    </section>
  </main>
</body>
</html>
