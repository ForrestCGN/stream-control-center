<!doctype html>
<html lang="de" data-theme="light">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Control-Center</title>
  <link rel="stylesheet" href="/dashboard/app.css" />
  <link rel="stylesheet" href="/dashboard/modules/sectionhome.css" />
  <link rel="stylesheet" href="/dashboard/modules/streamdesk.css" />
  <link rel="stylesheet" href="/dashboard/modules/clips.css" />
  <link rel="stylesheet" href="/dashboard/modules/controlhome.css" />
  <link rel="stylesheet" href="/dashboard/modules/alerts.css" />
  <link rel="stylesheet" href="/dashboard/modules/obs.css" />
  <link rel="stylesheet" href="/dashboard/modules/adminconfigs.css" />
  <link rel="stylesheet" href="/dashboard/modules/sound.css" />
  <link rel="stylesheet" href="/dashboard/modules/soundalerts.css" />
  <link rel="stylesheet" href="/dashboard/modules/tts.css" />
  <link rel="stylesheet" href="/dashboard/modules/hug.css" />
  <link rel="stylesheet" href="/dashboard/modules/tagebuch.css" />
  <link rel="stylesheet" href="/dashboard/modules/todo.css" />
  <link rel="stylesheet" href="/dashboard/modules/vip.css" />
</head>
<body>
  <div class="galaxy"></div>
  <div class="app-shell">
    <aside class="sidebar glass">
      <div class="brand">
        <div class="brand-mark">CGN</div>
        <div class="brand-text"><strong>ForrestCGN</strong><span>Control-Center</span></div>
      </div>

      <div class="nav-search-wrap">
        <input id="globalSearch" class="nav-search" type="search" placeholder="Suchen: Alerts, Hug, VIP, OBS..." autocomplete="off" />
      </div>

      <nav id="mainNav" class="main-nav main-nav-v2" aria-label="Hauptnavigation">
        <div class="nav-section-block nav-main-block">
          <div class="nav-section-title">Navigation</div>
          <button class="nav-main-item active" data-section="live"><span class="nav-icon">📡</span><span class="nav-label"><strong>Live</strong><small>Stream-Desk, Chat, Clips</small></span></button>
          <button class="nav-main-item" data-section="control"><span class="nav-icon">🧭</span><span class="nav-label"><strong>Control</strong><small>Alerts, OBS, Overlays</small></span></button>
          <button class="nav-main-item" data-section="community"><span class="nav-icon">👥</span><span class="nav-label"><strong>Community</strong><small>VIP, Hug, Deathcounter, Tagebuch</small></span></button>
          <button class="nav-main-item" data-section="system"><span class="nav-icon">🧩</span><span class="nav-label"><strong>System</strong><small>Sound, TTS, Module</small></span></button>
          <button class="nav-main-item" data-section="admin"><span class="nav-icon">🔐</span><span class="nav-label"><strong>Admin</strong><small>Configs, Rechte, Logs</small></span></button>
        </div>
      </nav>
    </aside>

    <main class="main">
      <header class="topbar glass">
        <div>
          <div id="pageBreadcrumb" class="page-breadcrumb">Live / Übersicht</div>
          <h1 id="pageTitle">Live</h1>
        </div>
        <div class="top-actions">
          <button id="navToggle" class="nav-toggle" title="Navigation ein-/ausklappen">☰</button>
          <button id="themeToggle" class="theme-toggle" title="Hell/Dunkel umschalten">🌙 Dunkel</button>
          <a id="overlayOpenLink" class="ghost-link" href="/overlays/_overlay-alerts-v2.html" target="_blank" hidden>Overlay öffnen</a>
          <button id="reloadBtn">Reload</button>
        </div>
      </header>

      <section id="sectionhomeModule" class="dashboard-module sectionhome-admin" data-module-panel="sectionhome"></section>
      <section id="streamdeskModule" class="dashboard-module streamdesk-admin" data-module-panel="streamdesk" hidden></section>
      <section id="clipsModule" class="dashboard-module clips-admin" data-module-panel="clips" hidden></section>
      <section id="controlhomeModule" class="dashboard-module controlhome-admin" data-module-panel="controlhome" hidden></section>
      <section id="alertsModule" class="dashboard-module alerts-admin" data-module-panel="alerts" hidden></section>
      <section id="obsModule" class="dashboard-module obs-admin" data-module-panel="obs" hidden></section>
      <section id="adminconfigsModule" class="dashboard-module adminconfigs-admin" data-module-panel="adminconfigs" hidden></section>
      <section id="soundModule" class="dashboard-module sound-admin" data-module-panel="sound_system" hidden></section>
      <section id="soundalertsModule" class="dashboard-module soundalerts-admin" data-module-panel="soundalerts" hidden></section>
      <section id="ttsModule" class="dashboard-module tts-admin" data-module-panel="tts" hidden></section>
      <section id="hugModule" class="dashboard-module hug-admin" data-module-panel="hug" hidden></section>
      <section id="tagebuchModule" class="dashboard-module tagebuch-admin" data-module-panel="tagebuch" hidden></section>
      <section id="todoModule" class="dashboard-module todo-admin" data-module-panel="todo" hidden></section>
      <section id="vipModule" class="dashboard-module vip-admin" data-module-panel="vip" hidden></section>
    </main>
  </div>
  <script src="/dashboard/app.js"></script>
  <script src="/dashboard/modules/soundalerts.js"></script>
  <script src="/dashboard/modules/tts.js"></script>
  <script src="/dashboard/modules/sectionhome.js"></script>
  <script src="/dashboard/modules/streamdesk.js"></script>
  <script src="/dashboard/modules/clips.js"></script>
  <script src="/dashboard/modules/controlhome.js"></script>
  <script src="/dashboard/modules/alerts.js"></script>
  <script src="/dashboard/modules/obs.js"></script>
  <script src="/dashboard/modules/adminconfigs.js"></script>
  <script src="/dashboard/modules/sound.js"></script>
  <script src="/dashboard/modules/hug.js"></script>
  <script src="/dashboard/modules/tagebuch.js"></script>
  <script src="/dashboard/modules/todo.js"></script>
  <script src="/dashboard/modules/vip.js"></script>
</body>
</html>
