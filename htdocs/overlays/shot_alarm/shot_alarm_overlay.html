<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shot-Alarm Overlay</title>
  <style>
    :root {
      --neon-purple: #a855f7;
      --neon-blue: #22d3ee;
      --white: #f8fafc;
      --muted: #cbd5e1;
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }
    #wrap {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      opacity: 0;
      transform: scale(0.94);
      transition: opacity 280ms ease, transform 280ms ease;
    }
    #wrap.show {
      opacity: 1;
      transform: scale(1);
    }
    .card {
      min-width: 760px;
      max-width: 980px;
      padding: 34px 42px;
      border-radius: 34px;
      border: 2px solid rgba(168, 85, 247, 0.82);
      background:
        radial-gradient(circle at 12% 10%, rgba(34, 211, 238, 0.28), transparent 34%),
        radial-gradient(circle at 88% 90%, rgba(168, 85, 247, 0.32), transparent 38%),
        rgba(8, 13, 29, 0.91);
      box-shadow:
        0 0 32px rgba(168, 85, 247, 0.58),
        0 0 72px rgba(34, 211, 238, 0.28),
        inset 0 0 34px rgba(15, 23, 42, 0.72);
      color: var(--white);
      text-align: center;
      position: relative;
      overflow: hidden;
    }
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--neon-blue);
      box-shadow: 0 0 18px var(--neon-blue), 0 0 38px var(--neon-blue);
    }
    .card::before { left: 26px; top: 22px; }
    .card::after { right: 26px; bottom: 22px; background: var(--neon-purple); box-shadow: 0 0 18px var(--neon-purple), 0 0 38px var(--neon-purple); }
    .title {
      font-size: 68px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(168, 85, 247, 0.92), 0 0 32px rgba(34, 211, 238, 0.6);
      margin-bottom: 18px;
    }
    .target {
      font-size: 34px;
      font-weight: 800;
      margin-bottom: 14px;
    }
    .target strong { color: #67e8f9; text-shadow: 0 0 18px rgba(34, 211, 238, 0.8); }
    .reason {
      font-size: 24px;
      color: var(--muted);
      margin-bottom: 18px;
    }
    .shots {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      padding: 12px 24px;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.58);
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 0 20px rgba(34, 211, 238, 0.22);
      font-size: 28px;
      font-weight: 900;
    }
    .meta {
      margin-top: 18px;
      color: #94a3b8;
      font-size: 16px;
    }
    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.22); }
    }
    #wrap.show .card { animation: pulse 1.2s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="wrap">
    <div class="card">
      <div class="title" id="title">SHOT-ALARM</div>
      <div class="target"><strong id="target">Engel & Roxxy</strong> müssen trinken!</div>
      <div class="reason" id="reason">Support-Event</div>
      <div class="shots">🥃 <span id="shots">1 Shot</span></div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <script>
    const wrap = document.getElementById('wrap');
    const titleEl = document.getElementById('title');
    const targetEl = document.getElementById('target');
    const reasonEl = document.getElementById('reason');
    const shotsEl = document.getElementById('shots');
    const metaEl = document.getElementById('meta');
    let hideTimer = null;
    let ws = null;

    function escText(value) { return String(value ?? ''); }

    function showShot(payload) {
      const trigger = payload && payload.trigger ? payload.trigger : payload;
      const shots = Math.max(1, Number(trigger.shots || 1));
      titleEl.textContent = escText(payload.title || 'SHOT-ALARM');
      targetEl.textContent = escText(trigger.targetLabel || payload.targetLabel || 'Engel & Roxxy');
      const user = trigger.user && trigger.user.displayName ? trigger.user.displayName : '';
      const reason = trigger.eventLabel || trigger.kind || 'Support-Event';
      reasonEl.textContent = user ? `${reason} von ${user}` : reason;
      shotsEl.textContent = shots === 1 ? '1 Shot' : `${shots} Shots`;
      const chance = trigger.chancePercent !== undefined ? `${trigger.chancePercent}%` : '';
      metaEl.textContent = chance ? `Regel: ${chance} Chance · Treffer` : 'Treffer';
      wrap.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => wrap.classList.remove('show'), Math.max(1500, Number(payload.holdMs || 12000)));
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.addEventListener('open', () => {
        try { ws.send(JSON.stringify({ type: 'hello', module: 'shot_alarm_overlay', clientId: 'shot_alarm_overlay', clientType: 'overlay' })); } catch (_) {}
      });
      ws.addEventListener('message', ev => {
        let data = null;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (!data) return;
        if (data.type === 'shot_alarm.show') showShot(data);
        if (data.channel === 'shot_alarm' && data.action === 'overlay.show' && data.payload) showShot(data.payload);
      });
      ws.addEventListener('close', () => setTimeout(connect, 1500));
    }

    const params = new URLSearchParams(location.search);
    if (params.get('test') === '1' || params.get('debug') === '1') {
      showShot({ title: 'SHOT-ALARM', holdMs: 8000, trigger: { targetLabel: 'Engel & Roxxy', eventLabel: 'Overlay-Test', user: { displayName: 'ForrestCGN' }, shots: 1, chancePercent: 100 } });
    }
    connect();
  </script>
</body>
</html>
