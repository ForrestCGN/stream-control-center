<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shot-Alarm Overlay</title>
  <style>
    * { box-sizing: border-box; }
    :root {
      --top-offset: 6px;
      --bar-height: 52px;
      --bar-radius: 24px;
      --bar-border: 3px;
      --bar-padding-x: 14px;
      --slot-gap: 8px;
      --neon-purple: #c45cff;
      --neon-blue: #8ff4ff;
      --white: #f8fafc;
      --muted: #cbd5e1;
      --fg-main: #f4f7ff;
      --fg-count-a: #8ff4ff;
      --fg-count-b: #c45cff;
      --bg-a: rgba(7, 9, 24, 0.96);
      --bg-b: rgba(5, 7, 22, 0.96);
      --count-bg: rgba(8, 10, 31, 0.62);
      --dark: rgba(8, 13, 29, 0.90);
    }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: "Montserrat", "Segoe UI", Arial, sans-serif;
      pointer-events: none;
    }
    #eventWrap {
      position: fixed;
      top: 50%;
      left: 50%;
      transform: translate(-50%, calc(-50% + 22px)) scale(0.98);
      width: min(720px, 62vw);
      pointer-events: none;
      opacity: 0;
      transition: opacity 240ms ease, transform 240ms ease;
      z-index: 8;
    }
    #eventWrap.show {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }
    .card {
      padding: 16px 22px 18px;
      border-radius: 22px;
      border: 3px solid transparent;
      background:
        radial-gradient(circle at 50% 0%, rgba(57, 230, 255, 0.12), transparent 38%) padding-box,
        linear-gradient(135deg, var(--bg-a) 0%, rgba(11, 16, 35, 0.97) 50%, var(--bg-b) 100%) padding-box,
        linear-gradient(180deg, #8ff4ff 0%, #c45cff 34%, #c45cff 100%) border-box;
      box-shadow:
        0 0 22px rgba(196, 92, 255, 0.54),
        0 0 48px rgba(57, 230, 255, 0.12),
        inset 0 0 24px rgba(57, 230, 255, 0.055);
      color: var(--white);
      text-align: center;
      position: relative;
      overflow: hidden;
      isolation: isolate;
    }
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--neon-blue);
      box-shadow: 0 0 14px var(--neon-blue), 0 0 28px var(--neon-blue);
    }
    .card::before { left: 20px; top: 18px; }
    .card::after { right: 20px; bottom: 18px; background: var(--neon-purple); box-shadow: 0 0 14px var(--neon-purple), 0 0 28px var(--neon-purple); }
    .title {
      font-size: clamp(24px, 2.8vw, 36px);
      line-height: 1;
      font-weight: 900;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      text-shadow: 0 0 14px rgba(168, 85, 247, 0.9), 0 0 24px rgba(34, 211, 238, 0.45);
      margin-bottom: 10px;
    }
    .message {
      font-size: clamp(16px, 1.8vw, 22px);
      font-weight: 800;
      margin-bottom: 8px;
    }
    .reason {
      font-size: clamp(13px, 1.25vw, 17px);
      color: var(--muted);
      margin-bottom: 14px;
    }
    .shots {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 9px 18px;
      border-radius: 999px;
      border: 1px solid rgba(34, 211, 238, 0.55);
      background: rgba(15, 23, 42, 0.72);
      box-shadow: 0 0 18px rgba(34, 211, 238, 0.22);
      font-size: clamp(16px, 1.6vw, 21px);
      font-weight: 900;
    }
    .meta {
      margin-top: 12px;
      color: #94a3b8;
      font-size: 14px;
    }
    #statusBar {
      position: fixed;
      top: var(--top-offset);
      left: 50%;
      bottom: auto;
      transform: translateX(-50%);
      min-height: var(--bar-height);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: var(--slot-gap);
      width: auto;
      min-width: 0;
      max-width: 94vw;
      padding: 0 var(--bar-padding-x);
      border-radius: var(--bar-radius);
      border: var(--bar-border) solid transparent;
      background:
        radial-gradient(circle at 50% 0%, rgba(57, 230, 255, 0.12), transparent 38%) padding-box,
        linear-gradient(135deg, var(--bg-a) 0%, rgba(11, 16, 35, 0.97) 50%, var(--bg-b) 100%) padding-box,
        linear-gradient(180deg, #8ff4ff 0%, #c45cff 34%, #c45cff 100%) border-box;
      color: var(--fg-main);
      box-shadow:
        0 0 22px rgba(196, 92, 255, 0.54),
        0 0 48px rgba(57, 230, 255, 0.12),
        inset 0 0 24px rgba(57, 230, 255, 0.055);
      pointer-events: none;
      opacity: 1;
      z-index: 10;
      overflow: hidden;
      isolation: isolate;
    }
    #statusBar::after {
      content: "";
      position: absolute;
      inset: 0;
      z-index: 1;
      pointer-events: none;
      background: linear-gradient(90deg, transparent 0%, rgba(57, 230, 255, .12) 28%, rgba(255, 255, 255, .08) 47%, rgba(196, 92, 255, .16) 62%, transparent 82%);
      opacity: .34;
      transform: translateX(-130%);
      animation: shotAlarmFrameRunner 4.8s linear infinite;
    }
    @keyframes shotAlarmFrameRunner {
      to { transform: translateX(130%); }
    }
    .status-slot {
      position: relative;
      z-index: 2;
      min-width: 0;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      white-space: nowrap;
    }
    .status-title {
      font-size: 17px;
      line-height: 1;
      font-weight: 900;
      letter-spacing: .07em;
      text-transform: uppercase;
      color: var(--fg-main);
      text-shadow:
        0 0 10px rgba(196, 92, 255, 0.64),
        0 0 18px rgba(57, 230, 255, 0.18);
      padding: 0 8px 0 2px;
    }
    .status-target {
      font-size: 15px;
      font-weight: 700;
      color: rgba(244, 247, 255, 0.92);
      text-shadow: 0 0 10px rgba(196, 92, 255, 0.42);
      padding: 0 4px;
    }
    .status-item {
      height: 40px;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 0 10px;
      border-radius: 14px;
      background:
        radial-gradient(circle at 50% 0%, rgba(57, 230, 255, 0.10), transparent 48%),
        var(--count-bg);
      box-shadow:
        0 0 12px rgba(196, 92, 255, 0.22),
        inset 0 0 14px rgba(57, 230, 255, 0.045);
      font-size: 12px;
      font-weight: 800;
      color: #dbeafe;
    }
    .status-item strong {
      min-width: 24px;
      text-align: center;
      font-size: 22px;
      line-height: 1;
      font-weight: 900;
      background: linear-gradient(90deg, var(--fg-count-a) 40%, var(--fg-count-b) 92%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 2px 7px rgba(5, 7, 22, 0.70),
        0 0 10px rgba(57, 230, 255, 0.18);
    }
    .dot {
      position: relative;
      z-index: 2;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex: 0 0 auto;
      background: var(--neon-blue);
      box-shadow: 0 0 12px var(--neon-blue), 0 0 22px rgba(57, 230, 255, 0.42);
      margin: 0 4px 0 2px;
    }
    .sep {
      position: relative;
      z-index: 2;
      width: 1px;
      height: 28px;
      margin: 0 2px;
      background: linear-gradient(180deg, transparent, rgba(143,244,255,.58), rgba(196,92,255,.46), transparent);
      box-shadow: 0 0 10px rgba(143,244,255,.24);
      opacity: .82;
    }
    @media (max-width: 760px) {
      #eventWrap { width: min(680px, 88vw); }
      #statusBar { transform: translateX(-50%) scale(.86); transform-origin: top center; }
      .status-target { display: none; }
    }
    @keyframes pulse {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.16); }
    }
    #eventWrap.show .card { animation: pulse 1.4s ease-in-out infinite; }
  </style>
</head>
<body>
  <div id="eventWrap">
    <div class="card">
      <div class="title" id="title">SHOT-ALARM</div>
      <div class="message" id="message">Die Heimleitung lost aus...</div>
      <div class="reason" id="reason">Support-Event</div>
      <div class="shots">🥃 <span id="shots">Auslosung läuft</span></div>
      <div class="meta" id="meta"></div>
    </div>
  </div>

  <div id="statusBar">
    <span class="dot"></span>
    <span class="status-slot status-title">SHOT-ALARM</span>
    <span class="sep"></span>
    <span class="status-slot status-target">Engel &amp; Roxxy</span>
    <span class="status-slot status-item">OFFEN <strong id="openShots">0</strong></span>
    <span class="status-slot status-item">GETRUNKEN <strong id="drunkShots">0</strong></span>
    <span class="status-slot status-item">GESAMT <strong id="totalShots">0</strong></span>
  </div>

  <script>
    const eventWrap = document.getElementById('eventWrap');
    const titleEl = document.getElementById('title');
    const messageEl = document.getElementById('message');
    const reasonEl = document.getElementById('reason');
    const shotsEl = document.getElementById('shots');
    const metaEl = document.getElementById('meta');
    const openShotsEl = document.getElementById('openShots');
    const drunkShotsEl = document.getElementById('drunkShots');
    const totalShotsEl = document.getElementById('totalShots');
    let hideTimer = null;
    let ws = null;

    function escText(value) { return String(value ?? ''); }
    function fmt(n) { return Number(n || 0).toLocaleString('de-DE'); }

    function applyStatus(status) {
      if (!status) return;
      openShotsEl.textContent = fmt(status.shotsOpen);
      drunkShotsEl.textContent = fmt(status.shotsDrunk);
      totalShotsEl.textContent = fmt(status.shotsAddedTotal);
    }

    async function fetchStatus() {
      try {
        const res = await fetch('/api/shot-alarm/status');
        const data = await res.json();
        applyStatus(data);
      } catch (_) {}
    }

    function showPayload(payload) {
      const summary = payload && payload.summary ? payload.summary : payload;
      if (payload.status) applyStatus(payload.status);
      const phase = payload.phase || summary.phase || 'result';
      const shotsAdded = Math.max(0, Number(summary.shotsAdded || summary.shots || 0));
      titleEl.textContent = escText(payload.title || 'SHOT-ALARM');
      messageEl.textContent = escText(payload.message || (phase === 'draw' ? 'Die Heimleitung lost aus...' : shotsAdded > 0 ? 'Engel & Roxxy müssen ran!' : 'Die Rentner-Leber wurde verschont.'));
      const user = summary.user && summary.user.displayName ? summary.user.displayName : '';
      const reason = summary.amountLabel || summary.eventLabel || summary.kind || 'Support-Event';
      reasonEl.textContent = user ? `${reason} von ${user}` : reason;
      if (phase === 'draw') shotsEl.textContent = 'Auslosung läuft';
      else shotsEl.textContent = shotsAdded === 1 ? '+1 Shot' : `+${shotsAdded} Shots`;
      if (phase === 'draw') metaEl.textContent = summary.chanceSummary ? `Regel: ${summary.chanceSummary}` : 'Die Heimleitung prüft den Fall...';
      else metaEl.textContent = `Noch offen: ${fmt(summary.shotsOpen ?? payload.status?.shotsOpen)} · Getrunken: ${fmt(summary.shotsDrunk ?? payload.status?.shotsDrunk)}`;
      eventWrap.classList.add('show');
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => eventWrap.classList.remove('show'), Math.max(1500, Number(payload.holdMs || 10000)));
    }

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.addEventListener('open', () => {
        try { ws.send(JSON.stringify({ type: 'hello', module: 'shot_alarm_overlay', clientId: 'shot_alarm_overlay', clientType: 'overlay' })); } catch (_) {}
        fetchStatus();
      });
      ws.addEventListener('message', ev => {
        let data = null;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (!data) return;
        if (data.type === 'shot_alarm.draw' || data.type === 'shot_alarm.result') showPayload(data);
        if (data.type === 'shot_alarm.status_bar') applyStatus(data);
        if (data.channel === 'shot_alarm' && data.action === 'overlay.show' && data.payload) showPayload(data.payload);
        if (data.channel === 'shot_alarm' && data.action === 'status_bar.update' && data.payload) applyStatus(data.payload);
      });
      ws.addEventListener('close', () => setTimeout(connect, 1500));
    }

    const params = new URLSearchParams(location.search);
    if (params.get('test') === '1' || params.get('debug') === '1') {
      showPayload({ phase: 'result', title: 'SHOT-ALARM', message: 'Engel & Roxxy müssen ran!', holdMs: 8000, status: { shotsOpen: 7, shotsDrunk: 3, shotsAddedTotal: 10 }, summary: { targetLabel: 'Engel & Roxxy', amountLabel: '25.000 Bits', user: { displayName: 'ForrestCGN' }, shotsAdded: 4, shotsOpen: 7, shotsDrunk: 3, chanceSummary: '2 sicher + 5x 50/50' } });
      applyStatus({ shotsOpen: 7, shotsDrunk: 3, shotsAddedTotal: 10 });
    }
    connect();
    fetchStatus();
    setInterval(fetchStatus, 5000);
  </script>
</body>
</html>
