<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>ForrestCGN TTS Overlay</title>
  <style>
    :root {
      --card-w: 900px;
      --card-min-h: 148px;
      --x: 50%;
      --y: calc(100% - 120px);
      --scale: 1;
      --cyan: #8ff4ff;
      --purple: #c45cff;
      --pink: #ff5eea;
      --text: #f8fbff;
      --muted: #b9c7e8;
      --panel-a: rgba(5, 7, 22, .94);
      --panel-b: rgba(18, 10, 46, .92);
    }

    * { box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      margin: 0;
      padding: 0;
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Arial, sans-serif;
    }

    body { pointer-events: none; }

    body[data-debug="1"] #debug { display: block; }

    #debug {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 99999;
      display: none;
      min-width: 520px;
      max-width: 900px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(143, 244, 255, .78);
      background: rgba(3, 6, 18, .88);
      color: #dff7ff;
      font: 13px/1.35 Consolas, monospace;
      white-space: pre-wrap;
      box-shadow: 0 0 18px rgba(143, 244, 255, .25);
      pointer-events: none;
    }

    #wrap {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: min(var(--card-w), calc(100vw - 64px));
      min-height: var(--card-min-h);
      opacity: 0;
      visibility: hidden;
      transform: translate(-50%, -50%) translateY(34px) scale(calc(var(--scale) * .96));
      transform-origin: center center;
      filter: blur(6px);
      transition: opacity .32s ease, transform .48s cubic-bezier(.16,1,.3,1), filter .36s ease;
      will-change: opacity, transform, filter;
      z-index: 50;
    }

    #wrap.visible {
      opacity: 1;
      visibility: visible;
      transform: translate(-50%, -50%) translateY(0) scale(var(--scale));
      filter: blur(0);
    }

    #wrap.exiting {
      opacity: 0;
      visibility: visible;
      transform: translate(-50%, -50%) translateY(-22px) scale(calc(var(--scale) * .985));
      filter: blur(4px);
    }

    .card {
      position: relative;
      min-height: var(--card-min-h);
      display: grid;
      grid-template-columns: 82px minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      padding: 22px 28px;
      border: 4px solid transparent;
      border-radius: 40px;
      background:
        radial-gradient(circle at 12% 50%, rgba(143,244,255,.13), transparent 34%) padding-box,
        linear-gradient(135deg, var(--panel-b), var(--panel-a)) padding-box,
        linear-gradient(120deg, var(--cyan), var(--purple) 42%, var(--pink) 72%, var(--cyan)) border-box;
      box-shadow:
        0 0 34px rgba(196,92,255,.44),
        0 0 80px rgba(143,244,255,.10),
        inset 0 0 30px rgba(143,244,255,.055);
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 15px 18px;
      border-radius: 29px;
      border: 2px solid transparent;
      background:
        linear-gradient(180deg, rgba(7,11,28,.95), rgba(4,7,20,.94)) padding-box,
        linear-gradient(180deg, rgba(143,244,255,.78), rgba(196,92,255,.82)) border-box;
      z-index: 0;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: -30px;
      background: linear-gradient(90deg, transparent 0%, rgba(143,244,255,.08) 30%, rgba(255,255,255,.11) 47%, rgba(196,92,255,.16) 62%, transparent 82%);
      transform: translateX(-132%);
      animation: runner 4.6s linear infinite;
      opacity: .48;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes runner { to { transform: translateX(132%); } }

    .orb {
      position: relative;
      z-index: 3;
      width: 76px;
      height: 76px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.38), transparent 32%),
        radial-gradient(circle at 50% 50%, rgba(143,244,255,.26), transparent 50%),
        linear-gradient(135deg, rgba(11, 16, 45, .98), rgba(121, 45, 220, .95) 53%, rgba(24, 199, 239, .82));
      border: 3px solid rgba(255,255,255,.92);
      box-shadow: 0 0 24px rgba(143,244,255,.32), 0 0 34px rgba(196,92,255,.42);
    }

    .orb svg {
      width: 34px;
      height: 34px;
      color: #fff;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.32)) drop-shadow(0 0 16px rgba(196,92,255,.32));
    }

    .content {
      position: relative;
      z-index: 3;
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .toprow {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(143,244,255,.34);
      white-space: nowrap;
    }

    .label-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      animation: pulseDot 1.35s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: .55; transform: scale(.92); }
      50% { opacity: 1; transform: scale(1.22); }
    }

    #user {
      min-width: 0;
      color: #fff;
      font-size: 28px;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: .01em;
      text-shadow: 0 0 16px rgba(196,92,255,.42), 0 0 20px rgba(143,244,255,.16);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #role {
      margin-left: auto;
      flex: 0 0 auto;
      padding: 4px 10px;
      border-radius: 999px;
      border: 1px solid rgba(143,244,255,.34);
      background: rgba(143,244,255,.08);
      color: #dff7ff;
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .08em;
      text-transform: uppercase;
    }

    #text {
      color: var(--text);
      font-size: 25px;
      line-height: 1.18;
      font-weight: 760;
      text-shadow: 0 2px 10px rgba(0,0,0,.55);
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .meta {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
      letter-spacing: .08em;
      text-transform: uppercase;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
  </style>
</head>
<body>
  <div id="debug">TTS overlay boot...</div>

  <div id="wrap" aria-hidden="true">
    <div class="card">
      <div class="orb" aria-hidden="true">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z" />
          <path d="M19 10v2a7 7 0 0 1-14 0v-2" />
          <path d="M12 19v3" />
          <path d="M8 22h8" />
        </svg>
      </div>
      <div class="content">
        <div class="toprow">
          <div class="label"><span class="label-dot"></span><span>Text to Speech</span></div>
          <div id="role">TTS</div>
        </div>
        <div id="user">ForrestCGN</div>
        <div id="text">...</div>
        <div class="meta" id="meta">Sound-System Visual</div>
      </div>
    </div>
  </div>

  <script>
    const SOUND_STATUS_URL = "/api/sound/status";
    const params = new URLSearchParams(location.search);
    const debugEnabled = params.get("debug") === "1";
    const pollEnabled = params.get("poll") !== "0";
    const pollMs = Math.max(200, Math.min(5000, Number(params.get("pollMs") || 350)));

    const wrap = document.getElementById("wrap");
    const userEl = document.getElementById("user");
    const roleEl = document.getElementById("role");
    const textEl = document.getElementById("text");
    const metaEl = document.getElementById("meta");
    const debugEl = document.getElementById("debug");

    if (debugEnabled) document.body.dataset.debug = "1";

    let ws = null;
    let reconnectTimer = null;
    let pollTimer = null;
    let hideTimer = null;
    let visible = false;
    let currentSoundRequestId = "";

    function setDebug(lines) {
      if (!debugEnabled || !debugEl) return;
      debugEl.textContent = (Array.isArray(lines) ? lines : [String(lines || "")]).join("\n");
    }

    function safe(value, fallback = "") {
      const text = String(value == null ? "" : value).trim();
      return text || fallback;
    }

    function applyParams() {
      const pos = safe(params.get("position"), "bottom").toLowerCase();
      const width = Number(params.get("width") || 900);
      const scale = Number(params.get("scale") || 1);
      const bottom = Number(params.get("bottom") || 120);
      const top = Number(params.get("top") || 0);
      const x = Number(params.get("x") || 50);

      document.documentElement.style.setProperty("--card-w", Math.max(420, Math.min(1500, width)) + "px");
      document.documentElement.style.setProperty("--scale", (Number.isFinite(scale) && scale > 0 ? scale : 1).toString());
      document.documentElement.style.setProperty("--x", `${Math.max(0, Math.min(100, x))}%`);

      if (pos === "center" || pos === "middle") {
        document.documentElement.style.setProperty("--y", "50%");
      } else if (pos === "top") {
        document.documentElement.style.setProperty("--y", `${Math.max(40, top || 120)}px`);
      } else {
        document.documentElement.style.setProperty("--y", `calc(100% - ${Math.max(40, bottom)}px)`);
      }
    }

    function isTtsItem(item) {
      const visual = item && item.visual ? item.visual : {};
      return safe(visual.module).toLowerCase() === "tts_overlay";
    }

    function findTtsItem(state) {
      if (!state || !state.ok) return null;
      if (state.current && isTtsItem(state.current)) return state.current;
      if (Array.isArray(state.parallel)) {
        return state.parallel.find(isTtsItem) || null;
      }
      if (Array.isArray(state.queue)) {
        return state.queue.find(isTtsItem) || null;
      }
      return null;
    }

    function visualFromItem(item) {
      const visual = item && item.visual ? item.visual : {};
      const requestId = safe(item.requestId || visual.soundRequestId || visual.requestId || item.id || item.soundId);
      return {
        soundRequestId: requestId,
        requestId: safe(visual.requestId || requestId),
        displayName: safe(visual.displayName || visual.user || item.requestedBy || item.user, "TTS"),
        login: safe(visual.login || item.requestedBy || item.user),
        role: safe(visual.role || item.role || "tts", "tts"),
        text: safe(visual.text || item.text || item.label || ""),
        voiceLabel: safe(visual.voiceLabel || visual.voice || ""),
        engine: safe(visual.engine || ""),
        durationMs: Number(visual.durationMs || item.durationMs || 0)
      };
    }

    function showOverlay(data, reason) {
      if (!data || !data.requestId) return;

      clearTimeout(hideTimer);
      currentSoundRequestId = data.soundRequestId || data.requestId;
      visible = true;

      userEl.textContent = data.displayName || "TTS";
      roleEl.textContent = data.role || "tts";
      textEl.textContent = data.text || "";
      metaEl.textContent = [data.engine, data.voiceLabel].filter(Boolean).join(" · ") || "Sound-System";

      wrap.classList.remove("exiting");
      wrap.classList.add("visible");
      wrap.setAttribute("aria-hidden", "false");

      setDebug([
        "SHOW TTS OVERLAY",
        "reason=" + reason,
        "requestId=" + data.requestId,
        "soundRequestId=" + data.soundRequestId,
        "displayName=" + data.displayName,
        "role=" + data.role,
        "text=" + data.text,
        "durationMs=" + data.durationMs
      ]);
    }

    function hideOverlay(reason) {
      if (!visible) return;
      visible = false;
      wrap.classList.remove("visible");
      wrap.classList.add("exiting");
      wrap.setAttribute("aria-hidden", "true");
      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        wrap.classList.remove("exiting");
        currentSoundRequestId = "";
      }, 450);
      setDebug(["HIDE TTS OVERLAY", "reason=" + reason]);
    }

    function handleSoundItem(item, reason) {
      if (!item || !isTtsItem(item)) return false;
      const data = visualFromItem(item);
      showOverlay(data, reason || "sound_item");
      return true;
    }

    async function pollSoundStatus() {
      try {
        const res = await fetch(`${SOUND_STATUS_URL}?t=${Date.now()}`, { cache: "no-store" });
        if (!res.ok) return;
        const state = await res.json();
        const item = findTtsItem(state);
        if (item) {
          handleSoundItem(item, "status_poll");
          return;
        }
        if (visible) hideOverlay("status_poll_empty");
      } catch (err) {
        setDebug(["poll failed", err && err.message ? err.message : String(err)]);
      }
    }

    function handleSoundSystemEvent(payload) {
      if (!payload || payload.op !== "sound_system") return;
      const reason = safe(payload.reason);
      const data = payload.data || payload.payload || {};
      const item = payload.item || data.item || data.current || null;

      setDebug([
        "SOUND EVENT",
        "reason=" + reason,
        "hasItem=" + Boolean(item),
        "requestId=" + safe(item && item.requestId),
        "visual.module=" + safe(item && item.visual && item.visual.module),
        "isTts=" + Boolean(item && isTtsItem(item))
      ]);

      const startReasons = ["started", "device_play_started", "item_started", "item_starting", "play_stream", "next_started", "interrupted_started", "parallel_started", "resumed"];
      const stopReasons = ["auto_finished", "finished", "device_play_finished", "device_play_stopped", "manual_stop", "manual_skip", "stop_stream", "skip_stream", "stopped", "reset"];

      if (startReasons.includes(reason)) {
        handleSoundItem(item, reason);
        return;
      }

      if (stopReasons.includes(reason)) {
        hideOverlay(reason);
      }
    }

    function connectWs() {
      clearTimeout(reconnectTimer);
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(protocol + "//" + location.host);

      setDebug(["TTS overlay WS connecting", "host=" + location.host]);

      ws.addEventListener("open", () => setDebug(["TTS overlay WS open", "host=" + location.host]));
      ws.addEventListener("message", (event) => {
        try { handleSoundSystemEvent(JSON.parse(event.data)); } catch (_) {}
      });
      ws.addEventListener("close", () => {
        setDebug(["TTS overlay WS closed", "reconnect in 1500ms"]);
        reconnectTimer = setTimeout(connectWs, 1500);
      });
      ws.addEventListener("error", () => { try { ws.close(); } catch (_) {} });
    }

    function init() {
      applyParams();
      connectWs();
      if (pollEnabled) {
        pollSoundStatus();
        pollTimer = setInterval(pollSoundStatus, pollMs);
      }
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(reconnectTimer);
      clearTimeout(hideTimer);
      clearInterval(pollTimer);
      try { if (ws) ws.close(); } catch (_) {}
    });

    init();
  </script>
</body>
</html>
