<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN TTS Overlay</title>
  <style>
    :root {
      --card-w: 860px;
      --card-min-h: 146px;
      --stage-x: 50%;
      --stage-y: calc(100% - 118px);
      --scale: 1;
      --panel: rgba(5, 7, 22, .94);
      --panel-2: rgba(10, 13, 34, .96);
      --inner: rgba(7, 11, 28, .94);
      --cyan: #8ff4ff;
      --cyan-soft: rgba(143, 244, 255, .34);
      --purple: #c45cff;
      --purple-soft: rgba(196, 92, 255, .42);
      --pink: #d77cff;
      --white: #f8fbff;
      --text: #f8fbff;
      --muted: #b9c7e8;
      --danger: #ff6f9d;
      --ok: #8ff4ff;
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    body {
      pointer-events: none;
    }

    #wrap {
      position: fixed;
      left: var(--stage-x);
      top: var(--stage-y);
      width: min(var(--card-w), calc(100vw - 52px));
      min-height: var(--card-min-h);
      transform: translate(-50%, -50%) translateY(34px) scale(calc(var(--scale) * .96));
      opacity: 0;
      filter: blur(7px);
      transition:
        opacity .34s ease,
        transform .56s cubic-bezier(.16, 1, .3, 1),
        filter .42s ease;
      will-change: transform, opacity, filter;
    }

    #wrap.show {
      opacity: 1;
      transform: translate(-50%, -50%) translateY(0) scale(var(--scale));
      filter: blur(0);
    }

    #wrap.hide {
      opacity: 0;
      transform: translate(-50%, -50%) translateY(-24px) scale(calc(var(--scale) * .985));
      filter: blur(5px);
    }

    .lines {
      position: absolute;
      left: 50%;
      top: 50%;
      width: calc(100% + 260px);
      height: 34px;
      transform: translate(-50%, -50%);
      z-index: 0;
      opacity: .78;
    }

    .line {
      position: absolute;
      top: 50%;
      width: 132px;
      height: 3px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), transparent);
      box-shadow: 0 0 16px var(--purple-soft), 0 0 22px rgba(143,244,255,.18);
    }

    .line.left { left: 0; transform: translateY(-50%); }
    .line.right { right: 0; transform: translateY(-50%) scaleX(-1); }

    .diamond {
      position: absolute;
      top: 50%;
      width: 18px;
      height: 18px;
      background: var(--white);
      transform: translateY(-50%) rotate(45deg);
      box-shadow: 0 0 12px rgba(255,255,255,.62), 0 0 24px var(--purple-soft);
      opacity: .9;
    }

    .diamond.left { left: 74px; animation: diamondLeft 5.8s ease-in-out infinite; }
    .diamond.right { right: 74px; animation: diamondRight 5.8s ease-in-out infinite; animation-delay: -2.9s; }

    @keyframes diamondLeft {
      0%, 100% { transform: translateY(-50%) rotate(45deg) translateX(0); opacity: .72; }
      50% { transform: translateY(-50%) rotate(45deg) translateX(42px); opacity: 1; }
    }

    @keyframes diamondRight {
      0%, 100% { transform: translateY(-50%) rotate(45deg) translateX(0); opacity: .72; }
      50% { transform: translateY(-50%) rotate(45deg) translateX(-42px); opacity: 1; }
    }

    .card {
      position: relative;
      z-index: 2;
      min-height: var(--card-min-h);
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      gap: 18px;
      align-items: center;
      padding: 22px 28px;
      border: 4px solid transparent;
      border-radius: 42px;
      background:
        radial-gradient(circle at 12% 50%, rgba(143,244,255,.10), transparent 31%) padding-box,
        linear-gradient(135deg, var(--panel-2), var(--panel)) padding-box,
        linear-gradient(180deg, var(--cyan) 0%, var(--purple) 34%, var(--purple) 100%) border-box;
      box-shadow:
        0 0 34px rgba(196,92,255,.48),
        0 0 80px rgba(143,244,255,.09),
        inset 0 0 30px rgba(143,244,255,.06);
      overflow: hidden;
      isolation: isolate;
    }

    .card::before {
      content: "";
      position: absolute;
      inset: 15px 18px;
      border-radius: 30px;
      border: 2px solid transparent;
      background:
        linear-gradient(180deg, var(--inner), rgba(4, 7, 20, .94)) padding-box,
        linear-gradient(180deg, rgba(143,244,255,.82), rgba(196,92,255,.86)) border-box;
      box-shadow: inset 0 0 20px rgba(143,244,255,.045);
      z-index: 0;
      pointer-events: none;
    }

    .card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent 0%, rgba(143,244,255,.10) 30%, rgba(255,255,255,.10) 47%, rgba(196,92,255,.16) 62%, transparent 82%);
      transform: translateX(-132%);
      animation: runner 4.6s linear infinite;
      opacity: .46;
      z-index: 1;
      pointer-events: none;
    }

    @keyframes runner { to { transform: translateX(132%); } }

    .orb {
      position: relative;
      z-index: 3;
      width: 78px;
      height: 78px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 18%, rgba(255,255,255,.38), transparent 32%),
        radial-gradient(circle at 50% 50%, rgba(143,244,255,.26), transparent 50%),
        linear-gradient(135deg, rgba(11, 16, 45, .98), rgba(121, 45, 220, .95) 53%, rgba(24, 199, 239, .82));
      border: 3px solid rgba(255,255,255,.92);
      box-shadow: 0 0 24px rgba(143,244,255,.32), 0 0 34px rgba(196,92,255,.42);
      flex: 0 0 auto;
    }

    .orb::before {
      content: "";
      position: absolute;
      inset: 12px;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.42);
      box-shadow: inset 0 0 12px rgba(255,255,255,.08);
    }

    .mic {
      position: relative;
      z-index: 2;
      width: 34px;
      height: 34px;
      color: #fff;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.32)) drop-shadow(0 0 16px rgba(196,92,255,.32));
    }

    .content {
      position: relative;
      z-index: 3;
      min-width: 0;
      display: grid;
      gap: 8px;
    }

    .toprow {
      display: flex;
      align-items: center;
      gap: 10px;
      min-width: 0;
    }

    .label {
      display: inline-flex;
      align-items: center;
      gap: 7px;
      color: var(--cyan);
      font-size: 12px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(143,244,255,.34);
      white-space: nowrap;
    }

    .label-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 12px var(--cyan);
      animation: pulseDot 1.35s ease-in-out infinite;
    }

    @keyframes pulseDot {
      0%, 100% { opacity: .55; transform: scale(.92); }
      50% { opacity: 1; transform: scale(1.22); }
    }

    .user {
      min-width: 0;
      max-width: 100%;
      color: var(--white);
      font-size: 28px;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: .01em;
      text-shadow: 0 0 16px rgba(196,92,255,.42), 0 0 20px rgba(143,244,255,.16);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .role {
      margin-left: auto;
      flex: 0 0 auto;
      display: inline-flex;
      align-items: center;
      min-height: 24px;
      padding: 4px 11px;
      border-radius: 999px;
      border: 1px solid rgba(143,244,255,.30);
      background: rgba(57,230,255,.075);
      color: #eafaff;
      font-size: 11px;
      font-weight: 900;
      letter-spacing: .09em;
      text-transform: uppercase;
      box-shadow: 0 0 16px rgba(143,244,255,.10);
    }

    .role.role-broadcaster { border-color: rgba(215,124,255,.42); color: #f3ddff; background: rgba(196,92,255,.12); }
    .role.role-moderator { border-color: rgba(143,244,255,.42); color: #dffaff; }
    .role.role-vip { border-color: rgba(215,124,255,.48); color: #f7e4ff; }
    .role.role-subscriber { border-color: rgba(255,255,255,.28); color: #eaf1ff; }

    .text {
      color: #eaf1ff;
      font-size: 24px;
      line-height: 1.24;
      font-weight: 750;
      letter-spacing: .003em;
      text-shadow: 0 2px 9px rgba(0,0,0,.58);
      overflow-wrap: anywhere;
      word-break: normal;
      max-height: 3.8em;
      overflow: hidden;
    }

    .spark {
      position: absolute;
      z-index: 1;
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 16px var(--cyan);
      opacity: .65;
      animation: sparkFloat 5.6s ease-in-out infinite;
      pointer-events: none;
    }

    .spark.s1 { top: 24%; left: 6%; }
    .spark.s2 { bottom: 20%; right: 8%; animation-delay: -1.1s; background: var(--pink); box-shadow: 0 0 16px var(--pink); }
    .spark.s3 { top: 23%; right: 17%; animation-delay: -2.5s; background: var(--purple); box-shadow: 0 0 16px var(--purple); }

    @keyframes sparkFloat {
      0%, 100% { transform: translateY(0) scale(1); opacity: .38; }
      50% { transform: translateY(-16px) scale(1.44); opacity: .95; }
    }

    @media (max-width: 760px) {
      :root { --card-w: calc(100vw - 24px); --card-min-h: 132px; --stage-y: calc(100% - 92px); }
      .lines { display: none; }
      .card { grid-template-columns: 1fr; padding: 20px 22px; border-radius: 34px; }
      .card::before { inset: 12px 14px; border-radius: 24px; }
      .orb { display: none; }
      .user { font-size: 23px; }
      .text { font-size: 20px; max-height: 4.9em; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  </style>
</head>
<body>
  <div id="wrap" aria-live="polite">
    <div class="lines" aria-hidden="true">
      <div class="line left"></div>
      <div class="line right"></div>
      <div class="diamond left"></div>
      <div class="diamond right"></div>
    </div>

    <div class="card">
      <div class="spark s1"></div>
      <div class="spark s2"></div>
      <div class="spark s3"></div>

      <div class="orb" aria-hidden="true">
        <svg class="mic" viewBox="0 0 64 64" role="img" aria-label="Mikrofon">
          <path fill="currentColor" d="M32 7c-7.1 0-12.8 5.7-12.8 12.8v12.4C19.2 39.3 24.9 45 32 45s12.8-5.7 12.8-12.8V19.8C44.8 12.7 39.1 7 32 7Zm0 43.2c-10.3 0-18.7-8.4-18.7-18.7a2.7 2.7 0 1 0-5.4 0c0 12.3 9.4 22.5 21.4 23.7v4.1h-7.1a2.7 2.7 0 0 0 0 5.4h19.6a2.7 2.7 0 1 0 0-5.4h-7.1v-4.1c12-1.3 21.4-11.4 21.4-23.7a2.7 2.7 0 1 0-5.4 0c0 10.3-8.4 18.7-18.7 18.7Z"/>
        </svg>
      </div>

      <div class="content">
        <div class="toprow">
          <div class="label"><span class="label-dot"></span>Text to Speech</div>
          <div id="role" class="role">TTS</div>
        </div>
        <div id="user" class="user">ForrestCGN</div>
        <div id="text" class="text">...</div>
      </div>
    </div>
  </div>

  <audio id="player" preload="auto"></audio>

  <script>
    const wrap = document.getElementById("wrap");
    const userEl = document.getElementById("user");
    const roleEl = document.getElementById("role");
    const textEl = document.getElementById("text");
    const player = document.getElementById("player");

    const params = new URLSearchParams(location.search);
    const position = String(params.get("position") || "bottom").toLowerCase();
    const scale = Number(params.get("scale") || "1") || 1;
    const width = Number(params.get("width") || "860") || 860;
    const bottom = Number(params.get("bottom") || "118") || 118;
    const top = Number(params.get("top") || "160") || 160;
    const x = Number(params.get("x") || "50") || 50;

    document.documentElement.style.setProperty("--scale", String(Math.max(.65, Math.min(1.35, scale))));
    document.documentElement.style.setProperty("--card-w", `${Math.max(520, Math.min(1200, width))}px`);
    document.documentElement.style.setProperty("--stage-x", `${Math.max(0, Math.min(100, x))}%`);
    if (position === "top") {
      document.documentElement.style.setProperty("--stage-y", `${Math.max(40, Math.min(980, top))}px`);
    } else if (position === "center" || position === "middle") {
      document.documentElement.style.setProperty("--stage-y", "50%");
    } else {
      document.documentElement.style.setProperty("--stage-y", `calc(100% - ${Math.max(40, Math.min(420, bottom))}px)`);
    }

    let currentId = null;
    let reconnectTimer = null;
    let gapAfterMs = 350;
    let activeWs = null;
    let visualTimer = null;

    function wsUrl() {
      const proto = location.protocol === "https:" ? "wss:" : "ws:";
      return `${proto}//${location.host}`;
    }

    function roleLabel(role) {
      const raw = String(role || "tts").trim().toLowerCase();
      const map = {
        broadcaster: "Chefetage",
        moderator: "Mod",
        vip: "VIP",
        subscriber: "Sub",
        viewer: "Viewer",
        system: "System",
        tts: "TTS"
      };
      return map[raw] || raw;
    }

    function roleClass(role) {
      return String(role || "tts").trim().toLowerCase().replace(/[^a-z0-9_-]/g, "") || "tts";
    }

    function show(item) {
      const role = item.role || "tts";
      userEl.textContent = item.user || "Unbekannt";
      roleEl.textContent = roleLabel(role);
      roleEl.className = `role role-${roleClass(role)}`;
      textEl.textContent = item.text || "";
      wrap.classList.remove("hide");
      requestAnimationFrame(() => wrap.classList.add("show"));
    }

    function hide() {
      wrap.classList.remove("show");
      wrap.classList.add("hide");
    }

    async function markDone(id) {
      try {
        await fetch(`/api/tts/done?id=${encodeURIComponent(id || "")}`, { cache: "no-store" });
      } catch (err) {
        console.error("TTS done failed", err);
      }
    }

    function stopAudio(markAsDone) {
      clearTimeout(visualTimer);
      visualTimer = null;
      try {
        player.pause();
        player.removeAttribute("src");
        player.load();
      } catch (_) {}
      hide();
      if (markAsDone && currentId) {
        const id = currentId;
        currentId = null;
        markDone(id);
      }
    }

    player.addEventListener("ended", () => {
      const id = currentId;
      currentId = null;
      setTimeout(() => {
        hide();
        markDone(id);
      }, gapAfterMs || 350);
    });

    player.addEventListener("error", () => {
      const id = currentId;
      currentId = null;
      hide();
      markDone(id);
    });

    function connect() {
      const ws = new WebSocket(wsUrl());
      activeWs = ws;

      ws.addEventListener("open", () => {
        console.log("TTS Overlay WS connected");
      });

      ws.addEventListener("message", async (event) => {
        let msg;
        try { msg = JSON.parse(event.data); } catch (_) { return; }

        if (msg.op === "tts_play") {
          const item = msg.item || {};
          currentId = item.id;
          gapAfterMs = Number(msg.gapAfterMs || 350);
          show(item);

          clearTimeout(visualTimer);
          visualTimer = null;

          const playbackMode = String(msg.playbackMode || item.playbackMode || "overlay").toLowerCase();
          const visualOnly = msg.visualOnly === true || playbackMode === "sound_system" || playbackMode === "off" || !msg.audioUrl;

          if (visualOnly) {
            const showMs = Math.max(1200, Number(msg.durationMs || item.durationMs || 2500) + gapAfterMs + 450);
            visualTimer = setTimeout(() => {
              const id = currentId;
              currentId = null;
              hide();
              markDone(id);
            }, showMs);
            return;
          }

          player.src = `${msg.audioUrl}?t=${Date.now()}`;
          player.volume = 1.0;

          try {
            await player.play();
          } catch (err) {
            console.error("TTS audio play failed", err);
            const id = currentId;
            currentId = null;
            hide();
            markDone(id);
          }
        }

        if (msg.op === "tts_stop") {
          stopAudio(true);
        }
      });

      ws.addEventListener("close", () => {
        console.log("TTS Overlay WS disconnected");
        clearTimeout(reconnectTimer);
        if (activeWs === ws) reconnectTimer = setTimeout(connect, 1500);
      });

      ws.addEventListener("error", () => {
        try { ws.close(); } catch (_) {}
      });
    }

    connect();
  </script>
</body>
</html>
