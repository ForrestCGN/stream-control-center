<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <title>CGN Clip Shoutout Player - CAN44.21.20 GQL Diagnose</title>
  <meta name="viewport" content="width=1920, height=1080">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      background: transparent;
      overflow: hidden;
      font-family: system-ui, -apple-system, "Segoe UI", sans-serif;
    }

    .wrapper {
      position: absolute;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      width: 980px;
      opacity: 0;
      pointer-events: none;
    }

    .wrapper.show { animation: intro 0.9s ease-out forwards; }
    .wrapper.hide { animation: outro 0.7s ease-in forwards; }

    @keyframes intro {
      from { opacity: 0; transform: translate(-130%, -50%) scale(0.8); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }
    @keyframes outro {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%, -60%) scale(0.6); }
    }

    .panel {
      display: grid;
      grid-template-columns: 190px 3px 1fr;
      gap: 0;
      padding: 22px 30px;
      border-radius: 40px;
      background: radial-gradient(circle at 15% 50%, #a580fc, #5a3fc0 55%, #28123f);
      border: 3px solid rgba(18, 8, 38, 0.9);
      box-shadow: 0 12px 22px rgba(0,0,0,0.9);
    }

    .divider {
      width: 3px;
      height: 360px;
      background: linear-gradient(180deg, transparent, #55c4ff, #a580fc, transparent);
      box-shadow: 0 0 14px rgba(165,128,252,0.9);
      border-radius: 99px;
      margin: auto 0;
    }

    .left {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 18px;
      height: 360px;
    }

    .avatar-wrap {
      width: 150px;
      height: 150px;
      padding: 7px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #a580fc, #28123f);
      box-shadow: 0 0 24px rgba(165,128,252,0.95);
    }

    .avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      background: #140627;
      border: 3px solid #120822;
      position: relative;
    }

    .avatar-inner::before {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      border: 3px solid #1e90ff;
      box-shadow: 0 0 14px rgba(30,144,255,0.9);
      pointer-events: none;
    }

    .avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    .avatar-ph {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 12px rgba(30,144,255,0.9);
    }

    .right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding-left: 22px;
    }

    .video-frame {
      width: 100%;
      height: 360px;
      border-radius: 26px;
      overflow: hidden;
      background: #05020a;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.7);
      position: relative;
    }

    video {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 250ms ease-in-out;
      background: #000;
    }

    .status {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 22px;
      text-align: center;
      color: #f7f0ff;
      font-size: 22px;
      line-height: 1.35;
      text-shadow: 0 0 10px rgba(85,196,255,0.8);
      background: radial-gradient(circle at center, rgba(34, 18, 64, 0.96), rgba(5, 2, 10, 0.98));
      z-index: 3;
      white-space: pre-wrap;
    }

    .status.error {
      color: #ffe2e2;
      text-shadow: 0 0 10px rgba(255,80,120,0.85);
    }

    .right-name {
      margin-top: 10px;
      font-family: "Pacifico", cursive;
      font-size: 34px;
      color: white;
      text-shadow: 0 0 10px rgba(165,128,252,0.9);
      text-align: center;
    }

    .right-sub {
      font-size: 16px;
      color: #d0c9ff;
      text-align: center;
    }
  </style>
</head>
<body>
  <div class="wrapper" id="wrap">
    <div class="panel">
      <div class="left">
        <div class="avatar-wrap">
          <div class="avatar-inner">
            <img id="avatarImg" class="avatar-img" alt="avatar">
            <div id="avatarPh" class="avatar-ph">?</div>
          </div>
        </div>
      </div>

      <div class="divider"></div>

      <div class="right">
        <div class="video-frame">
          <video id="clipplayer" playsinline webkit-playsinline></video>
          <div id="statusBox" class="status">Clip wird geladen...</div>
        </div>

        <div class="right-name" id="whoName">@User</div>
        <div class="right-sub" id="subline">🧓 Altersheim-TV</div>
      </div>
    </div>
  </div>

  <script>
    const BUILD = "CAN44.21.20";
    const TWITCH_CLIENT_ID = "kimne78kx3ncx6brgo4mv6wki5h1ko";
    const PERSISTED_HASH = "36b89d2507fce29e5ca551df756d27c1cfe079e2609642b4390aa4c35796eb11";

    function qs(name) {
      return new URLSearchParams(location.search).get(name);
    }

    function cleanLogin(value) {
      return String(value || "").replace(/^@+/, "").trim();
    }

    function cleanClipId(value) {
      return String(value || "").trim();
    }

    function showWrap() {
      const wrap = document.getElementById("wrap");
      wrap.classList.remove("show", "hide");
      void wrap.offsetWidth;
      wrap.classList.add("show");
    }

    function hideWrap() {
      const wrap = document.getElementById("wrap");
      wrap.classList.remove("show");
      wrap.classList.add("hide");
    }

    function setStatus(message, isError) {
      const box = document.getElementById("statusBox");
      box.textContent = message || "";
      box.classList.toggle("error", !!isError);
      box.style.display = message ? "flex" : "none";
      if (isError) console.error("[clip-player]", message);
      else console.info("[clip-player]", message);
    }

    function makeDiag(error, detail) {
      const suffix = detail ? "\n" + String(detail).slice(0, 900) : "";
      return "Clip konnte nicht geladen werden.\n" + error + suffix;
    }

    async function setAvatarAndName(user) {
      const img = document.getElementById("avatarImg");
      const ph  = document.getElementById("avatarPh");
      const who = document.getElementById("whoName");

      const login = cleanLogin(user);
      who.textContent = login ? ("@" + login) : "Clip";
      ph.textContent  = login ? login[0].toUpperCase() : "?";
      img.style.display = "none";
      ph.style.display  = "flex";

      if (!login) return;

      try {
        const res = await fetch("/userinfo?login=" + encodeURIComponent(login), { cache: "no-store" });
        if (!res.ok) throw new Error("userinfo http " + res.status);

        const json = await res.json();
        const u = json && json.data && json.data[0] ? json.data[0] : null;
        if (!u) throw new Error("userinfo missing data[0]");

        const displayName = (u.display_name || login).trim();
        const avatarUrl   = (u.profile_image_url || "").trim();

        who.textContent = "@" + displayName;

        if (avatarUrl) {
          img.src = avatarUrl;
          img.style.display = "block";
          ph.style.display = "none";
        }
      } catch (e) {
        console.warn("[clip-player] userinfo failed:", e);
      }
    }

    async function gql(body, label) {
      const res = await fetch("https://gql.twitch.tv/gql", {
        method: "POST",
        headers: {
          "Content-Type": "text/plain;charset=UTF-8",
          "Client-ID": TWITCH_CLIENT_ID
        },
        body: JSON.stringify(body)
      });

      const text = await res.text();
      let json = null;
      try { json = text ? JSON.parse(text) : null; }
      catch (e) { throw new Error(label + " invalid_json http=" + res.status + " body=" + text.slice(0, 300)); }

      if (!res.ok) {
        throw new Error(label + " http=" + res.status + " body=" + text.slice(0, 500));
      }

      if (json && Array.isArray(json.errors) && json.errors.length) {
        throw new Error(label + " gql_errors=" + JSON.stringify(json.errors).slice(0, 700));
      }

      return json;
    }

    function extractPlayback(json, label) {
      const clip = json && json.data && json.data.clip ? json.data.clip : null;
      if (!clip) throw new Error(label + " clip missing");

      const qualities = Array.isArray(clip.videoQualities) ? clip.videoQualities.slice() : [];
      if (!qualities.length) throw new Error(label + " no qualities");

      const token = clip.playbackAccessToken || clip.accessToken || null;
      if (!token || !token.signature || !token.value) throw new Error(label + " token missing");

      qualities.sort((a, b) => Number(b.quality || 0) - Number(a.quality || 0));
      const best = qualities.find(q => q && q.sourceURL) || qualities[0];
      if (!best || !best.sourceURL) throw new Error(label + " sourceURL missing");

      const url = best.sourceURL
        + "?sig=" + encodeURIComponent(token.signature)
        + "&token=" + encodeURIComponent(token.value);

      return { url, clip, quality: best.quality || "source", label };
    }

    async function loadClipWithPersistedQuery(clipId, version) {
      const label = "persisted_v" + version;
      const json = await gql({
        operationName: "VideoAccessToken_Clip",
        variables: { slug: clipId },
        extensions: {
          persistedQuery: {
            version,
            sha256Hash: PERSISTED_HASH
          }
        }
      }, label);
      return extractPlayback(json, label);
    }

    async function loadClipWithExplicitQuery(clipId) {
      const label = "explicit_query";
      const json = await gql({
        operationName: "ClipPlayerAccessTokenQuery",
        query: `query ClipPlayerAccessTokenQuery($slug: ID!) {
          clip(slug: $slug) {
            id
            slug
            title
            videoQualities {
              quality
              frameRate
              sourceURL
            }
            playbackAccessToken(params: { platform: "web", playerBackend: "mediaplayer", playerType: "site" }) {
              signature
              value
            }
          }
        }`,
        variables: { slug: clipId }
      }, label);
      return extractPlayback(json, label);
    }

    async function loadClip(clipId) {
      const attempts = [];
      const methods = [
        () => loadClipWithExplicitQuery(clipId),
        () => loadClipWithPersistedQuery(clipId, 1),
        () => loadClipWithPersistedQuery(clipId, 2)
      ];

      for (const method of methods) {
        try {
          const result = await method();
          console.info("[clip-player] playback resolved", result.label, result.quality);
          return result;
        } catch (e) {
          attempts.push(e && e.message ? e.message : String(e));
          console.warn("[clip-player] playback attempt failed:", e);
        }
      }

      throw new Error(attempts.join(" | "));
    }

    async function waitForCanPlay(video, timeoutMs) {
      if (video.readyState >= 3) return;
      await new Promise((resolve, reject) => {
        const timer = setTimeout(() => cleanup(() => reject(new Error("video canplay timeout"))), timeoutMs || 8000);
        function cleanup(done) {
          clearTimeout(timer);
          video.removeEventListener("canplay", onCanPlay);
          video.removeEventListener("loadeddata", onCanPlay);
          video.removeEventListener("error", onError);
          done();
        }
        function onCanPlay() { cleanup(resolve); }
        function onError() {
          const err = video.error;
          cleanup(() => reject(new Error("video error code=" + (err ? err.code : "unknown"))));
        }
        video.addEventListener("canplay", onCanPlay, { once: true });
        video.addEventListener("loadeddata", onCanPlay, { once: true });
        video.addEventListener("error", onError, { once: true });
      });
    }

    async function play(playback) {
      const v = document.getElementById("clipplayer");
      v.pause();
      v.removeAttribute("src");
      v.load();
      v.style.opacity = 0;
      v.controls = false;
      v.muted = false;
      v.volume = 1;
      v.src = playback.url;
      v.load();

      setStatus("Clip wird vorbereitet...", false);
      await waitForCanPlay(v, 9000);

      try {
        await v.play();
      } catch (e) {
        console.warn("[clip-player] autoplay with audio failed, trying muted:", e);
        v.muted = true;
        await v.play();
      }

      setStatus("", false);
      v.style.opacity = 1;
      document.getElementById("subline").textContent = "🧓 Altersheim-TV · " + playback.label + " · " + playback.quality;

      v.onended = () => {
        v.style.opacity = 0;
        hideWrap();
      };
    }

    document.addEventListener("DOMContentLoaded", async () => {
      const clipId = cleanClipId(qs("clipId"));
      const user = qs("user") || "";

      showWrap();
      await setAvatarAndName(user);

      if (!clipId) {
        setStatus(makeDiag("clipId fehlt", "URL-Parameter clipId ist leer."), true);
        return;
      }

      setStatus("Clip wird geladen...\n" + clipId, false);

      try {
        const playback = await loadClip(clipId);
        await play(playback);
      } catch (e) {
        const message = e && e.message ? e.message : String(e);
        console.error("[clip-player] failed", e);
        setStatus(makeDiag("Playback fehlgeschlagen", message), true);
      }
    });
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="clip_player_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="clips"
    data-name="Clip Player Overlay"
    data-version="0.2.0-can44-21-20"
    data-heartbeat-ms="5000"
  ></script>
</body>
</html>
