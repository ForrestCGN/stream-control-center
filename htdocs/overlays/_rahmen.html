<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Rahmen Overlay</title>
  <style>
    :root {
      --frame-width: 778px;
      --frame-height: 436px;
      --radius: 24px;
      --line: 6px;
      --neon-purple: #a855f7;
      --neon-blue: #38bdf8;
      --neon-cyan: #22d3ee;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      padding: 0;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      background: transparent;
      display: flex;
      align-items: center;
      justify-content: center;
      font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    #frame-container {
      width: var(--frame-width);
      height: var(--frame-height);
      position: relative;
      background: transparent;
      border-radius: var(--radius);
      isolation: isolate;
      pointer-events: none;
      filter:
        drop-shadow(0 0 8px rgba(168, 85, 247, 0.72))
        drop-shadow(0 0 16px rgba(56, 189, 248, 0.34));
    }

    /* Gleichmäßige Hauptkante: überall dieselbe Stärke, keine extra Unterkante. */
    #frame-container::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: var(--line);
      background:
        linear-gradient(135deg,
          rgba(168, 85, 247, 0.98) 0%,
          rgba(132, 92, 246, 0.94) 23%,
          rgba(56, 189, 248, 0.90) 50%,
          rgba(34, 211, 238, 0.90) 73%,
          rgba(168, 85, 247, 0.98) 100%);
      -webkit-mask:
        linear-gradient(#fff 0 0) content-box,
        linear-gradient(#fff 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      z-index: 3;
    }

    /* Dezente helle Innenkante für saubere Abgrenzung auf dunklem und hellem Content. */
    #frame-container::after {
      content: "";
      position: absolute;
      inset: 8px;
      border-radius: calc(var(--radius) - 8px);
      border: 1px solid rgba(255, 255, 255, 0.30);
      box-shadow:
        inset 0 0 0 1px rgba(168, 85, 247, 0.18),
        inset 0 0 14px rgba(34, 211, 238, 0.10);
      pointer-events: none;
      z-index: 4;
    }

    .outer-glow {
      position: absolute;
      inset: -2px;
      border-radius: calc(var(--radius) + 2px);
      border: 1px solid rgba(168, 85, 247, 0.28);
      box-shadow:
        0 0 18px rgba(168, 85, 247, 0.44),
        0 0 32px rgba(56, 189, 248, 0.20),
        inset 0 0 16px rgba(168, 85, 247, 0.14);
      pointer-events: none;
      z-index: 2;
    }

    .inner-soften {
      position: absolute;
      inset: 12px;
      border-radius: calc(var(--radius) - 12px);
      box-shadow:
        inset 0 0 18px rgba(0, 0, 0, 0.12),
        inset 0 0 26px rgba(168, 85, 247, 0.06);
      pointer-events: none;
      z-index: 1;
    }
  </style>
</head>
<body>
  <div id="frame-container" aria-label="ForrestCGN Rahmen Overlay">
    <div class="inner-soften"></div>
    <div class="outer-glow"></div>
  </div>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="frame_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="frame_overlay"
    data-name="Rahmen Overlay"
    data-version="0.2.2"
    data-heartbeat-ms="5000"
  ></script>
</body>
</html>
