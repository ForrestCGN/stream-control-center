<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>EVS49.17A – Winner Overlay Layout Editor</title>
  <style>
    :root {
      --bg: #050814;
      --panel: rgba(7, 12, 28, 0.92);
      --panel2: rgba(12, 20, 42, 0.94);
      --cyan: #22f5ff;
      --cyan-soft: rgba(34, 245, 255, 0.18);
      --cyan-faint: rgba(34, 245, 255, 0.08);
      --yellow: rgba(255, 228, 0, 0.72);
      --purple: #a64dff;
      --text: #f4fbff;
      --muted: #9fb4c8;
      --danger: #ff4d7a;
      --ok: #64ffb5;
    }

    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: var(--bg);
      color: var(--text);
      font-family: Inter, Segoe UI, Arial, sans-serif;
    }

    body {
      display: grid;
      grid-template-columns: 1fr 360px;
      grid-template-rows: 100vh;
    }

    #viewport {
      position: relative;
      overflow: auto;
      background: radial-gradient(circle at 50% 50%, rgba(40, 15, 80, 0.35), transparent 55%), #02040d;
    }

    #stageWrap {
      position: relative;
      width: 1920px;
      height: 1080px;
      transform-origin: top left;
      user-select: none;
    }

    #stage {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: #050814;
    }

    #bgImg {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
      pointer-events: none;
      opacity: 1;
    }

    #bgFallback {
      position: absolute;
      inset: 0;
      display: none;
      background:
        radial-gradient(circle at 20% 28%, rgba(126, 33, 255, 0.42), transparent 28%),
        radial-gradient(circle at 80% 28%, rgba(24, 130, 255, 0.36), transparent 30%),
        radial-gradient(circle at 50% 85%, rgba(31, 210, 255, 0.18), transparent 35%),
        #050814;
      pointer-events: none;
    }

    #gridLayer {
      position: absolute;
      inset: 0;
      pointer-events: none;
      opacity: 1;
      background-image:
        linear-gradient(to right, rgba(34, 245, 255, 0.34) 1px, transparent 1px),
        linear-gradient(to bottom, rgba(34, 245, 255, 0.34) 1px, transparent 1px),
        linear-gradient(to right, rgba(255, 230, 0, 0.82) 2px, transparent 2px),
        linear-gradient(to bottom, rgba(255, 230, 0, 0.82) 2px, transparent 2px);
      background-size: 50px 50px, 50px 50px, 100px 100px, 100px 100px;
      mix-blend-mode: screen;
    }

    .coord-label {
      position: absolute;
      z-index: 10;
      padding: 2px 5px;
      background: rgba(0, 0, 0, 0.68);
      border: 1px solid rgba(255, 230, 0, 0.5);
      border-radius: 4px;
      color: #fff55c;
      font-size: 14px;
      line-height: 1;
      font-weight: 800;
      text-shadow: 0 0 6px #000;
      pointer-events: none;
    }
    .coord-label.y { color: var(--cyan); border-color: rgba(34, 245, 255, 0.5); }

    #boxLayer {
      position: absolute;
      inset: 0;
    }

    .box {
      position: absolute;
      min-width: 20px;
      min-height: 20px;
      border: 3px dashed rgba(34, 245, 255, 0.98);
      background: rgba(5, 25, 45, 0.34);
      box-shadow: 0 0 16px rgba(34, 245, 255, 0.38), inset 0 0 26px rgba(34, 245, 255, 0.09);
      border-radius: 18px;
      cursor: move;
      color: #fff;
    }

    .box[data-role="area"] {
      border-width: 4px;
      background: rgba(4, 19, 32, 0.46);
      box-shadow: 0 0 24px rgba(34, 245, 255, 0.52), inset 0 0 34px rgba(34, 245, 255, 0.13);
    }

    .box[data-shape="circle"] {
      border-radius: 999px;
    }

    .box.selected {
      border-color: #fff55c;
      background: rgba(255, 230, 0, 0.12);
      box-shadow: 0 0 28px rgba(255, 230, 0, 0.62), inset 0 0 28px rgba(255, 230, 0, 0.14);
      z-index: 50 !important;
    }

    .box .label {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 4px 6px;
      text-align: center;
      font-size: 15px;
      font-weight: 900;
      line-height: 1.05;
      letter-spacing: 0.02em;
      text-transform: uppercase;
      text-shadow: 0 0 5px #000, 0 0 10px #000;
      pointer-events: none;
      overflow: hidden;
    }

    .box[data-role="area"] .label {
      align-items: flex-start;
      justify-content: flex-start;
      font-size: 12px;
      opacity: 0.84;
      padding: 6px 8px;
    }

    .hide-labels .box .label { display: none; }

    .resize-handle {
      position: absolute;
      right: -8px;
      bottom: -8px;
      width: 18px;
      height: 18px;
      border-radius: 5px;
      border: 2px solid #fff55c;
      background: rgba(0,0,0,0.9);
      box-shadow: 0 0 10px rgba(255,230,0,0.7);
      cursor: nwse-resize;
    }

    #side {
      background: linear-gradient(180deg, var(--panel), rgba(5, 9, 22, 0.98));
      border-left: 1px solid rgba(34, 245, 255, 0.25);
      box-shadow: -8px 0 30px rgba(0,0,0,0.45);
      overflow-y: auto;
      padding: 14px;
    }

    h1 {
      margin: 0 0 4px;
      font-size: 18px;
      line-height: 1.15;
    }
    .sub { color: var(--muted); font-size: 12px; line-height: 1.35; margin-bottom: 12px; }
    .card {
      background: var(--panel2);
      border: 1px solid rgba(34, 245, 255, 0.18);
      border-radius: 14px;
      padding: 12px;
      margin-bottom: 12px;
    }
    .row { display: flex; gap: 8px; align-items: center; margin: 8px 0; }
    .row.wrap { flex-wrap: wrap; }
    label { font-size: 12px; color: var(--muted); }
    input[type="number"], input[type="text"], select, textarea {
      width: 100%;
      background: rgba(0,0,0,0.35);
      color: var(--text);
      border: 1px solid rgba(34, 245, 255, 0.26);
      border-radius: 8px;
      padding: 7px 8px;
      outline: none;
      font: inherit;
    }
    input[type="number"] { text-align: right; }
    textarea {
      min-height: 230px;
      resize: vertical;
      font-family: Consolas, Menlo, monospace;
      font-size: 11px;
      line-height: 1.35;
    }
    button {
      background: rgba(34, 245, 255, 0.12);
      color: var(--text);
      border: 1px solid rgba(34, 245, 255, 0.4);
      border-radius: 9px;
      padding: 8px 10px;
      font-weight: 800;
      cursor: pointer;
    }
    button:hover { background: rgba(34, 245, 255, 0.22); }
    button.danger { border-color: rgba(255, 77, 122, 0.55); background: rgba(255, 77, 122, 0.12); }
    button.ok { border-color: rgba(100, 255, 181, 0.55); background: rgba(100, 255, 181, 0.12); }
    .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .btn-grid.three { grid-template-columns: 1fr 1fr 1fr; }
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .field-grid.four { grid-template-columns: 1fr 1fr 1fr 1fr; }
    .status { font-size: 12px; color: var(--ok); min-height: 18px; margin-top: 6px; }
    .warn { color: #ffe15c; }
    .small { font-size: 11px; color: var(--muted); line-height: 1.35; }
    .list {
      max-height: 255px;
      overflow-y: auto;
      border: 1px solid rgba(34, 245, 255, 0.18);
      border-radius: 10px;
      background: rgba(0,0,0,0.18);
    }
    .list button {
      display: block;
      width: 100%;
      text-align: left;
      border: 0;
      border-bottom: 1px solid rgba(34, 245, 255, 0.10);
      border-radius: 0;
      background: transparent;
      padding: 7px 9px;
      font-size: 12px;
      font-weight: 700;
    }
    .list button.active { background: rgba(34, 245, 255, 0.18); color: #fff55c; }
    .toggle-row { display: grid; grid-template-columns: 18px 1fr; gap: 7px; align-items: center; margin: 7px 0; }
    .toggle-row input { margin: 0; }
    .kbd { color: #fff55c; font-weight: 800; }
  </style>
</head>
<body>
  <main id="viewport">
    <div id="stageWrap">
      <section id="stage" class="">
        <div id="bgFallback"></div>
        <img id="bgImg" src="/assets/stream_events/winner_finale_bg_1920x1080.png" alt="Winner Finale Hintergrund" />
        <div id="gridLayer"></div>
        <div id="coordLayer"></div>
        <div id="boxLayer"></div>
      </section>
    </div>
  </main>

  <aside id="side">
    <h1>Winner Layout Editor</h1>
    <div class="sub">EVS49.17A · Nur Boxen positionieren/skalieren · Ausgabe als JSON</div>

    <div class="card">
      <div class="toggle-row"><input type="checkbox" id="toggleGrid" checked><label for="toggleGrid">Raster anzeigen</label></div>
      <div class="toggle-row"><input type="checkbox" id="toggleLabels" checked><label for="toggleLabels">Box-Labels anzeigen</label></div>
      <div class="toggle-row"><input type="checkbox" id="toggleBg" checked><label for="toggleBg">Hintergrund anzeigen</label></div>
      <div class="toggle-row"><input type="checkbox" id="snapGrid" checked><label for="snapGrid">Snap auf Raster</label></div>
      <div class="field-grid">
        <div><label>Snap px</label><input type="number" id="snapSize" value="5" min="1" max="100"></div>
        <div><label>Zoom</label><input type="number" id="zoomInput" value="100" min="25" max="125"></div>
      </div>
      <div class="row"><button id="fitBtn">An Fenster anpassen</button><button id="zoom100Btn">100%</button></div>
      <div class="small">Tipp: Ziehen = bewegen. Gelber Griff = skalieren. Pfeiltasten = 1px, <span class="kbd">Shift</span> = 10px.</div>
    </div>

    <div class="card">
      <label>Ausgewählte Box</label>
      <select id="boxSelect"></select>
      <div class="field-grid four" style="margin-top:8px;">
        <div><label>X</label><input type="number" id="xInput"></div>
        <div><label>Y</label><input type="number" id="yInput"></div>
        <div><label>W</label><input type="number" id="wInput"></div>
        <div><label>H</label><input type="number" id="hInput"></div>
      </div>
      <div class="field-grid" style="margin-top:8px;">
        <div><label>Label</label><input type="text" id="labelInput"></div>
        <div><label>Shape</label><select id="shapeInput"><option value="rect">rect</option><option value="circle">circle</option></select></div>
      </div>
      <div class="btn-grid three" style="margin-top:8px;">
        <button id="applyBtn" class="ok">Übernehmen</button>
        <button id="duplicateBtn">Duplizieren</button>
        <button id="deleteBtn" class="danger">Löschen</button>
      </div>
      <div class="status" id="editStatus"></div>
    </div>

    <div class="card">
      <label>Boxenliste</label>
      <div id="boxList" class="list"></div>
      <div class="row"><button id="addBoxBtn">Neue Box</button><button id="resetBtn" class="danger">Reset</button></div>
    </div>

    <div class="card">
      <label>JSON Export / Import</label>
      <textarea id="jsonOutput" spellcheck="false"></textarea>
      <div class="btn-grid" style="margin-top:8px;">
        <button id="refreshJsonBtn">JSON aktualisieren</button>
        <button id="copyJsonBtn">Kopieren</button>
        <button id="downloadJsonBtn">Download JSON</button>
        <button id="importJsonBtn">Import aus Feld</button>
      </div>
      <div class="status" id="jsonStatus"></div>
      <div class="small warn">Speichern in echte Projektdatei kann der Browser nicht direkt. Deshalb JSON kopieren oder downloaden und hier im Chat schicken.</div>
    </div>
  </aside>

<script>
(() => {
  'use strict';

  const STORAGE_KEY = 'evs49_17_winner_layout_editor_v1';
  const CANVAS = { w: 1920, h: 1080 };
  const DEFAULT_BACKGROUND = '/assets/stream_events/winner_finale_bg_1920x1080.png';

  const DEFAULT_LAYOUT = {
    version: 'EVS49.17A',
    canvas: { w: 1920, h: 1080 },
    background: DEFAULT_BACKGROUND,
    boxes: [
      { id: 'header.area', label: 'HEADER AREA', group: 'header', role: 'area', shape: 'rect', x: 410, y: 105, w: 1100, h: 150 },
      { id: 'header.title', label: 'HEADER TITLE', group: 'header', role: 'title', shape: 'rect', x: 560, y: 140, w: 800, h: 46 },
      { id: 'header.subtitle', label: 'HEADER SUBTITLE', group: 'header', role: 'subtitle', shape: 'rect', x: 620, y: 200, w: 680, h: 38 },

      { id: 'slot1.area', label: 'SLOT 1 AREA', group: 'slot1', role: 'area', shape: 'rect', x: 690, y: 365, w: 540, h: 360 },
      { id: 'slot1.avatar', label: 'SLOT 1 AVATAR', group: 'slot1', role: 'avatar', shape: 'circle', x: 890, y: 405, w: 130, h: 130 },
      { id: 'slot1.name', label: 'SLOT 1 NAME', group: 'slot1', role: 'name', shape: 'rect', x: 755, y: 560, w: 410, h: 54 },
      { id: 'slot1.points', label: 'SLOT 1 POINTS', group: 'slot1', role: 'points', shape: 'rect', x: 825, y: 625, w: 270, h: 44 },
      { id: 'slot1.reward', label: 'SLOT 1 REWARD', group: 'slot1', role: 'reward', shape: 'rect', x: 825, y: 685, w: 270, h: 44 },

      { id: 'slot2.area', label: 'SLOT 2 AREA', group: 'slot2', role: 'area', shape: 'rect', x: 120, y: 405, w: 475, h: 315 },
      { id: 'slot2.avatar', label: 'SLOT 2 AVATAR', group: 'slot2', role: 'avatar', shape: 'circle', x: 295, y: 450, w: 120, h: 120 },
      { id: 'slot2.name', label: 'SLOT 2 NAME', group: 'slot2', role: 'name', shape: 'rect', x: 185, y: 585, w: 340, h: 50 },
      { id: 'slot2.points', label: 'SLOT 2 POINTS', group: 'slot2', role: 'points', shape: 'rect', x: 235, y: 650, w: 240, h: 42 },
      { id: 'slot2.reward', label: 'SLOT 2 REWARD', group: 'slot2', role: 'reward', shape: 'rect', x: 235, y: 705, w: 240, h: 42 },

      { id: 'slot3.area', label: 'SLOT 3 AREA', group: 'slot3', role: 'area', shape: 'rect', x: 1325, y: 405, w: 475, h: 315 },
      { id: 'slot3.avatar', label: 'SLOT 3 AVATAR', group: 'slot3', role: 'avatar', shape: 'circle', x: 1500, y: 450, w: 120, h: 120 },
      { id: 'slot3.name', label: 'SLOT 3 NAME', group: 'slot3', role: 'name', shape: 'rect', x: 1390, y: 585, w: 340, h: 50 },
      { id: 'slot3.points', label: 'SLOT 3 POINTS', group: 'slot3', role: 'points', shape: 'rect', x: 1440, y: 650, w: 240, h: 42 },
      { id: 'slot3.reward', label: 'SLOT 3 REWARD', group: 'slot3', role: 'reward', shape: 'rect', x: 1440, y: 705, w: 240, h: 42 },

      { id: 'honor4.area', label: 'HONOR 4 AREA', group: 'honor4', role: 'area', shape: 'rect', x: 55, y: 825, w: 185, h: 130 },
      { id: 'honor4.name', label: 'HONOR 4 NAME', group: 'honor4', role: 'name', shape: 'rect', x: 70, y: 855, w: 155, h: 42 },
      { id: 'honor4.reward', label: 'HONOR 4 REWARD', group: 'honor4', role: 'reward', shape: 'rect', x: 70, y: 905, w: 155, h: 42 },

      { id: 'honor5.area', label: 'HONOR 5 AREA', group: 'honor5', role: 'area', shape: 'rect', x: 325, y: 825, w: 185, h: 130 },
      { id: 'honor5.name', label: 'HONOR 5 NAME', group: 'honor5', role: 'name', shape: 'rect', x: 340, y: 855, w: 155, h: 42 },
      { id: 'honor5.reward', label: 'HONOR 5 REWARD', group: 'honor5', role: 'reward', shape: 'rect', x: 340, y: 905, w: 155, h: 42 },

      { id: 'honor6.area', label: 'HONOR 6 AREA', group: 'honor6', role: 'area', shape: 'rect', x: 595, y: 825, w: 185, h: 130 },
      { id: 'honor6.name', label: 'HONOR 6 NAME', group: 'honor6', role: 'name', shape: 'rect', x: 610, y: 855, w: 155, h: 42 },
      { id: 'honor6.reward', label: 'HONOR 6 REWARD', group: 'honor6', role: 'reward', shape: 'rect', x: 610, y: 905, w: 155, h: 42 },

      { id: 'honor7.area', label: 'HONOR 7 AREA', group: 'honor7', role: 'area', shape: 'rect', x: 865, y: 825, w: 185, h: 130 },
      { id: 'honor7.name', label: 'HONOR 7 NAME', group: 'honor7', role: 'name', shape: 'rect', x: 880, y: 855, w: 155, h: 42 },
      { id: 'honor7.reward', label: 'HONOR 7 REWARD', group: 'honor7', role: 'reward', shape: 'rect', x: 880, y: 905, w: 155, h: 42 },

      { id: 'honor8.area', label: 'HONOR 8 AREA', group: 'honor8', role: 'area', shape: 'rect', x: 1135, y: 825, w: 185, h: 130 },
      { id: 'honor8.name', label: 'HONOR 8 NAME', group: 'honor8', role: 'name', shape: 'rect', x: 1150, y: 855, w: 155, h: 42 },
      { id: 'honor8.reward', label: 'HONOR 8 REWARD', group: 'honor8', role: 'reward', shape: 'rect', x: 1150, y: 905, w: 155, h: 42 },

      { id: 'honor9.area', label: 'HONOR 9 AREA', group: 'honor9', role: 'area', shape: 'rect', x: 1405, y: 825, w: 185, h: 130 },
      { id: 'honor9.name', label: 'HONOR 9 NAME', group: 'honor9', role: 'name', shape: 'rect', x: 1420, y: 855, w: 155, h: 42 },
      { id: 'honor9.reward', label: 'HONOR 9 REWARD', group: 'honor9', role: 'reward', shape: 'rect', x: 1420, y: 905, w: 155, h: 42 },

      { id: 'honor10.area', label: 'HONOR 10 AREA', group: 'honor10', role: 'area', shape: 'rect', x: 1675, y: 825, w: 185, h: 130 },
      { id: 'honor10.name', label: 'HONOR 10 NAME', group: 'honor10', role: 'name', shape: 'rect', x: 1690, y: 855, w: 155, h: 42 },
      { id: 'honor10.reward', label: 'HONOR 10 REWARD', group: 'honor10', role: 'reward', shape: 'rect', x: 1690, y: 905, w: 155, h: 42 }
    ]
  };

  const $ = (id) => document.getElementById(id);
  const stageWrap = $('stageWrap');
  const stage = $('stage');
  const viewport = $('viewport');
  const boxLayer = $('boxLayer');
  const coordLayer = $('coordLayer');
  const gridLayer = $('gridLayer');
  const bgImg = $('bgImg');
  const bgFallback = $('bgFallback');

  const boxSelect = $('boxSelect');
  const boxList = $('boxList');
  const jsonOutput = $('jsonOutput');
  const editStatus = $('editStatus');
  const jsonStatus = $('jsonStatus');

  const inputs = {
    x: $('xInput'), y: $('yInput'), w: $('wInput'), h: $('hInput'),
    label: $('labelInput'), shape: $('shapeInput')
  };

  let layout = loadInitialLayout();
  let selectedId = layout.boxes[0]?.id || null;
  let scale = 1;
  let dragState = null;

  function loadInitialLayout() {
    try {
      const saved = localStorage.getItem(STORAGE_KEY);
      if (saved) return normalizeLayout(JSON.parse(saved));
    } catch (err) {
      console.warn('localStorage layout invalid:', err);
    }
    return structuredClone(DEFAULT_LAYOUT);
  }

  function normalizeLayout(value) {
    const base = structuredClone(DEFAULT_LAYOUT);
    if (!value || typeof value !== 'object') return base;
    if (!Array.isArray(value.boxes)) return base;
    return {
      version: String(value.version || 'EVS49.17A'),
      canvas: { w: Number(value.canvas?.w || CANVAS.w), h: Number(value.canvas?.h || CANVAS.h) },
      background: String(value.background || DEFAULT_BACKGROUND),
      boxes: value.boxes.map((box, index) => ({
        id: String(box.id || `box.${index + 1}`),
        label: String(box.label || box.id || `BOX ${index + 1}`),
        group: String(box.group || 'custom'),
        role: String(box.role || 'custom'),
        shape: box.shape === 'circle' ? 'circle' : 'rect',
        x: clampNum(box.x, 0, CANVAS.w - 20, 100),
        y: clampNum(box.y, 0, CANVAS.h - 20, 100),
        w: clampNum(box.w, 20, CANVAS.w, 160),
        h: clampNum(box.h, 20, CANVAS.h, 60)
      }))
    };
  }

  function clampNum(value, min, max, fallback) {
    const n = Number(value);
    if (!Number.isFinite(n)) return fallback;
    return Math.max(min, Math.min(max, Math.round(n)));
  }

  function saveLocal() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(layout));
  }

  function getSelectedBox() {
    return layout.boxes.find(b => b.id === selectedId) || null;
  }

  function setStatus(el, text, isWarn = false) {
    el.textContent = text || '';
    el.classList.toggle('warn', !!isWarn);
    if (text) window.setTimeout(() => {
      if (el.textContent === text) el.textContent = '';
    }, 2500);
  }

  function snap(n) {
    if (!$('snapGrid').checked) return Math.round(n);
    const s = Math.max(1, Number($('snapSize').value || 5));
    return Math.round(n / s) * s;
  }

  function renderCoords() {
    coordLayer.innerHTML = '';
    for (let x = 0; x <= CANVAS.w; x += 100) {
      const el = document.createElement('div');
      el.className = 'coord-label x';
      el.textContent = `x:${x}`;
      el.style.left = `${Math.min(x + 4, CANVAS.w - 62)}px`;
      el.style.top = '4px';
      coordLayer.appendChild(el);
    }
    for (let y = 0; y <= CANVAS.h; y += 100) {
      const el = document.createElement('div');
      el.className = 'coord-label y';
      el.textContent = `y:${y}`;
      el.style.left = '4px';
      el.style.top = `${Math.min(y + 4, CANVAS.h - 20)}px`;
      coordLayer.appendChild(el);
    }
  }

  function renderBoxes() {
    boxLayer.innerHTML = '';
    layout.boxes.forEach((box, index) => {
      const el = document.createElement('div');
      el.className = 'box' + (box.id === selectedId ? ' selected' : '');
      el.dataset.id = box.id;
      el.dataset.role = box.role;
      el.dataset.shape = box.shape;
      el.style.left = `${box.x}px`;
      el.style.top = `${box.y}px`;
      el.style.width = `${box.w}px`;
      el.style.height = `${box.h}px`;
      el.style.zIndex = String(box.role === 'area' ? 5 + index : 20 + index);
      el.innerHTML = `<div class="label">${escapeHtml(box.label)}</div><div class="resize-handle" title="Skalieren"></div>`;
      el.addEventListener('pointerdown', onBoxPointerDown);
      el.querySelector('.resize-handle').addEventListener('pointerdown', onResizePointerDown);
      boxLayer.appendChild(el);
    });
    renderBoxControls();
    refreshJson();
  }

  function escapeHtml(s) {
    return String(s).replace(/[&<>"]/g, (c) => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
  }

  function renderBoxControls() {
    boxSelect.innerHTML = '';
    boxList.innerHTML = '';
    layout.boxes.forEach(box => {
      const opt = document.createElement('option');
      opt.value = box.id;
      opt.textContent = `${box.id} · ${box.label}`;
      boxSelect.appendChild(opt);

      const btn = document.createElement('button');
      btn.type = 'button';
      btn.className = box.id === selectedId ? 'active' : '';
      btn.textContent = `${box.id} (${box.x},${box.y},${box.w},${box.h})`;
      btn.addEventListener('click', () => selectBox(box.id));
      boxList.appendChild(btn);
    });
    if (selectedId) boxSelect.value = selectedId;
    updateInputs();
  }

  function updateInputs() {
    const box = getSelectedBox();
    const disabled = !box;
    Object.values(inputs).forEach(i => i.disabled = disabled);
    if (!box) return;
    inputs.x.value = box.x;
    inputs.y.value = box.y;
    inputs.w.value = box.w;
    inputs.h.value = box.h;
    inputs.label.value = box.label;
    inputs.shape.value = box.shape;
  }

  function selectBox(id) {
    if (!layout.boxes.some(b => b.id === id)) return;
    selectedId = id;
    renderBoxes();
  }

  function updateSelectedBox(patch, rerender = true) {
    const box = getSelectedBox();
    if (!box) return;
    Object.assign(box, patch);
    box.x = clampNum(box.x, 0, CANVAS.w - 20, box.x);
    box.y = clampNum(box.y, 0, CANVAS.h - 20, box.y);
    box.w = clampNum(box.w, 20, CANVAS.w - box.x, box.w);
    box.h = clampNum(box.h, 20, CANVAS.h - box.y, box.h);
    saveLocal();
    if (rerender) renderBoxes();
  }

  function clientToCanvas(event) {
    const rect = stageWrap.getBoundingClientRect();
    return {
      x: (event.clientX - rect.left) / scale,
      y: (event.clientY - rect.top) / scale
    };
  }

  function onBoxPointerDown(event) {
    if (event.target.classList.contains('resize-handle')) return;
    const el = event.currentTarget;
    const id = el.dataset.id;
    selectBox(id);
    const box = getSelectedBox();
    if (!box) return;
    const pt = clientToCanvas(event);
    dragState = {
      mode: 'move',
      id,
      startX: pt.x,
      startY: pt.y,
      orig: { x: box.x, y: box.y, w: box.w, h: box.h }
    };
    el.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  function onResizePointerDown(event) {
    event.stopPropagation();
    const el = event.currentTarget.closest('.box');
    const id = el.dataset.id;
    selectBox(id);
    const box = getSelectedBox();
    if (!box) return;
    const pt = clientToCanvas(event);
    dragState = {
      mode: 'resize',
      id,
      startX: pt.x,
      startY: pt.y,
      orig: { x: box.x, y: box.y, w: box.w, h: box.h }
    };
    el.setPointerCapture(event.pointerId);
    event.preventDefault();
  }

  window.addEventListener('pointermove', (event) => {
    if (!dragState) return;
    const box = layout.boxes.find(b => b.id === dragState.id);
    if (!box) return;
    const pt = clientToCanvas(event);
    const dx = pt.x - dragState.startX;
    const dy = pt.y - dragState.startY;
    if (dragState.mode === 'move') {
      box.x = Math.max(0, Math.min(CANVAS.w - box.w, snap(dragState.orig.x + dx)));
      box.y = Math.max(0, Math.min(CANVAS.h - box.h, snap(dragState.orig.y + dy)));
    } else {
      box.w = Math.max(20, Math.min(CANVAS.w - box.x, snap(dragState.orig.w + dx)));
      box.h = Math.max(20, Math.min(CANVAS.h - box.y, snap(dragState.orig.h + dy)));
      if (box.shape === 'circle' && event.shiftKey) {
        const size = Math.max(box.w, box.h);
        box.w = size;
        box.h = size;
      }
    }
    saveLocal();
    renderBoxesLight();
    updateInputs();
    refreshJson();
  });

  window.addEventListener('pointerup', () => {
    if (!dragState) return;
    dragState = null;
    renderBoxes();
  });

  function renderBoxesLight() {
    layout.boxes.forEach(box => {
      const el = boxLayer.querySelector(`.box[data-id="${CSS.escape(box.id)}"]`);
      if (!el) return;
      el.style.left = `${box.x}px`;
      el.style.top = `${box.y}px`;
      el.style.width = `${box.w}px`;
      el.style.height = `${box.h}px`;
    });
  }

  function refreshJson() {
    jsonOutput.value = JSON.stringify(layout, null, 2);
  }

  function applyInputs() {
    const box = getSelectedBox();
    if (!box) return;
    updateSelectedBox({
      x: snap(Number(inputs.x.value || 0)),
      y: snap(Number(inputs.y.value || 0)),
      w: snap(Number(inputs.w.value || 20)),
      h: snap(Number(inputs.h.value || 20)),
      label: inputs.label.value || box.id,
      shape: inputs.shape.value === 'circle' ? 'circle' : 'rect'
    });
    setStatus(editStatus, 'Übernommen.');
  }

  function fitToWindow() {
    const sideW = 0;
    const availableW = Math.max(320, viewport.clientWidth - sideW - 24);
    const availableH = Math.max(240, viewport.clientHeight - 24);
    scale = Math.min(availableW / CANVAS.w, availableH / CANVAS.h);
    scale = Math.max(0.25, Math.min(1.25, scale));
    applyScale();
  }

  function applyScale() {
    stageWrap.style.transform = `scale(${scale})`;
    stageWrap.style.margin = '12px';
    stageWrap.style.width = `${CANVAS.w}px`;
    stageWrap.style.height = `${CANVAS.h}px`;
    $('zoomInput').value = Math.round(scale * 100);
  }

  function setZoom(percent) {
    scale = Math.max(0.25, Math.min(1.25, Number(percent || 100) / 100));
    applyScale();
  }

  function duplicateSelected() {
    const box = getSelectedBox();
    if (!box) return;
    const idBase = `${box.id}.copy`;
    let id = idBase;
    let i = 2;
    while (layout.boxes.some(b => b.id === id)) id = `${idBase}${i++}`;
    const copy = { ...box, id, label: `${box.label} COPY`, x: box.x + 20, y: box.y + 20 };
    layout.boxes.push(copy);
    selectedId = id;
    saveLocal();
    renderBoxes();
  }

  function deleteSelected() {
    const box = getSelectedBox();
    if (!box) return;
    if (!confirm(`Box wirklich löschen?\n${box.id}`)) return;
    layout.boxes = layout.boxes.filter(b => b.id !== box.id);
    selectedId = layout.boxes[0]?.id || null;
    saveLocal();
    renderBoxes();
  }

  function addBox() {
    let i = 1;
    let id = `custom.box${i}`;
    while (layout.boxes.some(b => b.id === id)) id = `custom.box${++i}`;
    layout.boxes.push({ id, label: `CUSTOM BOX ${i}`, group: 'custom', role: 'custom', shape: 'rect', x: 100, y: 100, w: 220, h: 80 });
    selectedId = id;
    saveLocal();
    renderBoxes();
  }

  function copyJson() {
    refreshJson();
    navigator.clipboard?.writeText(jsonOutput.value).then(() => {
      setStatus(jsonStatus, 'JSON kopiert.');
    }).catch(() => {
      jsonOutput.focus();
      jsonOutput.select();
      setStatus(jsonStatus, 'Kopieren per Clipboard fehlgeschlagen. Feld ist markiert.', true);
    });
  }

  function downloadJson() {
    refreshJson();
    const blob = new Blob([jsonOutput.value], { type: 'application/json;charset=utf-8' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = 'event_winner_overlay_layout.json';
    document.body.appendChild(a);
    a.click();
    a.remove();
    URL.revokeObjectURL(a.href);
    setStatus(jsonStatus, 'JSON-Download gestartet.');
  }

  function importJson() {
    try {
      const parsed = JSON.parse(jsonOutput.value);
      layout = normalizeLayout(parsed);
      selectedId = layout.boxes[0]?.id || null;
      saveLocal();
      renderBoxes();
      setStatus(jsonStatus, 'JSON importiert.');
    } catch (err) {
      setStatus(jsonStatus, `JSON ungültig: ${err.message}`, true);
    }
  }

  function resetLayout() {
    if (!confirm('Layout wirklich auf Startwerte zurücksetzen?')) return;
    layout = structuredClone(DEFAULT_LAYOUT);
    selectedId = layout.boxes[0]?.id || null;
    saveLocal();
    renderBoxes();
    setStatus(editStatus, 'Layout zurückgesetzt.');
  }

  function onKey(event) {
    if (['INPUT', 'TEXTAREA', 'SELECT'].includes(document.activeElement?.tagName)) return;
    const box = getSelectedBox();
    if (!box) return;
    const step = event.shiftKey ? 10 : 1;
    let handled = true;
    if (event.key === 'ArrowLeft') box.x = Math.max(0, box.x - step);
    else if (event.key === 'ArrowRight') box.x = Math.min(CANVAS.w - box.w, box.x + step);
    else if (event.key === 'ArrowUp') box.y = Math.max(0, box.y - step);
    else if (event.key === 'ArrowDown') box.y = Math.min(CANVAS.h - box.h, box.y + step);
    else handled = false;
    if (!handled) return;
    event.preventDefault();
    saveLocal();
    renderBoxesLight();
    updateInputs();
    refreshJson();
  }

  function bindEvents() {
    $('toggleGrid').addEventListener('change', e => {
      gridLayer.style.display = e.target.checked ? 'block' : 'none';
      coordLayer.style.display = e.target.checked ? 'block' : 'none';
    });
    $('toggleLabels').addEventListener('change', e => stage.classList.toggle('hide-labels', !e.target.checked));
    $('toggleBg').addEventListener('change', e => {
      bgImg.style.display = e.target.checked ? 'block' : 'none';
      bgFallback.style.display = e.target.checked && bgImg.dataset.failed === '1' ? 'block' : 'none';
    });
    $('fitBtn').addEventListener('click', fitToWindow);
    $('zoom100Btn').addEventListener('click', () => setZoom(100));
    $('zoomInput').addEventListener('change', e => setZoom(e.target.value));
    boxSelect.addEventListener('change', e => selectBox(e.target.value));
    $('applyBtn').addEventListener('click', applyInputs);
    $('duplicateBtn').addEventListener('click', duplicateSelected);
    $('deleteBtn').addEventListener('click', deleteSelected);
    $('addBoxBtn').addEventListener('click', addBox);
    $('resetBtn').addEventListener('click', resetLayout);
    $('refreshJsonBtn').addEventListener('click', () => { refreshJson(); setStatus(jsonStatus, 'JSON aktualisiert.'); });
    $('copyJsonBtn').addEventListener('click', copyJson);
    $('downloadJsonBtn').addEventListener('click', downloadJson);
    $('importJsonBtn').addEventListener('click', importJson);
    ['x','y','w','h','label','shape'].forEach(k => inputs[k].addEventListener('change', applyInputs));
    window.addEventListener('keydown', onKey);
    window.addEventListener('resize', () => {});

    bgImg.addEventListener('error', () => {
      bgImg.dataset.failed = '1';
      bgImg.style.display = 'none';
      bgFallback.style.display = 'block';
      setStatus(editStatus, 'Hintergrundbild nicht geladen – Fallback aktiv.', true);
    });
  }

  renderCoords();
  bindEvents();
  renderBoxes();
  fitToWindow();
})();
</script>
</body>
</html>
