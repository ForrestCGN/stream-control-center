<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Runtime Overlay</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --cyan: #39e6ff;
      --cyan-soft: rgba(57, 230, 255, .22);
      --violet: #a855f7;
      --violet-soft: rgba(168, 85, 247, .34);
      --pink: #ff4fd8;
      --gold: #ffe66d;
      --ok: #76ffb4;
      --danger: #ff6b8f;
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, .78);
      --dark: rgba(5, 7, 24, .92);
    }

    * { box-sizing: border-box; }

    html,
    body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      display: block;
      opacity: 0;
      transform: scale(.985);
      filter: blur(5px);
      transition: opacity .34s ease, transform .42s cubic-bezier(.16, 1, .3, 1), filter .34s ease;
      isolation: isolate;
    }

    #stage.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    .backdrop {
      position: absolute;
      inset: -80px;
      opacity: .72;
      background:
        radial-gradient(circle at 50% 50%, rgba(57, 230, 255, .14), transparent 22%),
        radial-gradient(circle at 44% 48%, rgba(168, 85, 247, .18), transparent 30%),
        radial-gradient(circle at 62% 58%, rgba(255, 79, 216, .10), transparent 28%),
        linear-gradient(135deg, rgba(2, 4, 18, .28), rgba(14, 7, 34, .32), rgba(3, 6, 24, .26));
      z-index: 0;
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .24;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.88) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(57,230,255,.72) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(196,92,255,.64) 0 1px, transparent 1.6px);
      background-size: 170px 170px, 245px 245px, 330px 330px;
      background-position: 22px 54px, 86px 122px, 150px 30px;
      animation: starDrift 24s linear infinite;
    }

    @keyframes starDrift {
      to { background-position: 192px 224px, 331px 367px, 480px 360px; }
    }

    .ring-wrap {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 86px;
      width: 380px;
      height: 438px;
      display: block;
      transform: translateX(-50%);
      transform-origin: top center;
    }

    .ring-wrap::before,
    .ring-wrap::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .ring-wrap::before {
      left: 50%;
      top: 10px;
      width: 316px;
      height: 316px;
      transform: translateX(-50%);
      background: conic-gradient(from 0deg, rgba(57,230,255,.88), rgba(168,85,247,.80), rgba(255,79,216,.70), rgba(57,230,255,.88));
      -webkit-mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      mask: radial-gradient(farthest-side, transparent calc(100% - 5px), #000 calc(100% - 4px));
      filter: drop-shadow(0 0 10px rgba(168,85,247,.36)) drop-shadow(0 0 14px rgba(57,230,255,.14));
      animation: spin 4.8s linear infinite;
    }

    .ring-wrap::after {
      left: 50%;
      top: 16px;
      width: 304px;
      height: 304px;
      transform: translateX(-50%);
      border: 1px solid rgba(143,244,255,.20);
      box-shadow: 0 0 12px rgba(57,230,255,.10), inset 0 0 14px rgba(168,85,247,.08);
      animation: spinReverse 9.5s linear infinite;
    }

    @keyframes spin { to { transform: translateX(-50%) rotate(360deg); } }
    @keyframes spinReverse { to { transform: translateX(-50%) rotate(-360deg); } }

    .core {
      position: absolute;
      left: 50%;
      top: 18px;
      transform: translateX(-50%);
      z-index: 3;
      width: 300px;
      height: 300px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 38%, rgba(57,230,255,.18), transparent 36%),
        radial-gradient(circle at 50% 62%, rgba(168,85,247,.24), transparent 42%),
        linear-gradient(135deg, rgba(5,7,24,.93), rgba(19,9,45,.94));
      border: 1px solid rgba(143,244,255,.22);
      box-shadow:
        inset 0 0 26px rgba(57,230,255,.08),
        inset 0 0 48px rgba(168,85,247,.09),
        0 0 18px rgba(168,85,247,.24),
        0 0 34px rgba(57,230,255,.10);
    }

    .core::before {
      content: "";
      position: absolute;
      left: -70%;
      top: -20%;
      width: 48%;
      height: 140%;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.14), rgba(255,255,255,.08), rgba(255,79,216,.11), transparent);
      transform: skewX(-18deg);
      animation: scan 2.9s linear infinite;
    }

    @keyframes scan {
      to { transform: translateX(430%) skewX(-18deg); }
    }

    .count-number {
      position: relative;
      z-index: 5;
      max-width: 250px;
      font-size: 182px;
      line-height: .82;
      font-weight: 950;
      letter-spacing: -6px;
      font-variant-numeric: tabular-nums;
      color: var(--text);
      text-align: center;
      white-space: nowrap;
      color: var(--text);
      text-shadow:
        0 0 18px rgba(255,255,255,.28),
        0 0 30px rgba(57,230,255,.72),
        0 0 48px rgba(168,85,247,.58),
        0 0 72px rgba(255,79,216,.22);
      animation: numberPulse .92s cubic-bezier(.18, .9, .2, 1) infinite;
    }

    .count-number.word-state {
      max-width: 260px;
      font-size: 78px;
      line-height: .9;
      letter-spacing: .8px;
      animation: wordPulse 1.35s cubic-bezier(.16, 1, .3, 1) infinite;
    }

    @keyframes wordPulse {
      0%, 100% { transform: scale(.98); opacity: .92; filter: blur(0); }
      42% { transform: scale(1.035); opacity: 1; filter: blur(0); }
    }

    @keyframes numberPulse {
      0% { transform: scale(.88); opacity: .72; filter: blur(2px); }
      18% { transform: scale(1.04); opacity: 1; filter: blur(0); }
      72% { transform: scale(1); opacity: 1; filter: blur(0); }
      100% { transform: scale(.96); opacity: .82; filter: blur(1px); }
    }

    .caption {
      position: absolute;
      z-index: 6;
      left: 50%;
      top: 348px;
      transform: translateX(-50%);
      min-width: 364px;
      padding: 16px 24px 11px;
      border-radius: 999px;
      border: 1.5px solid rgba(57,230,255,.54);
      background:
        linear-gradient(135deg, rgba(5,7,24,.88), rgba(31,14,65,.86)) padding-box,
        linear-gradient(135deg, rgba(57,230,255,.58), rgba(168,85,247,.52), rgba(255,79,216,.38)) border-box;
      box-shadow:
        0 0 12px rgba(57,230,255,.15),
        0 0 16px rgba(168,85,247,.14),
        inset 0 0 12px rgba(168,85,247,.12);
      text-align: center;
      color: rgba(248,251,255,.94);
      font-size: 22px;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: .9px;
      text-transform: uppercase;
      text-shadow: 0 0 12px rgba(168,85,247,.44);
    }

    #stage.mode-guessing .caption {
      animation: guessingCaptionPulse 1.16s cubic-bezier(.16, 1, .3, 1) infinite;
      border-color: rgba(57,230,255,.68);
      text-shadow:
        0 0 10px rgba(255,255,255,.18),
        0 0 18px rgba(57,230,255,.50),
        0 0 24px rgba(168,85,247,.42);
    }

    @keyframes guessingCaptionPulse {
      0%, 100% {
        transform: translateX(-50%) scale(1);
        box-shadow:
          0 0 12px rgba(57,230,255,.15),
          0 0 16px rgba(168,85,247,.14),
          inset 0 0 12px rgba(168,85,247,.12);
        filter: brightness(1);
      }
      45% {
        transform: translateX(-50%) scale(1.035);
        box-shadow:
          0 0 17px rgba(57,230,255,.25),
          0 0 24px rgba(168,85,247,.22),
          inset 0 0 16px rgba(168,85,247,.18);
        filter: brightness(1.08);
      }
    }

    .result-card {
      position: absolute;
      right: 46px;
      top: 50%;
      z-index: 6;
      width: 460px;
      min-height: 96px;
      display: none;
      grid-template-columns: 72px 2px 1fr;
      column-gap: 12px;
      align-items: center;
      padding: 10px 14px;
      border-radius: 18px;
      border: 2px solid transparent;
      background:
        radial-gradient(circle at 10% 25%, rgba(67,34,130,0.88) 0%, rgba(25,17,57,0.96) 52%, rgba(7,8,25,0.96) 100%) padding-box,
        linear-gradient(135deg, rgba(57,230,255,.92), rgba(168,85,247,.88), rgba(255,79,216,.70)) border-box;
      box-shadow:
        0 8px 18px rgba(0,0,0,0.52),
        0 0 18px rgba(57,230,255,.16),
        0 0 24px rgba(168,85,247,.22),
        inset 0 0 16px rgba(120,90,220,0.05);
      text-align: left;
      overflow: hidden;
      animation: resultSlideIn .42s cubic-bezier(.18,.84,.28,1) both;
    }

    @keyframes resultSlideIn {
      from { opacity: 1; transform: translate(560px, -50%); }
      to { opacity: 1; transform: translate(0, -50%); }
    }

    .result-kicker {
      color: var(--cyan);
      font-size: 12px;
      line-height: 1.02;
      font-weight: 900;
      letter-spacing: 1.9px;
      text-transform: uppercase;
      text-shadow: 0 0 9px rgba(57,230,255,.26);
    }

    .result-title {
      margin: 0;
      color: var(--text);
      font-size: 28px;
      line-height: 1.02;
      font-weight: 900;
      text-shadow:
        0 0 7px rgba(85,196,255,0.20),
        0 0 11px rgba(165,128,252,0.16),
        0 0 16px rgba(165,128,252,0.07);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      max-width: 330px;
    }

    .result-subline {
      margin: 0;
      color: #e8e7ff;
      font-size: 15px;
      line-height: 1.16;
      font-weight: 700;
      text-shadow:
        0 0 5px rgba(165,128,252,0.15),
        0 0 5px rgba(85,196,255,0.09);
      overflow-wrap: anywhere;
      max-width: 330px;
    }

    .result-extra {
      display: none;
      margin: 0;
      color: rgba(248, 251, 255, .82);
      font-size: 14px;
      line-height: 1.16;
      font-weight: 700;
      overflow-wrap: anywhere;
      max-width: 330px;
      text-shadow: 0 0 8px rgba(168,85,247,.22);
    }

    .result-card.winner-card {
      width: 500px;
      min-height: 132px;
      grid-template-columns: 72px 2px minmax(0, 1fr);
      align-items: center;
      padding: 12px 16px;
    }

    .result-card.winner-card .result-right {
      gap: 5px;
      min-width: 0;
    }

    .result-card.winner-card .result-title {
      max-width: 374px;
      white-space: nowrap;
      overflow: visible;
      text-overflow: clip;
      font-size: 28px;
      line-height: 1.02;
    }

    .result-card.winner-card .result-title.name-long {
      font-size: 24px;
      letter-spacing: -0.3px;
    }

    .result-card.winner-card .result-title.name-very-long {
      font-size: 21px;
      letter-spacing: -0.5px;
    }

    .result-card.winner-card .result-subline {
      max-width: 374px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      font-size: 14px;
      line-height: 1.12;
      color: rgba(232, 231, 255, .92);
    }

    .result-card.winner-card .result-extra {
      display: -webkit-box;
      max-width: 374px;
      margin-top: 3px;
      color: rgba(248, 251, 255, .88);
      font-size: 14px;
      line-height: 1.16;
      font-weight: 800;
      overflow: hidden;
      text-overflow: ellipsis;
      overflow-wrap: anywhere;
      word-break: break-word;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      text-shadow: 0 0 8px rgba(168,85,247,.24);
    }

    .result-left {
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-avatar-wrap {
      position: relative;
      width: 72px;
      height: 72px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .result-avatar-ring {
      position: absolute;
      inset: 0;
      width: 72px;
      height: 72px;
      filter:
        drop-shadow(0 0 4px rgba(85,196,255,0.25))
        drop-shadow(0 0 7px rgba(165,128,252,0.18));
      animation: spinRing 3.2s linear infinite;
      z-index: 1;
      pointer-events: none;
      overflow: visible;
      opacity: 0.70;
    }

    .result-avatar-inner {
      position: relative;
      width: 62px;
      height: 62px;
      border-radius: 999px;
      overflow: hidden;
      background: #120822;
      border: 2px solid rgba(18, 8, 38, 0.96);
      z-index: 2;
      box-shadow: inset 0 0 8px rgba(0,0,0,0.28);
    }

    .result-avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: inherit;
    }

    .result-avatar-fallback {
      width: 100%;
      height: 100%;
      display: none;
      align-items: center;
      justify-content: center;
      font-size: 21px;
      font-weight: 800;
      color: #f7f2ff;
      background: radial-gradient(circle at 30% 30%, #6e50c9, #261544);
      border-radius: inherit;
      text-transform: uppercase;
    }

    .result-divider {
      width: 2px;
      height: 52px;
      align-self: center;
      border-radius: 99px;
      background: linear-gradient(
        180deg,
        rgba(0,0,0,0) 0%,
        rgba(85,196,255,0.95) 28%,
        rgba(165,128,252,0.98) 64%,
        rgba(0,0,0,0) 100%
      );
      box-shadow:
        0 0 7px rgba(165,128,252,0.45),
        0 0 4px rgba(85,196,255,0.34);
    }

    .result-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      min-width: 0;
    }

    .result-card.no-avatar {
      grid-template-columns: 1fr;
      width: 460px;
    }

    .result-card.no-avatar .result-left,
    .result-card.no-avatar .result-divider {
      display: none;
    }

    .result-card.no-avatar .result-title,
    .result-card.no-avatar .result-subline,
    .result-card.no-avatar .result-extra {
      max-width: 400px;
    }

    .result-card.unresolved-card {
      left: 50%;
      right: auto;
      top: 96px;
      width: 540px;
      min-height: 148px;
      grid-template-columns: 1fr;
      padding: 20px 30px 18px;
      text-align: center;
      transform: translateX(-50%);
      background:
        radial-gradient(circle at 50% 5%, rgba(255,107,143,.20), transparent 42%) padding-box,
        radial-gradient(circle at 50% 100%, rgba(168,85,247,.24), transparent 56%) padding-box,
        linear-gradient(135deg, rgba(9,10,28,.98), rgba(34,13,52,.98), rgba(13,11,32,.98)) padding-box,
        linear-gradient(135deg, rgba(255,107,143,.84), rgba(168,85,247,.88), rgba(57,230,255,.54)) border-box;
      box-shadow:
        0 10px 22px rgba(0,0,0,0.56),
        0 0 18px rgba(255,107,143,.18),
        0 0 26px rgba(168,85,247,.20),
        inset 0 0 18px rgba(255,107,143,.07);
      animation: unresolvedDropIn .38s cubic-bezier(.18,.84,.28,1) both;
    }

    @keyframes unresolvedDropIn {
      from { opacity: 0; transform: translate(-50%, -26px) scale(.98); }
      to { opacity: 1; transform: translate(-50%, 0) scale(1); }
    }

    .result-card.unresolved-card .result-right {
      align-items: center;
      gap: 9px;
    }

    .result-card.unresolved-card .result-kicker,
    .result-card.unresolved-card .result-title,
    .result-card.unresolved-card .result-subline,
    .result-card.unresolved-card .result-extra {
      text-align: center;
      max-width: 430px;
      margin-left: auto;
      margin-right: auto;
    }

    .result-card.unresolved-card .result-kicker {
      color: var(--danger);
      font-size: 15px;
      letter-spacing: 2.2px;
      text-shadow:
        0 0 10px rgba(255,107,143,.38),
        0 0 18px rgba(168,85,247,.22);
    }

    .result-card.unresolved-card .result-title {
      font-size: 23px;
      line-height: 1.18;
      white-space: pre-line;
      max-width: 390px;
    }

    .result-card.unresolved-card .result-subline,
    .result-card.unresolved-card .result-extra {
      display: block;
      font-size: 15px;
      line-height: 1.22;
      max-width: 390px;
    }

    #stage.mode-guessing .ring-wrap {
      display: block;
    }

    #stage.mode-guessing .flash {
      animation-duration: 1.6s;
    }

    #stage.mode-result .ring-wrap,
    #stage.mode-finished .ring-wrap,
    #stage.mode-cancelled .ring-wrap {
      display: none;
    }

    #stage.mode-result .result-card,
    #stage.mode-finished .result-card,
    #stage.mode-cancelled .result-card {
      display: grid;
    }

    #stage.mode-cancelled .result-kicker { color: var(--danger); }
    #stage.mode-finished .result-kicker { color: var(--gold); }

    .flash {
      position: absolute;
      inset: 0;
      z-index: 2;
      opacity: 0;
      background: radial-gradient(circle at 50% 50%, rgba(255,255,255,.16), rgba(57,230,255,.07) 20%, transparent 48%);
      animation: flashPulse 1.15s ease-in-out infinite;
    }

    @keyframes flashPulse {
      0%, 100% { opacity: 0; }
      44% { opacity: .28; }
    }


    .answer-counter {
      position: fixed;
      left: auto;
      right: 38px;
      top: 42px;
      z-index: 20;
      width: 92px;
      height: 92px;
      display: none;
      align-items: center;
      justify-content: center;
      border-radius: 999px;
      border: 2px solid #39e6ff;
      background:
        radial-gradient(circle at 50% 35%, #16435b 0%, #111827 43%, #160a34 100%),
        linear-gradient(135deg, #050718, #160a34);
      box-shadow:
        0 0 14px rgba(57,230,255,.24),
        0 0 22px rgba(168,85,247,.24),
        inset 0 0 18px rgba(168,85,247,.12);
      color: var(--text);
      font-size: 40px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: -1px;
      font-variant-numeric: tabular-nums;
      text-align: center;
      text-shadow:
        0 0 10px rgba(255,255,255,.20),
        0 0 18px rgba(57,230,255,.60),
        0 0 26px rgba(168,85,247,.45);
      opacity: 0;
      transform: translateY(-8px) scale(.96);
      transition: opacity .22s ease, transform .26s cubic-bezier(.16, 1, .3, 1), border-color .22s ease;
    }

    .answer-counter.visible {
      display: flex;
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .answer-counter.urgent {
      border-color: rgba(255,107,143,.82);
      text-shadow:
        0 0 10px rgba(255,255,255,.18),
        0 0 18px rgba(255,107,143,.58),
        0 0 24px rgba(168,85,247,.38);
    }

    #debug {
      position: fixed;
      right: 18px;
      bottom: 18px;
      z-index: 50;
      display: none;
      width: 560px;
      max-height: 320px;
      overflow: auto;
      padding: 12px 14px;
      border: 1px solid rgba(57,230,255,.34);
      border-radius: 14px;
      background: rgba(2,4,14,.82);
      color: rgba(248,251,255,.88);
      font: 12px/1.35 Consolas, Monaco, monospace;
      pointer-events: auto;
      white-space: pre-wrap;
    }

    body.debug #debug { display: block; }

    @media (max-width: 1280px) {
      body { transform-origin: top left; transform: scale(.6666667); }
    }
  </style>
</head>
<body>
  <div id="stage" aria-live="polite">
    <div class="backdrop"></div>
    <div class="stars"></div>
    <div class="flash"></div>

    <section class="ring-wrap" aria-label="Countdown">
      <div class="core">
        <div id="countNumber" class="count-number">3</div>
      </div>
      <div id="caption" class="caption">Sound startet gleich</div>
    </section>

    <section id="resultCard" class="result-card no-avatar" aria-label="Event-Auswertung">
      <div class="result-left">
        <div id="resultAvatarWrap" class="result-avatar-wrap" aria-hidden="true">
          <svg class="result-avatar-ring" viewBox="0 0 90 90" xmlns="http://www.w3.org/2000/svg">
            <defs>
              <linearGradient id="resultAvatarGradient" x1="0%" y1="0%" x2="100%" y2="100%">
                <stop offset="0%" stop-color="#55c4ff" />
                <stop offset="55%" stop-color="#a580fc" />
                <stop offset="100%" stop-color="#ff4fd8" />
              </linearGradient>
            </defs>
            <circle cx="45" cy="45" r="41" fill="none" stroke="url(#resultAvatarGradient)" stroke-width="2.8" stroke-linecap="round" stroke-dasharray="148 58" />
          </svg>
          <div class="result-avatar-inner">
            <img id="resultAvatarImg" class="result-avatar-img" alt="" />
            <div id="resultAvatarFallback" class="result-avatar-fallback">CGN</div>
          </div>
        </div>
      </div>
      <div class="result-divider"></div>
      <div class="result-right">
        <div id="resultKicker" class="result-kicker">Auswertung</div>
        <h1 id="resultTitle" class="result-title">Runde beendet</h1>
        <p id="resultSubline" class="result-subline">Die Heimleitung zählt nach.</p>
        <p id="resultExtra" class="result-extra"></p>
      </div>
    </section>
  </div>

  <div id="answerCounter" class="answer-counter" aria-label="Antwortzeit">60</div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_runtime_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Runtime Overlay",
      version: "0.3.7",
      heartbeatIntervalMs: 5000,
      capabilities: [
        "overlay.heartbeat",
        "stream_events.runtime_display",
        "stream_events.runtime.countdown",
        "stream_events.runtime.guessing",
        "stream_events.runtime.result",
        "ack"
      ],
      meta: {
        overlay: "event_runtime_overlay.html",
        communication: "communication_bus",
        owner: "stream_events",
        playbackOwner: "sound_system"
      }
    };
  </script>

  <script>
    (function () {
      "use strict";

      const STATE_ROUTE = "/api/stream-events/runtime-overlay/state";
      const PREROLL_STATUS_ROUTE = "/api/sound/event-preroll/status";
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const qs = new URLSearchParams(window.location.search);
      const forcedEventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const demo = String(qs.get("demo") || "").trim().toLowerCase();

      const els = {
        stage: document.getElementById("stage"),
        countNumber: document.getElementById("countNumber"),
        caption: document.getElementById("caption"),
        resultCard: document.getElementById("resultCard"),
        resultAvatarWrap: document.getElementById("resultAvatarWrap"),
        resultAvatarImg: document.getElementById("resultAvatarImg"),
        resultAvatarFallback: document.getElementById("resultAvatarFallback"),
        resultKicker: document.getElementById("resultKicker"),
        resultTitle: document.getElementById("resultTitle"),
        resultSubline: document.getElementById("resultSubline"),
        resultExtra: document.getElementById("resultExtra"),
        answerCounter: document.getElementById("answerCounter"),
        debug: document.getElementById("debug")
      };

      let pollTimer = null;
      let demoTimer = null;
      let pollMs = 300;
      let lastState = null;
      let lastDemoSecond = null;
      let lastRuntimePhaseKey = "";
      let lastRuntimeMode = "";
      let activeCountdownPhaseKey = "";
      let countdownTimers = [];
      let resultHideTimer = null;
      let answerCounterTimer = null;
      let lastDisplayedCountdownValue = "";
      let lastAnswerCounterKey = "";
      let answerCounterLocalStartMs = 0;
      let answerCounterInitialSeconds = 0;
      let answerCounterShownValue = "";

      if (DEBUG) document.body.classList.add("debug");

      function cleanText(value, fallback) {
        const text = String(value == null ? "" : value).replace(/[\r\n\t]+/g, " ").replace(/\s{2,}/g, " ").trim();
        return text || fallback || "";
      }


      function truncateText(value, maxLength) {
        const text = cleanText(value, "");
        const limit = Math.max(8, Number(maxLength) || 34);
        if (text.length <= limit) return text;
        return text.slice(0, Math.max(1, limit - 1)).trimEnd() + "…";
      }

      function winnerNameSizeClass(name) {
        const text = cleanText(name, "");
        const len = text.length;
        if (len >= 23) return "name-very-long";
        if (len >= 18) return "name-long";
        return "";
      }

      function number(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : fallback;
      }

      function setText(el, value, fallback) {
        if (!el) return;
        el.textContent = cleanText(value, fallback);
      }

      function safeModeFromPhase(state) {
        const display = state && state.display ? state.display : {};
        const phase = state && state.phase ? state.phase : {};
        const fromDisplay = cleanText(display.overlayMode, "").toLowerCase();
        if (fromDisplay) return fromDisplay;
        const key = cleanText(phase.key, "").toLowerCase();
        if (key === "sound_preroll_countdown" || key === "countdown" || key === "preroll_countdown") return "countdown";
        if (key === "sound_guessing" || key === "guessing" || key === "sound_playing" || key === "sound_started") return "guessing";
        if (key === "sound_solved" || key === "sound_unresolved") return "result";
        if (key === "finished") return "finished";
        if (key === "cancelled") return "cancelled";
        return "hidden";
      }

      function applyClass(mode, visible) {
        els.stage.className = visible ? `visible mode-${mode}` : `mode-${mode}`;
      }

      function countdownValue(state) {
        const countdown = state && state.countdown ? state.countdown : {};
        const seconds = Math.max(1, Math.min(30, Math.ceil(number(countdown.seconds, 3))));
        const remaining = countdown.remainingSeconds;
        if (remaining !== null && remaining !== undefined && Number.isFinite(Number(remaining))) {
          return Math.max(1, Math.min(seconds, Math.ceil(Number(remaining))));
        }
        const endsAt = Number(countdown.countdownEndsAtMs || 0);
        if (Number.isFinite(endsAt) && endsAt > 0) {
          return Math.max(1, Math.min(seconds, Math.ceil((endsAt - Date.now()) / 1000)));
        }
        return seconds;
      }

      function clearCountdownTimers() {
        for (const timer of countdownTimers) window.clearTimeout(timer);
        countdownTimers = [];
      }

      function clearResultHideTimer() {
        if (resultHideTimer) window.clearTimeout(resultHideTimer);
        resultHideTimer = null;
      }

      function clearAnswerCounterTimer() {
        if (answerCounterTimer) window.clearTimeout(answerCounterTimer);
        answerCounterTimer = null;
      }

      function hideAnswerCounter() {
        clearAnswerCounterTimer();
        lastAnswerCounterKey = "";
        answerCounterLocalStartMs = 0;
        answerCounterInitialSeconds = 0;
        answerCounterShownValue = "";
        if (els.answerCounter) {
          els.answerCounter.classList.remove("visible", "urgent");
        }
      }

      function answerWindowRemainingSeconds(state) {
        const answerWindow = state && state.answerWindow ? state.answerWindow : {};
        if (!answerWindow.active) return 0;
        const endsAtMs = Number(answerWindow.endsAtMs || 0) || Date.parse(String(answerWindow.endsAt || ""));
        const maxSeconds = Math.max(1, Math.min(3600, Math.ceil(number(answerWindow.seconds, 60))));
        if (Number.isFinite(endsAtMs) && endsAtMs > 0) {
          return Math.max(0, Math.min(maxSeconds, Math.ceil((endsAtMs - Date.now()) / 1000)));
        }
        return Math.max(0, Math.min(maxSeconds, Math.ceil(number(answerWindow.remainingSeconds, 0))));
      }

      function scheduleAnswerCounterTick() {
        if (answerCounterTimer || !answerCounterLocalStartMs) return;
        const elapsedMs = Math.max(0, Date.now() - answerCounterLocalStartMs);
        const delay = Math.max(120, 1000 - (elapsedMs % 1000));
        answerCounterTimer = window.setTimeout(function () {
          answerCounterTimer = null;
          updateAnswerCounter(lastState);
        }, delay);
      }

      function updateAnswerCounter(state) {
        const answerWindow = state && state.answerWindow ? state.answerWindow : {};
        if (!answerWindow.active || !els.answerCounter) {
          hideAnswerCounter();
          return;
        }

        const key = cleanText(answerWindow.roundUid || answerWindow.eventUid || "answer", "answer");
        const serverRemaining = answerWindowRemainingSeconds(state);
        if (serverRemaining <= 0) {
          hideAnswerCounter();
          return;
        }

        if (lastAnswerCounterKey !== key) {
          lastAnswerCounterKey = key;
          answerCounterLocalStartMs = Date.now();
          answerCounterInitialSeconds = serverRemaining;
          answerCounterShownValue = "";
          clearAnswerCounterTimer();
        }

        const elapsedSeconds = Math.max(0, Math.floor((Date.now() - answerCounterLocalStartMs) / 1000));
        const remaining = Math.max(0, answerCounterInitialSeconds - elapsedSeconds);
        if (remaining <= 0) {
          hideAnswerCounter();
          return;
        }

        const nextValue = String(remaining);
        if (answerCounterShownValue !== nextValue) {
          answerCounterShownValue = nextValue;
          els.answerCounter.textContent = nextValue;
        }

        els.answerCounter.classList.toggle("urgent", remaining <= 10);
        els.answerCounter.classList.add("visible");
        scheduleAnswerCounterTick();
      }

      function scheduleResultHide(state) {
        clearResultHideTimer();
        const result = state && state.result ? state.result : {};
        const visibleMs = Math.max(0, number(result.visibleMs, 0));
        const elapsedMs = Math.max(0, number(result.elapsedMs, 0));
        const remainingMs = visibleMs > 0 ? Math.max(400, visibleMs - elapsedMs) : 0;
        if (!remainingMs) return;
        resultHideTimer = window.setTimeout(function () {
          applyClass("hidden", false);
          lastRuntimeMode = "hidden";
          fetchState();
        }, remainingMs);
      }

      function forceNumberRestart(value) {
        const next = cleanText(value, "3");
        const isWord = !/^\d+$/.test(next);
        els.countNumber.classList.toggle("word-state", isWord);
        if (els.countNumber.textContent === next && lastDisplayedCountdownValue === next) return;
        lastDisplayedCountdownValue = next;
        els.countNumber.style.animation = "none";
        els.countNumber.offsetHeight;
        els.countNumber.textContent = next;
        els.countNumber.style.animation = "";
      }

      function countdownPhaseKey(state) {
        const countdown = state && state.countdown ? state.countdown : {};
        const phase = state && state.phase ? state.phase : {};
        return cleanText(countdown.phaseKey || countdown.requestId || phase.key || "countdown", "countdown");
      }

      function countdownStartMs(state, seconds) {
        const countdown = state && state.countdown ? state.countdown : {};
        const fromStart = Number(countdown.countdownStartedAtMs || 0);
        if (Number.isFinite(fromStart) && fromStart > 0) return fromStart;
        const fromEnd = Number(countdown.countdownEndsAtMs || 0);
        if (Number.isFinite(fromEnd) && fromEnd > 0) return fromEnd - (seconds * 1000);
        return Date.now();
      }

      function countdownValueForTime(startedAtMs, seconds, nowMs) {
        const elapsedSteps = Math.max(0, Math.floor((nowMs - startedAtMs) / 1000));
        return Math.max(1, Math.min(seconds, seconds - elapsedSteps));
      }

      function renderCountdownValue(value) {
        forceNumberRestart(String(value));
        setText(els.caption, "Sound startet gleich", "Sound startet gleich");
      }

      function startCountdownSequencer(state) {
        const countdown = state && state.countdown ? state.countdown : {};
        const seconds = Math.max(1, Math.min(30, Math.ceil(number(countdown.seconds, 3))));
        const phaseKey = countdownPhaseKey(state);
        const startedAtMs = countdownStartMs(state, seconds);
        const now = Date.now();

        activeCountdownPhaseKey = phaseKey;
        clearCountdownTimers();

        renderCountdownValue(countdownValueForTime(startedAtMs, seconds, now));

        for (let step = 1; step <= seconds; step += 1) {
          const boundaryMs = startedAtMs + (step * 1000);
          const delay = boundaryMs - Date.now();
          if (delay <= 15) continue;
          countdownTimers.push(window.setTimeout(function () {
            if (activeCountdownPhaseKey !== phaseKey || lastRuntimeMode !== "countdown") return;
            const value = seconds - step;
            if (value > 0) renderCountdownValue(value);
            else {
              forceNumberRestart(cleanText(countdown.finalLabel, "LOS!"));
              setText(els.caption, "", "");
            }
          }, delay));
        }
      }

      function applyCountdown(state) {
        const phaseKey = countdownPhaseKey(state);
        if (phaseKey && phaseKey !== lastRuntimePhaseKey) {
          lastRuntimePhaseKey = phaseKey;
          lastRuntimeMode = "countdown";
          startCountdownSequencer(state);
          return;
        }
        if (lastRuntimeMode !== "countdown") {
          lastRuntimeMode = "countdown";
          startCountdownSequencer(state);
          return;
        }
        if (activeCountdownPhaseKey !== phaseKey) startCountdownSequencer(state);
      }

      function applyGuessing(state) {
        clearCountdownTimers();
        activeCountdownPhaseKey = "";
        lastRuntimeMode = "hidden";
        applyClass("hidden", false);
      }

      function latestSolutionText(state) {
        const latest = state && state.sound ? state.sound.latestRound : null;
        const status = cleanText(latest && latest.status, "");
        if (status === "unresolved") return "";
        const item = latest && latest.itemVisible && latest.item ? latest.item : null;
        return item ? cleanText(item.title || "", "") : "";
      }

      function resultItem(state) {
        const latest = state && state.sound ? state.sound.latestRound : null;
        return latest && latest.itemVisible && latest.item ? latest.item : null;
      }

      function resultInitials(name) {
        const cleaned = cleanText(name, "CGN");
        if (!cleaned) return "CGN";
        const parts = cleaned.split(/\s+/).filter(Boolean).slice(0, 2);
        const initials = parts.map(part => part.charAt(0).toUpperCase()).join("");
        return initials || cleaned.slice(0, 2).toUpperCase();
      }

      function setResultAvatar(url, name, visible) {
        const show = !!visible;
        if (els.resultCard) els.resultCard.classList.toggle("no-avatar", !show);
        if (!els.resultAvatarWrap || !els.resultAvatarImg || !els.resultAvatarFallback) return;
        if (!show) {
          els.resultAvatarImg.removeAttribute("src");
          els.resultAvatarImg.style.display = "none";
          els.resultAvatarFallback.style.display = "none";
          return;
        }
        const avatarUrl = cleanText(url, "");
        const fallback = resultInitials(name || "CGN");
        els.resultAvatarFallback.textContent = fallback;
        if (avatarUrl) {
          els.resultAvatarImg.style.display = "block";
          els.resultAvatarImg.src = avatarUrl;
          els.resultAvatarImg.alt = cleanText(name || "Gewinner", "Gewinner");
          els.resultAvatarFallback.style.display = "none";
          els.resultAvatarImg.onerror = function () {
            els.resultAvatarImg.removeAttribute("src");
            els.resultAvatarImg.style.display = "none";
            els.resultAvatarFallback.style.display = "flex";
          };
        } else {
          els.resultAvatarImg.removeAttribute("src");
          els.resultAvatarImg.style.display = "none";
          els.resultAvatarFallback.style.display = "flex";
        }
      }

      function isoToMs(value) {
        const ms = Date.parse(String(value || ""));
        return Number.isFinite(ms) ? ms : 0;
      }

      function normalizePrerollPayload(entry) {
        if (!entry || typeof entry !== "object") return null;
        const payload = entry.payload && typeof entry.payload === "object" ? entry.payload : {};
        const action = cleanText(entry.action || payload.action || "", "");
        if (!action) return null;
        const atMs = isoToMs(entry.at) || Date.now();
        const seconds = Math.max(1, Math.min(30, Math.ceil(number(payload.seconds, 3))));
        const requestId = cleanText(entry.requestId || payload.requestId || "", "");
        const soundId = cleanText(entry.soundId || payload.soundId || "", "");
        const phaseKey = cleanText(payload.phaseKey || `${action}:${requestId}:${atMs}`, `${action}:${atMs}`);
        return {
          action,
          atMs,
          seconds,
          requestId,
          soundId,
          eventUid: cleanText(payload.eventUid, ""),
          roundUid: cleanText(payload.roundUid, ""),
          phaseKey,
          mode: cleanText(payload.mode || (action === "countdown.start" ? "countdown" : (action === "guessing.start" ? "guessing" : "hidden")), "hidden")
        };
      }

      function buildStateFromPrerollStatus(status) {
        const events = status && Array.isArray(status.recentEvents) ? status.recentEvents : [];
        if (!events.length) return null;
        const now = Date.now();
        const latest = normalizePrerollPayload(events[0]);
        if (!latest) return null;

        if (latest.action === "hide" || latest.action === "cancel" || latest.action === "failed") {
          return {
            ok: true,
            phase: { key: "hidden", label: "", visible: false, reason: "sound_preroll_fallback_hide" },
            display: { overlayMode: "hidden", showCountdown: false, countdownFinalLabel: "LOS!", guessingLabel: "" },
            countdown: { active: false, mode: "sound_preroll_fallback", seconds: latest.seconds, phaseKey: latest.phaseKey, requestId: latest.requestId },
            overlay: { pollMs: 300 }
          };
        }

        if (latest.action === "countdown.start") {
          const countdownEndsAtMs = latest.atMs + (latest.seconds * 1000);
          if (now > countdownEndsAtMs + 900) return null;
          return {
            ok: true,
            phase: { key: "sound_preroll_countdown", label: "Sound startet gleich", visible: true, reason: "sound_preroll_status_fallback" },
            display: { overlayMode: "countdown", headline: "Sound startet gleich", subline: "Gleich im Chat raten!", showCountdown: true, countdownFinalLabel: "LOS!", guessingLabel: "" },
            countdown: {
              active: true,
              mode: "sound_preroll_status_fallback",
              owner: "sound_system",
              seconds: latest.seconds,
              remainingSeconds: Math.max(1, Math.min(latest.seconds, Math.ceil((countdownEndsAtMs - now) / 1000))),
              phaseKey: latest.phaseKey,
              requestId: latest.requestId,
              countdownStartedAtMs: latest.atMs,
              countdownEndsAtMs,
              finalLabel: "LOS!",
              guessingLabel: ""
            },
            overlay: { pollMs: 300 }
          };
        }

        if (latest.action === "guessing.start") {
          const maxGuessingMs = 30000;
          if (now > latest.atMs + maxGuessingMs) return null;
          return {
            ok: true,
            phase: { key: "sound_guessing", label: "Sound läuft", visible: false, reason: "sound_preroll_status_fallback_hidden_until_answer_window" },
            display: { overlayMode: "hidden", headline: "", subline: "", showCountdown: false, countdownFinalLabel: "LOS!", guessingLabel: "" },
            countdown: { active: false, mode: "sound_preroll_status_fallback", owner: "sound_system", seconds: latest.seconds, phaseKey: latest.phaseKey, requestId: latest.requestId, finalLabel: "LOS!", guessingLabel: "" },
            overlay: { pollMs: 300 }
          };
        }

        return null;
      }

      async function fetchPrerollFallbackState() {
        try {
          const res = await fetch(`${PREROLL_STATUS_ROUTE}?_=${Date.now()}`, { cache: "no-store" });
          if (!res.ok) return null;
          const data = await res.json();
          return buildStateFromPrerollStatus(data);
        } catch (_) {
          return null;
        }
      }

      function shouldUsePrerollFallback(state) {
        if (!state || !state.ok) return true;
        const mode = safeModeFromPhase(state);
        const phase = state.phase || {};
        const answerWindow = state.answerWindow || {};
        const phaseKey = cleanText(phase.key, "");
        if (answerWindow.active || phaseKey === "sound_answer_window" || phaseKey === "sound_guessing") return false;
        if (mode === "hidden") return true;
        if (phase.visible === false) return true;
        return false;
      }

      function applyResult(state, mode) {
        const phase = state && state.phase ? state.phase : {};
        const display = state && state.display ? state.display : {};
        const item = resultItem(state);
        const solution = latestSolutionText(state);
        const key = cleanText(phase.key, "");

        let kicker = "Auswertung";
        let title = cleanText(display.headline, "Runde beendet");
        let subline = cleanText(display.subline, "Die Heimleitung zählt nach.");
        let extra = "";
        let showAvatar = false;
        let avatarUrl = "";
        let avatarName = "";

        if (key === "sound_solved") {
          const winnerName = cleanText(item && (item.solvedByDisplayName || item.solvedByLogin), "Jemand aus dem Chat");
          const snippetTitle = cleanText(solution || (item && item.title), "den Sound");
          const points = Math.max(0, Math.round(number(item && item.awardedPoints, number(item && item.points, 0))));
          kicker = "Richtig erkannt";
          title = winnerName;
          subline = "hat den Schnipsel erkannt";
          if (points > 0) subline += " · +" + points + " Punkte";
          extra = "„" + snippetTitle + "“";
          showAvatar = true;
          avatarUrl = cleanText(item && item.solvedByAvatarUrl, "");
          avatarName = winnerName;
        } else if (key === "sound_unresolved") {
          kicker = "KEINE LÖSUNG";
          title = "Die Heimleitung hat im Chat\nkeine richtige Antwort erkannt.";
          subline = "Der Schnipsel bleibt im Archiv.";
          extra = "";
        } else if (mode === "finished") {
          kicker = "Event beendet";
        } else if (mode === "cancelled") {
          kicker = "Abgebrochen";
        }

        if (els.resultCard) {
          els.resultCard.classList.toggle("unresolved-card", key === "sound_unresolved");
          els.resultCard.classList.toggle("winner-card", key === "sound_solved");
        }
        if (els.resultTitle) {
          els.resultTitle.classList.remove("name-long", "name-very-long");
          if (key === "sound_solved") {
            const nameClass = winnerNameSizeClass(title);
            if (nameClass) els.resultTitle.classList.add(nameClass);
          }
        }
        setResultAvatar(avatarUrl, avatarName, showAvatar);
        setText(els.resultKicker, kicker, "Auswertung");
        setText(els.resultTitle, title, "Runde beendet");
        setText(els.resultSubline, subline, "Die Heimleitung zählt nach.");
        setText(els.resultExtra, extra, "");
      }

      function applyState(data) {
        const state = data && data.ok ? data : null;
        lastState = state;

        if (!state) {
          hideAnswerCounter();
          applyClass("hidden", false);
          if (DEBUG) els.debug.textContent = JSON.stringify(data || {}, null, 2);
          return;
        }

        const mode = safeModeFromPhase(state);
        const visible = !!(state.phase && state.phase.visible) && mode !== "hidden";
        pollMs = Math.max(300, Math.min(5000, number(state.overlay && state.overlay.pollMs, pollMs)));

        updateAnswerCounter(state);

        if (mode === "countdown") {
          clearResultHideTimer();
          applyCountdown(state);
        } else if (mode === "guessing") {
          clearResultHideTimer();
          applyGuessing(state);
        } else if (mode === "result" || mode === "finished" || mode === "cancelled") {
          clearCountdownTimers();
          activeCountdownPhaseKey = "";
          lastRuntimeMode = mode;
          applyResult(state, mode);
          scheduleResultHide(state);
        } else if (mode === "hidden") {
          clearCountdownTimers();
          clearResultHideTimer();
          activeCountdownPhaseKey = "";
          lastRuntimeMode = "hidden";
        }

        applyClass(mode, visible);

        if (DEBUG) els.debug.textContent = JSON.stringify(state, null, 2);
      }

      async function fetchState() {
        if (demo) return;
        try {
          const url = forcedEventUid
            ? `${STATE_ROUTE}?eventUid=${encodeURIComponent(forcedEventUid)}&_=${Date.now()}`
            : `${STATE_ROUTE}?_=${Date.now()}`;
          const res = await fetch(url, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();

          if (shouldUsePrerollFallback(data)) {
            const fallback = await fetchPrerollFallbackState();
            if (fallback && fallback.ok) {
              applyState(fallback);
              if (DEBUG) els.debug.textContent = JSON.stringify({ source: "preroll_status_fallback", state: fallback, original: data }, null, 2);
              return;
            }
          }

          applyState(data);
        } catch (err) {
          const fallback = await fetchPrerollFallbackState();
          if (fallback && fallback.ok) {
            applyState(fallback);
            if (DEBUG) els.debug.textContent = JSON.stringify({ source: "preroll_status_fallback_after_error", state: fallback, error: err && err.message ? err.message : String(err) }, null, 2);
            return;
          }
          applyClass("hidden", false);
          if (DEBUG) els.debug.textContent = `[event-runtime-overlay] ${err && err.message ? err.message : err}`;
        }
      }

      function runCountdownDemo() {
        const steps = [
          { mode: "countdown", value: 3, caption: "Sound startet gleich", visible: true, ms: 900 },
          { mode: "countdown", value: 2, caption: "Sound startet gleich", visible: true, ms: 900 },
          { mode: "countdown", value: 1, caption: "Sound startet gleich", visible: true, ms: 900 },
          { mode: "guessing", value: "LOS!", caption: "", visible: false, ms: 900 }
        ];
        let index = 0;
        function tick() {
          const step = steps[index % steps.length];
          if (step.value !== lastDemoSecond) {
            lastDemoSecond = step.value;
            forceNumberRestart(step.value);
          }
          setText(els.caption, step.caption, step.caption);
          applyClass(step.mode, step.visible);
          index += 1;
          demoTimer = window.setTimeout(tick, step.ms);
        }
        tick();
      }

      function runResultDemo() {
        applyState({
          ok: true,
          phase: { key: "sound_solved", visible: true },
          display: { overlayMode: "result", headline: "Richtig erkannt", subline: "Demo" },
          sound: { latestRound: { itemVisible: true, item: { title: "Demo-Sound", solvedByDisplayName: "ForrestCGN", solvedByAvatarUrl: "", awardedPoints: 25, result: "solved" } } },
          overlay: { pollMs: 900 }
        });
      }

      function runResultLongDemo() {
        applyState({
          ok: true,
          phase: { key: "sound_solved", visible: true },
          display: { overlayMode: "result", headline: "Richtig erkannt", subline: "Demo langer Gewinner" },
          sound: {
            latestRound: {
              itemVisible: true,
              status: "solved",
              item: {
                title: "Alf und die Heimleitung pruefen den viel zu langen Schnipsel-Titel im Altersheimarchiv",
                solvedByDisplayName: "ForrestCGN123456789012345",
                solvedByLogin: "forrestcgn123456789012345",
                solvedByAvatarUrl: "",
                awardedPoints: 25,
                result: "solved"
              }
            }
          },
          overlay: { pollMs: 900 }
        });
      }

      function schedulePoll() {
        if (pollTimer) window.clearInterval(pollTimer);
        if (!demo) pollTimer = window.setInterval(fetchState, pollMs);
      }

      function handleBusMessage(event) {
        const msg = event && event.detail ? event.detail : null;
        if (!msg || typeof msg !== "object" || demo) return;
        const meta = msg.meta && typeof msg.meta === "object" ? msg.meta : {};
        const target = msg.target && typeof msg.target === "object" ? msg.target : {};
        const source = msg.source && typeof msg.source === "object" ? msg.source : {};
        const moduleName = String(msg.module || source.module || meta.module || "").toLowerCase();
        const channel = String(msg.channel || msg.type || msg.op || msg.action || "").toLowerCase();
        const capability = String(meta.capability || target.capability || "").toLowerCase();
        const isRuntimeTarget = capability === "stream_events.runtime_display" || capability.indexOf("stream_events.runtime") === 0;
        const isStreamEvents = moduleName === "stream_events" || channel.indexOf("stream_events") >= 0 || channel.indexOf("stream-events") >= 0;
        const isSoundLifecycle = moduleName === "sound_system" || channel === "sound" || channel.indexOf("sound.") >= 0;
        if (isRuntimeTarget || isStreamEvents || isSoundLifecycle) {
          fetchState();
        }
      }

      if (demo === "countdown") {
        runCountdownDemo();
      } else if (demo === "result") {
        runResultDemo();
      } else if (demo === "result-long") {
        runResultLongDemo();
      } else {
        fetchState().then(schedulePoll);
      }

      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", fetchState);
      window.addEventListener("beforeunload", function () {
        if (pollTimer) window.clearInterval(pollTimer);
        if (demoTimer) window.clearTimeout(demoTimer);
        clearCountdownTimers();
        clearResultHideTimer();
        clearAnswerCounterTimer();
      });
    })();
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="stream_events_runtime_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="stream_events"
    data-name="Stream Events Runtime Overlay"
    data-version="0.3.7"
    data-heartbeat-ms="5000"
  ></script>
</body>
