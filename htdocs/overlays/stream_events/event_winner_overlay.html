<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --cw: 1672px;
      --ch: 941px;
      --text: #f8fbff;
      --gold: #ffe16a;
      --gold2: #ffbf44;
      --bronze: #ffa36a;
      --silver: #dbe9ff;
      --violet: #b478ff;
      --blue: #63b8ff;
      --muted: rgba(248,251,255,.78);
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0; width: var(--w); height: var(--h); overflow: hidden;
      background: #030615;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: var(--text); pointer-events: none;
    }
    #stage { position: fixed; inset: 0; width: var(--w); height: var(--h); opacity: 0; transition: opacity .55s ease; }
    #stage.visible { opacity: 1; }
    #stage.hidden-hard { opacity: 0; }
    #canvas {
      position: absolute;
      width: var(--cw);
      height: var(--ch);
      left: 50%;
      top: 50%;
      /*
        Die generierte Grafik ist 1672x941. Das ist exakt 16:9, aber kleiner als 1920x1080.
        Wir behalten die Koordinaten im Grafik-Raster und skalieren die komplette Bühne sauber auf FullHD.
      */
      transform: translate(-50%, -50%) scale(1.14833);
      transform-origin: center center;
      overflow: hidden;
      isolation: isolate;
    }
    .bg { position: absolute; inset: 0; width: 100%; height: 100%; object-fit: cover; z-index: 0; }
    .shade { position: absolute; inset: 0; z-index: 1; background: linear-gradient(180deg, rgba(0,0,0,.02), rgba(0,0,0,.08) 55%, rgba(0,0,0,.12)); }
    .header {
      position: absolute; z-index: 5; left: 378px; top: 44px; width: 916px; height: 116px; display: grid; place-items: center; text-align: center;
    }
    .phase-title {
      margin: 0; max-width: 900px; font-size: 54px; line-height: 1; font-weight: 950; text-transform: uppercase; letter-spacing: .035em;
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
      text-shadow: 0 0 22px rgba(157,112,255,.35), 0 0 42px rgba(62,168,255,.28);
    }
    .phase-subtitle {
      margin: 8px 0 0; max-width: 860px; font-size: 24px; line-height: 1.1; font-weight: 800; color: rgba(248,251,255,.82);
      white-space: nowrap; overflow: hidden; text-overflow: ellipsis; text-shadow: 0 0 14px rgba(0,0,0,.35);
    }
    .phase-title.pulse, .phase-subtitle.pulse { animation: titlePulse .55s cubic-bezier(.16,1,.3,1) both; }
    @keyframes titlePulse { from { opacity: 0; transform: translateY(12px) scale(.985); filter: blur(5px);} to { opacity:1; transform:none; filter:none;} }

    .award-slot, .honor-slot {
      position: absolute; z-index: 5; opacity: 0; transform: scale(.985); transition: opacity .45s ease, transform .6s cubic-bezier(.16,1,.3,1), filter .5s ease;
      filter: saturate(.92) brightness(.95);
    }
    .award-slot.filled, .honor-slot.filled { opacity: 1; transform: scale(1); filter: saturate(1) brightness(1); }
    .award-slot.active, .honor-slot.active { animation: slotGlow 1.2s ease-in-out 2; }
    @keyframes slotGlow { 50% { filter: drop-shadow(0 0 24px rgba(255,227,109,.42)) drop-shadow(0 0 40px rgba(92,184,255,.18)); } }

    #slot3 { left: 96px; top: 314px; width: 420px; height: 382px; }
    #slot1 { left: 548px; top: 245px; width: 574px; height: 432px; }
    #slot2 { left: 1158px; top: 314px; width: 420px; height: 382px; }

    .award-slot .inner {
      width: 100%; height: 100%; display: flex; flex-direction: column; align-items: center; justify-content: flex-start;
      padding: 18px 28px 18px; background: rgba(0,0,0,.01); text-align: center;
    }
    .award-slot.center .inner { padding: 20px 40px 20px; }
    .award-rank {
      order: 1; margin-top: 8px; color: var(--gold); font-weight: 950; text-transform: uppercase; letter-spacing: .08em; line-height: 1;
      font-size: 30px; text-shadow: 0 0 18px rgba(255,225,106,.28);
    }
    .award-slot.side .award-rank { font-size: 28px; color: #efefef; text-shadow: 0 0 18px rgba(255,255,255,.18); }
    .avatar-wrap {
      order: 2; margin-top: 16px; border-radius: 50%; padding: 5px; display: grid; place-items: center; flex: 0 0 auto;
      background: linear-gradient(135deg, #ffffff, #d9d9d9); box-shadow: 0 0 24px rgba(255,255,255,.18);
    }
    .award-slot.center .avatar-wrap { width: 132px; height: 132px; }
    .award-slot.side .avatar-wrap { width: 112px; height: 112px; }
    .award-slot.medal-gold .avatar-wrap { background: linear-gradient(135deg, #fff4a7, #ffdc6d 45%, #b97516 100%); box-shadow: 0 0 22px rgba(255,220,109,.32); }
    .award-slot.medal-silver .avatar-wrap { background: linear-gradient(135deg, #ffffff, #dbe9ff 44%, #8ea5ca 100%); box-shadow: 0 0 22px rgba(219,233,255,.25); }
    .award-slot.medal-bronze .avatar-wrap { background: linear-gradient(135deg, #ffd2b8, #ffa56f 44%, #8d401e 100%); box-shadow: 0 0 22px rgba(255,165,111,.24); }
    .avatar {
      width: 100%; height: 100%; border-radius: 50%; overflow: hidden; display: grid; place-items: center;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,.14), transparent 36%), linear-gradient(135deg, rgba(26,33,58,.92), rgba(4,9,24,.96));
      border: 2px solid rgba(255,255,255,.22); color: #fff; font-weight: 950; text-transform: uppercase; text-shadow: 0 0 16px rgba(255,255,255,.35);
    }
    .award-slot.center .avatar { font-size: 52px; }
    .award-slot.side .avatar { font-size: 42px; }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    .award-name-box, .honor-name-box { width: 100%; overflow: hidden; position: relative; }
    .award-name, .honor-name {
      display: inline-block; white-space: nowrap; max-width: 100%; font-weight: 950; letter-spacing: -.03em; vertical-align: top;
      text-shadow: 0 0 18px rgba(80,196,255,.14), 0 0 30px rgba(180,120,255,.15);
    }
    .award-name-box { order: 3; margin-top: 18px; }
    .award-slot.center .award-name { font-size: 31px; }
    .award-slot.side .award-name { font-size: 25px; }
    .award-points { order: 4; margin-top: 8px; color: rgba(248,251,255,.82); font-size: 18px; font-weight: 850; }
    .award-slot.center .award-points { font-size: 22px; }
    .award-reward {
      order: 5; margin-top: auto; width: 76%; min-height: 46px; border-radius: 18px; display: grid; place-items: center;
      padding: 8px 14px; background: rgba(0,0,0,.42); border: 1px solid rgba(255,255,255,.22);
      color: #fff; font-size: 18px; font-weight: 900; text-shadow: 0 0 14px rgba(0,0,0,.3);
    }
    .award-slot.center .award-reward { width: 64%; min-height: 50px; font-size: 19px; }
    .award-slot.medal-gold .award-reward { border-color: rgba(255,225,106,.46); box-shadow: inset 0 0 14px rgba(255,225,106,.08), 0 0 18px rgba(255,225,106,.10); }
    .award-slot.medal-silver .award-reward { border-color: rgba(219,233,255,.40); box-shadow: inset 0 0 14px rgba(219,233,255,.06), 0 0 18px rgba(219,233,255,.08); }
    .award-slot.medal-bronze .award-reward { border-color: rgba(255,165,111,.40); box-shadow: inset 0 0 14px rgba(255,165,111,.06), 0 0 18px rgba(255,165,111,.08); }

    .marquee-track { display: inline-flex; gap: 40px; will-change: transform; }
    .marquee.active .marquee-track { animation: marqueeX var(--dur, 8s) linear infinite alternate; }
    @keyframes marqueeX { from { transform: translateX(0); } to { transform: translateX(calc(-1 * var(--shift, 0px))); } }

    .honor-slot { top: 760px; width: 190px; height: 108px; }
    #honor10 { left: 60px; }
    #honor9  { left: 287px; }
    #honor8  { left: 514px; }
    #honor7  { left: 741px; }
    #honor6  { left: 968px; }
    #honor5  { left: 1195px; }
    #honor4  { left: 1422px; }
    .honor-slot .inner { width: 100%; height: 100%; display: flex; flex-direction: column; justify-content: center; padding: 14px 14px 10px; background: rgba(0,0,0,.01); }
    .honor-rank { color: #f3f1ff; font-size: 16px; font-weight: 900; text-transform: uppercase; letter-spacing: .06em; }
    .honor-name-box { margin-top: 7px; }
    .honor-name { font-size: 19px; color: #fff; }
    .honor-reward { margin-top: 10px; width: 100%; min-height: 28px; display: grid; place-items: center; border-radius: 999px; background: rgba(0,0,0,.34); border: 1px solid rgba(167,120,255,.28); color: #f2ccff; font-size: 15px; font-weight: 900; }

    .confetti { position: absolute; inset: 0; z-index: 2; pointer-events: none; overflow: hidden; }
    .confetti i { position: absolute; top: -34px; width: 9px; height: 17px; border-radius: 3px; opacity: .75; background: var(--gold); animation: fall linear forwards; }
    .confetti i:nth-child(3n) { background: #51d4ff; } .confetti i:nth-child(3n+1) { background: #ff70da; }
    @keyframes fall { to { transform: translateY(1020px) rotate(700deg); opacity: 0; } }

    #debug { position: fixed; z-index: 99; left: 14px; bottom: 14px; max-width: 760px; max-height: 250px; overflow: auto; display: none; padding: 10px; background: rgba(0,0,0,.72); border: 1px solid rgba(255,255,255,.2); color: #fff; font-size: 12px; white-space: pre-wrap; pointer-events: auto; }
    body.debug #debug { display: block; }
    @media (prefers-reduced-motion: reduce) { *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; } }
  </style>
</head>
<body>
  <div id="stage" class="hidden-hard" aria-live="polite">
    <div id="canvas">
      <img class="bg" src="/assets/stream_events/winner_finale_cosmic_stage_v2.png" alt="" />
      <div class="shade"></div>
      <div id="confetti" class="confetti"></div>

      <header class="header">
        <div>
          <h1 id="phaseTitle" class="phase-title">CGN Event-Finale</h1>
          <p id="phaseSubtitle" class="phase-subtitle">Die Plätze werden gleich enthüllt.</p>
        </div>
      </header>

      <section id="slot3" class="award-slot side" data-rank="3"><div class="inner"></div></section>
      <section id="slot1" class="award-slot center" data-rank="1"><div class="inner"></div></section>
      <section id="slot2" class="award-slot side" data-rank="2"><div class="inner"></div></section>

      <section id="honor10" class="honor-slot" data-rank="10"><div class="inner"></div></section>
      <section id="honor9" class="honor-slot" data-rank="9"><div class="inner"></div></section>
      <section id="honor8" class="honor-slot" data-rank="8"><div class="inner"></div></section>
      <section id="honor7" class="honor-slot" data-rank="7"><div class="inner"></div></section>
      <section id="honor6" class="honor-slot" data-rank="6"><div class="inner"></div></section>
      <section id="honor5" class="honor-slot" data-rank="5"><div class="inner"></div></section>
      <section id="honor4" class="honor-slot" data-rank="4"><div class="inner"></div></section>
    </div>
  </div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",
      version: "0.4.1",
      heartbeatIntervalMs: 5000,
      capabilities: ["overlay.heartbeat", "stream_events.winner_finale_display", "stream_events.winner_finale", "ack"],
      meta: { overlay: "event_winner_overlay.html", communication: "communication_bus", owner: "stream_events", step: "EVS48.1" }
    };
  </script>

  <script>
    (function () {
      "use strict";
      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const speed = String(qs.get("speed") || "normal").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";
      const fastMode = speed === "fast" || speed === "test" || qs.get("fast") === "1";
      const timeline = fastMode
        ? { intro: 850, honor: 1700, top: 2300, gap: 420, final: 7500 }
        : { intro: 4200, honor: 9800, top: 13200, gap: 1100, final: 60000 };
      const autoHideMs = Math.max(8000, Math.min(360000, Number(qs.get("hideMs") || (fastMode ? 82000 : 285000))));

      const els = {
        stage: document.getElementById("stage"),
        phaseTitle: document.getElementById("phaseTitle"),
        phaseSubtitle: document.getElementById("phaseSubtitle"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug"),
        slots: {
          1: document.getElementById("slot1"), 2: document.getElementById("slot2"), 3: document.getElementById("slot3"),
          4: document.getElementById("honor4"), 5: document.getElementById("honor5"), 6: document.getElementById("honor6"),
          7: document.getElementById("honor7"), 8: document.getElementById("honor8"), 9: document.getElementById("honor9"), 10: document.getElementById("honor10")
        }
      };
      let timers = [];
      let hideTimer = null;
      let currentFinaleUid = "";
      if (DEBUG) document.body.classList.add("debug");

      function log(value) { if (!DEBUG) return; try { els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); } catch (err) { els.debug.textContent = String(value); } }
      function defer(fn, ms) { const t = window.setTimeout(fn, ms); timers.push(t); return t; }
      function clearTimers() { timers.forEach((t) => window.clearTimeout(t)); timers = []; if (hideTimer) window.clearTimeout(hideTimer); hideTimer = null; }
      function showStage() { els.stage.classList.remove("hidden-hard"); window.requestAnimationFrame(() => els.stage.classList.add("visible")); }
      function hideStage() { els.stage.classList.remove("visible"); hideTimer = window.setTimeout(() => { els.stage.classList.add("hidden-hard"); clearConfetti(); }, 700); }
      function cleanText(value, fallback) { const text = String(value == null ? "" : value).trim(); return text || fallback || ""; }
      function cleanNumber(value, fallback) { const n = Number(value); return Number.isFinite(n) ? n : Number(fallback || 0); }
      function formatInt(value) { return cleanNumber(value, 0).toLocaleString("de-DE"); }
      function pointsLabel(points) { const n = cleanNumber(points, 0); return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`; }
      function crumbsLabel(value) { return `+${formatInt(value)} extra`; }
      function firstExisting(row, keys, fallback) { for (const k of keys) if (row && row[k] != null && String(row[k]).trim() !== "") return row[k]; return fallback; }
      function avatarUrl(row) { return cleanText(firstExisting(row, ["avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url", "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"], ""), ""); }
      function initials(name) { const text = cleanText(name, "CGN").replace(/[^\p{L}\p{N}\s_-]/gu, "").trim(); const parts = text.split(/[\s_-]+/).filter(Boolean); if (parts.length >= 2) return `${parts[0][0]}${parts[1][0]}`.toUpperCase(); return text.slice(0, 2).toUpperCase() || "CG"; }
      function escapeHtml(value) { return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;"); }
      function normalizeRow(row, index) {
        const src = row && typeof row === "object" ? row : {};
        const rank = cleanNumber(firstExisting(src, ["rank", "place", "position"], index + 1), index + 1);
        const login = cleanText(firstExisting(src, ["userLogin", "user_login", "login", "username", "userName", "user_name"], ""), "");
        const display = cleanText(firstExisting(src, ["userDisplayName", "user_display_name", "displayName", "display_name", "name"], login), login || `Platz ${rank}`);
        return { rank, userLogin: login, userDisplayName: display, points: cleanNumber(firstExisting(src, ["points", "total_points", "score", "totalScore", "total_score"], 0), 0), entries: cleanNumber(firstExisting(src, ["entries", "entry_count", "answerCount", "answer_count", "solved", "solvedCount"], 0), 0), avatarUrl: avatarUrl(src), rewardLabel: cleanText(firstExisting(src, ["rewardLabel", "reward_label", "prizeLabel", "prize_label", "prize"], ""), ""), rewardValue: cleanText(firstExisting(src, ["rewardValue", "reward_value", "prizeValue", "prize_value"], ""), ""), crumbBonus: cleanNumber(firstExisting(src, ["crumbBonus", "crumb_bonus", "kekskruemel", "cookieCrumbs", "cookie_crumbs"], 0), 0) };
      }
      function rowKey(row) { return String(row.userLogin || row.userDisplayName || "").trim().toLowerCase(); }
      function uniqueRows(rows) { const seen = new Set(); return rows.filter((row) => { const key = rowKey(row) || `rank_${row.rank}`; if (seen.has(key)) return false; seen.add(key); return true; }); }
      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || finale.event || {};
        const rawWinner = finale.winner || preview.winner || {};
        const rankingSources = [finale.ranking, finale.top10, finale.topTen, finale.leaderboard, finale.results, finale.rows, preview.ranking, preview.top10, preview.topTen, preview.leaderboard, preview.topCandidates, preview.results];
        let ranking = [];
        for (const source of rankingSources) if (Array.isArray(source) && source.length) { ranking = source.map(normalizeRow); break; }
        const top3Source = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const top3 = top3Source.map(normalizeRow);
        const candidates = (Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : [])).map(normalizeRow);
        const winner = normalizeRow(rawWinner && Object.keys(rawWinner).length ? rawWinner : (top3[0] || ranking[0] || candidates[0] || {}), 0);
        if (!ranking.length) ranking = uniqueRows([winner, ...top3, ...candidates]).filter((row) => row.userDisplayName);
        ranking = uniqueRows(ranking).sort((a, b) => a.rank !== b.rank ? a.rank - b.rank : b.points - a.points);
        let podiumRows = ranking.filter((row) => row.rank >= 1 && row.rank <= 3).slice(0, 3);
        if (podiumRows.length < 3 && top3.length) podiumRows = uniqueRows([...podiumRows, ...top3]).sort((a, b) => a.rank - b.rank).slice(0, 3);
        const honorRows = ranking.filter((row) => row.rank >= 4 && row.rank <= 10).sort((a, b) => a.rank - b.rank);
        const eventName = cleanText(firstExisting(finale, ["eventName", "event_name", "name"], firstExisting(event, ["title", "name"], "CGN Event-Finale")), "CGN Event-Finale");
        return { finaleUid: cleanText(firstExisting(finale, ["finaleUid", "uid", "id"], firstExisting(preview, ["finaleUid", "uid"], eventUid || `finale_${Date.now()}`)), `finale_${Date.now()}`), eventUid: cleanText(firstExisting(finale, ["eventUid", "event_uid"], firstExisting(event, ["uid", "id"], eventUid)), eventUid || ""), eventName, winner, podiumRows, honorRows };
      }
      function clearConfetti() { els.confetti.innerHTML = ""; }
      function makeConfetti(amount) {
        clearConfetti(); const count = Math.max(10, Math.min(100, amount || 40));
        for (let i = 0; i < count; i += 1) { const p = document.createElement("i"); p.style.left = `${Math.random()*100}%`; p.style.animationDuration = `${4.0 + Math.random()*4.0}s`; p.style.animationDelay = `${Math.random()*1.0}s`; p.style.transform = `translateY(-60px) rotate(${Math.random()*360}deg)`; els.confetti.appendChild(p); }
      }
      function setPhase(title, subtitle) {
        els.phaseTitle.textContent = title; els.phaseSubtitle.textContent = subtitle || "";
        els.phaseTitle.classList.remove("pulse"); els.phaseSubtitle.classList.remove("pulse");
        void els.phaseTitle.offsetWidth; els.phaseTitle.classList.add("pulse"); els.phaseSubtitle.classList.add("pulse");
      }
      function renderAvatar(container, row) {
        if (!container) return; container.innerHTML = "";
        const url = cleanText(row && row.avatarUrl, "");
        if (url) {
          const img = document.createElement("img"); img.alt = ""; img.decoding = "async"; img.referrerPolicy = "no-referrer"; img.src = url; img.onerror = () => { container.innerHTML = initials(row && row.userDisplayName); }; container.appendChild(img); return;
        }
        container.textContent = initials(row && row.userDisplayName);
      }
      function fitOrMarquee(el, text, maxSize, minSize) {
        if (!el) return;
        el.classList.remove('marquee', 'active');
        el.innerHTML = '';
        const span = document.createElement('span');
        span.textContent = cleanText(text, '');
        el.appendChild(span);
        let size = maxSize;
        el.style.fontSize = `${size}px`;
        while (size > minSize && el.scrollWidth > el.clientWidth + 1) { size -= 1; el.style.fontSize = `${size}px`; }
        if (el.scrollWidth > el.clientWidth + 1) {
          const raw = cleanText(text, '');
          const first = document.createElement('span');
          first.textContent = raw;
          const second = document.createElement('span');
          second.textContent = raw;
          const track = document.createElement('span');
          track.className = 'marquee-track';
          track.appendChild(first); track.appendChild(second);
          el.innerHTML = '';
          el.classList.add('marquee', 'active');
          el.style.fontSize = `${Math.max(minSize, size - 1)}px`;
          el.appendChild(track);
          requestAnimationFrame(() => {
            const shift = Math.max(20, track.scrollWidth / 2 - el.clientWidth + 24);
            el.style.setProperty('--shift', `${shift}px`);
            el.style.setProperty('--dur', `${Math.min(15, Math.max(6, shift / 22))}s`);
          });
        }
      }
      function nameClass(name) { const l = cleanText(name, "").length; return l > 24 ? "long" : ""; }
      function renderAward(row) {
        const slot = els.slots[row.rank]; if (!slot) return;
        const rankText = `Platz ${row.rank}`;
        const reward = row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel;
        slot.classList.remove('medal-bronze','medal-silver','medal-gold');
        if (row.rank === 1) slot.classList.add('medal-gold'); else if (row.rank === 2) slot.classList.add('medal-silver'); else slot.classList.add('medal-bronze');
        slot.querySelector('.inner').innerHTML = `<div class="award-rank">${escapeHtml(rankText)}</div><div class="avatar-wrap"><div class="avatar"></div></div><div class="award-name-box"><div class="award-name"></div></div><div class="award-points">${escapeHtml(pointsLabel(row.points))}</div><div class="award-reward">${escapeHtml(reward)}</div>`;
        renderAvatar(slot.querySelector('.avatar'), row);

        at += timeline.intro;

        [3, 2, 1].forEach((rank) => {

          { rank: 2, userDisplayName: long ? 'EngelCGN_Silbername_mit_Extra_Laenge' : 'EngelCGN', points: 108, entries: 11, rewardLabel: 'Amazon-Gutschein' },
          { rank: 3, userDisplayName: long ? 'HeimleitungHD_Langer_Bronze_Name' : 'HeimleitungHD', points: 96, entries: 9, rewardLabel: 'Amazon-Gutschein' },

      }
      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try { const res = await fetch(finaleRoute, { cache: 'no-store' }); if (!res.ok) throw new Error(`HTTP ${res.status}`); const data = await res.json(); log(data); if (data && data.existingFinale) playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true }); }

      function extractBusPayload(detail) { const msg = detail && typeof detail === 'object' ? detail : {}; const payload = msg.payload && typeof msg.payload === 'object' ? msg.payload : msg; return { msg, payload }; }
