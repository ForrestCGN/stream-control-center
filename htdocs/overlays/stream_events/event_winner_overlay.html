<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --cyan: #39e6ff;
      --cyan-soft: rgba(57, 230, 255, .26);
      --violet: #a855f7;
      --violet-soft: rgba(168, 85, 247, .34);
      --pink: #ff4fd8;
      --gold: #ffe66d;
      --gold2: #ffbf3f;
      --bronze: #d98b4b;
      --silver: #d8e6ff;
      --cookie: #ffd18a;
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, .70);
      --line: rgba(143, 244, 255, .18);
      --panel: rgba(8, 11, 34, .76);
      --panel-strong: rgba(12, 10, 42, .90);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transform: scale(.988);
      filter: blur(5px);
      transition: opacity .45s ease, transform .55s cubic-bezier(.16, 1, .3, 1), filter .45s ease;
      isolation: isolate;
    }

    #stage.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    #stage.hidden-hard { opacity: 0; }

    .backdrop {
      position: absolute;
      inset: -90px;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 14%, rgba(57,230,255,.18), transparent 28%),
        radial-gradient(circle at 18% 72%, rgba(168,85,247,.22), transparent 34%),
        radial-gradient(circle at 83% 62%, rgba(255,79,216,.15), transparent 31%),
        radial-gradient(circle at 52% 98%, rgba(255,230,109,.10), transparent 26%),
        linear-gradient(135deg, rgba(4,6,20,.86), rgba(16,9,45,.91), rgba(4,10,32,.84));
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .24;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.82) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(57,230,255,.62) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,230,109,.52) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(196,92,255,.50) 0 1px, transparent 1.6px);
      background-size: 170px 170px, 245px 245px, 315px 315px, 410px 410px;
      background-position: 20px 48px, 88px 118px, 146px 32px, 218px 178px;
      animation: starDrift 34s linear infinite;
    }

    @keyframes starDrift {
      to { background-position: 190px 218px, 333px 363px, 461px 347px, 628px 588px; }
    }

    .frame {
      position: absolute;
      inset: 46px 74px;
      z-index: 2;
      border-radius: 42px;
      border: 1px solid rgba(143,244,255,.20);
      box-shadow:
        inset 0 0 52px rgba(57,230,255,.048),
        0 0 58px rgba(168,85,247,.18),
        0 0 100px rgba(57,230,255,.09);
      overflow: hidden;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: .86;
      filter: blur(.2px);
    }

    .frame::before {
      top: -2px;
      left: 8%;
      width: 360px;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.92), rgba(168,85,247,.78), transparent);
      animation: runnerTop 7.8s ease-in-out infinite alternate;
    }

    .frame::after {
      bottom: -2px;
      right: 11%;
      width: 430px;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(255,79,216,.80), rgba(255,230,109,.82), transparent);
      animation: runnerBottom 8.6s ease-in-out infinite alternate;
    }

    @keyframes runnerTop { to { left: 63%; } }
    @keyframes runnerBottom { to { right: 59%; } }

    .spotlight {
      position: absolute;
      z-index: 3;
      top: -26px;
      width: 520px;
      height: 940px;
      opacity: .18;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(57,230,255,.32), rgba(57,230,255,.07) 42%, transparent 78%);
      clip-path: polygon(48% 0, 58% 0, 100% 100%, 0 100%);
      filter: blur(10px);
      transform-origin: top center;
    }

    .spotlight.left { left: 300px; transform: rotate(15deg); }
    .spotlight.right { right: 300px; transform: rotate(-15deg); background: linear-gradient(180deg, rgba(168,85,247,.36), rgba(168,85,247,.08) 44%, transparent 78%); }

    .main {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 50%;
      width: 1560px;
      height: 875px;
      transform: translate(-50%, -50%);
      border-radius: 38px;
      background:
        radial-gradient(circle at 50% 0%, rgba(57,230,255,.11), transparent 42%),
        linear-gradient(135deg, rgba(7, 10, 30, .91), rgba(18, 10, 52, .88));
      border: 1px solid rgba(143,244,255,.23);
      box-shadow:
        inset 0 0 44px rgba(57,230,255,.05),
        inset 0 0 84px rgba(168,85,247,.055),
        0 0 32px rgba(168,85,247,.32),
        0 0 84px rgba(57,230,255,.13);
      overflow: hidden;
      padding: 36px 48px 32px;
    }

    .main::before {
      content: "";
      position: absolute;
      left: -35%;
      top: -22%;
      width: 30%;
      height: 150%;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.085), rgba(255,255,255,.05), rgba(255,79,216,.07), transparent);
      transform: skewX(-18deg);
      animation: scan 7.2s linear infinite;
    }

    @keyframes scan { to { transform: translateX(600%) skewX(-18deg); } }

    .topline {
      position: relative;
      z-index: 3;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 16px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 9px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(57,230,255,.16), rgba(168,85,247,.17));
      border: 1px solid rgba(143,244,255,.20);
      box-shadow: 0 0 24px rgba(57,230,255,.09);
      color: rgba(248,251,255,.91);
      font-size: 19px;
      font-weight: 850;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255,230,109,.9), 0 0 26px rgba(255,230,109,.28);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    @keyframes dotPulse { 50% { transform: scale(1.35); opacity: .74; } }

    .event-name {
      flex: 1;
      color: rgba(248,251,255,.82);
      text-align: right;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: .04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .headline {
      position: relative;
      z-index: 3;
      margin: 0;
      text-align: center;
      font-size: 62px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: .02em;
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(255,255,255,.20),
        0 0 35px rgba(57,230,255,.48),
        0 0 58px rgba(168,85,247,.42),
        0 0 85px rgba(255,79,216,.17);
    }

    .subline {
      position: relative;
      z-index: 3;
      margin: 11px auto 18px;
      max-width: 1210px;
      color: var(--muted);
      text-align: center;
      font-size: 24px;
      font-weight: 650;
      letter-spacing: .02em;
    }

    .arena {
      position: relative;
      z-index: 3;
      height: 615px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(5,8,28,.58), rgba(18,10,52,.54));
      border: 1px solid rgba(143,244,255,.15);
      box-shadow: inset 0 0 34px rgba(57,230,255,.035), 0 0 32px rgba(168,85,247,.10);
      overflow: hidden;
    }

    .arena::before {
      content: "";
      position: absolute;
      left: 105px;
      right: 105px;
      bottom: 170px;
      height: 2px;
      opacity: .56;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.40), rgba(255,230,109,.22), rgba(168,85,247,.34), transparent);
      filter: blur(.2px);
    }

    .award-stage {
      position: absolute;
      z-index: 4;
      left: 42px;
      right: 42px;
      top: 34px;
      height: 392px;
      display: grid;
      grid-template-columns: 1fr 1.14fr 1fr;
      gap: 26px;
      align-items: end;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .55s ease, transform .65s cubic-bezier(.16, 1, .3, 1);
    }

    .award-stage.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .award-slot {
      position: relative;
      min-height: 252px;
      padding: 22px 22px 20px;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 0%, rgba(57,230,255,.08), transparent 46%),
        linear-gradient(135deg, rgba(8,11,34,.80), rgba(20,11,52,.76));
      border: 1px solid rgba(143,244,255,.16);
      box-shadow: inset 0 0 28px rgba(57,230,255,.04), 0 0 34px rgba(168,85,247,.13);
      overflow: hidden;
      opacity: .78;
      transform: scale(.985);
      transition: opacity .55s ease, transform .65s cubic-bezier(.16, 1, .3, 1), box-shadow .45s ease, border-color .45s ease, filter .45s ease;
    }

    .award-slot.waiting {
      opacity: .34;
      filter: saturate(.58);
    }

    .award-slot.filled {
      opacity: 1;
      transform: scale(1);
    }

    .award-slot.place-1 {
      min-height: 330px;
      padding: 28px 28px 26px;
      border-color: rgba(255,230,109,.35);
      box-shadow: inset 0 0 34px rgba(255,230,109,.045), 0 0 46px rgba(255,230,109,.16), 0 0 68px rgba(168,85,247,.14);
    }

    .award-slot.place-2 { border-color: rgba(216,230,255,.29); }
    .award-slot.place-3 { border-color: rgba(217,139,75,.31); }

    .award-slot.winner-glow {
      border-color: rgba(255,230,109,.72);
      box-shadow:
        inset 0 0 42px rgba(255,230,109,.08),
        0 0 46px rgba(255,230,109,.28),
        0 0 92px rgba(168,85,247,.24),
        0 0 130px rgba(57,230,255,.13);
      animation: winnerPulse 1.8s ease-in-out infinite alternate;
    }

    @keyframes winnerPulse {
      to { transform: scale(1.018); }
    }

    .award-placeholder {
      position: absolute;
      inset: 0;
      display: grid;
      place-items: center;
      text-align: center;
      color: rgba(248,251,255,.34);
      font-weight: 950;
      letter-spacing: .13em;
      text-transform: uppercase;
      font-size: 21px;
    }

    .award-content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; gap: 12px; }

    .award-head {
      display: flex;
      align-items: center;
      gap: 16px;
      min-width: 0;
    }

    .avatar-ring {
      width: 94px;
      height: 94px;
      flex: 0 0 auto;
      border-radius: 50%;
      padding: 5px;
      background: conic-gradient(from 135deg, rgba(57,230,255,.95), rgba(168,85,247,.88), rgba(255,79,216,.78), rgba(255,230,109,.88), rgba(57,230,255,.95));
      box-shadow: 0 0 24px rgba(57,230,255,.20), 0 0 46px rgba(168,85,247,.16);
    }

    .place-1 .avatar-ring {
      width: 124px;
      height: 124px;
      box-shadow: 0 0 30px rgba(255,230,109,.24), 0 0 64px rgba(168,85,247,.18);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.16), transparent 38%),
        linear-gradient(135deg, rgba(57,230,255,.18), rgba(168,85,247,.30));
      border: 2px solid rgba(255,255,255,.15);
      color: rgba(248,251,255,.92);
      font-size: 27px;
      font-weight: 950;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(57,230,255,.40);
    }

    .place-1 .avatar { font-size: 38px; }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .award-place {
      color: var(--gold);
      font-size: 21px;
      font-weight: 950;
      letter-spacing: .13em;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255,230,109,.25);
    }

    .award-name {
      margin-top: 4px;
      font-size: 34px;
      line-height: 1;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      text-shadow: 0 0 22px rgba(57,230,255,.24), 0 0 36px rgba(168,85,247,.18);
    }

    .place-1 .award-name { font-size: 46px; }

    .award-points {
      color: rgba(248,251,255,.76);
      font-size: 20px;
      font-weight: 800;
    }

    .award-reward {
      padding: 11px 14px;
      border-radius: 18px;
      color: var(--gold);
      font-size: 22px;
      font-weight: 950;
      background: rgba(255,230,109,.09);
      border: 1px solid rgba(255,230,109,.18);
      text-align: center;
      text-shadow: 0 0 16px rgba(255,230,109,.20);
    }

    .place-1 .award-reward { font-size: 25px; }

    .reveal-card {
      position: absolute;
      z-index: 10;
      left: 50%;
      top: 43%;
      width: 760px;
      min-height: 290px;
      transform: translate(-50%, -50%) scale(.92);
      opacity: 0;
      border-radius: 36px;
      padding: 32px 36px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,230,109,.13), transparent 46%),
        linear-gradient(135deg, rgba(10,13,37,.96), rgba(29,14,64,.93));
      border: 1px solid rgba(143,244,255,.25);
      box-shadow:
        0 0 34px rgba(57,230,255,.18),
        0 0 68px rgba(168,85,247,.26),
        inset 0 0 42px rgba(255,255,255,.035);
      display: grid;
      grid-template-columns: 158px 1fr;
      gap: 26px;
      align-items: center;
      transition: opacity .42s ease, transform .58s cubic-bezier(.16, 1, .3, 1), filter .4s ease;
    }

    .reveal-card.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .reveal-card.hidden-soft {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.96);
    }

    .reveal-card.final-focus {
      top: 40%;
      border-color: rgba(255,230,109,.46);
      box-shadow:
        0 0 42px rgba(255,230,109,.22),
        0 0 76px rgba(168,85,247,.28),
        0 0 108px rgba(57,230,255,.12),
        inset 0 0 46px rgba(255,230,109,.055);
    }

    .reveal-kicker {
      color: var(--gold);
      font-size: 23px;
      font-weight: 950;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,230,109,.28);
    }

    .reveal-name {
      margin-top: 6px;
      max-width: 515px;
      font-size: 57px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.025em;
      text-shadow: 0 0 26px rgba(57,230,255,.36), 0 0 46px rgba(168,85,247,.34);
      overflow-wrap: anywhere;
    }

    .reveal-meta {
      margin-top: 13px;
      color: rgba(248,251,255,.76);
      font-size: 24px;
      font-weight: 700;
    }

    .reveal-reward {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,230,109,.18), rgba(57,230,255,.10));
      border: 1px solid rgba(255,230,109,.24);
      color: var(--gold);
      font-size: 24px;
      font-weight: 950;
      text-shadow: 0 0 18px rgba(255,230,109,.25);
    }

    .honor-wall {
      position: absolute;
      z-index: 5;
      left: 34px;
      right: 34px;
      bottom: 24px;
      min-height: 134px;
      padding: 14px 18px;
      border-radius: 25px;
      background: rgba(3, 8, 28, .55);
      border: 1px solid rgba(143,244,255,.14);
      box-shadow: inset 0 0 24px rgba(57,230,255,.035);
      transition: opacity .45s ease, filter .45s ease, background .45s ease, border-color .45s ease, box-shadow .45s ease;
    }

    .honor-wall.empty {
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .honor-wall.dimmed {
      opacity: .68;
      filter: saturate(.74) brightness(.82);
    }

    .wall-title {
      color: rgba(248,251,255,.70);
      font-size: 16px;
      font-weight: 900;
      letter-spacing: .15em;
      text-transform: uppercase;
      margin-bottom: 10px;
      opacity: 1;
      transition: opacity .35s ease;
    }

    .honor-wall.empty .wall-title { opacity: 0; }

    .honor-list {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 9px;
    }

    .honor-chip {
      min-height: 78px;
      padding: 9px 10px 8px;
      border-radius: 17px;
      background: linear-gradient(135deg, rgba(255,209,138,.075), rgba(168,85,247,.10));
      border: 1px solid rgba(255,209,138,.30);
      box-shadow: 0 0 18px rgba(255,209,138,.10);
      overflow: hidden;
      opacity: 1;
      transform: translateY(0) scale(1);
      transition: opacity .34s ease, transform .42s cubic-bezier(.16, 1, .3, 1), border-color .34s ease, box-shadow .34s ease;
    }

    .honor-chip.preparing {
      visibility: hidden;
      opacity: 0;
      transition: none;
    }

    .honor-chip.pop-in {
      animation: chipPop .48s cubic-bezier(.16, 1, .3, 1) both;
    }

    @keyframes chipPop {
      from { opacity: 0; transform: translateY(10px) scale(.94); }
      to { opacity: 1; transform: translateY(0) scale(1); }
    }

    .chip-place {
      color: var(--cookie);
      font-size: 16px;
      font-weight: 950;
      letter-spacing: .05em;
    }

    .chip-name {
      margin-top: 3px;
      color: var(--text);
      font-size: 18px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip-reward {
      margin-top: 4px;
      color: var(--gold);
      font-size: 15px;
      font-weight: 850;
      white-space: nowrap;
    }

    .footer-line {
      position: absolute;
      z-index: 6;
      left: 70px;
      right: 70px;
      bottom: 166px;
      color: rgba(248,251,255,.58);
      font-size: 18px;
      font-weight: 680;
      text-align: center;
      opacity: 0;
      transition: opacity .45s ease;
    }

    .footer-line.visible { opacity: 1; }

    .confetti {
      position: absolute;
      inset: 0;
      z-index: 3;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti i {
      position: absolute;
      top: -40px;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      opacity: .78;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,230,109,.28);
      animation: fall linear forwards;
    }

    .confetti i:nth-child(3n) { background: var(--cyan); box-shadow: 0 0 14px rgba(57,230,255,.28); }
    .confetti i:nth-child(3n+1) { background: var(--pink); box-shadow: 0 0 14px rgba(255,79,216,.28); }

    @keyframes fall {
      to { transform: translateY(760px) rotate(720deg); opacity: 0; }
    }

    .fly-proxy {
      position: fixed !important;
      z-index: 95 !important;
      margin: 0 !important;
      pointer-events: none !important;
      transform: none !important;
      opacity: .98 !important;
      transition-property: left, top, width, height, opacity, border-radius, filter !important;
      transition-timing-function: cubic-bezier(.16, 1, .3, 1) !important;
      filter: drop-shadow(0 0 28px rgba(255,209,138,.34));
    }

    .fly-proxy.to-chip {
      padding: 9px 10px !important;
      gap: 8px !important;
      grid-template-columns: 44px 1fr !important;
      border-radius: 18px !important;
      overflow: hidden !important;
    }

    .fly-proxy.to-chip .avatar-ring {
      width: 44px !important;
      height: 44px !important;
      padding: 3px !important;
    }

    .fly-proxy.to-chip .avatar { font-size: 14px !important; }
    .fly-proxy.to-chip .reveal-kicker { font-size: 10px !important; letter-spacing: .08em !important; }
    .fly-proxy.to-chip .reveal-name { font-size: 16px !important; max-width: 110px !important; white-space: nowrap !important; overflow: hidden !important; text-overflow: ellipsis !important; }
    .fly-proxy.to-chip .reveal-meta { display: none !important; }
    .fly-proxy.to-chip .reveal-reward { margin-top: 4px !important; padding: 3px 8px !important; font-size: 10px !important; }

    #debug {
      position: fixed;
      z-index: 120;
      left: 14px;
      bottom: 14px;
      max-width: 780px;
      max-height: 270px;
      overflow: auto;
      display: none;
      padding: 10px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 12px;
      white-space: pre-wrap;
      pointer-events: auto;
    }

    body.debug #debug { display: block; }

    @keyframes headlineIn {
      from { transform: translateY(26px) scale(.96); opacity: 0; filter: blur(8px); }
      to { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }

    @keyframes fadeUp {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .headline.pulse { animation: headlineIn .75s cubic-bezier(.16, 1, .3, 1) both; }
    .subline.pulse { animation: fadeUp .75s .08s cubic-bezier(.16, 1, .3, 1) both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",

      capabilities: [

      ],

        communication: "communication_bus",
        owner: "stream_events",
        step: "EVS46.0"
      }
    };
  </script>

  <script>
    (function () {
      "use strict";

      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const speed = String(qs.get("speed") || "normal").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";
      const fastMode = speed === "fast" || speed === "test" || qs.get("fast") === "1";
      const timeline = fastMode
        ? { intro: 1500, honor: 2600, honorFly: 900, honorPause: 650, awardIntro: 1500, award: 3500, awardFly: 900, awardPause: 900, final: 16000, emptyHonor: 1200 }
        : { intro: 5200, honor: 9500, honorFly: 1400, honorPause: 900, awardIntro: 5200, award: 15000, awardFly: 1400, awardPause: 1000, final: 65000, emptyHonor: 2600 };
      const autoHideMs = Math.max(12000, Math.min(420000, Number(qs.get("hideMs") || (fastMode ? 90000 : 320000))));

      const els = {
        stage: document.getElementById("stage"),
        main: document.getElementById("main"),
        badgeText: document.getElementById("badgeText"),
        eventName: document.getElementById("eventName"),
        headline: document.getElementById("headline"),
        subline: document.getElementById("subline"),
        revealCard: document.getElementById("revealCard"),
        revealAvatar: document.getElementById("revealAvatar"),
        revealKicker: document.getElementById("revealKicker"),
        revealName: document.getElementById("revealName"),
        revealMeta: document.getElementById("revealMeta"),
        revealReward: document.getElementById("revealReward"),
        honorWall: document.getElementById("honorWall"),
        honorList: document.getElementById("honorList"),
        awardStage: document.getElementById("awardStage"),
        podium1: document.getElementById("podium1"),
        podium2: document.getElementById("podium2"),
        podium3: document.getElementById("podium3"),
        footerLine: document.getElementById("footerLine"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug")
      };

      let timers = [];
      let hideTimer = null;
      let currentFinaleUid = "";

      if (DEBUG) document.body.classList.add("debug");

      function log(value) {
        if (!DEBUG) return;
        try {
          els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        } catch (err) {
          els.debug.textContent = String(value);
        }
      }

      function defer(fn, ms) {
        const timer = window.setTimeout(fn, ms);
        timers.push(timer);
        return timer;
      }

      function clearTimers() {
        timers.forEach((timer) => window.clearTimeout(timer));
        timers = [];
        if (hideTimer) window.clearTimeout(hideTimer);
        hideTimer = null;
      }

      function showStage() {
        els.stage.classList.remove("hidden-hard");
        window.requestAnimationFrame(() => els.stage.classList.add("visible"));
      }

      function hideStage() {
        hideReveal();
        els.stage.classList.remove("visible");
        hideTimer = window.setTimeout(() => {
          els.stage.classList.add("hidden-hard");
          clearConfetti();
        }, 700);
      }

      function cleanText(value, fallback) {
        const text = String(value == null ? "" : value).trim();
        return text || fallback || "";
      }

      function cleanNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : Number(fallback || 0);
      }

      function formatInt(value) {
        return cleanNumber(value, 0).toLocaleString("de-DE");
      }

      function pointsLabel(points) {
        const n = cleanNumber(points, 0);
        return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`;
      }

      function crumbsLabel(value) {
        const n = cleanNumber(value, 0);
        return `+${formatInt(n)} Kekskrümel`;
      }

      function firstExisting(row, keys, fallback) {
        for (const key of keys) {
          if (row && row[key] != null && String(row[key]).trim() !== "") return row[key];
        }
        return fallback;
      }

      function getAvatarUrl(row) {
        return cleanText(firstExisting(row, [
          "avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url", "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"
        ], ""), "");
      }

      function normalizeRow(row, index) {
        const src = row && typeof row === "object" ? row : {};
        const rank = cleanNumber(firstExisting(src, ["rank", "place", "position"], index + 1), index + 1);
        const login = cleanText(firstExisting(src, ["userLogin", "user_login", "login", "username", "userName", "user_name"], ""), "");
        const display = cleanText(firstExisting(src, ["userDisplayName", "user_display_name", "displayName", "display_name", "name"], login), login || `Platz ${rank}`);
        return {
          rank,
          userLogin: login,
          userDisplayName: display,
          points: cleanNumber(firstExisting(src, ["points", "total_points", "score", "totalScore", "total_score"], 0), 0),
          entries: cleanNumber(firstExisting(src, ["entries", "entry_count", "answerCount", "answer_count", "solved", "solvedCount"], 0), 0),
          avatarUrl: getAvatarUrl(src),
          rewardLabel: cleanText(firstExisting(src, ["rewardLabel", "reward_label", "prizeLabel", "prize_label", "prize"], ""), ""),
          rewardValue: cleanText(firstExisting(src, ["rewardValue", "reward_value", "prizeValue", "prize_value"], ""), ""),
          crumbBonus: cleanNumber(firstExisting(src, ["crumbBonus", "crumb_bonus", "kekskruemel", "cookieCrumbs", "cookie_crumbs"], 0), 0)
        };
      }

      function rowKey(row) {
        return String(row.userLogin || row.userDisplayName || "").trim().toLowerCase();
      }

      function uniqueRows(rows) {
        const seen = new Set();
        return rows.filter((row) => {
          const key = rowKey(row) || `rank_${row.rank}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || finale.event || {};
        const rawWinner = finale.winner || preview.winner || {};

        const rankingSources = [
          finale.ranking,
          finale.top10,
          finale.topTen,
          finale.leaderboard,
          finale.results,
          finale.rows,
          preview.ranking,
          preview.top10,
          preview.topTen,
          preview.leaderboard,
          preview.topCandidates,
          preview.results
        ];
        let ranking = [];
        for (const source of rankingSources) {
          if (Array.isArray(source) && source.length) {
            ranking = source.map(normalizeRow);
            break;
          }
        }

        const top3Source = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const top3 = top3Source.map(normalizeRow);
        const candidates = (Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : [])).map(normalizeRow);
        const winner = normalizeRow(rawWinner && Object.keys(rawWinner).length ? rawWinner : (top3[0] || ranking[0] || candidates[0] || {}), 0);
        if (!ranking.length) ranking = uniqueRows([winner, ...top3, ...candidates]).filter((row) => row.userDisplayName);

        ranking = uniqueRows(ranking).sort((a, b) => {
          if (a.rank !== b.rank) return a.rank - b.rank;
          return b.points - a.points;
        });

        let podiumRows = ranking.filter((row) => row.rank >= 1 && row.rank <= 3).slice(0, 3);
        if (podiumRows.length < 3 && top3.length) podiumRows = uniqueRows([...podiumRows, ...top3]).slice(0, 3);
        if (podiumRows.length < 3) podiumRows = uniqueRows([winner, ...podiumRows, ...ranking]).slice(0, 3);
        podiumRows = podiumRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 1) || index + 1 })).sort((a, b) => a.rank - b.rank).slice(0, 3);

        const podiumKeys = new Set(podiumRows.map(rowKey));
        let honorRows = ranking.filter((row) => row.rank >= 4 && row.rank <= 10 && !podiumKeys.has(rowKey(row)));
        if (!honorRows.length && ranking.length > 3) honorRows = ranking.slice(3, 10);
        honorRows = honorRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 4) || index + 4 })).sort((a, b) => b.rank - a.rank).slice(0, 7);

        const crumbDefaults = { 10: 4000, 9: 5000, 8: 6000, 7: 7000, 6: 8000, 5: 9000, 4: 10000 };
        honorRows = honorRows.map((row) => ({ ...row, crumbBonus: row.crumbBonus || crumbDefaults[row.rank] || 0, rewardLabel: row.rewardLabel || "Kekskrümel extra" }));

        const defaultPrizeByRank = {
          1: "Gold-Platz · Amazon-Gutschein",
          2: "Silber-Platz · Amazon-Gutschein",
          3: "Bronze-Platz · Amazon-Gutschein"
        };
        podiumRows = podiumRows.map((row) => ({ ...row, rewardLabel: row.rewardLabel || defaultPrizeByRank[row.rank] || "Amazon-Gutschein" }));

        return {
          finaleUid: cleanText(finale.finaleUid || finale.uid || preview.finaleUid, `demo_${Date.now()}`),
          eventUid: cleanText(finale.eventUid || event.eventUid || event.uid || preview.eventUid, ""),
          eventName: cleanText(finale.eventName || event.name || preview.eventName, "Event-Finale"),
          message: cleanText(finale.message || preview.message, "Die Heimleitung zählt die letzten Kekskrümel."),
          winner: podiumRows.find((row) => row.rank === 1) || winner,
          honorRows,
          podiumRows,
          rankingCount: cleanNumber(finale.rankingCount || preview.rankingCount || ranking.length, ranking.length),
          rawRankingCount: ranking.length
        };
      }

      function renderAvatar(container, row) {
        container.innerHTML = "";
        const url = cleanText(row && row.avatarUrl, "");
        if (url) {
          const img = document.createElement("img");
          img.alt = "";
          img.decoding = "async";
          img.referrerPolicy = "no-referrer";
          img.src = url;
          img.onerror = () => {
            container.innerHTML = initials(row && row.userDisplayName);
          };
          container.appendChild(img);
          return;
        }
        container.textContent = initials(row && row.userDisplayName);
      }

      function initials(name) {
        const text = cleanText(name, "CGN").replace(/[^\p{L}\p{N}\s_-]/gu, "").trim();
        const parts = text.split(/[\s_-]+/).filter(Boolean);
        if (parts.length >= 2) return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
        return text.slice(0, 2).toUpperCase() || "CG";
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function pulseTitles() {
        els.headline.classList.remove("pulse");
        els.subline.classList.remove("pulse");
        void els.headline.offsetWidth;
        els.headline.classList.add("pulse");
        els.subline.classList.add("pulse");
      }

      function setTitles(headline, subline, badge) {
        els.headline.textContent = headline;
        els.subline.textContent = subline;
        if (badge) els.badgeText.textContent = badge;
        pulseTitles();
      }

      function clearConfetti() {
        els.confetti.innerHTML = "";
      }

      function makeConfetti(amount) {
        clearConfetti();
        const count = Math.max(18, Math.min(100, amount || 55));
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement("i");
          const sideBias = Math.random();
          const left = sideBias < .32 ? Math.random() * 26 : sideBias > .68 ? 74 + Math.random() * 26 : 28 + Math.random() * 44;
          piece.style.left = `${left}%`;
          piece.style.animationDuration = `${4.2 + Math.random() * 4.8}s`;
          piece.style.animationDelay = `${Math.random() * 1.5}s`;
          piece.style.transform = `translateY(-60px) rotate(${Math.random() * 360}deg)`;
          piece.style.width = `${7 + Math.random() * 8}px`;
          piece.style.height = `${12 + Math.random() * 16}px`;
          els.confetti.appendChild(piece);
        }
      }

      function showReveal(row, opts) {
        const options = opts || {};
        els.revealCard.classList.toggle("final-focus", !!options.finalFocus);
        els.revealKicker.textContent = options.kicker || `Platz ${row.rank}`;
        els.revealName.textContent = row.userDisplayName;
        els.revealMeta.textContent = options.meta || pointsLabel(row.points);
        els.revealReward.textContent = options.reward || row.rewardLabel || "";
        renderAvatar(els.revealAvatar, row);
        els.revealCard.classList.remove("visible", "hidden-soft");
        void els.revealCard.offsetWidth;
        els.revealCard.classList.add("visible");
      }

      function hideReveal() {
        els.revealCard.classList.remove("visible");
        els.revealCard.classList.add("hidden-soft");
      }

      function setFooter(text, visible) {
        els.footerLine.textContent = text;
        els.footerLine.classList.toggle("visible", !!visible);
      }

      function initHonorWall() {
        els.honorList.innerHTML = "";
        els.honorWall.classList.add("empty");
        els.honorWall.classList.remove("dimmed");
      }

      function buildHonorChip(row, preparing) {
        const chip = document.createElement("div");
        chip.className = `honor-chip${preparing ? " preparing" : " pop-in"}`;
        chip.dataset.rank = String(row.rank);
        chip.innerHTML = `
          <div class="chip-place">Platz ${escapeHtml(row.rank)}</div>
          <div class="chip-name"></div>
          <div class="chip-reward"></div>
        `;
        chip.querySelector(".chip-name").textContent = row.userDisplayName;
        chip.querySelector(".chip-reward").textContent = `🍪 ${crumbsLabel(row.crumbBonus)}`;
        return chip;
      }

      function revealHonorChip(chip) {
        if (!chip) return;
        els.honorWall.classList.remove("empty");
        chip.classList.remove("preparing");
        chip.classList.add("pop-in");
        chip.style.visibility = "";
      }

      function podiumLabel(rank) {
        if (rank === 1) return "Platz 1 · Gold";
        if (rank === 2) return "Platz 2 · Silber";
        if (rank === 3) return "Platz 3 · Bronze";
        return `Platz ${rank}`;
      }

      function emptyAwardSlots() {
        const placeholders = {
          1: "Gold wartet",
          2: "Silber wartet",
          3: "Bronze wartet"
        };
        [els.podium1, els.podium2, els.podium3].forEach((slot) => {
          const rank = Number(slot.id.replace("podium", ""));
          slot.className = `award-slot place-${rank} waiting`;
          slot.innerHTML = `<div class="award-placeholder">${escapeHtml(placeholders[rank] || "wartet")}</div>`;
        });
      }

      function renderAwardSlot(slot, row) {
        if (!slot || !row) return;
        slot.className = `award-slot place-${row.rank} filled`;
        slot.innerHTML = `
          <div class="award-content">
            <div class="award-head">
              <div class="avatar-ring"><div class="avatar"></div></div>
              <div style="min-width:0;">
                <div class="award-place">${escapeHtml(podiumLabel(row.rank))}</div>
                <div class="award-name"></div>
              </div>
            </div>
            <div class="award-points">${escapeHtml(pointsLabel(row.points))}</div>
            <div class="award-reward">${escapeHtml(row.rewardLabel)}${row.rewardValue ? ` · ${escapeHtml(row.rewardValue)}` : ""}</div>
          </div>
        `;
        slot.querySelector(".award-name").textContent = row.userDisplayName;
        renderAvatar(slot.querySelector(".avatar"), row);
      }

      function animateRevealToTarget(target, options, after) {
        if (!target) {
          hideReveal();
          if (after) after();
          return;
        }
        const mode = options && options.mode === "chip" ? "chip" : "award";
        const startRect = els.revealCard.getBoundingClientRect();
        const targetRect = target.getBoundingClientRect();
        const clone = els.revealCard.cloneNode(true);
        clone.id = "flyProxy";
        clone.classList.add("fly-proxy");
        if (mode === "chip") clone.classList.add("to-chip");
        clone.style.left = `${startRect.left}px`;
        clone.style.top = `${startRect.top}px`;
        clone.style.width = `${startRect.width}px`;
        clone.style.height = `${startRect.height}px`;
        clone.style.transitionDuration = `${timeline.honorFly}ms`;
        document.body.appendChild(clone);
        els.revealCard.classList.remove("visible");
        els.revealCard.classList.add("hidden-soft");

        window.requestAnimationFrame(() => {
          clone.style.left = `${targetRect.left}px`;
          clone.style.top = `${targetRect.top}px`;
          clone.style.width = `${targetRect.width}px`;
          clone.style.height = `${targetRect.height}px`;
          clone.style.opacity = ".92";
          clone.style.borderRadius = mode === "chip" ? "17px" : "30px";
        });

        defer(() => {
          if (after) after();
          clone.style.opacity = "0";
        }, timeline.honorFly);

        defer(() => {
          clone.remove();
        }, timeline.honorFly + 280);
      }

      function animateHonorToSlot(row) {
        let chip = els.honorList.querySelector(`[data-rank="${row.rank}"]`);
        if (!chip) {
          chip = buildHonorChip(row, true);
          els.honorList.appendChild(chip);
        }
        animateRevealToTarget(chip, { mode: "chip" }, () => revealHonorChip(chip));
      }

      function awardSlotForRank(rank) {
        if (rank === 1) return els.podium1;
        if (rank === 2) return els.podium2;
        return els.podium3;
      }

      function resetView(finale) {
        els.eventName.textContent = finale.eventName;
        setTitles("Die Heimleitung zählt aus", "Bitte nicht drängeln. Die Keksorden werden frisch sortiert.", "CGN Event-Finale");
        hideReveal();
        els.awardStage.classList.remove("visible");
        emptyAwardSlots();
        setFooter("Die Heimleitung bedankt sich bei allen Teilnehmenden.", false);
        initHonorWall();
        clearConfetti();
      }

      function playFinale(rawFinale, options) {
        const finale = normalizeFinale(rawFinale);
        if (!finale.podiumRows.length && !finale.honorRows.length) return;
        if (!(options && options.force) && currentFinaleUid && currentFinaleUid === finale.finaleUid) return;
        currentFinaleUid = finale.finaleUid;
        clearTimers();
        resetView(finale);
        log({ speed, fastMode, timeline, finale });
        showStage();

        let at = 250;
        defer(() => {
          setTitles("Top-10 Ehrenrunde", "Plätze 10 bis 4 bekommen extra Kekskrümel und ihren Keksorden.", "Keksorden-Ausgabe");
          setFooter("Keine Verlierer. Die Ehrenwand füllt sich erst nach jeder Ehrung.", true);
        }, at);

        at += timeline.intro;
        const honorRows = finale.honorRows || [];
        if (honorRows.length) {
          honorRows.forEach((row) => {
            defer(() => {
              els.awardStage.classList.remove("visible");
              els.honorWall.classList.remove("dimmed");
              setTitles(`Platz ${row.rank} · Ehrenrunde`, `${row.userDisplayName} bekommt den Keksorden und ${crumbsLabel(row.crumbBonus)}.`, "Top-10 Ehrenrunde");
              showReveal(row, {
                kicker: `Platz ${row.rank} · Top-10 Ehrenrunde`,
                meta: pointsLabel(row.points),
                reward: `🍪 ${crumbsLabel(row.crumbBonus)}`
              });
              makeConfetti(fastMode ? 18 : 34);
            }, at);
            at += timeline.honor;
            defer(() => {
              animateHonorToSlot(row);
            }, at);
            at += timeline.honorFly + timeline.honorPause;
          });
        } else {
          defer(() => {
            setTitles("Top-10 Ehrenrunde", "Für dieses Finale wurden keine Plätze 10 bis 4 geliefert. Die Preisverleihung startet direkt.", "Finale");
          }, at);
          at += timeline.emptyHonor;
        }

        defer(() => {
          setTitles("Preisverleihung", "Bronze, Silber und Gold werden jetzt nacheinander auf die Bühne geholt.", "Amazon-Gutschein-Plätze");
          hideReveal();
          els.awardStage.classList.add("visible");
          els.honorWall.classList.add("dimmed");
          setFooter("Platz 3 links, Platz 1 in der Mitte, Platz 2 rechts. Keine Karte verdeckt das Podium.", true);
        }, at);
        at += timeline.awardIntro;

        const podiumByRank = new Map((finale.podiumRows || []).map((row) => [row.rank, row]));
        const order = [3, 2, 1];
        order.forEach((rank) => {
          const row = podiumByRank.get(rank) || (finale.podiumRows || []).find((item) => item.rank === rank);
          if (!row) return;
          defer(() => {
            const kicker = rank === 1 ? "Platz 1 · Gold" : rank === 2 ? "Platz 2 · Silber" : "Platz 3 · Bronze";
            setTitles(kicker, `${row.userDisplayName} sichert sich ${row.rewardLabel}.`, "Preisverleihung");
            showReveal(row, {
              kicker,
              meta: pointsLabel(row.points),
              reward: row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel,
              finalFocus: rank === 1
            });
            makeConfetti(rank === 1 ? (fastMode ? 46 : 82) : (fastMode ? 22 : 42));
          }, at);
          at += timeline.award;
          defer(() => {
            const slot = awardSlotForRank(rank);
            animateRevealToTarget(slot, { mode: "award" }, () => {
              renderAwardSlot(slot, row);
              if (rank === 1) slot.classList.add("winner-glow");
            });
          }, at);
          at += timeline.awardFly + timeline.awardPause;
        });

        const winner = podiumByRank.get(1) || finale.winner || finale.podiumRows[0];
        defer(() => {
          if (winner) {
            setTitles("CGN Event-Gewinner", `${winner.userDisplayName} steht ganz oben auf dem Treppchen.`, "Gold-Platz");
          }
          hideReveal();
          els.awardStage.classList.add("visible");
          els.honorWall.classList.add("dimmed");
          setFooter("Glückwunsch an alle Top-10-Rentner. Die Heimleitung hat gesprochen.", true);
          makeConfetti(fastMode ? 70 : 105);
        }, at);
        at += timeline.final;

        const totalRun = Math.max(at + 1000, Math.min(autoHideMs, at + 3000));
        defer(() => hideStage(), totalRun);
      }

      function demoFinale(kind) {
        const long = kind === "long";
        const rows = [
          { rank: 1, userDisplayName: long ? "ForrestCGN_mit_dem_sehr_langen_Gewinnernamen" : "ForrestCGN", points: 120, entries: 12, rewardLabel: "Gold-Platz · Amazon-Gutschein" },
          { rank: 2, userDisplayName: "EngelCGN", points: 108, entries: 11, rewardLabel: "Silber-Platz · Amazon-Gutschein" },
          { rank: 3, userDisplayName: "HeimleitungHD", points: 96, entries: 9, rewardLabel: "Bronze-Platz · Amazon-Gutschein" },
          { rank: 4, userDisplayName: "KaffeeKoenig", points: 88, entries: 8, crumbBonus: 10000 },
          { rank: 5, userDisplayName: "OpaRollator", points: 82, entries: 8, crumbBonus: 9000 },
          { rank: 6, userDisplayName: "RentnerRambo", points: 76, entries: 7, crumbBonus: 8000 },
          { rank: 7, userDisplayName: "KeksKommando", points: 70, entries: 7, crumbBonus: 7000 },
          { rank: 8, userDisplayName: "BingoBerta", points: 64, entries: 6, crumbBonus: 6000 },
          { rank: 9, userDisplayName: "PuddingPanzer", points: 58, entries: 5, crumbBonus: 5000 },
          { rank: 10, userDisplayName: "ZiviMitHerz", points: 52, entries: 5, crumbBonus: 4000 }
        ];
        return {
          finale: {
            finaleUid: `demo_${kind || "single"}_${Date.now()}`,
            eventUid: "demo_event",
            eventName: long ? "1 Jahr Twitch - Langer Namenstest im Wohnbereich" : "1 Jahr Twitch - Sound-Schnipsel Finale",
            mode: "ranked_finale",
            winner: rows[0],
            top3: rows.slice(0, 3),
            ranking: rows,
            rankingCount: rows.length,
            message: "Top-10 Finale mit Keksorden und Gutschein-Plätzen."
          }
        };
      }

      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try {
          const res = await fetch(finaleRoute, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          log(data);
          if (data && data.existingFinale) {
            playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true });
          }
        } catch (err) {
          log({ error: err.message || String(err), route: finaleRoute });
        }
      }

      function extractBusPayload(detail) {
        const msg = detail && typeof detail === "object" ? detail : {};
        const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg;
        return { msg, payload };
      }

      function handleBusMessage(event) {
        if (demo) return;
        const { msg, payload } = extractBusPayload(event && event.detail);
        const channel = String(msg.channel || payload.channel || "").toLowerCase();
        const action = String(msg.action || payload.action || "").toLowerCase();
        const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event || payload.ranking || payload.top3 || payload.winner);
        const isFinale = channel === "stream_events.winner_finale" || channel.indexOf("winner_finale") >= 0 || action.indexOf("winner_finale") >= 0 || action === "started" || action === "replay_requested";
        if (!isFinale || !hasFinale) return;
        const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
        playFinale(finale, { force: action === "replay_requested" });
      }

      if (demo) {
        window.setTimeout(() => playFinale(demoFinale(demo), { force: true }), 350);
      } else {
        loadExistingFinale();
      }

      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
      window.addEventListener("beforeunload", clearTimers);
    })();
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="stream_events_winner_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="stream_events"
    data-name="Stream Events Gewinner-Finale Overlay"
    data-version="0.3.0"
    data-heartbeat-ms="5000"
  ></script>
</body>
