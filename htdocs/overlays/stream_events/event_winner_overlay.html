<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --bg0: rgba(4, 6, 22, .82);
      --bg1: rgba(12, 8, 38, .92);
      --cyan: #39e6ff;
      --cyan-soft: rgba(57, 230, 255, .24);
      --violet: #a855f7;
      --violet-soft: rgba(168, 85, 247, .32);
      --pink: #ff4fd8;
      --pink-soft: rgba(255, 79, 216, .24);
      --gold: #ffe66d;
      --gold-soft: rgba(255, 230, 109, .28);
      --green: #77ffb0;
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, .75);
      --line: rgba(157, 235, 255, .20);
      --glass: rgba(8, 11, 34, .74);
      --glass2: rgba(13, 9, 44, .84);
      --shadow: 0 0 24px rgba(168, 85, 247, .30), 0 0 54px rgba(57, 230, 255, .12);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transform: scale(.985);
      filter: blur(7px);
      transition: opacity .45s ease, transform .55s cubic-bezier(.16, 1, .3, 1), filter .45s ease;
      isolation: isolate;
    }

    #stage.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    #stage.hidden-hard { opacity: 0; }

    .backdrop {
      position: absolute;
      inset: -90px;
      z-index: 0;
      opacity: .96;
      background:
        radial-gradient(circle at 50% 50%, rgba(255, 230, 109, .13), transparent 16%),
        radial-gradient(circle at 42% 48%, rgba(168, 85, 247, .20), transparent 31%),
        radial-gradient(circle at 63% 56%, rgba(57, 230, 255, .16), transparent 30%),
        radial-gradient(circle at 50% 82%, rgba(255, 79, 216, .12), transparent 28%),
        linear-gradient(135deg, rgba(4,6,22,.72), rgba(16,9,45,.78), rgba(4,10,32,.70));
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .28;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.82) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(57,230,255,.68) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,230,109,.62) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(196,92,255,.54) 0 1px, transparent 1.6px);
      background-size: 165px 165px, 245px 245px, 310px 310px, 390px 390px;
      background-position: 22px 54px, 86px 122px, 140px 30px, 210px 170px;
      animation: starDrift 28s linear infinite;
    }

    @keyframes starDrift {
      to { background-position: 187px 219px, 331px 367px, 450px 340px, 600px 560px; }
    }

    .runner {
      position: absolute;
      inset: 52px 92px;
      z-index: 2;
      border-radius: 42px;
      border: 1px solid rgba(143,244,255,.14);
      box-shadow: inset 0 0 44px rgba(57,230,255,.045), 0 0 58px rgba(168,85,247,.10);
      overflow: hidden;
    }

    .runner::before {
      content: "";
      position: absolute;
      inset: -3px;
      border-radius: 44px;
      background: conic-gradient(from 0deg, transparent, rgba(57,230,255,.74), transparent 18%, transparent 55%, rgba(255,79,216,.62), transparent 74%, rgba(255,230,109,.66), transparent);
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      padding: 3px;
      opacity: .84;
      animation: borderRun 5.8s linear infinite;
    }

    @keyframes borderRun { to { transform: rotate(360deg); } }

    .main {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 50%;
      width: 1480px;
      min-height: 720px;
      transform: translate(-50%, -50%);
      border-radius: 38px;
      background:
        linear-gradient(135deg, rgba(7, 10, 30, .91), rgba(18, 10, 52, .88)),
        radial-gradient(circle at 50% 0%, rgba(57,230,255,.10), transparent 42%);
      border: 1px solid rgba(143, 244, 255, .22);
      box-shadow:
        inset 0 0 44px rgba(57,230,255,.05),
        inset 0 0 74px rgba(168,85,247,.05),
        0 0 26px rgba(168,85,247,.34),
        0 0 74px rgba(57,230,255,.13);
      overflow: hidden;
      padding: 46px 54px 44px;
    }

    .main::before {
      content: "";
      position: absolute;
      left: -30%;
      top: -22%;
      width: 34%;
      height: 150%;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.10), rgba(255,255,255,.06), rgba(255,79,216,.08), transparent);
      transform: skewX(-18deg);
      animation: scan 4.8s linear infinite;
    }

    @keyframes scan { to { transform: translateX(520%) skewX(-18deg); } }

    .topline {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 26px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 9px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(57,230,255,.16), rgba(168,85,247,.17));
      border: 1px solid rgba(143,244,255,.20);
      box-shadow: 0 0 24px rgba(57,230,255,.09);
      color: rgba(248,251,255,.91);
      font-size: 20px;
      font-weight: 800;
      letter-spacing: .18em;
      text-transform: uppercase;
    }

    .badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255,230,109,.9), 0 0 26px rgba(255,230,109,.28);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    @keyframes dotPulse { 50% { transform: scale(1.35); opacity: .74; } }

    .event-name {
      flex: 1;
      color: rgba(248,251,255,.80);
      text-align: right;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: .05em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .headline {
      position: relative;
      z-index: 2;
      margin: 0;
      text-align: center;
      font-size: 78px;
      line-height: .96;
      font-weight: 950;
      letter-spacing: .02em;
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(255,255,255,.25),
        0 0 35px rgba(57,230,255,.55),
        0 0 58px rgba(168,85,247,.46),
        0 0 85px rgba(255,79,216,.20);
    }

    .subline {
      position: relative;
      z-index: 2;
      margin: 17px auto 34px;
      max-width: 1120px;
      color: var(--muted);
      text-align: center;
      font-size: 28px;
      font-weight: 650;
      letter-spacing: .02em;
    }

    .show-grid {
      position: relative;
      z-index: 2;
      display: grid;
      grid-template-columns: 1fr 1.24fr;
      gap: 32px;
      align-items: stretch;
    }

    .panel {
      position: relative;
      min-height: 370px;
      border-radius: 28px;
      padding: 28px;
      background: linear-gradient(135deg, rgba(5,8,28,.70), rgba(18,10,52,.62));
      border: 1px solid rgba(143,244,255,.18);
      box-shadow: inset 0 0 24px rgba(57,230,255,.035), 0 0 32px rgba(168,85,247,.12);
      overflow: hidden;
    }

    .panel-title {
      margin: 0 0 22px;
      color: rgba(248,251,255,.86);
      font-size: 22px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .rank-list {
      display: grid;
      gap: 14px;
    }

    .rank-row {
      display: grid;
      grid-template-columns: 58px 1fr auto;
      align-items: center;
      gap: 14px;
      min-height: 72px;
      padding: 12px 16px;
      border-radius: 20px;
      background: rgba(255,255,255,.045);
      border: 1px solid rgba(143,244,255,.12);
      transform: translateX(-28px);
      opacity: 0;
      transition: transform .55s cubic-bezier(.16, 1, .3, 1), opacity .45s ease;
    }

    .phase-ranking .rank-row,
    .phase-draw .rank-row,
    .phase-winner .rank-row {
      transform: translateX(0);
      opacity: 1;
    }

    .rank-row:nth-child(2) { transition-delay: .12s; }
    .rank-row:nth-child(3) { transition-delay: .24s; }

    .place {
      width: 48px;
      height: 48px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      font-size: 24px;
      font-weight: 950;
      background: linear-gradient(135deg, rgba(57,230,255,.18), rgba(168,85,247,.22));
      border: 1px solid rgba(143,244,255,.18);
      box-shadow: 0 0 18px rgba(57,230,255,.10);
    }

    .rank-row:first-child .place {
      color: #15120a;
      background: linear-gradient(135deg, #fff4a3, #ffca45);
      box-shadow: 0 0 22px rgba(255,230,109,.35);
    }

    .rank-user {
      min-width: 0;
    }

    .rank-name {
      font-size: 27px;
      font-weight: 920;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .rank-meta {
      margin-top: 2px;
      color: rgba(248,251,255,.58);
      font-size: 16px;
      font-weight: 650;
    }

    .rank-points {
      color: var(--gold);
      font-size: 26px;
      font-weight: 950;
      text-align: right;
      text-shadow: 0 0 18px rgba(255,230,109,.24);
      white-space: nowrap;
    }

    .draw-panel {
      display: grid;
      place-items: center;
      min-height: 370px;
    }

    .draw-wheel {
      position: relative;
      width: 520px;
      height: 302px;
      display: grid;
      place-items: center;
      border-radius: 30px;
      background:
        radial-gradient(circle at 50% 50%, rgba(255,230,109,.14), transparent 42%),
        linear-gradient(135deg, rgba(57,230,255,.09), rgba(168,85,247,.16), rgba(255,79,216,.10));
      border: 1px solid rgba(143,244,255,.18);
      box-shadow: inset 0 0 38px rgba(57,230,255,.06), var(--shadow);
      overflow: hidden;
    }

    .draw-wheel::before,
    .draw-wheel::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      pointer-events: none;
    }

    .draw-wheel::before {
      width: 410px;
      height: 410px;
      border: 2px solid rgba(255,230,109,.20);
      box-shadow: 0 0 36px rgba(255,230,109,.14), inset 0 0 38px rgba(168,85,247,.08);
      animation: slowSpin 7.5s linear infinite;
    }

    .draw-wheel::after {
      width: 310px;
      height: 310px;
      border: 1px dashed rgba(57,230,255,.28);
      animation: slowSpinReverse 10s linear infinite;
    }

    @keyframes slowSpin { to { transform: rotate(360deg); } }
    @keyframes slowSpinReverse { to { transform: rotate(-360deg); } }

    .draw-kicker {
      position: absolute;
      top: 24px;
      left: 28px;
      right: 28px;
      color: rgba(248,251,255,.66);
      text-align: center;
      font-size: 18px;
      font-weight: 900;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .draw-name {
      position: relative;
      z-index: 2;
      max-width: 420px;
      color: var(--text);
      font-size: 50px;
      line-height: 1.04;
      font-weight: 950;
      text-align: center;
      letter-spacing: .01em;
      text-shadow: 0 0 26px rgba(57,230,255,.42), 0 0 44px rgba(168,85,247,.34);
      transform: scale(.92);
      opacity: .72;
      transition: transform .22s ease, opacity .22s ease;
      word-break: break-word;
    }

    .phase-draw .draw-name {
      animation: drawPulse .45s ease-in-out infinite;
    }

    @keyframes drawPulse {
      50% { transform: scale(1.035); opacity: 1; }
    }

    .winner-card {
      display: none;
      position: absolute;
      inset: 0;
      z-index: 8;
      place-items: center;
      padding: 64px;
      background: radial-gradient(circle at 50% 50%, rgba(255,230,109,.11), transparent 38%);
      opacity: 0;
      transform: scale(.96);
      transition: opacity .45s ease, transform .55s cubic-bezier(.16, 1, .3, 1);
    }

    .phase-winner .winner-card {
      display: grid;
      opacity: 1;
      transform: scale(1);
    }

    .winner-inner {
      position: relative;
      width: 1050px;
      min-height: 430px;
      border-radius: 38px;
      padding: 42px 48px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,230,109,.18), transparent 42%),
        linear-gradient(135deg, rgba(8,10,30,.95), rgba(28,13,64,.93));
      border: 1px solid rgba(255,230,109,.36);
      box-shadow:
        0 0 36px rgba(255,230,109,.22),
        0 0 76px rgba(168,85,247,.28),
        0 0 120px rgba(57,230,255,.11),
        inset 0 0 48px rgba(255,230,109,.06);
      text-align: center;
      overflow: hidden;
    }

    .winner-inner::before {
      content: "";
      position: absolute;
      inset: -120px;
      background: conic-gradient(from 0deg, transparent, rgba(255,230,109,.18), transparent, rgba(57,230,255,.16), transparent, rgba(255,79,216,.13), transparent);
      animation: slowSpin 7s linear infinite;
      opacity: .8;
    }

    .winner-content {
      position: relative;
      z-index: 2;
    }

    .winner-kicker {
      margin: 0 0 14px;
      color: var(--gold);
      font-size: 26px;
      font-weight: 950;
      letter-spacing: .18em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,230,109,.34);
    }

    .winner-name {
      margin: 0;
      max-width: 960px;
      color: var(--text);
      font-size: 88px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.035em;
      text-shadow:
        0 0 20px rgba(255,255,255,.22),
        0 0 36px rgba(255,230,109,.38),
        0 0 70px rgba(168,85,247,.44),
        0 0 92px rgba(57,230,255,.18);
      word-break: break-word;
    }

    .winner-points {
      margin-top: 20px;
      color: var(--gold);
      font-size: 40px;
      font-weight: 950;
      text-shadow: 0 0 20px rgba(255,230,109,.30);
    }

    .winner-line {
      margin: 22px auto 0;
      max-width: 850px;
      color: rgba(248,251,255,.78);
      font-size: 25px;
      font-weight: 720;
      line-height: 1.32;
    }

    .confetti {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti i {
      position: absolute;
      top: -40px;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      opacity: .86;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,230,109,.28);
      animation: fall linear forwards;
    }

    .confetti i:nth-child(3n) { background: var(--cyan); box-shadow: 0 0 14px rgba(57,230,255,.28); }
    .confetti i:nth-child(3n+1) { background: var(--pink); box-shadow: 0 0 14px rgba(255,79,216,.28); }

    @keyframes fall {
      to { transform: translateY(1180px) rotate(720deg); opacity: 0; }
    }

    #debug {
      position: fixed;
      z-index: 99;
      left: 14px;
      bottom: 14px;
      max-width: 780px;
      max-height: 260px;
      overflow: auto;
      display: none;
      padding: 10px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 12px;
      white-space: pre-wrap;
      pointer-events: auto;
    }

    body.debug #debug { display: block; }

    .phase-intro .headline { animation: headlineIn .95s cubic-bezier(.16, 1, .3, 1) both; }
    .phase-intro .subline { animation: fadeUp .95s .16s cubic-bezier(.16, 1, .3, 1) both; }

    @keyframes headlineIn {
      from { transform: translateY(26px) scale(.96); opacity: 0; filter: blur(8px); }
      to { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }

    @keyframes fadeUp {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div id="stage" class="hidden-hard" aria-live="polite">
    <div class="backdrop"></div>
    <div class="stars"></div>
    <div class="runner"></div>
    <main id="main" class="main phase-idle">
      <div class="topline">
        <div class="badge"><span class="dot"></span><span id="badgeText">CGN Event-Finale</span></div>
        <div id="eventName" class="event-name">Event</div>
      </div>

      <h1 id="headline" class="headline">Die Heimleitung zählt aus</h1>
      <p id="subline" class="subline">Bitte nicht drängeln. Die Rentner-Lose werden frisch sortiert.</p>

      <section class="show-grid">
        <div class="panel ranking-panel">
          <h2 class="panel-title">Top 3 vom Wohnbereich</h2>
          <div id="rankList" class="rank-list"></div>
        </div>

        <div class="panel draw-panel">
          <div class="draw-wheel">
            <div id="drawKicker" class="draw-kicker">Goldener Umschlag</div>
            <div id="drawName" class="draw-name">Heimleitung prüft...</div>
          </div>
        </div>
      </section>

      <section class="winner-card">
        <div class="winner-inner">
          <div class="winner-content">
            <p id="winnerKicker" class="winner-kicker">Gewinner</p>
            <h2 id="winnerName" class="winner-name">ForrestCGN</h2>
            <div id="winnerPoints" class="winner-points">0 Punkte</div>
            <p id="winnerLine" class="winner-line">Die Heimleitung verleiht den goldenen Ehrenplatz am Fenster.</p>
          </div>
        </div>
      </section>

      <div id="confetti" class="confetti"></div>
    </main>
  </div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",
      version: "0.1.0",
      heartbeatIntervalMs: 5000,
      capabilities: [
        "overlay.heartbeat",
        "stream_events.winner_finale_display",
        "stream_events.winner_finale",
        "ack"
      ],
      meta: {
        overlay: "event_winner_overlay.html",
        communication: "communication_bus",
        owner: "stream_events"
      }
    };
  </script>

  <script>
    (function () {
      "use strict";

      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const autoHideMs = Math.max(8000, Math.min(60000, Number(qs.get("hideMs") || 26000)));
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";

      const els = {
        stage: document.getElementById("stage"),
        main: document.getElementById("main"),
        badgeText: document.getElementById("badgeText"),
        eventName: document.getElementById("eventName"),
        headline: document.getElementById("headline"),
        subline: document.getElementById("subline"),
        rankList: document.getElementById("rankList"),
        drawKicker: document.getElementById("drawKicker"),
        drawName: document.getElementById("drawName"),
        winnerKicker: document.getElementById("winnerKicker"),
        winnerName: document.getElementById("winnerName"),
        winnerPoints: document.getElementById("winnerPoints"),
        winnerLine: document.getElementById("winnerLine"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug")
      };

      let phaseTimers = [];
      let drawTimer = null;
      let hideTimer = null;
      let currentFinaleUid = "";

      if (DEBUG) document.body.classList.add("debug");

      function log(value) {
        if (!DEBUG) return;
        try {
          els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        } catch (err) {
          els.debug.textContent = String(value);
        }
      }

      function clearTimers() {
        phaseTimers.forEach((timer) => window.clearTimeout(timer));
        phaseTimers = [];
        if (drawTimer) window.clearInterval(drawTimer);
        drawTimer = null;
        if (hideTimer) window.clearTimeout(hideTimer);
        hideTimer = null;
      }

      function setPhase(phase) {
        els.main.classList.remove("phase-idle", "phase-intro", "phase-ranking", "phase-draw", "phase-winner", "phase-outro");
        els.main.classList.add(`phase-${phase}`);
      }

      function showStage() {
        els.stage.classList.remove("hidden-hard");
        window.requestAnimationFrame(() => els.stage.classList.add("visible"));
      }

      function hideStage() {
        setPhase("outro");
        els.stage.classList.remove("visible");
        hideTimer = window.setTimeout(() => {
          els.stage.classList.add("hidden-hard");
          setPhase("idle");
          clearConfetti();
        }, 650);
      }

      function cleanText(value, fallback) {
        const text = String(value == null ? "" : value).trim();
        return text || fallback || "";
      }

      function pointsLabel(points) {
        const n = Number(points || 0);
        return `${n} ${n === 1 ? "Punkt" : "Punkte"}`;
      }

      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || {};
        const winner = finale.winner || preview.winner || (preview.top3 && preview.top3[0]) || {};
        const top3 = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const candidates = Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : []);
        return {
          finaleUid: cleanText(finale.finaleUid, `demo_${Date.now()}`),
          eventUid: cleanText(finale.eventUid || event.eventUid || preview.eventUid, ""),
          eventName: cleanText(finale.eventName || event.name, "Event-Finale"),
          mode: cleanText(finale.mode, candidates.length > 1 ? "draw_among_tied_first_place" : "single_winner_presentation"),
          message: cleanText(finale.message, "Die Heimleitung öffnet den goldenen Umschlag."),
          winner: {
            userLogin: cleanText(winner.userLogin || winner.user_login, ""),
            userDisplayName: cleanText(winner.userDisplayName || winner.user_display_name || winner.userLogin || winner.user_login, "Unbekannter Rentner"),
            points: Number(winner.points || winner.total_points || finale.topScore || 0),
            rank: Number(winner.rank || 1)
          },
          top3: top3.map((row, index) => ({
            rank: Number(row.rank || index + 1),
            userLogin: cleanText(row.userLogin || row.user_login, ""),
            userDisplayName: cleanText(row.userDisplayName || row.user_display_name || row.userLogin || row.user_login, `Platz ${index + 1}`),
            points: Number(row.points || row.total_points || 0),
            entries: Number(row.entries || row.entry_count || 0)
          })).slice(0, 3),
          candidates: candidates.map((row, index) => ({
            rank: Number(row.rank || 1),
            userDisplayName: cleanText(row.userDisplayName || row.user_display_name || row.userLogin || row.user_login, `Kandidat ${index + 1}`),
            points: Number(row.points || row.total_points || finale.topScore || 0)
          })),
          topScore: Number(finale.topScore || preview.topScore || winner.points || 0),
          hasTie: (finale.candidateCount || candidates.length) > 1
        };
      }

      function renderRanking(top3) {
        const rows = Array.isArray(top3) && top3.length ? top3 : [];
        els.rankList.innerHTML = "";
        if (!rows.length) {
          const empty = document.createElement("div");
          empty.className = "rank-row";
          empty.innerHTML = `<div class="place">?</div><div class="rank-user"><div class="rank-name">Keine Punkte</div><div class="rank-meta">Die Heimleitung findet keinen Zettel.</div></div><div class="rank-points">0</div>`;
          els.rankList.appendChild(empty);
          return;
        }
        rows.forEach((row, index) => {
          const div = document.createElement("div");
          div.className = "rank-row";
          div.innerHTML = `
            <div class="place">${index + 1}</div>
            <div class="rank-user">
              <div class="rank-name"></div>
              <div class="rank-meta">${row.entries ? `${row.entries} Treffer im Heimleitungsprotokoll` : "Eventwertung"}</div>
            </div>
            <div class="rank-points">${pointsLabel(row.points)}</div>
          `;
          div.querySelector(".rank-name").textContent = row.userDisplayName;
          els.rankList.appendChild(div);
        });
      }

      function winnerLine(finale) {
        const lines = [
          "Die Heimleitung verleiht den goldenen Ehrenplatz am Fenster.",
          "Die Gehhilfe wird poliert, der Bingo-Tisch applaudiert.",
          "Der Wohnbereich steht Kopf. Bitte die Blutdrucktabletten bereithalten.",
          "Offiziell geprüft, gezählt und mit Rentner-Glitzer abgestempelt.",
          "Das Altersheimarchiv bestätigt: Heute war das ganz großes Kino."
        ];
        const seed = Math.abs(String(finale.winner.userDisplayName || "").split("").reduce((sum, c) => sum + c.charCodeAt(0), 0));
        return lines[seed % lines.length];
      }

      function clearConfetti() {
        els.confetti.innerHTML = "";
      }

      function makeConfetti() {
        clearConfetti();
        for (let i = 0; i < 86; i += 1) {
          const piece = document.createElement("i");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.animationDuration = `${4.2 + Math.random() * 4.6}s`;
          piece.style.animationDelay = `${Math.random() * 1.6}s`;
          piece.style.transform = `translateY(-60px) rotate(${Math.random() * 360}deg)`;
          piece.style.width = `${7 + Math.random() * 8}px`;
          piece.style.height = `${12 + Math.random() * 16}px`;
          els.confetti.appendChild(piece);
        }
      }

      function runDrawNames(finale, durationMs) {
        const pool = (finale.candidates && finale.candidates.length ? finale.candidates : finale.top3).map((row) => row.userDisplayName).filter(Boolean);
        if (!pool.length) pool.push(finale.winner.userDisplayName);
        let idx = 0;
        els.drawName.textContent = pool[0] || "Heimleitung prüft...";
        drawTimer = window.setInterval(() => {
          idx += 1;
          els.drawName.textContent = pool[idx % pool.length];
        }, finale.hasTie ? 135 : 230);
        phaseTimers.push(window.setTimeout(() => {
          if (drawTimer) window.clearInterval(drawTimer);
          drawTimer = null;
          els.drawName.textContent = finale.winner.userDisplayName;
        }, Math.max(1200, durationMs - 850)));
      }

      function playFinale(rawFinale, options = {}) {
        const finale = normalizeFinale(rawFinale);
        if (!finale.winner || !finale.winner.userDisplayName) return;
        if (!options.force && currentFinaleUid && currentFinaleUid === finale.finaleUid) return;
        currentFinaleUid = finale.finaleUid;
        clearTimers();
        clearConfetti();
        log(finale);

        els.badgeText.textContent = finale.hasTie ? "Rentner-Losentscheid" : "CGN Event-Finale";
        els.eventName.textContent = finale.eventName;
        els.headline.textContent = finale.hasTie ? "Punktgleichstand im Altersheim!" : "Die Heimleitung hat ausgezählt!";
        els.subline.textContent = finale.hasTie
          ? "Mehrere Rentner teilen sich Platz 1. Der goldene Umschlag entscheidet."
          : "Der Siegerzettel liegt bereit. Bitte nicht am Rollator drängeln.";
        els.drawKicker.textContent = finale.hasTie ? "Losrad der Heimleitung" : "Goldener Umschlag";
        els.drawName.textContent = "Heimleitung prüft...";
        els.winnerKicker.textContent = finale.hasTie ? "Ausgeloster Gewinner" : "Event-Gewinner";
        els.winnerName.textContent = finale.winner.userDisplayName;
        els.winnerPoints.textContent = pointsLabel(finale.winner.points || finale.topScore);
        els.winnerLine.textContent = winnerLine(finale);
        renderRanking(finale.top3);

        showStage();
        setPhase("intro");

        phaseTimers.push(window.setTimeout(() => setPhase("ranking"), 1500));
        phaseTimers.push(window.setTimeout(() => {
          setPhase("draw");
          runDrawNames(finale, finale.hasTie ? 5200 : 3600);
        }, 4700));
        phaseTimers.push(window.setTimeout(() => {
          setPhase("winner");
          makeConfetti();
        }, finale.hasTie ? 10300 : 8900));
        phaseTimers.push(window.setTimeout(() => hideStage(), autoHideMs));
      }

      function demoFinale(kind) {
        const tie = kind === "tie" || kind === "draw";
        const candidates = tie
          ? [
              { rank: 1, userDisplayName: "OpaRollator", points: 80, entries: 8 },
              { rank: 1, userDisplayName: "RentnerRambo", points: 80, entries: 8 },
              { rank: 1, userDisplayName: "KaffeeKoenig", points: 80, entries: 8 }
            ]
          : [{ rank: 1, userDisplayName: "ForrestCGN", points: 120, entries: 12 }];
        return {
          finale: {
            finaleUid: `demo_${kind}_${Date.now()}`,
            eventUid: "demo_event",
            eventName: tie ? "1 Jahr Twitch - Gleichstand im Wohnbereich" : "1 Jahr Twitch - Sound-Schnipsel Finale",
            mode: tie ? "draw_among_tied_first_place" : "single_winner_presentation",
            winner: tie ? candidates[1] : candidates[0],
            topScore: tie ? 80 : 120,
            candidates,
            candidateCount: candidates.length,
            top3: tie
              ? candidates
              : [
                  candidates[0],
                  { rank: 2, userDisplayName: "EngelCGN", points: 90, entries: 9 },
                  { rank: 3, userDisplayName: "HeimleitungHD", points: 70, entries: 7 }
                ],
            rankingCount: tie ? 9 : 14,
            message: tie ? "Punktgleichstand auf Platz 1." : "Eindeutiger Event-Gewinner."
          }
        };
      }

      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try {
          const res = await fetch(finaleRoute, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          log(data);
          if (data && data.existingFinale) {
            playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true });
          }
        } catch (err) {
          log({ error: err.message || String(err), route: finaleRoute });
        }
      }

      function extractBusPayload(detail) {
        const msg = detail && typeof detail === "object" ? detail : {};
        const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg;
        return { msg, payload };
      }

      function handleBusMessage(event) {
        if (demo) return;
        const { msg, payload } = extractBusPayload(event && event.detail);
        const channel = String(msg.channel || payload.channel || "").toLowerCase();
        const action = String(msg.action || payload.action || "").toLowerCase();
        const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event);
        const isFinale = channel === "stream_events.winner_finale" || channel.indexOf("winner_finale") >= 0 || action.indexOf("winner_finale") >= 0 || action === "started" || action === "replay_requested";
        if (!isFinale || !hasFinale) return;
        const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
        playFinale(finale, { force: action === "replay_requested" });
      }

      if (demo) {
        window.setTimeout(() => playFinale(demoFinale(demo), { force: true }), 350);
      } else {
        loadExistingFinale();
      }

      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
      window.addEventListener("beforeunload", clearTimers);
    })();
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="stream_events_winner_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="stream_events"
    data-name="Stream Events Gewinner-Finale Overlay"
    data-version="0.1.0"
    data-heartbeat-ms="5000"
  ></script>
</body>
</html>
