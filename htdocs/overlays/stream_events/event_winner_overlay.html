<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --bg: rgba(3, 6, 20, .86);
      --panel: rgba(8, 11, 34, .78);
      --panel2: rgba(16, 10, 48, .82);
      --cyan: #39e6ff;
      --cyan-soft: rgba(57, 230, 255, .28);
      --violet: #a855f7;
      --violet-soft: rgba(168, 85, 247, .34);
      --pink: #ff4fd8;
      --pink-soft: rgba(255, 79, 216, .22);
      --gold: #ffe66d;
      --gold2: #ffbf3f;
      --gold-soft: rgba(255, 230, 109, .30);
      --bronze: #d98b4b;
      --silver: #d8e6ff;
      --cookie: #ffd18a;
      --text: #f8fbff;
      --muted: rgba(248, 251, 255, .72);
      --line: rgba(143, 244, 255, .20);
      --shadow: 0 0 24px rgba(168, 85, 247, .34), 0 0 58px rgba(57, 230, 255, .14);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transform: scale(.985);
      filter: blur(6px);
      transition: opacity .45s ease, transform .55s cubic-bezier(.16, 1, .3, 1), filter .45s ease;
      isolation: isolate;
    }

    #stage.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    #stage.hidden-hard { opacity: 0; }

    .backdrop {
      position: absolute;
      inset: -80px;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 18%, rgba(57,230,255,.16), transparent 28%),
        radial-gradient(circle at 22% 68%, rgba(168,85,247,.20), transparent 34%),
        radial-gradient(circle at 77% 64%, rgba(255,79,216,.15), transparent 32%),
        radial-gradient(circle at 50% 93%, rgba(255,230,109,.12), transparent 24%),
        linear-gradient(135deg, rgba(4,6,20,.82), rgba(16,9,45,.88), rgba(4,10,32,.80));
    }

    .stars {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .27;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.84) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(57,230,255,.66) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,230,109,.56) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(196,92,255,.52) 0 1px, transparent 1.6px);
      background-size: 170px 170px, 245px 245px, 315px 315px, 410px 410px;
      background-position: 20px 48px, 88px 118px, 146px 32px, 218px 178px;
      animation: starDrift 34s linear infinite;
    }

    @keyframes starDrift {
      to { background-position: 190px 218px, 333px 363px, 461px 347px, 628px 588px; }
    }

    .frame {
      position: absolute;
      inset: 46px 74px;
      z-index: 2;
      border-radius: 42px;
      border: 1px solid rgba(143,244,255,.18);
      box-shadow:
        inset 0 0 50px rgba(57,230,255,.045),
        0 0 52px rgba(168,85,247,.16),
        0 0 92px rgba(57,230,255,.08);
      overflow: hidden;
    }

    .frame::before,
    .frame::after {
      content: "";
      position: absolute;
      border-radius: 999px;
      pointer-events: none;
      opacity: .85;
      filter: blur(.2px);
    }

    .frame::before {
      top: -2px;
      left: 9%;
      width: 360px;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.90), rgba(168,85,247,.78), transparent);
      animation: runnerTop 7.8s ease-in-out infinite alternate;
    }

    .frame::after {
      bottom: -2px;
      right: 12%;
      width: 430px;
      height: 4px;
      background: linear-gradient(90deg, transparent, rgba(255,79,216,.82), rgba(255,230,109,.84), transparent);
      animation: runnerBottom 8.6s ease-in-out infinite alternate;
    }

    @keyframes runnerTop { to { left: 63%; } }
    @keyframes runnerBottom { to { right: 59%; } }

    .spotlight {
      position: absolute;
      z-index: 3;
      top: -20px;
      width: 520px;
      height: 940px;
      opacity: .20;
      pointer-events: none;
      background: linear-gradient(180deg, rgba(57,230,255,.32), rgba(57,230,255,.07) 42%, transparent 78%);
      clip-path: polygon(48% 0, 58% 0, 100% 100%, 0 100%);
      filter: blur(10px);
      transform-origin: top center;
    }

    .spotlight.left { left: 310px; transform: rotate(15deg); }
    .spotlight.right { right: 310px; transform: rotate(-15deg); background: linear-gradient(180deg, rgba(168,85,247,.36), rgba(168,85,247,.08) 44%, transparent 78%); }

    .main {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 50%;
      width: 1550px;
      height: 850px;
      transform: translate(-50%, -50%);
      border-radius: 38px;
      background:
        radial-gradient(circle at 50% 0%, rgba(57,230,255,.11), transparent 42%),
        linear-gradient(135deg, rgba(7, 10, 30, .90), rgba(18, 10, 52, .88));
      border: 1px solid rgba(143, 244, 255, .22);
      box-shadow:
        inset 0 0 44px rgba(57,230,255,.05),
        inset 0 0 80px rgba(168,85,247,.055),
        0 0 28px rgba(168,85,247,.32),
        0 0 80px rgba(57,230,255,.13);
      overflow: hidden;
      padding: 38px 48px 34px;
    }

    .main::before {
      content: "";
      position: absolute;
      left: -35%;
      top: -22%;
      width: 30%;
      height: 150%;
      background: linear-gradient(90deg, transparent, rgba(57,230,255,.09), rgba(255,255,255,.06), rgba(255,79,216,.07), transparent);
      transform: skewX(-18deg);
      animation: scan 6.6s linear infinite;
    }

    @keyframes scan { to { transform: translateX(600%) skewX(-18deg); } }

    .topline {
      position: relative;
      z-index: 2;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 18px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 12px;
      min-height: 44px;
      padding: 9px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(57,230,255,.16), rgba(168,85,247,.17));
      border: 1px solid rgba(143,244,255,.20);
      box-shadow: 0 0 24px rgba(57,230,255,.09);
      color: rgba(248,251,255,.91);
      font-size: 19px;
      font-weight: 850;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .badge .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--gold);
      box-shadow: 0 0 12px rgba(255,230,109,.9), 0 0 26px rgba(255,230,109,.28);
      animation: dotPulse 1.2s ease-in-out infinite;
    }

    @keyframes dotPulse { 50% { transform: scale(1.35); opacity: .74; } }

    .event-name {
      flex: 1;
      color: rgba(248,251,255,.80);
      text-align: right;
      font-size: 20px;
      font-weight: 750;
      letter-spacing: .04em;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .headline {
      position: relative;
      z-index: 2;
      margin: 0;
      text-align: center;
      font-size: 68px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: .02em;
      text-transform: uppercase;
      text-shadow:
        0 0 18px rgba(255,255,255,.20),
        0 0 35px rgba(57,230,255,.48),
        0 0 58px rgba(168,85,247,.42),
        0 0 85px rgba(255,79,216,.17);
    }

    .subline {
      position: relative;
      z-index: 2;
      margin: 12px auto 20px;
      max-width: 1180px;
      color: var(--muted);
      text-align: center;
      font-size: 25px;
      font-weight: 650;
      letter-spacing: .02em;
    }

    .arena {
      position: relative;
      z-index: 2;
      height: 560px;
      border-radius: 30px;
      background: linear-gradient(135deg, rgba(5,8,28,.57), rgba(18,10,52,.54));
      border: 1px solid rgba(143,244,255,.15);
      box-shadow: inset 0 0 32px rgba(57,230,255,.035), 0 0 32px rgba(168,85,247,.10);
      overflow: hidden;
    }

    .center-card {
      position: absolute;
      left: 50%;
      top: 48%;
      z-index: 4;
      width: 760px;
      min-height: 325px;
      transform: translate(-50%, -50%) scale(.92);
      opacity: 0;
      border-radius: 36px;
      padding: 34px 38px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,230,109,.14), transparent 46%),
        linear-gradient(135deg, rgba(10,13,37,.95), rgba(29,14,64,.92));
      border: 1px solid rgba(143,244,255,.24);
      box-shadow:
        0 0 34px rgba(57,230,255,.18),
        0 0 68px rgba(168,85,247,.26),
        inset 0 0 42px rgba(255,255,255,.035);
      display: grid;
      grid-template-columns: 172px 1fr;
      gap: 26px;
      align-items: center;
      transition: opacity .42s ease, transform .58s cubic-bezier(.16, 1, .3, 1), left .86s cubic-bezier(.16, 1, .3, 1), top .86s cubic-bezier(.16, 1, .3, 1);
    }

    .center-card.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .center-card.flying-honor {
      opacity: .98;
      transform: translate(-50%, -50%) scale(var(--honor-fly-scale, .265));
      filter: drop-shadow(0 0 28px rgba(255,209,138,.32));
    }

    .center-card.final-winner {
      width: 920px;
      min-height: 390px;
      grid-template-columns: 205px 1fr;
      border-color: rgba(255,230,109,.44);
      box-shadow:
        0 0 46px rgba(255,230,109,.22),
        0 0 92px rgba(168,85,247,.30),
        0 0 128px rgba(57,230,255,.14),
        inset 0 0 50px rgba(255,230,109,.06);
    }

    .avatar-wrap {
      width: 156px;
      height: 156px;
      border-radius: 50%;
      padding: 7px;
      background: conic-gradient(from 140deg, rgba(57,230,255,.95), rgba(168,85,247,.88), rgba(255,79,216,.78), rgba(255,230,109,.88), rgba(57,230,255,.95));
      box-shadow: 0 0 28px rgba(57,230,255,.24), 0 0 58px rgba(168,85,247,.20);
    }

    .center-card.final-winner .avatar-wrap {
      width: 190px;
      height: 190px;
      box-shadow: 0 0 35px rgba(255,230,109,.28), 0 0 78px rgba(168,85,247,.24);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 50% 35%, rgba(255,255,255,.16), transparent 38%),
        linear-gradient(135deg, rgba(57,230,255,.18), rgba(168,85,247,.30));
      border: 2px solid rgba(255,255,255,.16);
      color: rgba(248,251,255,.92);
      font-size: 44px;
      font-weight: 950;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(57,230,255,.40);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .presentation-kicker {
      color: var(--gold);
      font-size: 24px;
      font-weight: 950;
      letter-spacing: .15em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,230,109,.28);
    }

    .presentation-name {
      margin-top: 6px;
      max-width: 505px;
      font-size: 58px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.025em;
      text-shadow: 0 0 26px rgba(57,230,255,.36), 0 0 46px rgba(168,85,247,.34);
      overflow-wrap: anywhere;
    }

    .center-card.final-winner .presentation-name {
      max-width: 610px;
      font-size: 76px;
      text-shadow: 0 0 30px rgba(255,230,109,.34), 0 0 58px rgba(168,85,247,.38), 0 0 82px rgba(57,230,255,.18);
    }

    .presentation-meta {
      margin-top: 13px;
      color: rgba(248,251,255,.76);
      font-size: 24px;
      font-weight: 700;
    }

    .presentation-reward {
      margin-top: 16px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 18px;
      border-radius: 999px;
      background: linear-gradient(135deg, rgba(255,230,109,.18), rgba(57,230,255,.10));
      border: 1px solid rgba(255,230,109,.24);
      color: var(--gold);
      font-size: 25px;
      font-weight: 950;
      text-shadow: 0 0 18px rgba(255,230,109,.25);
    }

    .honor-wall {
      position: absolute;
      z-index: 3;
      left: 32px;
      right: 32px;
      bottom: 26px;
      min-height: 148px;
      padding: 18px 20px;
      border-radius: 26px;
      background: rgba(3, 8, 28, .58);
      border: 1px solid rgba(143,244,255,.14);
      box-shadow: inset 0 0 24px rgba(57,230,255,.035);
      opacity: 1;
      transition: opacity .34s ease, background-color .34s ease, border-color .34s ease, box-shadow .34s ease;
    }

    .honor-wall.empty {
      opacity: 0;
      background: transparent;
      border-color: transparent;
      box-shadow: none;
    }

    .wall-title {
      color: rgba(248,251,255,.72);
      font-size: 17px;
      font-weight: 900;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 12px;
      opacity: 1;
      transition: opacity .35s ease;
    }

    .honor-wall.empty .wall-title {
      opacity: 0;
    }

    .honor-list {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 10px;
    }

    .honor-chip {
      min-height: 86px;
      padding: 10px 10px 9px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,255,255,.035), rgba(168,85,247,.045));
      border: 1px solid rgba(143,244,255,.10);
      opacity: 0;
      transform: translateY(10px) scale(.98);
      transition: opacity .34s ease, transform .42s cubic-bezier(.16, 1, .3, 1), border-color .34s ease, box-shadow .34s ease, background .34s ease;
      overflow: hidden;
    }

    .honor-chip.preparing {
      visibility: hidden;
      opacity: 0;
      transform: translateY(0) scale(1);
      transition: none;
    }

    .honor-chip.filled {
      opacity: 1;
      transform: translateY(0) scale(1);
      background: linear-gradient(135deg, rgba(255,209,138,.075), rgba(168,85,247,.10));
      border-color: rgba(255,209,138,.30);
      box-shadow: 0 0 18px rgba(255,209,138,.10);
    }

    .honor-chip.receiving {
      border-color: rgba(255,209,138,.44);
      box-shadow: 0 0 26px rgba(255,209,138,.18), 0 0 42px rgba(168,85,247,.13);
    }

    .honor-flight-chip {
      position: absolute;
      z-index: 8;
      pointer-events: none;
      will-change: transform, opacity;
      transform-origin: center center;
      opacity: 1;
      box-shadow: 0 0 34px rgba(255,209,138,.24), 0 0 62px rgba(168,85,247,.18);
      transition: transform var(--honor-fly-ms, 920ms) cubic-bezier(.16, 1, .3, 1), opacity .24s ease;
    }

    .honor-flight-chip.land {
      transform: translate(0, 0) scale(1) !important;
    }

    .honor-flight-chip.done {
      opacity: 0;
    }

    .chip-place {
      color: var(--cookie);
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .05em;
    }

    .chip-name {
      margin-top: 3px;
      color: var(--text);
      font-size: 20px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip-reward {
      margin-top: 5px;
      color: var(--gold);
      font-size: 16px;
      font-weight: 850;
      white-space: nowrap;
    }

    .podium {
      position: absolute;
      z-index: 2;
      left: 44px;
      right: 44px;
      top: 54px;
      height: 345px;
      opacity: 0;
      transition: opacity .55s ease;
    }

    .podium.visible { opacity: 1; }

    .podium-slot {
      position: absolute;
      bottom: 0;
      width: 375px;
      min-height: 245px;
      padding: 22px;
      border-radius: 28px;
      background: linear-gradient(135deg, rgba(8,11,34,.76), rgba(20,11,52,.70));
      border: 1px solid rgba(143,244,255,.16);
      box-shadow: inset 0 0 26px rgba(57,230,255,.04), 0 0 34px rgba(168,85,247,.12);
      transform: translateY(34px);
      opacity: 0;
      transition: opacity .55s ease, transform .65s cubic-bezier(.16, 1, .3, 1), box-shadow .45s ease;
    }

    .podium-slot.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .podium-slot.place-3 { left: 86px; border-color: rgba(217,139,75,.28); }
    .podium-slot.place-2 { right: 86px; border-color: rgba(216,230,255,.28); }
    .podium-slot.place-1 {
      left: 50%;
      width: 455px;
      min-height: 292px;
      transform: translate(-50%, 34px);
      border-color: rgba(255,230,109,.34);
      box-shadow: inset 0 0 30px rgba(255,230,109,.045), 0 0 46px rgba(255,230,109,.16), 0 0 68px rgba(168,85,247,.14);
    }

    .podium-slot.place-1.visible { transform: translate(-50%, 0); }

    .podium-head {
      display: flex;
      align-items: center;
      gap: 14px;
      margin-bottom: 14px;
    }

    .small-avatar-wrap {
      width: 74px;
      height: 74px;
      border-radius: 50%;
      padding: 4px;
      background: linear-gradient(135deg, rgba(57,230,255,.85), rgba(168,85,247,.72), rgba(255,230,109,.82));
      box-shadow: 0 0 18px rgba(57,230,255,.18);
      flex: 0 0 auto;
    }

    .small-avatar-wrap .avatar { font-size: 22px; border-width: 1px; }

    .podium-place {
      color: var(--gold);
      font-size: 20px;
      font-weight: 950;
      letter-spacing: .13em;
      text-transform: uppercase;
    }

    .podium-name {
      margin-top: 3px;
      font-size: 30px;
      line-height: 1;
      font-weight: 950;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .podium-points {
      color: rgba(248,251,255,.72);
      font-size: 19px;
      font-weight: 750;
    }

    .podium-reward {
      margin-top: 14px;
      padding: 10px 13px;
      border-radius: 17px;
      color: var(--gold);
      font-size: 22px;
      font-weight: 950;
      background: rgba(255,230,109,.09);
      border: 1px solid rgba(255,230,109,.18);
      text-align: center;
    }

    .footer-line {
      position: absolute;
      z-index: 2;
      left: 70px;
      right: 70px;
      bottom: 188px;
      color: rgba(248,251,255,.58);
      font-size: 20px;
      font-weight: 680;
      text-align: center;
      opacity: 0;
      transition: opacity .45s ease;
    }

    .footer-line.visible { opacity: 1; }

    .confetti {
      position: absolute;
      inset: 0;
      z-index: 9;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti i {
      position: absolute;
      top: -40px;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      opacity: .86;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,230,109,.28);
      animation: fall linear forwards;
    }

    .confetti i:nth-child(3n) { background: var(--cyan); box-shadow: 0 0 14px rgba(57,230,255,.28); }
    .confetti i:nth-child(3n+1) { background: var(--pink); box-shadow: 0 0 14px rgba(255,79,216,.28); }

    @keyframes fall {
      to { transform: translateY(1180px) rotate(720deg); opacity: 0; }
    }

    #debug {
      position: fixed;
      z-index: 99;
      left: 14px;
      bottom: 14px;
      max-width: 780px;
      max-height: 270px;
      overflow: auto;
      display: none;
      padding: 10px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 12px;
      white-space: pre-wrap;
      pointer-events: auto;
    }

    body.debug #debug { display: block; }

    @keyframes headlineIn {
      from { transform: translateY(26px) scale(.96); opacity: 0; filter: blur(8px); }
      to { transform: translateY(0) scale(1); opacity: 1; filter: blur(0); }
    }

    @keyframes fadeUp {
      from { transform: translateY(18px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }

    .headline.pulse { animation: headlineIn .75s cubic-bezier(.16, 1, .3, 1) both; }
    .subline.pulse { animation: fadeUp .75s .08s cubic-bezier(.16, 1, .3, 1) both; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div id="stage" class="hidden-hard" aria-live="polite">
    <div class="backdrop"></div>
    <div class="stars"></div>
    <div class="frame"></div>
    <div class="spotlight left"></div>
    <div class="spotlight right"></div>

    <main id="main" class="main phase-idle">
      <div class="topline">
        <div class="badge"><span class="dot"></span><span id="badgeText">CGN Event-Finale</span></div>
        <div id="eventName" class="event-name">Event</div>
      </div>

      <h1 id="headline" class="headline">Die Heimleitung zählt aus</h1>
      <p id="subline" class="subline">Bitte nicht drängeln. Die Keksorden werden frisch sortiert.</p>

      <section class="arena">
        <div id="centerCard" class="center-card">
          <div class="avatar-wrap"><div id="presentationAvatar" class="avatar"></div></div>
          <div>
            <div id="presentationKicker" class="presentation-kicker">Top-10 Ehrenrunde</div>
            <div id="presentationName" class="presentation-name">ForrestCGN</div>
            <div id="presentationMeta" class="presentation-meta">0 Punkte</div>

        <div id="honorWall" class="honor-wall">

        <div id="confetti" class="confetti"></div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",
      version: "0.2.4",
      heartbeatIntervalMs: 5000,
      capabilities: [
        "overlay.heartbeat",
        "stream_events.winner_finale_display",
        "stream_events.winner_finale",
        "ack"
      ],
      meta: {
        overlay: "event_winner_overlay.html",
        communication: "communication_bus",
        owner: "stream_events",
        step: "EVS45.4"
      }
    };
  </script>

  <script>
    (function () {
      "use strict";

      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const speed = String(qs.get("speed") || "normal").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";
      const fastMode = speed === "fast" || speed === "test" || qs.get("fast") === "1";
      const timeline = fastMode
        ? { intro: 1100, honor: 1150, honorFly: 920, honorPause: 220, top: 1500, final: 7000, emptyHonor: 700 }
        : { intro: 5200, honor: 9800, honorFly: 1350, honorPause: 900, top: 15000, final: 52000, emptyHonor: 2600 };
      const autoHideMs = Math.max(8000, Math.min(360000, Number(qs.get("hideMs") || (fastMode ? 72000 : 285000))));

      const els = {
        stage: document.getElementById("stage"),
        main: document.getElementById("main"),
        badgeText: document.getElementById("badgeText"),
        eventName: document.getElementById("eventName"),
        headline: document.getElementById("headline"),
        subline: document.getElementById("subline"),
        centerCard: document.getElementById("centerCard"),
        presentationAvatar: document.getElementById("presentationAvatar"),
        presentationKicker: document.getElementById("presentationKicker"),
        presentationName: document.getElementById("presentationName"),
        presentationMeta: document.getElementById("presentationMeta"),
        presentationReward: document.getElementById("presentationReward"),
        honorWall: document.getElementById("honorWall"),
        honorList: document.getElementById("honorList"),
        podium: document.getElementById("podium"),
        podium1: document.getElementById("podium1"),
        podium2: document.getElementById("podium2"),
        podium3: document.getElementById("podium3"),
        footerLine: document.getElementById("footerLine"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug")
      };

      let timers = [];
      let hideTimer = null;
      let currentFinaleUid = "";

      if (DEBUG) document.body.classList.add("debug");

      function log(value) {
        if (!DEBUG) return;
        try {
          els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        } catch (err) {
          els.debug.textContent = String(value);
        }
      }

      function defer(fn, ms) {
        const timer = window.setTimeout(fn, ms);
        timers.push(timer);
        return timer;
      }

      function clearTimers() {
        timers.forEach((timer) => window.clearTimeout(timer));
        timers = [];
        if (hideTimer) window.clearTimeout(hideTimer);
        hideTimer = null;
      }

      function showStage() {
        els.stage.classList.remove("hidden-hard");
        window.requestAnimationFrame(() => els.stage.classList.add("visible"));
      }

      function hideStage() {
        els.centerCard.classList.remove("visible");
        els.stage.classList.remove("visible");
        hideTimer = window.setTimeout(() => {
          els.stage.classList.add("hidden-hard");
          clearConfetti();
        }, 700);
      }

      function cleanText(value, fallback) {
        const text = String(value == null ? "" : value).trim();
        return text || fallback || "";
      }

      function cleanNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : Number(fallback || 0);
      }

      function formatInt(value) {
        return cleanNumber(value, 0).toLocaleString("de-DE");
      }

      function pointsLabel(points) {
        const n = cleanNumber(points, 0);
        return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`;
      }

      function crumbsLabel(value) {
        const n = cleanNumber(value, 0);
        return `+${formatInt(n)} Kekskrümel`;
      }

      function firstExisting(row, keys, fallback) {
        for (const key of keys) {
          if (row && row[key] != null && String(row[key]).trim() !== "") return row[key];
        }
        return fallback;
      }

      function avatarUrl(row) {
        return cleanText(firstExisting(row, [
          "avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url", "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"
        ], ""), "");
      }

      function normalizeRow(row, index) {
        const src = row && typeof row === "object" ? row : {};
        const rank = cleanNumber(firstExisting(src, ["rank", "place", "position"], index + 1), index + 1);
        const login = cleanText(firstExisting(src, ["userLogin", "user_login", "login", "username", "userName", "user_name"], ""), "");
        const display = cleanText(firstExisting(src, ["userDisplayName", "user_display_name", "displayName", "display_name", "name"], login), login || `Platz ${rank}`);
        return {
          rank,
          userLogin: login,
          userDisplayName: display,
          points: cleanNumber(firstExisting(src, ["points", "total_points", "score", "totalScore", "total_score"], 0), 0),
          entries: cleanNumber(firstExisting(src, ["entries", "entry_count", "answerCount", "answer_count", "solved", "solvedCount"], 0), 0),
          avatarUrl: avatarUrl(src),
          rewardLabel: cleanText(firstExisting(src, ["rewardLabel", "reward_label", "prizeLabel", "prize_label", "prize"], ""), ""),
          rewardValue: cleanText(firstExisting(src, ["rewardValue", "reward_value", "prizeValue", "prize_value"], ""), ""),
          crumbBonus: cleanNumber(firstExisting(src, ["crumbBonus", "crumb_bonus", "kekskruemel", "cookieCrumbs", "cookie_crumbs"], 0), 0)
        };
      }

      function rowKey(row) {
        return String(row.userLogin || row.userDisplayName || "").trim().toLowerCase();
      }

      function uniqueRows(rows) {
        const seen = new Set();
        return rows.filter((row) => {
          const key = rowKey(row) || `rank_${row.rank}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || finale.event || {};
        const rawWinner = finale.winner || preview.winner || {};

        const rankingSources = [
          finale.ranking,
          finale.top10,
          finale.topTen,
          finale.leaderboard,
          finale.results,
          finale.rows,
          preview.ranking,
          preview.top10,
          preview.topTen,
          preview.leaderboard,
          preview.topCandidates,
          preview.results
        ];
        let ranking = [];
        for (const source of rankingSources) {
          if (Array.isArray(source) && source.length) {
            ranking = source.map(normalizeRow);
            break;
          }
        }

        const top3Source = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const top3 = top3Source.map(normalizeRow);
        const candidates = (Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : [])).map(normalizeRow);
        const winner = normalizeRow(rawWinner && Object.keys(rawWinner).length ? rawWinner : (top3[0] || ranking[0] || candidates[0] || {}), 0);
        if (!ranking.length) ranking = uniqueRows([winner, ...top3, ...candidates]).filter((row) => row.userDisplayName);

        ranking = uniqueRows(ranking).sort((a, b) => {
          if (a.rank !== b.rank) return a.rank - b.rank;
          return b.points - a.points;
        });

        let podiumRows = ranking.filter((row) => row.rank >= 1 && row.rank <= 3).slice(0, 3);
        if (podiumRows.length < 3 && top3.length) podiumRows = uniqueRows([...podiumRows, ...top3]).slice(0, 3);
        if (podiumRows.length < 3) podiumRows = uniqueRows([winner, ...podiumRows, ...ranking]).slice(0, 3);
        podiumRows = podiumRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 1) || index + 1 })).sort((a, b) => a.rank - b.rank).slice(0, 3);

        const podiumKeys = new Set(podiumRows.map(rowKey));
        let honorRows = ranking.filter((row) => row.rank >= 4 && row.rank <= 10 && !podiumKeys.has(rowKey(row)));
        if (!honorRows.length && ranking.length > 3) honorRows = ranking.slice(3, 10);
        honorRows = honorRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 4) || index + 4 })).sort((a, b) => b.rank - a.rank).slice(0, 7);

        const crumbDefaults = { 10: 4000, 9: 5000, 8: 6000, 7: 7000, 6: 8000, 5: 9000, 4: 10000 };
        honorRows = honorRows.map((row) => ({ ...row, crumbBonus: row.crumbBonus || crumbDefaults[row.rank] || 0, rewardLabel: row.rewardLabel || "Kekskrümel extra" }));

        const defaultPrizeByRank = {
          1: "Gold-Platz · Amazon-Gutschein",
          2: "Silber-Platz · Amazon-Gutschein",
          3: "Bronze-Platz · Amazon-Gutschein"
        };
        podiumRows = podiumRows.map((row) => ({ ...row, rewardLabel: row.rewardLabel || defaultPrizeByRank[row.rank] || "Amazon-Gutschein" }));

        return {
          finaleUid: cleanText(finale.finaleUid || finale.uid || preview.finaleUid, `demo_${Date.now()}`),
          eventUid: cleanText(finale.eventUid || event.eventUid || event.uid || preview.eventUid, ""),
          eventName: cleanText(finale.eventName || event.name || preview.eventName, "Event-Finale"),
          message: cleanText(finale.message || preview.message, "Die Heimleitung zählt die letzten Kekskrümel."),
          winner: podiumRows.find((row) => row.rank === 1) || winner,
          honorRows,
          podiumRows,
          rankingCount: cleanNumber(finale.rankingCount || preview.rankingCount || ranking.length, ranking.length),
          rawRankingCount: ranking.length
        };
      }

      function renderAvatar(container, row) {
        container.innerHTML = "";
        const url = cleanText(row && row.avatarUrl, "");
        if (url) {
          const img = document.createElement("img");
          img.alt = "";
          img.decoding = "async";
          img.referrerPolicy = "no-referrer";
          img.src = url;
          img.onerror = () => {
            container.innerHTML = initials(row && row.userDisplayName);
          };
          container.appendChild(img);
          return;
        }
        container.textContent = initials(row && row.userDisplayName);
      }

      function initials(name) {
        const text = cleanText(name, "CGN").replace(/[^\p{L}\p{N}\s_-]/gu, "").trim();
        const parts = text.split(/[\s_-]+/).filter(Boolean);
        if (parts.length >= 2) return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
        return text.slice(0, 2).toUpperCase() || "CG";
      }

      function pulseTitles() {
        els.headline.classList.remove("pulse");
        els.subline.classList.remove("pulse");
        void els.headline.offsetWidth;
        els.headline.classList.add("pulse");
        els.subline.classList.add("pulse");
      }

      function setTitles(headline, subline, badge) {
        els.headline.textContent = headline;
        els.subline.textContent = subline;
        if (badge) els.badgeText.textContent = badge;
        pulseTitles();
      }

      function clearConfetti() {
        els.confetti.innerHTML = "";
      }

      function makeConfetti(amount) {
        clearConfetti();
        const count = Math.max(28, Math.min(140, amount || 80));
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement("i");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.animationDuration = `${4.0 + Math.random() * 4.8}s`;
          piece.style.animationDelay = `${Math.random() * 1.5}s`;
          piece.style.transform = `translateY(-60px) rotate(${Math.random() * 360}deg)`;
          piece.style.width = `${7 + Math.random() * 8}px`;
          piece.style.height = `${12 + Math.random() * 16}px`;
          els.confetti.appendChild(piece);
        }
      }

      function showPresentation(row, opts) {
        const options = opts || {};
        els.centerCard.classList.toggle("final-winner", !!options.finalWinner);
        els.presentationKicker.textContent = options.kicker || `Platz ${row.rank}`;
        els.presentationName.textContent = row.userDisplayName;
        els.presentationMeta.textContent = options.meta || pointsLabel(row.points);
        els.presentationReward.textContent = options.reward || row.rewardLabel || "";
        renderAvatar(els.presentationAvatar, row);
        els.centerCard.classList.remove("visible");
        void els.centerCard.offsetWidth;
        els.centerCard.classList.add("visible");
      }

      function hidePresentation() {
        els.centerCard.classList.remove("visible");
      }

      function removeHonorFlightChips() {
        document.querySelectorAll(".honor-flight-chip").forEach((node) => node.remove());
      }

      function initHonorWall() {
        removeHonorFlightChips();
        if (els.honorList) els.honorList.innerHTML = "";
        if (els.honorWall) els.honorWall.classList.add("empty");
      }

      function buildHonorChip(row, preparing) {
        const chip = document.createElement("div");
        chip.className = `honor-chip${preparing ? " preparing" : " filled"}`;
        chip.dataset.rank = String(row.rank);
        chip.innerHTML = `
          <div class="chip-place">Platz ${escapeHtml(row.rank)}</div>
          <div class="chip-name"></div>
          <div class="chip-reward"></div>
        `;
        chip.querySelector(".chip-name").textContent = row.userDisplayName;
        chip.querySelector(".chip-reward").textContent = `🍪 ${crumbsLabel(row.crumbBonus)}`;
        return chip;
      }

      function revealHonorChip(chip) {
        if (!chip) return;
        chip.classList.remove("preparing", "receiving");
        chip.classList.add("filled");
        chip.style.visibility = "";
        if (els.honorWall) els.honorWall.classList.remove("empty");
      }

      function animateHonorToSlot(row) {
        if (!row || !els.honorList) return;

        let chip = els.honorList.querySelector(`[data-rank="${row.rank}"]`);
        if (!chip) {
          chip = buildHonorChip(row, true);
          els.honorList.appendChild(chip);
        }

        const arena = chip.closest(".arena");
        if (!arena) {
          revealHonorChip(chip);
          hidePresentation();
          return;
        }

        const arenaRect = arena.getBoundingClientRect();
        const chipRect = chip.getBoundingClientRect();
        const cardRect = els.centerCard.getBoundingClientRect();

        if (!chipRect.width || !chipRect.height || !cardRect.width || !cardRect.height) {
          revealHonorChip(chip);
          hidePresentation();
          return;
        }

        const targetLeft = chipRect.left - arenaRect.left;
        const targetTop = chipRect.top - arenaRect.top;
        const targetCenterX = targetLeft + chipRect.width / 2;
        const targetCenterY = targetTop + chipRect.height / 2;
        const startCenterX = cardRect.left - arenaRect.left + cardRect.width / 2;
        const startCenterY = cardRect.top - arenaRect.top + cardRect.height / 2;
        const dx = startCenterX - targetCenterX;
        const dy = startCenterY - targetCenterY;
        const startScaleByWidth = Math.max(1, (cardRect.width * 0.78) / chipRect.width);
        const startScaleByHeight = Math.max(1, (cardRect.height * 0.64) / chipRect.height);
        const startScale = Math.max(2.3, Math.min(4.4, Math.min(startScaleByWidth, startScaleByHeight)));

        const flightChip = buildHonorChip(row, false);
        flightChip.classList.add("honor-flight-chip");
        flightChip.style.width = `${chipRect.width}px`;
        flightChip.style.height = `${chipRect.height}px`;
        flightChip.style.left = `${targetLeft}px`;
        flightChip.style.top = `${targetTop}px`;
        flightChip.style.setProperty("--honor-fly-ms", `${timeline.honorFly}ms`);
        flightChip.style.transform = `translate(${dx}px, ${dy}px) scale(${startScale})`;
        arena.appendChild(flightChip);

        chip.classList.add("receiving");

        defer(() => {
          hidePresentation();
          flightChip.classList.add("land");
        }, 80);

        defer(() => {
          revealHonorChip(chip);
          flightChip.classList.add("done");
        }, timeline.honorFly + 70);

        defer(() => {
          flightChip.remove();
        }, timeline.honorFly + 360);
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function podiumLabel(rank) {
        if (rank === 1) return "Platz 1 · Gold";
        if (rank === 2) return "Platz 2 · Silber";
        if (rank === 3) return "Platz 3 · Bronze";
        return `Platz ${rank}`;
      }

      function renderPodiumSlot(slot, row) {
        if (!row) {
          slot.innerHTML = "";
          slot.classList.remove("visible");
          return;
        }
        slot.innerHTML = `
          <div class="podium-head">
            <div class="small-avatar-wrap"><div class="avatar"></div></div>
            <div style="min-width:0;">
              <div class="podium-place">${escapeHtml(podiumLabel(row.rank))}</div>
              <div class="podium-name"></div>
            </div>
          </div>
          <div class="podium-points">${escapeHtml(pointsLabel(row.points))}</div>
          <div class="podium-reward">${escapeHtml(row.rewardLabel)}${row.rewardValue ? ` · ${escapeHtml(row.rewardValue)}` : ""}</div>
        `;
        slot.querySelector(".podium-name").textContent = row.userDisplayName;
        renderAvatar(slot.querySelector(".avatar"), row);
      }

      function setFooter(text, visible) {
        els.footerLine.textContent = text;
        els.footerLine.classList.toggle("visible", !!visible);
      }

      function resetView(finale) {
        els.eventName.textContent = finale.eventName;
        els.badgeText.textContent = "CGN Event-Finale";
        setTitles("Die Heimleitung zählt aus", "Bitte nicht drängeln. Die Keksorden werden frisch sortiert.", "CGN Event-Finale");
        hidePresentation();
        els.podium.classList.remove("visible");
        [els.podium1, els.podium2, els.podium3].forEach((slot) => {
          slot.classList.remove("visible");
          slot.innerHTML = "";
        });
        setFooter("Die Heimleitung bedankt sich bei allen Teilnehmenden.", false);
        initHonorWall();
        clearConfetti();
      }

      function playFinale(rawFinale, options) {
        const finale = normalizeFinale(rawFinale);
        if (!finale.podiumRows.length && !finale.honorRows.length) return;
        if (!(options && options.force) && currentFinaleUid && currentFinaleUid === finale.finaleUid) return;
        currentFinaleUid = finale.finaleUid;
        clearTimers();
        resetView(finale);
        log({ speed, fastMode, timeline, finale });
        showStage();

        let at = 250;
        defer(() => {
          setTitles("Top-10 Ehrenrunde", "Plätze 10 bis 4 bekommen heute extra Kekskrümel und ihren Keksorden.", "Keksorden-Ausgabe");
          setFooter("Keine Verlierer. Das ist die Ehrenwand vom Wohnbereich.", true);
        }, at);

        at += timeline.intro;
        const honorRows = finale.honorRows || [];
        if (honorRows.length) {
          honorRows.forEach((row) => {
            defer(() => {
              setTitles(`Platz ${row.rank} · Ehrenrunde`, `${row.userDisplayName} bekommt den Keksorden und ${crumbsLabel(row.crumbBonus)}.`, "Top-10 Ehrenrunde");
              showPresentation(row, {
                kicker: `Platz ${row.rank} · Top-10 Ehrenrunde`,
                meta: pointsLabel(row.points),
                reward: `🍪 ${crumbsLabel(row.crumbBonus)}`
              });
              makeConfetti(fastMode ? 28 : 44);
            }, at);
            at += timeline.honor;
            defer(() => {
              animateHonorToSlot(row);
            }, at);
            at += timeline.honorFly + timeline.honorPause;
          });
        } else {
          defer(() => {
            setTitles("Top-10 Ehrenrunde", "Für dieses Finale wurden keine Plätze 10 bis 4 geliefert. Die Preisverleihung startet direkt.", "Finale");
          }, at);
          at += timeline.emptyHonor;
        }

        defer(() => {
          setTitles("Preisverleihung", "Jetzt kommen Bronze, Silber und Gold. Bitte die guten Rollatoren nach vorne.", "Amazon-Gutschein-Plätze");
          hidePresentation();
          els.podium.classList.add("visible");
          setFooter("Platz 3 links, Platz 2 rechts, Platz 1 in der Mitte.", true);
        }, at);
        at += timeline.intro;

        const podiumByRank = new Map((finale.podiumRows || []).map((row) => [row.rank, row]));
        const order = [3, 2, 1];
        order.forEach((rank) => {
          const row = podiumByRank.get(rank) || (finale.podiumRows || []).find((item) => item.rank === rank);
          if (!row) return;
          defer(() => {
            const kicker = rank === 1 ? "Platz 1 · Gold" : rank === 2 ? "Platz 2 · Silber" : "Platz 3 · Bronze";
            setTitles(kicker, `${row.userDisplayName} sichert sich ${row.rewardLabel}.`, "Preisverleihung");
            showPresentation(row, {
              kicker,
              meta: pointsLabel(row.points),
              reward: row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel,
              finalWinner: rank === 1
            });
            makeConfetti(rank === 1 ? (fastMode ? 70 : 120) : (fastMode ? 38 : 58));
          }, at);
          at += timeline.top;
          defer(() => {
            const slot = rank === 1 ? els.podium1 : rank === 2 ? els.podium2 : els.podium3;
            renderPodiumSlot(slot, row);
            slot.classList.add("visible");
            if (rank !== 1) hidePresentation();
          }, at);
          at += timeline.honorPause;
        });

        const winner = podiumByRank.get(1) || finale.winner || finale.podiumRows[0];
        defer(() => {
          if (winner) {
            setTitles("CGN Event-Gewinner", `${winner.userDisplayName} steht ganz oben auf dem Treppchen.`, "Gold-Platz");
            showPresentation(winner, {
              kicker: "Platz 1 · Gold",
              meta: pointsLabel(winner.points),
              reward: winner.rewardValue ? `${winner.rewardLabel} · ${winner.rewardValue}` : winner.rewardLabel,
              finalWinner: true
            });
          }
          setFooter("Glückwunsch an alle Top-10-Rentner. Die Heimleitung hat gesprochen.", true);
          makeConfetti(fastMode ? 110 : 140);
        }, at);
        at += timeline.final;

        const totalRun = Math.max(at + 1000, Math.min(autoHideMs, at + 3000));
        defer(() => hideStage(), totalRun);
      }

      function demoFinale(kind) {
        const long = kind === "long";
        const rows = [
          { rank: 1, userDisplayName: long ? "ForrestCGN_mit_dem_sehr_langen_Gewinnernamen" : "ForrestCGN", points: 120, entries: 12, rewardLabel: "Gold-Platz · Amazon-Gutschein" },
          { rank: 2, userDisplayName: "EngelCGN", points: 108, entries: 11, rewardLabel: "Silber-Platz · Amazon-Gutschein" },
          { rank: 3, userDisplayName: "HeimleitungHD", points: 96, entries: 9, rewardLabel: "Bronze-Platz · Amazon-Gutschein" },
          { rank: 4, userDisplayName: "KaffeeKoenig", points: 88, entries: 8, crumbBonus: 10000 },
          { rank: 5, userDisplayName: "OpaRollator", points: 82, entries: 8, crumbBonus: 9000 },
          { rank: 6, userDisplayName: "RentnerRambo", points: 76, entries: 7, crumbBonus: 8000 },
          { rank: 7, userDisplayName: "KeksKommando", points: 70, entries: 7, crumbBonus: 7000 },
          { rank: 8, userDisplayName: "BingoBerta", points: 64, entries: 6, crumbBonus: 6000 },
          { rank: 9, userDisplayName: "PuddingPanzer", points: 58, entries: 5, crumbBonus: 5000 },
          { rank: 10, userDisplayName: "ZiviMitHerz", points: 52, entries: 5, crumbBonus: 4000 }
        ];
        return {
          finale: {
            finaleUid: `demo_${kind || "single"}_${Date.now()}`,
            eventUid: "demo_event",
            eventName: long ? "1 Jahr Twitch - Langer Namenstest im Wohnbereich" : "1 Jahr Twitch - Sound-Schnipsel Finale",
            mode: "ranked_finale",
            winner: rows[0],
            top3: rows.slice(0, 3),
            ranking: rows,
            rankingCount: rows.length,
            message: "Top-10 Finale mit Keksorden und Gutschein-Plätzen."
          }
        };
      }

      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try {
          const res = await fetch(finaleRoute, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          log(data);
          if (data && data.existingFinale) {
            playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true });
          }
        } catch (err) {
          log({ error: err.message || String(err), route: finaleRoute });
        }
      }

      function extractBusPayload(detail) {
        const msg = detail && typeof detail === "object" ? detail : {};
        const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg;
        return { msg, payload };
      }

      function handleBusMessage(event) {
        if (demo) return;
        const { msg, payload } = extractBusPayload(event && event.detail);
        const channel = String(msg.channel || payload.channel || "").toLowerCase();
        const action = String(msg.action || payload.action || "").toLowerCase();
        const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event || payload.ranking || payload.top3 || payload.winner);
        const isFinale = channel === "stream_events.winner_finale" || channel.indexOf("winner_finale") >= 0 || action.indexOf("winner_finale") >= 0 || action === "started" || action === "replay_requested";
        if (!isFinale || !hasFinale) return;
        const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
        playFinale(finale, { force: action === "replay_requested" });
      }

      if (demo) {
        window.setTimeout(() => playFinale(demoFinale(demo), { force: true }), 350);
      } else {
        loadExistingFinale();
      }

      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
      window.addEventListener("beforeunload", clearTimers);
    })();
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="stream_events_winner_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="stream_events"
    data-name="Stream Events Gewinner-Finale Overlay"
    data-version="0.2.4"
    data-heartbeat-ms="5000"
  ></script>
</body>
