<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --text: #f8fbff;
      --muted: rgba(248,251,255,.84);
      --yellow: #fff06a;
      --cyan: #37f6ff;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: #050816;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      color: var(--text);
    }
    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 1;
      overflow: hidden;
      background:
        radial-gradient(circle at 50% 28%, rgba(117,72,255,.22), transparent 34%),
        linear-gradient(135deg, #060817 0%, #101535 48%, #050816 100%);
    }
    #winnerBg {
      position: absolute;
      inset: 0;
      width: 1920px;
      height: 1080px;
      object-fit: cover;
      z-index: 0;
    }
    #shade {
      position: absolute;
      inset: 0;
      z-index: 1;
      background: linear-gradient(180deg, rgba(0,0,0,.01), rgba(0,0,0,.08) 70%, rgba(0,0,0,.16));
      pointer-events: none;
    }
    #boxLayer, #liveLayer, #gridLayer {
      position: absolute;
      left: 0;
      top: 0;
      width: 1920px;
      height: 1080px;
      pointer-events: none;
    }
    #boxLayer { z-index: 30; display: none; }
    #liveLayer { z-index: 20; }
    #gridLayer { z-index: 50; display: none; }
    body.box-debug #boxLayer { display: block; }
    body.box-debug #liveLayer { display: none; }
    body.grid-debug #gridLayer { display: block; }

    .debug-box {
      position: absolute;
      border: 2px dashed rgba(55,246,255,.96);
      background: rgba(0,22,38,.24);
      box-shadow: 0 0 0 1px rgba(255,255,255,.14) inset, 0 0 16px rgba(0,230,255,.28);
      color: #fff;
      text-shadow: 0 0 8px rgba(0,0,0,.95);
      font: 900 13px/1.05 "Segoe UI", Arial, sans-serif;
      text-transform: uppercase;
      letter-spacing: .03em;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      border-radius: 14px;
      padding: 0 4px;
      white-space: normal;
    }
    .debug-box.role-area {
      border-width: 3px;
      background: rgba(0,22,38,.16);
      border-radius: 18px;
      align-items: flex-start;
      justify-content: flex-start;
      padding: 8px 10px;
      font-size: 11px;
    }
    .debug-box.shape-circle { border-radius: 50%; }
    .debug-box[data-id^="honor"][data-id$=".area"] {
      color: transparent;
      text-shadow: none;
      border-width: 2px;
      background: rgba(0,22,38,.10);
    }

    .live-box {
      position: absolute;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      overflow: hidden;
      padding: 0 8px;
      color: #fff;
      text-shadow: 0 2px 0 rgba(0,0,0,.65), 0 0 12px rgba(0,0,0,.75);
      font-weight: 950;
      letter-spacing: .01em;
      line-height: 1.05;
      white-space: nowrap;
    }
    .live-box.title {
      font-size: 34px;
      text-transform: uppercase;
      letter-spacing: .04em;
    }
    .live-box.subtitle {
      font-size: 18px;
      color: #f3f8ff;
    }
    .live-box.avatar {
      padding: 0;
      border-radius: 50%;
      background: rgba(12,20,34,.78);
      border: 4px solid rgba(255,255,255,.86);
      box-shadow: 0 0 24px rgba(255,255,255,.12);
      color: #fff;
      font-size: 31px;
      font-weight: 950;
      text-transform: uppercase;
    }
    .live-box.avatar.rank1 {
      border-color: #ffd75f;
      box-shadow: 0 0 24px rgba(255,215,95,.22);
    }
    .live-box.avatar.rank2 {
      border-color: #dfeaff;
      box-shadow: 0 0 24px rgba(223,234,255,.18);
    }
    .live-box.avatar.rank3 {
      border-color: #ffb17c;
      box-shadow: 0 0 24px rgba(255,177,124,.18);
    }
    .live-box.avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
      display: block;
    }
    .live-box.name {
      font-size: 18px;
      color: #fff;
    }
    .live-box.points {
      font-size: 22px;
      color: var(--yellow);
      text-transform: uppercase;
    }
    .live-box.reward {
      font-size: 22px;
      color: #fff;
      text-transform: uppercase;
    }
    .live-box.honor-name {
      font-size: 17px;
      color: #fff;
    }
    .live-box.honor-reward {
      font-size: 16px;
      color: var(--yellow);
      text-transform: uppercase;
    }
    .fit-text {
      display: inline-block;
      max-width: none;
      white-space: nowrap;
    }
    .marquee .fit-text {
      animation: marquee var(--dur, 9s) ease-in-out infinite alternate;
    }
    @keyframes marquee {
      from { transform: translateX(0); }
      to { transform: translateX(calc(-1 * var(--shift, 40px))); }
    }

    .grid-line { position: absolute; background: rgba(10,235,255,.45); }
    .grid-line.v { top: 0; width: 1px; height: 1080px; }
    .grid-line.h { left: 0; height: 1px; width: 1920px; }
    .grid-line.major { background: rgba(255,238,0,.92); }
    .grid-label {
      position: absolute;
      z-index: 51;
      padding: 2px 5px;
      border-radius: 3px;
      background: rgba(0,0,0,.72);
      color: #fff45f;
      font: 800 12px/1 Consolas, monospace;
      text-shadow: none;
    }
    .grid-label.y { color: #39f7ff; }
    #debug {
      position: fixed;
      left: 12px;
      bottom: 12px;
      z-index: 100;
      max-width: 760px;
      max-height: 360px;
      overflow: auto;
      padding: 10px 12px;
      border: 1px solid rgba(255,255,255,.22);
      border-radius: 10px;
      background: rgba(0,0,0,.78);
      color: #e9fbff;
      font: 12px/1.35 Consolas, monospace;
      display: none;
      pointer-events: auto;
    }
    body.debug #debug { display: block; }
  
    /* EVS49.26: Reveal-Timeline. Design/Positionen bleiben unverändert. */
    #liveLayer.reveal-running .live-box {
      opacity: 0;
      transform: translateY(10px) scale(.985);
      transition:
        opacity .75s ease,
        transform .85s cubic-bezier(.16,1,.3,1),
        filter .9s ease;
      filter: brightness(.72);
    }
    #liveLayer.reveal-running .live-box.revealed {
      opacity: 1;
      transform: none;
      filter: brightness(1);
    }
    #liveLayer.reveal-running .live-box.reveal-pop {
      animation: cgnRevealPop 1.25s ease-out 1;
    }
    #liveLayer.reveal-running .live-box.highlight {
      animation: cgnWinnerHighlight 1.8s ease-in-out 1;
    }
    #liveLayer.reveal-running .live-box.final-glow {
      animation: cgnFinalGlow 4.5s ease-in-out infinite;
    }
    @keyframes cgnRevealPop {
      0% { transform: translateY(18px) scale(.94); opacity:0; }
      55% { transform: translateY(-4px) scale(1.025); opacity:1; }
      100% { transform:none; opacity:1; }
    }
    @keyframes cgnWinnerHighlight {
      0%,100% { filter: brightness(1); }
      45% { filter: brightness(1.35) drop-shadow(0 0 18px rgba(255,240,106,.24)); }
    }
    @keyframes cgnFinalGlow {
      0%,100% { filter: brightness(1); }
      50% { filter: brightness(1.18) drop-shadow(0 0 14px rgba(55,246,255,.16)); }
    }

  
    /* EVS49.27: Namen etwas größer + dezenter CGN-Glow/Wabber-Effekt. */
    .live-box.name {
      font-size: 25px;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0,0,0,.75),
        0 0 10px rgba(255,255,255,.40),
        0 0 18px rgba(55,246,255,.22);
    }
    .live-box.honor-name {
      font-size: 22px;
      color: #ffffff;
      text-shadow:
        0 2px 0 rgba(0,0,0,.75),
        0 0 9px rgba(255,255,255,.36),
        0 0 15px rgba(55,246,255,.20);
    }
    .live-box.name .fit-text,
    .live-box.honor-name .fit-text {
      animation: cgnNameWobble 4.8s ease-in-out infinite;
      transform-origin: 50% 55%;
    }
    .live-box.name.revealed,
    .live-box.honor-name.revealed {
      filter: brightness(1.08) drop-shadow(0 0 10px rgba(55,246,255,.14));
    }
    @keyframes cgnNameWobble {
      0%, 100% { transform: translateY(0) scale(1); }
      25% { transform: translateY(-1px) scale(1.012); }
      50% { transform: translateY(0) scale(1.004); }
      75% { transform: translateY(1px) scale(1.014); }
    }

  </style>
</head>
<body>
  <div id="stage">

    <div id="shade"></div>

    <div id="boxLayer"></div>
    <div id="gridLayer"></div>
  </div>
  <pre id="debug"></pre>

  <script>
  (() => {
    "use strict";

    const MODULE_VERSION = "0.5.29";
    const STEP = "EVS49.29";

    const INLINE_LAYOUT = {"version": "EVS49.29", "canvas": {"w": 1920, "h": 1080}, "background": "/assets/stream_events/winner_finale_bg_1920x1080.png", "boxes": [{"id": "header.area", "label": "HEADER AREA", "group": "header", "role": "area", "shape": "rect", "x": 465, "y": 105, "w": 980, "h": 150}, {"id": "header.title", "label": "HEADER TITLE", "group": "header", "role": "title", "shape": "rect", "x": 560, "y": 135, "w": 800, "h": 46}, {"id": "header.subtitle", "label": "HEADER SUBTITLE", "group": "header", "role": "subtitle", "shape": "rect", "x": 620, "y": 190, "w": 680, "h": 38}, {"id": "slot1.area", "label": "SLOT 1 AREA", "group": "slot1", "role": "area", "shape": "rect", "x": 690, "y": 365, "w": 540, "h": 360}, {"id": "slot1.avatar", "label": "SLOT 1 AVATAR", "group": "slot1", "role": "avatar", "shape": "circle", "x": 890, "y": 400, "w": 130, "h": 130}, {"id": "slot1.name", "label": "SLOT 1 NAME", "group": "slot1", "role": "name", "shape": "rect", "x": 755, "y": 540, "w": 410, "h": 54}, {"id": "slot1.points", "label": "SLOT 1 POINTS", "group": "slot1", "role": "points", "shape": "rect", "x": 825, "y": 600, "w": 270, "h": 44}, {"id": "slot1.reward", "label": "SLOT 1 REWARD", "group": "slot1", "role": "reward", "shape": "rect", "x": 825, "y": 660, "w": 270, "h": 44}, {"id": "slot2.area", "label": "SLOT 2 AREA", "group": "slot2", "role": "area", "shape": "rect", "x": 120, "y": 405, "w": 475, "h": 315}, {"id": "slot2.avatar", "label": "SLOT 2 AVATAR", "group": "slot2", "role": "avatar", "shape": "circle", "x": 295, "y": 420, "w": 120, "h": 120}, {"id": "slot2.name", "label": "SLOT 2 NAME", "group": "slot2", "role": "name", "shape": "rect", "x": 185, "y": 550, "w": 340, "h": 50}, {"id": "slot2.points", "label": "SLOT 2 POINTS", "group": "slot2", "role": "points", "shape": "rect", "x": 235, "y": 610, "w": 240, "h": 42}, {"id": "slot2.reward", "label": "SLOT 2 REWARD", "group": "slot2", "role": "reward", "shape": "rect", "x": 235, "y": 655, "w": 240, "h": 42}, {"id": "slot3.area", "label": "SLOT 3 AREA", "group": "slot3", "role": "area", "shape": "rect", "x": 1325, "y": 405, "w": 475, "h": 315}, {"id": "slot3.avatar", "label": "SLOT 3 AVATAR", "group": "slot3", "role": "avatar", "shape": "circle", "x": 1500, "y": 420, "w": 120, "h": 120}, {"id": "slot3.name", "label": "SLOT 3 NAME", "group": "slot3", "role": "name", "shape": "rect", "x": 1390, "y": 550, "w": 340, "h": 50}, {"id": "slot3.points", "label": "SLOT 3 POINTS", "group": "slot3", "role": "points", "shape": "rect", "x": 1440, "y": 610, "w": 240, "h": 42}, {"id": "slot3.reward", "label": "SLOT 3 REWARD", "group": "slot3", "role": "reward", "shape": "rect", "x": 1440, "y": 660, "w": 240, "h": 42}, {"id": "honor4.area", "label": "HONOR 4 AREA", "group": "honor4", "role": "area", "shape": "rect", "x": 55, "y": 820, "w": 185, "h": 130}, {"id": "honor4.name", "label": "HONOR 4 NAME", "group": "honor4", "role": "name", "shape": "rect", "x": 70, "y": 835, "w": 155, "h": 42}, {"id": "honor4.reward", "label": "HONOR 4 REWARD", "group": "honor4", "role": "reward", "shape": "rect", "x": 70, "y": 895, "w": 155, "h": 42}, {"id": "honor5.area", "label": "HONOR 5 AREA", "group": "honor5", "role": "area", "shape": "rect", "x": 325, "y": 820, "w": 185, "h": 130}, {"id": "honor5.name", "label": "HONOR 5 NAME", "group": "honor5", "role": "name", "shape": "rect", "x": 340, "y": 835, "w": 155, "h": 42}, {"id": "honor5.reward", "label": "HONOR 5 REWARD", "group": "honor5", "role": "reward", "shape": "rect", "x": 340, "y": 895, "w": 155, "h": 42}, {"id": "honor6.area", "label": "HONOR 6 AREA", "group": "honor6", "role": "area", "shape": "rect", "x": 595, "y": 820, "w": 185, "h": 130}, {"id": "honor6.name", "label": "HONOR 6 NAME", "group": "honor6", "role": "name", "shape": "rect", "x": 610, "y": 835, "w": 155, "h": 42}, {"id": "honor6.reward", "label": "HONOR 6 REWARD", "group": "honor6", "role": "reward", "shape": "rect", "x": 610, "y": 895, "w": 155, "h": 42}, {"id": "honor7.area", "label": "HONOR 7 AREA", "group": "honor7", "role": "area", "shape": "rect", "x": 865, "y": 820, "w": 185, "h": 130}, {"id": "honor7.name", "label": "HONOR 7 NAME", "group": "honor7", "role": "name", "shape": "rect", "x": 880, "y": 835, "w": 155, "h": 42}, {"id": "honor7.reward", "label": "HONOR 7 REWARD", "group": "honor7", "role": "reward", "shape": "rect", "x": 880, "y": 895, "w": 155, "h": 42}, {"id": "honor8.area", "label": "HONOR 8 AREA", "group": "honor8", "role": "area", "shape": "rect", "x": 1135, "y": 820, "w": 185, "h": 130}, {"id": "honor8.name", "label": "HONOR 8 NAME", "group": "honor8", "role": "name", "shape": "rect", "x": 1150, "y": 835, "w": 155, "h": 42}, {"id": "honor8.reward", "label": "HONOR 8 REWARD", "group": "honor8", "role": "reward", "shape": "rect", "x": 1150, "y": 895, "w": 155, "h": 42}, {"id": "honor9.area", "label": "HONOR 9 AREA", "group": "honor9", "role": "area", "shape": "rect", "x": 1405, "y": 820, "w": 185, "h": 130}, {"id": "honor9.name", "label": "HONOR 9 NAME", "group": "honor9", "role": "name", "shape": "rect", "x": 1420, "y": 835, "w": 155, "h": 42}, {"id": "honor9.reward", "label": "HONOR 9 REWARD", "group": "honor9", "role": "reward", "shape": "rect", "x": 1420, "y": 895, "w": 155, "h": 42}, {"id": "honor10.area", "label": "HONOR 10 AREA", "group": "honor10", "role": "area", "shape": "rect", "x": 1675, "y": 820, "w": 185, "h": 130}, {"id": "honor10.name", "label": "HONOR 10 NAME", "group": "honor10", "role": "name", "shape": "rect", "x": 1690, "y": 835, "w": 155, "h": 42}, {"id": "honor10.reward", "label": "HONOR 10 REWARD", "group": "honor10", "role": "reward", "shape": "rect", "x": 1690, "y": 895, "w": 155, "h": 42}]};

    const qs = new URLSearchParams(window.location.search);
    const debugMode = String(qs.get("debug") || "").toLowerCase();
    const BOX_DEBUG = debugMode === "boxes" || qs.get("boxes") === "1";
    const GRID_DEBUG = debugMode === "grid" || qs.get("grid") === "1";
    const DEBUG = qs.get("debug") === "1" || qs.get("log") === "1";
    const FINAL_STATE = String(qs.get("state") || "").toLowerCase() === "final";
    const durationMode = String(qs.get("duration") || "normal").toLowerCase();
    const instantMode = FINAL_STATE || qs.get("instant") === "1";
    const demo = String(qs.get("demo") || "").toLowerCase();
    const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();

    const els = {
      liveLayer: document.getElementById("liveLayer"),
      boxLayer: document.getElementById("boxLayer"),
      gridLayer: document.getElementById("gridLayer"),
      debug: document.getElementById("debug")
    };

    if (BOX_DEBUG) document.body.classList.add("box-debug");
    if (GRID_DEBUG) document.body.classList.add("grid-debug");
    if (DEBUG) document.body.classList.add("debug");

    const layout = normalizeLayout(INLINE_LAYOUT);
    const boxMap = new Map(layout.boxes.map((box) => [box.id, box]));

    function log(value) {
      if (!DEBUG) return;
      try { els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); }
      catch (err) { els.debug.textContent = String(value); }
    }

    function normalizeLayout(raw) {
      const boxes = Array.isArray(raw && raw.boxes) ? raw.boxes : [];
      return {
        version: String(raw && raw.version || STEP),
        canvas: raw && raw.canvas || { w: 1920, h: 1080 },
        background: String(raw && raw.background || "/assets/stream_events/winner_finale_bg_1920x1080.png"),
        boxes: boxes.map((box) => ({
          id: String(box.id || ""),
          label: String(box.label || box.id || ""),
          group: String(box.group || ""),
          role: String(box.role || ""),
          shape: String(box.shape || "rect").toLowerCase() === "circle" ? "circle" : "rect",
          x: Number(box.x || 0),
          y: Number(box.y || 0),
          w: Math.max(1, Number(box.w || 1)),
          h: Math.max(1, Number(box.h || 1))
        })).filter((box) => box.id)
      };
    }

    function getBox(id) {
      return boxMap.get(id) || null;
    }

    function makeEl(className, box) {
      const el = document.createElement("div");
      el.className = className;
      el.dataset.id = box.id;
      el.style.left = box.x + "px";
      el.style.top = box.y + "px";
      el.style.width = box.w + "px";
      el.style.height = box.h + "px";
      if (box.shape === "circle") el.style.borderRadius = "50%";
      return el;
    }

    function renderBoxes() {
      els.boxLayer.innerHTML = "";
      for (const box of layout.boxes) {
        const el = makeEl(`debug-box role-${box.role} shape-${box.shape}`, box);
        el.textContent = box.label;
        els.boxLayer.appendChild(el);
      }
    }

    function buildGrid() {
      els.gridLayer.innerHTML = "";
      for (let x = 0; x <= 1920; x += 50) {
        const line = document.createElement("div");
        line.className = "grid-line v" + (x % 100 === 0 ? " major" : "");
        line.style.left = x + "px";
        els.gridLayer.appendChild(line);
        if (x % 100 === 0) {
          const label = document.createElement("div");
          label.className = "grid-label x";
          label.style.left = (x + 3) + "px";
          label.style.top = "3px";
          label.textContent = "x:" + x;
          els.gridLayer.appendChild(label);
        }
      }
      for (let y = 0; y <= 1080; y += 50) {
        const line = document.createElement("div");
        line.className = "grid-line h" + (y % 100 === 0 ? " major" : "");
        line.style.top = y + "px";
        els.gridLayer.appendChild(line);
        if (y % 100 === 0) {
          const label = document.createElement("div");
          label.className = "grid-label y";
          label.style.left = "3px";
          label.style.top = (y + 3) + "px";
          label.textContent = "y:" + y;
          els.gridLayer.appendChild(label);
        }
      }
    }

    function cleanText(value, fallback = "") {
      const text = String(value == null ? "" : value).trim();
      return text || fallback;
    }

    function cleanNumber(value, fallback = 0) {
      const n = Number(value);
      return Number.isFinite(n) ? n : Number(fallback || 0);
    }

    function formatInt(value) {
      return cleanNumber(value, 0).toLocaleString("de-DE");
    }

    function pointsLabel(value) {
      const n = cleanNumber(value, 0);
      return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`;
    }

    function crumbsLabel(value) {
      return `+${formatInt(value)} extra`;
    }

    function escapeText(value) {
      return String(value == null ? "" : value);
    }

    function initials(name) {
      const raw = cleanText(name, "?");
      const parts = raw.replace(/[_-]+/g, " ").split(/\s+/).filter(Boolean);
      if (!parts.length) return "?";
      const first = parts[0][0] || "";
      const second = (parts[1] && parts[1][0]) || (parts[0][1] || "");
      return (first + second).toUpperCase();
    }

    function firstExisting(row, keys, fallback = "") {
      for (const key of keys) {
        if (row && row[key] != null && String(row[key]).trim() !== "") return row[key];
      }
      return fallback;
    }

    function avatarUrl(row) {
      return cleanText(firstExisting(row, [
        "avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url",
        "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"
      ], ""), "");
    }

    function normalizeRow(row, rank) {
      const userDisplayName = cleanText(firstExisting(row, [
        "userDisplayName", "displayName", "display_name", "userName", "username", "login", "userLogin", "name"
      ], `Platz ${rank}`), `Platz ${rank}`);
      return {
        rank,
        userDisplayName,
        avatarUrl: avatarUrl(row),
        points: cleanNumber(firstExisting(row, ["points", "score", "totalPoints", "total_points"], 0), 0),
        rewardLabel: cleanText(firstExisting(row, ["rewardLabel", "reward", "prize", "label"], rank <= 3 ? "Amazon-Gutschein" : "Extra"), rank <= 3 ? "Amazon-Gutschein" : "Extra"),
        rewardValue: cleanText(firstExisting(row, ["rewardValue", "reward_value", "value"], ""), ""),
        crumbBonus: cleanNumber(firstExisting(row, ["crumbBonus", "crumb_bonus", "bonus", "extra", "crumbs"], 0), 0)
      };
    }

    function normalizeFinale(raw) {
      const payload = raw && raw.finale ? raw.finale : raw || {};
      const event = raw && raw.event ? raw.event : payload.event || {};
      const eventName = cleanText(payload.eventName || payload.name || event.name || event.title || "CGN Event-Gewinner");
      const preview = raw && raw.preview && typeof raw.preview === "object" ? raw.preview : {};
      const previewRankingRows = preview && preview.ranking && Array.isArray(preview.ranking.rows) ? preview.ranking.rows : [];
      const allRows = []
        .concat(Array.isArray(payload.ranking) ? payload.ranking : [])
        .concat(payload.ranking && Array.isArray(payload.ranking.rows) ? payload.ranking.rows : [])
        .concat(Array.isArray(payload.rows) ? payload.rows : [])
        .concat(Array.isArray(payload.winners) ? payload.winners : [])
        .concat(previewRankingRows);
      let podiumRows = Array.isArray(payload.podiumRows) ? payload.podiumRows : [];
      let honorRows = Array.isArray(payload.honorRows) ? payload.honorRows : [];
      if (!podiumRows.length) podiumRows = allRows.filter((row) => cleanNumber(row.rank, 0) >= 1 && cleanNumber(row.rank, 0) <= 3);
      if (!honorRows.length) honorRows = allRows.filter((row) => cleanNumber(row.rank, 0) >= 4 && cleanNumber(row.rank, 0) <= 10);
      if (!podiumRows.length && payload.top3 && Array.isArray(payload.top3)) podiumRows = payload.top3;
      return {
        finaleUid: cleanText(payload.finaleUid || payload.uid || payload.id || eventUid || "demo"),
        eventName,
        subtitle: cleanText(payload.subtitle || payload.phaseSubtitle || "", ""),
        podiumRows: podiumRows.map((row, index) => normalizeRow(row, cleanNumber(row.rank, index + 1))),
        honorRows: honorRows.map((row, index) => normalizeRow(row, cleanNumber(row.rank, index + 4)))
      };
    }

    function setTextBox(boxId, text, className, options = {}) {
      const box = getBox(boxId);
      if (!box) return null;
      const el = makeEl("live-box " + className, box);
      const span = document.createElement("span");
      span.className = "fit-text";
      span.textContent = escapeText(text);
      el.appendChild(span);
      els.liveLayer.appendChild(el);
      fitText(el, span, options.max || 22, options.min || 10, options.marquee !== false);
      return el;
    }

    function setAvatarBox(boxId, row, rank) {
      const box = getBox(boxId);
      if (!box) return null;
      const el = makeEl(`live-box avatar rank${rank}`, box);
      const url = cleanText(row && row.avatarUrl, "");
      if (url) {
        const img = document.createElement("img");
        img.alt = "";
        img.decoding = "async";
        img.referrerPolicy = "no-referrer";
        img.src = url;
        img.onerror = () => {
          el.innerHTML = "";
          el.textContent = initials(row && row.userDisplayName);
        };
        el.appendChild(img);
      } else {
        el.textContent = initials(row && row.userDisplayName);
      }
      els.liveLayer.appendChild(el);
      return el;
    }

    function fitText(container, span, maxSize, minSize, allowMarquee) {
      if (!container || !span) return;
      let size = maxSize;
      container.style.fontSize = size + "px";
      container.classList.remove("marquee");
      span.style.transform = "none";
      while (size > minSize && span.scrollWidth > container.clientWidth - 4) {
        size -= 1;
        container.style.fontSize = size + "px";
      }
      if (allowMarquee && span.scrollWidth > container.clientWidth - 4) {
        const shift = Math.max(18, span.scrollWidth - container.clientWidth + 24);
        container.style.setProperty("--shift", shift + "px");
        container.style.setProperty("--dur", Math.min(14, Math.max(6, shift / 18)) + "s");
        container.classList.add("marquee");
      }
    }

    function renderHeader(title, subtitle) {
      setTextBox("header.title", title || "CGN Event-Gewinner", "title", { max: 34, min: 20, marquee: false });
      setTextBox("header.subtitle", subtitle || "", "subtitle", { max: 18, min: 11, marquee: true });
    }

    function renderAward(row) {
      const rank = cleanNumber(row.rank, 0);
      if (rank < 1 || rank > 3) return;
      setAvatarBox(`slot${rank}.avatar`, row, rank);
      setTextBox(`slot${rank}.name`, row.userDisplayName, "name", { max: rank === 1 ? 27 : 25, min: 12, marquee: true });
      setTextBox(`slot${rank}.points`, pointsLabel(row.points), "points", { max: rank === 1 ? 22 : 20, min: 12, marquee: false });
      const reward = row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel;
      setTextBox(`slot${rank}.reward`, reward, "reward", { max: rank === 1 ? 22 : 20, min: 12, marquee: true });
    }

    function renderHonor(row) {
      const rank = cleanNumber(row.rank, 0);
      if (rank < 4 || rank > 10) return;
      setTextBox(`honor${rank}.name`, row.userDisplayName, "honor-name", { max: 22, min: 10, marquee: true });
      const reward = row.crumbBonus ? crumbsLabel(row.crumbBonus) : (row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel);
      setTextBox(`honor${rank}.reward`, reward, "honor-reward", { max: 16, min: 9, marquee: true });
    }


    function timelineSettings() {
      if (durationMode === "short") {
        return { intro: 14000, honorStep: 11000, podiumStep: 18000, finalHold: 65000, stagger: 700 };
      }
      if (durationMode === "long") {
        return { intro: 30000, honorStep: 20000, podiumStep: 30000, finalHold: 115000, stagger: 900 };
      }
      return { intro: 22000, honorStep: 15500, podiumStep: 24000, finalHold: 90000, stagger: 800 };
    }

    function setHeaderText(title, subtitle) {
      const titleBox = els.liveLayer.querySelector('[data-id="header.title"] .fit-text');
      const subtitleBox = els.liveLayer.querySelector('[data-id="header.subtitle"] .fit-text');
      if (titleBox) titleBox.textContent = title || "CGN Event-Gewinner";
      if (subtitleBox) subtitleBox.textContent = subtitle || "";
    }

    function revealBox(id, extraClass = "") {
      const el = els.liveLayer.querySelector(`[data-id="${id}"]`);
      if (!el) return;
      el.classList.add("revealed", "reveal-pop");
      if (extraClass) el.classList.add(extraClass);
      window.setTimeout(() => el.classList.remove("reveal-pop", "highlight"), 1900);
    }

    function revealGroup(ids, delayStep = 0) {
      ids.forEach((id, index) => {
        window.setTimeout(() => revealBox(id, index === ids.length - 1 ? "highlight" : ""), index * delayStep);
      });
    }


    function winTextForRow(row) {
      if (!row) return "";
      if (row.rank >= 4) {
        return `${row.userDisplayName} gewinnt ${row.crumbBonus ? crumbsLabel(row.crumbBonus) : (row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel)}.`;
      }
      const reward = row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel;
      return `${row.userDisplayName} gewinnt ${reward}.`;
    }

    function revealHonor(rank, row, offset, settings) {
      window.setTimeout(() => {
        setHeaderText(`Platz ${rank}`, winTextForRow(row));
        revealGroup([`honor${rank}.name`, `honor${rank}.reward`], settings.stagger);
      }, offset);
    }

    function revealPodium(rank, row, offset, settings) {
      window.setTimeout(() => {
        const title = rank === 1 ? "Platz 1" : `Platz ${rank}`;
        setHeaderText(title, winTextForRow(row));
        revealGroup([`slot${rank}.avatar`, `slot${rank}.name`, `slot${rank}.points`, `slot${rank}.reward`], settings.stagger);
      }, offset);
    }

    function runRevealTimeline(finale) {
      const settings = timelineSettings();
      els.liveLayer.classList.add("reveal-running");
      els.liveLayer.querySelectorAll(".live-box").forEach((el) => {
        el.classList.remove("revealed", "highlight", "final-glow", "reveal-pop");
      });

      setHeaderText(finale.eventName || "CGN Event-Gewinner", "Die Gewinner des 1-Jahres-Events werden enthüllt.");
      revealGroup(["header.title", "header.subtitle"], settings.stagger);

      let offset = settings.intro;

      const honorOrder = [10, 9, 8, 7, 6, 5, 4];
      honorOrder.forEach((rank) => {
        const row = (finale.honorRows || []).find((item) => item.rank === rank);
        if (!row) return;
        revealHonor(rank, row, offset, settings);
        offset += settings.honorStep;
      });

      const podiumOrder = [3, 2, 1];
      podiumOrder.forEach((rank) => {
        const row = (finale.podiumRows || []).find((item) => item.rank === rank);
        if (!row) return;
        revealPodium(rank, row, offset, settings);
        offset += settings.podiumStep;
      });

      window.setTimeout(() => {
        const first = (finale.podiumRows || []).find((row) => row.rank === 1);
        setHeaderText("Glückwunsch an alle Gewinner", first ? `${first.userDisplayName} holt sich Platz 1.` : "Danke für 1 Jahr CGN-Community.");
        els.liveLayer.querySelectorAll(".live-box").forEach((el) => {
          el.classList.add("revealed", "final-glow");
        });
      }, offset);

      log({
        step: STEP,
        moduleVersion: MODULE_VERSION,
        durationMode,
        estimatedMs: offset + settings.finalHold,
        layoutVersion: layout.version
      });
    }

    function revealAllInstant() {
      els.liveLayer.classList.remove("reveal-running");
      els.liveLayer.querySelectorAll(".live-box").forEach((el) => {
        el.classList.add("revealed");
      });
    }

    function renderFinale(raw) {
      const finale = normalizeFinale(raw);
      els.liveLayer.innerHTML = "";
      const first = (finale.podiumRows || []).find((row) => row.rank === 1);
      const subtitle = finale.subtitle || (first ? `${first.userDisplayName} steht auf Platz 1.` : "Die Gewinner stehen fest.");
      renderHeader(finale.eventName, subtitle);
      for (const row of (finale.podiumRows || [])) renderAward(row);
      for (const row of (finale.honorRows || [])) renderHonor(row);
      if (instantMode) {
        revealAllInstant();
        log({ step: STEP, moduleVersion: MODULE_VERSION, mode: "instant", layoutVersion: layout.version, finale });
      } else {
        runRevealTimeline(finale);
      }
    }

    function demoFinale() {
      return {
        finaleUid: "demo",
        eventName: "CGN Event-Gewinner",
        podiumRows: [
          { rank: 1, userDisplayName: "Urlug", points: 120, rewardLabel: "Amazon-Gutschein" },
          { rank: 2, userDisplayName: "RoxxyFoxxyCGN", points: 108, rewardLabel: "Amazon-Gutschein" },
          { rank: 3, userDisplayName: "UdoWB", points: 96, rewardLabel: "Amazon-Gutschein" }
        ],
        honorRows: [
          { rank: 4, userDisplayName: "EngelCGN", crumbBonus: 10000 },
          { rank: 5, userDisplayName: "AdoredPenny", crumbBonus: 9000 },
          { rank: 6, userDisplayName: "AmpersandHD", crumbBonus: 8000 },
          { rank: 7, userDisplayName: "Araglor", crumbBonus: 7000 },
          { rank: 8, userDisplayName: "Tiegerpranke01", crumbBonus: 6000 },
          { rank: 9, userDisplayName: "ForrestCGN", crumbBonus: 5000 },
          { rank: 10, userDisplayName: "Heimleitung", crumbBonus: 4000 }
        ]
      };
    }

    async function loadExistingFinale() {
      if (!eventUid) return;
      try {
        const res = await fetch(`/api/stream-events/events/${encodeURIComponent(eventUid)}/finale`, { cache: "no-store" });
        if (!res.ok) throw new Error("HTTP " + res.status);
        const data = await res.json();
        if (data && data.existingFinale) renderFinale({ finale: data.existingFinale, preview: data, event: data.event });
        else if (data && data.finale) renderFinale({ finale: data.finale, preview: data.preview || data, event: data.event });
        else renderFinale({ finale: data, preview: data, event: data.event });
      } catch (err) {
        log({ error: err.message || String(err), eventUid });
      }
    }

    function extractBusPayload(detail) {
      const msg = detail && typeof detail === "object" ? detail : {};
      const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg;
      return { msg, payload };
    }

    function handleBusMessage(event) {
      if (demo) return;
      const { msg, payload } = extractBusPayload(event && event.detail);
      const channel = String(msg.channel || payload.channel || "").toLowerCase();
      const action = String(msg.action || payload.action || "").toLowerCase();
      const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event || payload.ranking || payload.top3 || payload.winner);
      const isFinale = channel === "stream_events.winner_finale" || channel.includes("winner_finale") || action.includes("winner_finale") || action === "started" || action === "replay_requested";
      if (!isFinale || !hasFinale) return;
      const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
      renderFinale(finale);
    }

    renderBoxes();
    if (GRID_DEBUG) buildGrid();

    if (!BOX_DEBUG) {
      if (demo) renderFinale(demoFinale());
      else loadExistingFinale();
      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
    }
  })();
  </script>

  <script src="/overlays/shared/overlay_bus_client.js" data-overlay-id="stream_events_winner_overlay" data-client-type="overlay" data-mode="obs_overlay" data-module="stream_events" data-name="Stream Events Gewinner-Finale Overlay" data-version="0.5.29" data-heartbeat-ms="5000"></script>
</body>
