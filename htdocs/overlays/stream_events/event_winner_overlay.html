<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Gewinner-Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --text: #f8fbff;
      --muted: rgba(248,251,255,.76);
      --dim: rgba(248,251,255,.54);
      --gold: #ffe66d;
      --gold2: #ffbd41;
      --cyan: #39e6ff;
      --violet: #a855f7;
      --bronze: #ff9d6c;
      --silver: #dbe8ff;
      --cookie: #ffd18a;
    }
    * { box-sizing: border-box; }
    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }
    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transition: opacity .55s ease;
      overflow: hidden;
      isolation: isolate;
    }
    #stage.visible { opacity: 1; }
    #stage.hidden-hard { opacity: 0; }
    .bg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      z-index: 0;
    }
    .shade {
      position: absolute;
      inset: 0;
      z-index: 1;
      background:
        radial-gradient(circle at 50% 21%, rgba(255,230,109,.08), transparent 28%),
        linear-gradient(180deg, rgba(0,0,0,.05), rgba(0,0,0,.10) 52%, rgba(0,0,0,.12));
    }
    .header {
      position: absolute;
      z-index: 4;
      left: 535px;
      top: 54px;
      width: 850px;
      height: 112px;
      display: grid;
      place-items: center;
      text-align: center;
      opacity: .98;
    }
    .phase-title {
      margin: 0;
      max-width: 800px;
      font-size: 48px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: .055em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(57,230,255,.35), 0 0 44px rgba(168,85,247,.32);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .phase-subtitle {
      margin: 9px 0 0;
      max-width: 850px;
      color: rgba(248,251,255,.76);
      font-size: 22px;
      line-height: 1.12;
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-shadow: 0 0 16px rgba(0,0,0,.35);
    }
    .phase-title.pulse, .phase-subtitle.pulse { animation: titlePulse .62s cubic-bezier(.16,1,.3,1) both; }
    @keyframes titlePulse { from { opacity:0; transform: translateY(14px) scale(.98); filter: blur(6px); } to { opacity:1; transform: translateY(0) scale(1); filter: blur(0); } }

    .award-slot, .honor-slot {
      position: absolute;
      z-index: 5;
      opacity: 0;
      transform: scale(.985);
      transition: opacity .55s ease, transform .65s cubic-bezier(.16,1,.3,1), filter .5s ease;
      filter: saturate(.9) brightness(.92);
    }
    .award-slot.filled, .honor-slot.filled {
      opacity: 1;
      transform: scale(1);
      filter: saturate(1) brightness(1);
    }
    .award-slot.active, .honor-slot.active { animation: slotGlow 1.25s ease-in-out 2; }
    @keyframes slotGlow {
      0%,100% { filter: drop-shadow(0 0 0 rgba(255,255,255,0)); }
      50% { filter: drop-shadow(0 0 24px rgba(255,230,109,.45)) drop-shadow(0 0 44px rgba(57,230,255,.18)); }
    }
    .award-slot .inner, .honor-slot .inner {
      width: 100%;
      height: 100%;
      display: grid;
      align-content: center;
      background: rgba(0,0,0,.01);
      overflow: hidden;
    }
    .award-slot .avatar-wrap {
      border-radius: 50%;
      padding: 6px;
      background: conic-gradient(from 140deg, rgba(57,230,255,.95), rgba(168,85,247,.92), rgba(255,79,216,.78), rgba(255,230,109,.90), rgba(57,230,255,.95));
      box-shadow: 0 0 24px rgba(57,230,255,.20), 0 0 52px rgba(168,85,247,.20);
      display: grid;
      place-items: center;
      flex: 0 0 auto;
    }
    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      display: grid;
      place-items: center;
      background: radial-gradient(circle at 50% 35%, rgba(255,255,255,.17), transparent 36%), linear-gradient(135deg, rgba(57,230,255,.30), rgba(168,85,247,.42));
      border: 2px solid rgba(255,255,255,.20);
      color: #fff;
      font-weight: 950;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(57,230,255,.42);
    }
    .avatar img { width: 100%; height: 100%; object-fit: cover; display: block; }

    /* Positions passend zum 1920x1080-Grafikrahmen */
    #slot3 { left: 214px; top: 355px; width: 395px; height: 360px; }
    #slot1 { left: 700px; top: 286px; width: 520px; height: 465px; }
    #slot2 { left: 1304px; top: 355px; width: 405px; height: 360px; }

    .award-slot.side .inner {
      padding: 26px 34px 24px;
      grid-template-columns: 96px 1fr;
      column-gap: 20px;
      align-items: center;
    }
    .award-slot.side .avatar-wrap { width: 94px; height: 94px; grid-row: 1 / span 3; align-self: start; margin-top: 8px; }
    .award-slot.side .avatar { font-size: 28px; }
    .award-slot.center .inner {
      padding: 34px 48px 36px;
      grid-template-columns: 130px 1fr;
      column-gap: 26px;
      align-items: center;
    }
    .award-slot.center .avatar-wrap { width: 128px; height: 128px; grid-row: 1 / span 3; align-self: start; margin-top: 24px; }
    .award-slot.center .avatar { font-size: 38px; }
    .award-rank {
      color: var(--gold);
      font-size: 24px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .14em;
      text-transform: uppercase;
      text-shadow: 0 0 16px rgba(255,230,109,.32);
    }
    .award-name {
      margin-top: 13px;
      color: #fff;
      font-size: 44px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.035em;
      text-shadow: 0 0 18px rgba(57,230,255,.28), 0 0 36px rgba(168,85,247,.30);
      max-height: 92px;
      overflow: hidden;
      overflow-wrap: anywhere;
    }
    .award-slot.center .award-name { font-size: 60px; max-height: 180px; }
    .award-name.long { font-size: 34px; line-height: 1.02; max-height: 108px; }
    .award-slot.center .award-name.long { font-size: 46px; line-height: 1.02; max-height: 190px; }
    .award-name.very-long { font-size: 27px; line-height: 1.05; max-height: 110px; }
    .award-slot.center .award-name.very-long { font-size: 36px; line-height: 1.03; max-height: 190px; }
    .award-points {
      margin-top: 13px;
      color: rgba(248,251,255,.80);
      font-size: 24px;
      font-weight: 850;
    }
    .award-slot.center .award-points { font-size: 28px; }
    .award-reward {
      grid-column: 1 / -1;
      margin-top: 20px;
      align-self: end;
      justify-self: stretch;
      min-height: 52px;
      display: grid;
      place-items: center;
      padding: 8px 18px;
      border-radius: 18px;
      background: rgba(255,230,109,.09);
      border: 1px solid rgba(255,230,109,.22);
      color: var(--gold);
      font-size: 26px;
      line-height: 1.1;
      font-weight: 950;
      text-align: center;
      text-shadow: 0 0 14px rgba(255,230,109,.25);
    }
    .award-slot.side .award-reward { font-size: 22px; }

    .honor-slot { height: 154px; }
    #honor10 { left: 96px; top: 824px; width: 202px; }
    #honor9  { left: 326px; top: 824px; width: 202px; }
    #honor8  { left: 558px; top: 824px; width: 202px; }
    #honor7  { left: 789px; top: 824px; width: 202px; }
    #honor6  { left: 1020px; top: 824px; width: 202px; }
    #honor5  { left: 1251px; top: 824px; width: 202px; }
    #honor4  { left: 1482px; top: 824px; width: 202px; }
    .honor-slot .inner { padding: 20px 17px 14px; justify-content: center; }
    .honor-rank { color: var(--cookie); font-size: 17px; font-weight: 950; letter-spacing: .08em; text-transform: uppercase; }
    .honor-name { margin-top: 8px; color: #fff; font-size: 24px; line-height: 1.02; font-weight: 950; text-shadow: 0 0 16px rgba(57,230,255,.18); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .honor-name.long { font-size: 19px; }
    .honor-reward { margin-top: 12px; display: inline-flex; align-items: center; justify-content: center; width: 100%; min-height: 30px; padding: 4px 10px; border-radius: 999px; background: rgba(255,230,109,.08); border: 1px solid rgba(255,230,109,.16); color: var(--gold); font-size: 19px; font-weight: 950; white-space: nowrap; }

    .empty-hint {
      position: absolute;
      z-index: 3;
      opacity: .18;
      font-size: 28px;
      letter-spacing: .22em;
      font-weight: 950;
      text-transform: uppercase;
      color: rgba(255,255,255,.70);
      text-shadow: 0 0 20px rgba(57,230,255,.18);
      transition: opacity .45s ease;
    }
    .empty-hint.hidden { opacity: 0; }
    #hint3 { left: 263px; top: 492px; }
    #hint1 { left: 826px; top: 480px; color: rgba(255,230,109,.58); }
    #hint2 { left: 1350px; top: 492px; color: rgba(216,230,255,.60); }

    .confetti {
      position: absolute;
      inset: 0;
      z-index: 2;
      pointer-events: none;
      overflow: hidden;
    }
    .confetti i {
      position: absolute;
      top: -34px;
      width: 9px;
      height: 17px;
      border-radius: 3px;
      opacity: .72;
      background: var(--gold);
      animation: fall linear forwards;
    }
    .confetti i:nth-child(3n) { background: var(--cyan); }
    .confetti i:nth-child(3n+1) { background: #ff4fd8; }
    @keyframes fall { to { transform: translateY(1160px) rotate(700deg); opacity: 0; } }

    #debug {
      position: fixed;
      z-index: 99;
      left: 14px;
      bottom: 14px;
      max-width: 760px;
      max-height: 250px;
      overflow: auto;
      display: none;
      padding: 10px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 12px;
      white-space: pre-wrap;
      pointer-events: auto;
    }
    body.debug #debug { display: block; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div id="stage" class="hidden-hard" aria-live="polite">
    <img class="bg" src="/assets/stream_events/winner_finale_cgn_stage.png" alt="" />
    <div class="shade"></div>
    <div id="confetti" class="confetti"></div>

    <header class="header">
      <div>
        <h1 id="phaseTitle" class="phase-title">CGN Event-Finale</h1>
        <p id="phaseSubtitle" class="phase-subtitle">Die Plätze werden gleich enthüllt.</p>
      </div>
    </header>

    <div id="hint3" class="empty-hint">Platz 3</div>
    <div id="hint1" class="empty-hint">Platz 1</div>
    <div id="hint2" class="empty-hint">Platz 2</div>

    <section id="slot3" class="award-slot side" data-rank="3"><div class="inner"></div></section>
    <section id="slot1" class="award-slot center" data-rank="1"><div class="inner"></div></section>
    <section id="slot2" class="award-slot side" data-rank="2"><div class="inner"></div></section>

    <section id="honor10" class="honor-slot" data-rank="10"><div class="inner"></div></section>
    <section id="honor9" class="honor-slot" data-rank="9"><div class="inner"></div></section>
    <section id="honor8" class="honor-slot" data-rank="8"><div class="inner"></div></section>
    <section id="honor7" class="honor-slot" data-rank="7"><div class="inner"></div></section>
    <section id="honor6" class="honor-slot" data-rank="6"><div class="inner"></div></section>
    <section id="honor5" class="honor-slot" data-rank="5"><div class="inner"></div></section>
    <section id="honor4" class="honor-slot" data-rank="4"><div class="inner"></div></section>
  </div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",
      version: "0.3.0",
      heartbeatIntervalMs: 5000,
      capabilities: ["overlay.heartbeat", "stream_events.winner_finale_display", "stream_events.winner_finale", "ack"],
      meta: { overlay: "event_winner_overlay.html", communication: "communication_bus", owner: "stream_events", step: "EVS47.3" }
    };
  </script>

  <script>
    (function () {
      "use strict";
      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const speed = String(qs.get("speed") || "normal").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";
      const fastMode = speed === "fast" || speed === "test" || qs.get("fast") === "1";
      const timeline = fastMode
        ? { intro: 900, honor: 1850, top: 2600, gap: 450, final: 8500 }
        : { intro: 4300, honor: 10500, top: 15000, gap: 1200, final: 62000 };
      const autoHideMs = Math.max(8000, Math.min(360000, Number(qs.get("hideMs") || (fastMode ? 85000 : 285000))));

      const els = {
        stage: document.getElementById("stage"),
        phaseTitle: document.getElementById("phaseTitle"),
        phaseSubtitle: document.getElementById("phaseSubtitle"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug"),
        slots: {
          1: document.getElementById("slot1"),
          2: document.getElementById("slot2"),
          3: document.getElementById("slot3"),
          4: document.getElementById("honor4"),
          5: document.getElementById("honor5"),
          6: document.getElementById("honor6"),
          7: document.getElementById("honor7"),
          8: document.getElementById("honor8"),
          9: document.getElementById("honor9"),
          10: document.getElementById("honor10")
        },
        hints: { 1: document.getElementById("hint1"), 2: document.getElementById("hint2"), 3: document.getElementById("hint3") }
      };
      let timers = [];
      let hideTimer = null;
      let currentFinaleUid = "";
      if (DEBUG) document.body.classList.add("debug");

      function log(value) {
        if (!DEBUG) return;
        try { els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2); }
        catch (err) { els.debug.textContent = String(value); }
      }
      function defer(fn, ms) { const t = window.setTimeout(fn, ms); timers.push(t); return t; }
      function clearTimers() { timers.forEach((t) => window.clearTimeout(t)); timers = []; if (hideTimer) window.clearTimeout(hideTimer); hideTimer = null; }
      function showStage() { els.stage.classList.remove("hidden-hard"); window.requestAnimationFrame(() => els.stage.classList.add("visible")); }
      function hideStage() { els.stage.classList.remove("visible"); hideTimer = window.setTimeout(() => { els.stage.classList.add("hidden-hard"); clearConfetti(); }, 700); }
      function cleanText(value, fallback) { const text = String(value == null ? "" : value).trim(); return text || fallback || ""; }
      function cleanNumber(value, fallback) { const n = Number(value); return Number.isFinite(n) ? n : Number(fallback || 0); }
      function formatInt(value) { return cleanNumber(value, 0).toLocaleString("de-DE"); }
      function pointsLabel(points) { const n = cleanNumber(points, 0); return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`; }
      function crumbsLabel(value) { return `+${formatInt(value)} extra`; }
      function firstExisting(row, keys, fallback) { for (const k of keys) if (row && row[k] != null && String(row[k]).trim() !== "") return row[k]; return fallback; }
      function avatarUrl(row) { return cleanText(firstExisting(row, ["avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url", "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"], ""), ""); }
      function initials(name) { const text = cleanText(name, "CGN").replace(/[^\p{L}\p{N}\s_-]/gu, "").trim(); const parts = text.split(/[\s_-]+/).filter(Boolean); if (parts.length >= 2) return `${parts[0][0]}${parts[1][0]}`.toUpperCase(); return text.slice(0, 2).toUpperCase() || "CG"; }
      function escapeHtml(value) { return String(value == null ? "" : value).replace(/&/g, "&amp;").replace(/</g, "&lt;").replace(/>/g, "&gt;").replace(/\"/g, "&quot;"); }
      function normalizeRow(row, index) {
        const src = row && typeof row === "object" ? row : {};
        const rank = cleanNumber(firstExisting(src, ["rank", "place", "position"], index + 1), index + 1);
        const login = cleanText(firstExisting(src, ["userLogin", "user_login", "login", "username", "userName", "user_name"], ""), "");
        const display = cleanText(firstExisting(src, ["userDisplayName", "user_display_name", "displayName", "display_name", "name"], login), login || `Platz ${rank}`);
        return { rank, userLogin: login, userDisplayName: display, points: cleanNumber(firstExisting(src, ["points", "total_points", "score", "totalScore", "total_score"], 0), 0), entries: cleanNumber(firstExisting(src, ["entries", "entry_count", "answerCount", "answer_count", "solved", "solvedCount"], 0), 0), avatarUrl: avatarUrl(src), rewardLabel: cleanText(firstExisting(src, ["rewardLabel", "reward_label", "prizeLabel", "prize_label", "prize"], ""), ""), rewardValue: cleanText(firstExisting(src, ["rewardValue", "reward_value", "prizeValue", "prize_value"], ""), ""), crumbBonus: cleanNumber(firstExisting(src, ["crumbBonus", "crumb_bonus", "kekskruemel", "cookieCrumbs", "cookie_crumbs"], 0), 0) };
      }
      function rowKey(row) { return String(row.userLogin || row.userDisplayName || "").trim().toLowerCase(); }
      function uniqueRows(rows) { const seen = new Set(); return rows.filter((row) => { const key = rowKey(row) || `rank_${row.rank}`; if (seen.has(key)) return false; seen.add(key); return true; }); }
      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || finale.event || {};
        const rawWinner = finale.winner || preview.winner || {};
        const rankingSources = [finale.ranking, finale.top10, finale.topTen, finale.leaderboard, finale.results, finale.rows, preview.ranking, preview.top10, preview.topTen, preview.leaderboard, preview.topCandidates, preview.results];
        let ranking = [];
        for (const source of rankingSources) if (Array.isArray(source) && source.length) { ranking = source.map(normalizeRow); break; }
        const top3Source = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const top3 = top3Source.map(normalizeRow);
        const candidates = (Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : [])).map(normalizeRow);
        const winner = normalizeRow(rawWinner && Object.keys(rawWinner).length ? rawWinner : (top3[0] || ranking[0] || candidates[0] || {}), 0);
        if (!ranking.length) ranking = uniqueRows([winner, ...top3, ...candidates]).filter((row) => row.userDisplayName);
        ranking = uniqueRows(ranking).sort((a, b) => a.rank !== b.rank ? a.rank - b.rank : b.points - a.points);
        let podiumRows = ranking.filter((row) => row.rank >= 1 && row.rank <= 3).slice(0, 3);
        if (podiumRows.length < 3 && top3.length) podiumRows = uniqueRows([...podiumRows, ...top3]).slice(0, 3);
        if (podiumRows.length < 3) podiumRows = uniqueRows([winner, ...podiumRows, ...ranking]).slice(0, 3);
        podiumRows = podiumRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 1) || index + 1 })).sort((a, b) => a.rank - b.rank).slice(0, 3);
        const podiumKeys = new Set(podiumRows.map(rowKey));
        let honorRows = ranking.filter((row) => row.rank >= 4 && row.rank <= 10 && !podiumKeys.has(rowKey(row)));
        if (!honorRows.length && ranking.length > 3) honorRows = ranking.slice(3, 10);
        honorRows = honorRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 4) || index + 4 })).sort((a, b) => b.rank - a.rank).slice(0, 7);
        const crumbDefaults = { 10: 4000, 9: 5000, 8: 6000, 7: 7000, 6: 8000, 5: 9000, 4: 10000 };
        honorRows = honorRows.map((row) => ({ ...row, crumbBonus: row.crumbBonus || crumbDefaults[row.rank] || 0, rewardLabel: row.rewardLabel || "Kekskrümel" }));
        podiumRows = podiumRows.map((row) => ({ ...row, rewardLabel: row.rewardLabel || "Amazon-Gutschein" }));
        return { finaleUid: cleanText(finale.finaleUid || finale.uid || preview.finaleUid, `demo_${Date.now()}`), eventUid: cleanText(finale.eventUid || event.eventUid || event.uid || preview.eventUid, ""), eventName: cleanText(finale.eventName || event.name || preview.eventName, "Event-Finale"), winner: podiumRows.find((row) => row.rank === 1) || winner, honorRows, podiumRows, rankingCount: cleanNumber(finale.rankingCount || preview.rankingCount || ranking.length, ranking.length), rawRankingCount: ranking.length };
      }
      function renderAvatar(container, row) {
        container.innerHTML = "";
        const url = cleanText(row && row.avatarUrl, "");
        if (url) {
          const img = document.createElement("img"); img.alt = ""; img.decoding = "async"; img.referrerPolicy = "no-referrer"; img.src = url; img.onerror = () => { container.innerHTML = initials(row && row.userDisplayName); }; container.appendChild(img); return;
        }
        container.textContent = initials(row && row.userDisplayName);
      }
      function nameClass(name) { const l = cleanText(name, "").length; return l > 32 ? "very-long" : (l > 20 ? "long" : ""); }
      function renderAward(row) {
        const slot = els.slots[row.rank]; if (!slot) return;
        const rankText = row.rank === 1 ? "Platz 1" : row.rank === 2 ? "Platz 2" : "Platz 3";
        const reward = row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel;
        slot.querySelector(".inner").innerHTML = `<div class="avatar-wrap"><div class="avatar"></div></div><div><div class="award-rank">${escapeHtml(rankText)}</div><div class="award-name ${nameClass(row.userDisplayName)}"></div><div class="award-points">${escapeHtml(pointsLabel(row.points))}</div></div><div class="award-reward">${escapeHtml(reward)}</div>`;
        slot.querySelector(".award-name").textContent = row.userDisplayName;
        renderAvatar(slot.querySelector(".avatar"), row);
        slot.classList.add("filled", "active");
        if (els.hints[row.rank]) els.hints[row.rank].classList.add("hidden");
        defer(() => slot.classList.remove("active"), 2600);
      }
      function renderHonor(row) {
        const slot = els.slots[row.rank]; if (!slot) return;
        slot.querySelector(".inner").innerHTML = `<div class="honor-rank">Platz ${escapeHtml(row.rank)}</div><div class="honor-name ${nameClass(row.userDisplayName)}"></div><div class="honor-reward">🍪 ${escapeHtml(crumbsLabel(row.crumbBonus))}</div>`;
        slot.querySelector(".honor-name").textContent = row.userDisplayName;
        slot.classList.add("filled", "active");
        defer(() => slot.classList.remove("active"), 1900);
      }
      function clearConfetti() { els.confetti.innerHTML = ""; }
      function makeConfetti(amount) {
        clearConfetti(); const count = Math.max(12, Math.min(110, amount || 40));
        for (let i = 0; i < count; i += 1) { const p = document.createElement("i"); p.style.left = `${Math.random()*100}%`; p.style.animationDuration = `${4.2 + Math.random()*4.6}s`; p.style.animationDelay = `${Math.random()*1.2}s`; p.style.transform = `translateY(-60px) rotate(${Math.random()*360}deg)`; els.confetti.appendChild(p); }
      }
      function setPhase(title, subtitle) {
        els.phaseTitle.textContent = title; els.phaseSubtitle.textContent = subtitle || "";
        els.phaseTitle.classList.remove("pulse"); els.phaseSubtitle.classList.remove("pulse");
        void els.phaseTitle.offsetWidth; els.phaseTitle.classList.add("pulse"); els.phaseSubtitle.classList.add("pulse");
      }
      function resetView() {
        Object.values(els.slots).forEach((slot) => { if (!slot) return; slot.classList.remove("filled", "active"); const inner = slot.querySelector(".inner"); if (inner) inner.innerHTML = ""; });
        Object.values(els.hints).forEach((hint) => hint && hint.classList.remove("hidden"));
        clearConfetti();
      }
      function playFinale(rawFinale, options) {
        const finale = normalizeFinale(rawFinale);
        if (!finale.podiumRows.length && !finale.honorRows.length) return;
        if (!(options && options.force) && currentFinaleUid && currentFinaleUid === finale.finaleUid) return;
        currentFinaleUid = finale.finaleUid;
        clearTimers(); resetView(); log({ speed, fastMode, timeline, finale }); showStage();
        let at = 250;
        defer(() => setPhase("CGN Event-Finale", "Die Plätze werden jetzt nacheinander enthüllt."), at);
        at += timeline.intro;
        const honorRows = finale.honorRows || [];
        honorRows.forEach((row) => {
          defer(() => { setPhase(`Platz ${row.rank}`, `${row.userDisplayName} bekommt ${crumbsLabel(row.crumbBonus)} Kekskrümel.`); renderHonor(row); makeConfetti(fastMode ? 16 : 26); }, at);
          at += timeline.honor + timeline.gap;
        });
        defer(() => setPhase("Finale Top 3", "Jetzt werden die Gutschein-Plätze enthüllt."), at);
        at += timeline.intro;
        const podiumByRank = new Map((finale.podiumRows || []).map((row) => [row.rank, row]));
        [3, 2, 1].forEach((rank) => {
          const row = podiumByRank.get(rank) || (finale.podiumRows || []).find((item) => item.rank === rank);
          if (!row) return;
          defer(() => { setPhase(`Platz ${rank}`, `${row.userDisplayName} sichert sich den Gutschein-Platz.`); renderAward(row); makeConfetti(rank === 1 ? (fastMode ? 55 : 95) : (fastMode ? 25 : 42)); }, at);
          at += timeline.top + timeline.gap;
        });
        const winner = podiumByRank.get(1) || finale.winner || finale.podiumRows[0];
        defer(() => { if (winner) setPhase("CGN Event-Gewinner", `${winner.userDisplayName} steht auf Platz 1.`); makeConfetti(fastMode ? 80 : 120); }, at);
        at += timeline.final;
        const totalRun = Math.max(at + 1000, Math.min(autoHideMs, at + 3000));
        defer(() => hideStage(), totalRun);
      }
      function demoFinale(kind) {
        const long = kind === "long";
        const rows = [
          { rank: 1, userDisplayName: long ? "ForrestCGN_mit_dem_sehr_langen_Gewinnernamen" : "ForrestCGN", points: 120, entries: 12, rewardLabel: "Amazon-Gutschein" },
          { rank: 2, userDisplayName: long ? "EngelCGN_Silbername_mit_Extra_Laenge" : "EngelCGN", points: 108, entries: 11, rewardLabel: "Amazon-Gutschein" },
          { rank: 3, userDisplayName: long ? "HeimleitungHD_Langer_Bronze_Name" : "HeimleitungHD", points: 96, entries: 9, rewardLabel: "Amazon-Gutschein" },
          { rank: 4, userDisplayName: "KaffeeKoenig", points: 88, entries: 8, crumbBonus: 10000 },
          { rank: 5, userDisplayName: "OpaRollator", points: 82, entries: 8, crumbBonus: 9000 },
          { rank: 6, userDisplayName: "RentnerRambo", points: 76, entries: 7, crumbBonus: 8000 },
          { rank: 7, userDisplayName: "KeksKommando", points: 70, entries: 7, crumbBonus: 7000 },
          { rank: 8, userDisplayName: "BingoBerta", points: 64, entries: 6, crumbBonus: 6000 },
          { rank: 9, userDisplayName: "PuddingPanzer", points: 58, entries: 5, crumbBonus: 5000 },
          { rank: 10, userDisplayName: "ZiviMitHerz", points: 52, entries: 5, crumbBonus: 4000 }
        ];
        return { finale: { finaleUid: `demo_${kind || "single"}_${Date.now()}`, eventUid: "demo_event", eventName: long ? "1 Jahr Twitch - Langer Namenstest" : "1 Jahr Twitch - Sound-Schnipsel Finale", mode: "ranked_finale", winner: rows[0], top3: rows.slice(0, 3), ranking: rows, rankingCount: rows.length } };
      }
      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try { const res = await fetch(finaleRoute, { cache: "no-store" }); if (!res.ok) throw new Error(`HTTP ${res.status}`); const data = await res.json(); log(data); if (data && data.existingFinale) playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true }); }
        catch (err) { log({ error: err.message || String(err), route: finaleRoute }); }
      }
      function extractBusPayload(detail) { const msg = detail && typeof detail === "object" ? detail : {}; const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg; return { msg, payload }; }
      function handleBusMessage(event) {
        if (demo) return;
        const { msg, payload } = extractBusPayload(event && event.detail);
        const channel = String(msg.channel || payload.channel || "").toLowerCase();
        const action = String(msg.action || payload.action || "").toLowerCase();
        const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event || payload.ranking || payload.top3 || payload.winner);
        const isFinale = channel === "stream_events.winner_finale" || channel.indexOf("winner_finale") >= 0 || action.indexOf("winner_finale") >= 0 || action === "started" || action === "replay_requested";
        if (!isFinale || !hasFinale) return;
        const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
        playFinale(finale, { force: action === "replay_requested" });
      }
      if (demo) window.setTimeout(() => playFinale(demoFinale(demo), { force: true }), 350); else loadExistingFinale();
      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
      window.addEventListener("beforeunload", clearTimers);
    })();
  </script>
