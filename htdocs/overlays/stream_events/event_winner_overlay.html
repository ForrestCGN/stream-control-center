<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>ForrestCGN Event Finale</title>
  <style>
    :root {
      --w: 1920px;
      --h: 1080px;
      --bg0: #030516;
      --bg1: #070b25;
      --bg2: #14082d;
      --cyan: #36e7ff;
      --cyan-soft: rgba(54,231,255,.22);
      --violet: #a855f7;
      --violet-soft: rgba(168,85,247,.30);
      --pink: #ff4fd8;
      --gold: #ffe86d;
      --gold-soft: rgba(255,232,109,.24);
      --cookie: #ffd093;
      --text: #f7fbff;
      --muted: rgba(247,251,255,.68);
      --line: rgba(143,244,255,.18);
      --panel: rgba(9, 12, 36, .74);
      --panel-strong: rgba(14, 11, 42, .88);
      --glass: rgba(255,255,255,.055);
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      width: var(--w);
      height: var(--h);
      overflow: hidden;
      background: transparent;
      color: var(--text);
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
      pointer-events: none;
    }

    #stage {
      position: fixed;
      inset: 0;
      width: var(--w);
      height: var(--h);
      opacity: 0;
      transform: scale(.992);
      filter: blur(5px);
      transition: opacity .45s ease, transform .60s cubic-bezier(.16, 1, .3, 1), filter .45s ease;
      isolation: isolate;
    }

    #stage.visible {
      opacity: 1;
      transform: scale(1);
      filter: blur(0);
    }

    #stage.hidden-hard { opacity: 0; }

    .space-bg {
      position: absolute;
      inset: -80px;
      z-index: 0;
      background:
        radial-gradient(circle at 50% 12%, rgba(54,231,255,.20), transparent 25%),
        radial-gradient(circle at 14% 72%, rgba(168,85,247,.25), transparent 32%),
        radial-gradient(circle at 86% 67%, rgba(255,79,216,.18), transparent 31%),
        radial-gradient(circle at 50% 94%, rgba(255,232,109,.13), transparent 22%),
        linear-gradient(135deg, var(--bg0), var(--bg1) 44%, var(--bg2));
    }

    .grain {
      position: absolute;
      inset: 0;
      z-index: 1;
      opacity: .30;
      background-image:
        radial-gradient(circle, rgba(255,255,255,.75) 0 1px, transparent 1.5px),
        radial-gradient(circle, rgba(54,231,255,.50) 0 1px, transparent 1.6px),
        radial-gradient(circle, rgba(255,232,109,.40) 0 1px, transparent 1.6px);
      background-size: 190px 190px, 310px 310px, 430px 430px;
      background-position: 22px 55px, 130px 86px, 270px 160px;
      animation: starMove 38s linear infinite;
    }

    @keyframes starMove {
      to { background-position: 212px 245px, 440px 396px, 700px 590px; }
    }

    .neon-frame {
      position: absolute;
      inset: 42px 56px;
      z-index: 2;
      border-radius: 46px;
      border: 1px solid rgba(143,244,255,.18);
      box-shadow: inset 0 0 70px rgba(54,231,255,.045), 0 0 66px rgba(168,85,247,.20);
      overflow: hidden;
    }

    .neon-frame::before,
    .neon-frame::after {
      content: "";
      position: absolute;
      height: 4px;
      border-radius: 999px;
      filter: blur(.2px);
      opacity: .82;
    }

    .neon-frame::before {
      top: -2px;
      left: 24%;
      width: 520px;
      background: linear-gradient(90deg, transparent, rgba(54,231,255,.86), rgba(168,85,247,.78), transparent);
      animation: runnerA 8.2s ease-in-out infinite alternate;
    }

    .neon-frame::after {
      bottom: -2px;
      right: 20%;
      width: 620px;
      background: linear-gradient(90deg, transparent, rgba(255,79,216,.76), rgba(255,232,109,.78), transparent);
      animation: runnerB 9.4s ease-in-out infinite alternate;
    }

    @keyframes runnerA { to { left: 50%; } }
    @keyframes runnerB { to { right: 48%; } }

    .beam {
      position: absolute;
      z-index: 3;
      top: -80px;
      width: 440px;
      height: 950px;
      opacity: .16;
      pointer-events: none;
      filter: blur(12px);
      transform-origin: top center;
      background: linear-gradient(180deg, rgba(54,231,255,.46), rgba(54,231,255,.06) 52%, transparent 82%);
      clip-path: polygon(45% 0, 56% 0, 100% 100%, 0 100%);
      animation: beamDrift 7s ease-in-out infinite alternate;
    }

    .beam.b1 { left: 250px; transform: rotate(16deg); }
    .beam.b2 { left: 740px; opacity: .20; background: linear-gradient(180deg, rgba(255,232,109,.38), rgba(255,232,109,.06), transparent 82%); }
    .beam.b3 { right: 270px; transform: rotate(-16deg); background: linear-gradient(180deg, rgba(168,85,247,.44), rgba(168,85,247,.06), transparent 82%); animation-delay: -2.4s; }

    @keyframes beamDrift {
      to { opacity: .25; transform: translateX(24px) rotate(var(--rot, 0deg)); }
    }

    .shell {
      position: absolute;
      z-index: 5;
      left: 76px;
      right: 76px;
      top: 72px;
      bottom: 70px;
      border-radius: 42px;
      background:
        radial-gradient(circle at 50% 9%, rgba(54,231,255,.12), transparent 31%),
        linear-gradient(145deg, rgba(5,8,28,.86), rgba(19,9,50,.84));
      border: 1px solid rgba(143,244,255,.20);
      box-shadow: inset 0 0 50px rgba(54,231,255,.045), 0 0 52px rgba(168,85,247,.17), 0 0 100px rgba(54,231,255,.07);
      overflow: hidden;
    }

    .shell::before {
      content: "";
      position: absolute;
      left: -32%;
      top: -25%;
      width: 24%;
      height: 155%;
      transform: skewX(-16deg);
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.05), rgba(54,231,255,.09), transparent);
      animation: scan 7.4s linear infinite;
      opacity: .75;
    }

    @keyframes scan { to { transform: translateX(680%) skewX(-16deg); } }

    .header {
      position: absolute;
      z-index: 7;
      left: 70px;
      right: 70px;
      top: 42px;
      text-align: center;
    }

    .phase {
      min-height: 26px;
      color: var(--gold);
      font-size: 20px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .20em;
      text-transform: uppercase;
      text-shadow: 0 0 18px rgba(255,232,109,.24);
    }

    .title {
      margin-top: 14px;
      font-size: 72px;
      line-height: .96;
      font-weight: 950;
      letter-spacing: .035em;
      text-transform: uppercase;
      text-shadow: 0 0 20px rgba(255,255,255,.22), 0 0 42px rgba(54,231,255,.42), 0 0 74px rgba(168,85,247,.36);
      white-space: nowrap;
    }

    .lead {
      margin-top: 12px;
      color: rgba(247,251,255,.73);
      font-size: 26px;
      line-height: 1.15;
      font-weight: 800;
      text-shadow: 0 0 16px rgba(54,231,255,.10);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .award-area {
      position: absolute;
      z-index: 6;
      left: 76px;
      right: 76px;
      top: 250px;
      height: 545px;
      border-radius: 34px;
      background: linear-gradient(135deg, rgba(2,6,24,.34), rgba(20,9,47,.26));
      border: 1px solid rgba(143,244,255,.12);
      box-shadow: inset 0 0 45px rgba(54,231,255,.035);
      overflow: hidden;
    }

    .award-area::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 36%, rgba(255,232,109,.12), transparent 25%),
        radial-gradient(circle at 20% 55%, rgba(54,231,255,.10), transparent 30%),
        radial-gradient(circle at 80% 55%, rgba(168,85,247,.13), transparent 30%);
      opacity: .9;
    }

    .focus-card {
      position: absolute;
      z-index: 9;
      left: 50%;
      top: 50%;
      width: 920px;
      min-height: 315px;
      transform: translate(-50%, -50%) scale(.94);
      opacity: 0;
      display: grid;
      grid-template-columns: 190px 1fr;
      gap: 30px;
      align-items: center;
      padding: 32px 38px;
      border-radius: 36px;
      background:
        radial-gradient(circle at 32% 14%, rgba(255,232,109,.14), transparent 34%),
        linear-gradient(135deg, rgba(11,14,42,.95), rgba(34,14,70,.88));
      border: 1px solid rgba(255,232,109,.27);
      box-shadow: 0 0 42px rgba(54,231,255,.15), 0 0 72px rgba(168,85,247,.26), inset 0 0 50px rgba(255,255,255,.035);
      transition: opacity .42s ease, transform .62s cubic-bezier(.16, 1, .3, 1), filter .35s ease;
    }

    .focus-card.visible {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1);
    }

    .focus-card.hide-soft {
      opacity: 0;
      transform: translate(-50%, -50%) scale(.985);
      filter: blur(7px);
    }

    .avatar-ring {
      width: 164px;
      height: 164px;
      border-radius: 50%;
      padding: 7px;
      background: conic-gradient(from 140deg, rgba(54,231,255,.98), rgba(168,85,247,.88), rgba(255,79,216,.78), rgba(255,232,109,.92), rgba(54,231,255,.98));
      box-shadow: 0 0 30px rgba(54,231,255,.25), 0 0 70px rgba(168,85,247,.18);
    }

    .avatar {
      width: 100%;
      height: 100%;
      border-radius: 50%;
      display: grid;
      place-items: center;
      overflow: hidden;
      background: radial-gradient(circle at 50% 32%, rgba(255,255,255,.18), transparent 38%), linear-gradient(135deg, rgba(54,231,255,.24), rgba(168,85,247,.32));
      border: 2px solid rgba(255,255,255,.16);
      color: #fff;
      font-size: 44px;
      font-weight: 950;
      text-shadow: 0 0 18px rgba(54,231,255,.42);
    }

    .avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .focus-kicker {
      color: var(--gold);
      font-size: 25px;
      line-height: 1;
      font-weight: 950;
      letter-spacing: .16em;
      text-transform: uppercase;
    }

    .focus-name {
      margin-top: 10px;
      max-width: 630px;
      color: #fff;
      font-size: 62px;
      line-height: .98;
      font-weight: 950;
      letter-spacing: -.025em;
      text-shadow: 0 0 28px rgba(54,231,255,.32), 0 0 54px rgba(168,85,247,.30);
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .focus-name.long { font-size: 49px; }
    .focus-name.xlong { font-size: 40px; line-height: 1.02; }

    .focus-meta {
      margin-top: 13px;
      color: rgba(247,251,255,.72);
      font-size: 24px;
      font-weight: 800;
    }

    .focus-reward {
      margin-top: 17px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      max-width: 620px;
      padding: 11px 20px;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(255,232,109,.15), rgba(54,231,255,.08));
      border: 1px solid rgba(255,232,109,.22);
      color: var(--gold);
      font-size: 27px;
      line-height: 1.12;
      font-weight: 950;
      text-align: center;
      text-shadow: 0 0 16px rgba(255,232,109,.20);
    }

    .top3-grid {
      position: absolute;
      z-index: 7;
      inset: 52px 54px 42px;
      display: grid;
      grid-template-columns: 1fr 1.18fr 1fr;
      gap: 36px;
      align-items: end;
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .55s ease, transform .65s cubic-bezier(.16, 1, .3, 1);
    }

    .top3-grid.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .award-card {
      position: relative;
      min-width: 0;
      min-height: 360px;
      padding: 30px 28px 26px;
      border-radius: 34px;
      background:
        radial-gradient(circle at 50% 0%, rgba(255,255,255,.08), transparent 40%),
        linear-gradient(145deg, rgba(10,13,37,.86), rgba(30,12,62,.78));
      border: 1px solid rgba(143,244,255,.14);
      box-shadow: inset 0 0 34px rgba(54,231,255,.035), 0 0 30px rgba(168,85,247,.12);
      overflow: hidden;
      opacity: 0;
      transform: translateY(28px) scale(.965);
      transition: opacity .55s ease, transform .75s cubic-bezier(.16, 1, .3, 1), border-color .45s ease, box-shadow .45s ease, filter .45s ease;
    }

    .award-card::after {
      content: "";
      position: absolute;
      inset: 0;
      background: linear-gradient(120deg, transparent 18%, rgba(255,255,255,.075) 38%, transparent 56%);
      transform: translateX(-130%);
      opacity: .65;
      pointer-events: none;
    }

    .award-card.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
    }

    .award-card.revealed::after { animation: cardShine 1.65s ease .25s both; }
    @keyframes cardShine { to { transform: translateX(130%); } }

    .award-card.rank1 {
      min-height: 438px;
      border-color: rgba(255,232,109,.34);
      box-shadow: inset 0 0 42px rgba(255,232,109,.05), 0 0 46px rgba(255,232,109,.15), 0 0 78px rgba(168,85,247,.15);
    }

    .award-card.rank2 { border-color: rgba(54,231,255,.22); }
    .award-card.rank3 { border-color: rgba(255,144,94,.24); }

    .award-card.dimmed { filter: saturate(.86) brightness(.88); opacity: .68; }
    .award-card.focused { transform: translateY(-10px) scale(1.025); filter: none; }

    .card-head {
      display: flex;
      align-items: center;
      gap: 18px;
      min-width: 0;
    }

    .award-card.rank1 .card-head {
      display: block;
      text-align: center;
    }

    .card-avatar {
      width: 104px;
      height: 104px;
      border-radius: 50%;
      padding: 5px;
      background: conic-gradient(from 140deg, rgba(54,231,255,.98), rgba(168,85,247,.88), rgba(255,79,216,.72), rgba(255,232,109,.92), rgba(54,231,255,.98));
      box-shadow: 0 0 26px rgba(54,231,255,.22), 0 0 50px rgba(168,85,247,.14);
      flex: 0 0 auto;
    }

    .rank1 .card-avatar {
      width: 134px;
      height: 134px;
      margin: 0 auto 18px;
      box-shadow: 0 0 34px rgba(255,232,109,.26), 0 0 74px rgba(168,85,247,.18);
    }

    .card-avatar .avatar { font-size: 30px; border-width: 1px; }
    .rank1 .card-avatar .avatar { font-size: 38px; }

    .rank-label {
      color: var(--gold);
      font-size: 25px;
      line-height: 1.05;
      font-weight: 950;
      letter-spacing: .14em;
      text-transform: uppercase;
    }

    .rank1 .rank-label { font-size: 30px; }

    .card-name {
      margin-top: 18px;
      color: #fff;
      font-size: 43px;
      line-height: 1.02;
      font-weight: 950;
      letter-spacing: -.025em;
      text-shadow: 0 0 24px rgba(54,231,255,.26), 0 0 46px rgba(168,85,247,.25);
      overflow-wrap: anywhere;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }

    .rank1 .card-name {
      margin-top: 8px;
      text-align: center;
      font-size: 58px;
      -webkit-line-clamp: 3;
    }

    .card-name.long { font-size: 34px; }
    .card-name.xlong { font-size: 29px; line-height: 1.05; }
    .rank1 .card-name.long { font-size: 45px; }
    .rank1 .card-name.xlong { font-size: 36px; line-height: 1.04; }

    .card-points {
      margin-top: 18px;
      color: rgba(247,251,255,.74);
      font-size: 22px;
      font-weight: 850;
    }

    .rank1 .card-points { text-align: center; font-size: 24px; }

    .card-reward {
      margin-top: 18px;
      min-height: 58px;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 10px 16px;
      border-radius: 18px;
      color: var(--gold);
      font-size: 24px;
      line-height: 1.12;
      font-weight: 950;
      text-align: center;
      background: rgba(255,232,109,.09);
      border: 1px solid rgba(255,232,109,.18);
      text-shadow: 0 0 14px rgba(255,232,109,.16);
    }

    .rank1 .card-reward { font-size: 28px; }

    .honor-rail {
      position: absolute;
      z-index: 8;
      left: 112px;
      right: 112px;
      bottom: 42px;
      min-height: 132px;
      border-radius: 28px;
      padding: 18px 18px 16px;
      background: rgba(3,8,28,.48);
      border: 1px solid rgba(143,244,255,.13);
      box-shadow: inset 0 0 26px rgba(54,231,255,.032);
      opacity: 0;
      transform: translateY(18px);
      transition: opacity .42s ease, transform .55s cubic-bezier(.16, 1, .3, 1);
    }

    .honor-rail.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .honor-title {
      color: rgba(247,251,255,.66);
      font-size: 17px;
      font-weight: 950;
      letter-spacing: .16em;
      text-transform: uppercase;
      margin-bottom: 12px;
    }

    .honor-list {
      display: grid;
      grid-template-columns: repeat(7, minmax(0, 1fr));
      gap: 10px;
    }

    .honor-chip {
      min-height: 70px;
      padding: 9px 10px 8px;
      border-radius: 17px;
      background: linear-gradient(135deg, rgba(255,209,147,.065), rgba(168,85,247,.075));
      border: 1px solid rgba(255,209,147,.22);
      opacity: 0;
      transform: translateY(12px) scale(.965);
      transition: opacity .36s ease, transform .48s cubic-bezier(.16, 1, .3, 1), box-shadow .35s ease;
      overflow: hidden;
    }

    .honor-chip.revealed {
      opacity: 1;
      transform: translateY(0) scale(1);
      box-shadow: 0 0 18px rgba(255,209,147,.09);
    }

    .chip-place {
      color: var(--cookie);
      font-size: 15px;
      font-weight: 950;
      letter-spacing: .04em;
    }

    .chip-name {
      margin-top: 2px;
      color: #fff;
      font-size: 17px;
      font-weight: 900;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .chip-reward {
      margin-top: 4px;
      color: var(--gold);
      font-size: 14px;
      font-weight: 900;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .footer {
      position: absolute;
      z-index: 8;
      left: 160px;
      right: 160px;
      bottom: 186px;
      color: rgba(247,251,255,.56);
      font-size: 19px;
      line-height: 1.15;
      font-weight: 800;
      text-align: center;
      opacity: 0;
      transition: opacity .42s ease;
      text-shadow: 0 0 14px rgba(0,0,0,.40);
    }

    .footer.visible { opacity: 1; }

    .confetti {
      position: absolute;
      inset: 0;
      z-index: 4;
      pointer-events: none;
      overflow: hidden;
    }

    .confetti i {
      position: absolute;
      top: -50px;
      width: 10px;
      height: 18px;
      border-radius: 3px;
      opacity: .74;
      background: var(--gold);
      box-shadow: 0 0 14px rgba(255,232,109,.22);
      animation: fall linear forwards;
    }

    .confetti i:nth-child(3n) { background: var(--cyan); box-shadow: 0 0 14px rgba(54,231,255,.22); }
    .confetti i:nth-child(3n+1) { background: var(--pink); box-shadow: 0 0 14px rgba(255,79,216,.20); }

    @keyframes fall {
      to { transform: translateY(1180px) rotate(720deg); opacity: 0; }
    }

    #debug {
      position: fixed;
      z-index: 99;
      left: 14px;
      bottom: 14px;
      max-width: 780px;
      max-height: 270px;
      overflow: auto;
      display: none;
      padding: 10px;
      background: rgba(0,0,0,.72);
      border: 1px solid rgba(255,255,255,.2);
      color: #fff;
      font-size: 12px;
      white-space: pre-wrap;
      pointer-events: auto;
    }

    body.debug #debug { display: block; }

    .title.pulse,
    .lead.pulse { animation: titleIn .72s cubic-bezier(.16, 1, .3, 1) both; }
    @keyframes titleIn {
      from { transform: translateY(18px); opacity: .1; filter: blur(8px); }
      to { transform: translateY(0); opacity: 1; filter: blur(0); }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { animation-duration: .001ms !important; animation-iteration-count: 1 !important; transition-duration: .001ms !important; }
    }
  </style>
</head>
<body>
  <div id="stage" class="hidden-hard" aria-live="polite">
    <div class="space-bg"></div>
    <div class="grain"></div>
    <div class="neon-frame"></div>
    <div class="beam b1"></div>
    <div class="beam b2"></div>
    <div class="beam b3"></div>

    <main class="shell">
      <section class="header">
        <div id="phaseText" class="phase">CGN Event-Finale</div>
        <div id="mainTitle" class="title">Preisverleihung</div>
        <div id="leadText" class="lead">Die Heimleitung sortiert die letzten Kekskrümel.</div>
      </section>

      <section class="award-area">
        <div id="confetti" class="confetti"></div>

        <article id="focusCard" class="focus-card">
          <div class="avatar-ring"><div id="focusAvatar" class="avatar"></div></div>
          <div>
            <div id="focusKicker" class="focus-kicker">Top 10 · Platz 10</div>
            <div id="focusName" class="focus-name">ForrestCGN</div>
            <div id="focusMeta" class="focus-meta">0 Punkte</div>
            <div id="focusReward" class="focus-reward">+4.000 Kekskrümel extra</div>
          </div>
        </article>

        <section id="top3Grid" class="top3-grid">
          <article id="card3" class="award-card rank3"></article>
          <article id="card1" class="award-card rank1"></article>
          <article id="card2" class="award-card rank2"></article>
        </section>
      </section>

      <section id="honorRail" class="honor-rail">
        <div class="honor-title">Top-10 Ehrenrunde · Plätze 10 bis 4</div>
        <div id="honorList" class="honor-list"></div>
      </section>

      <div id="footer" class="footer">Alle Top-10-Plätze bleiben sichtbar. Keine Karte verdeckt die Bühne.</div>
    </main>
  </div>

  <pre id="debug"></pre>

  <script>
    window.CGN_OVERLAY_BUS = {
      clientId: "stream_events_winner_overlay",
      clientType: "overlay",
      mode: "obs_overlay",
      module: "stream_events",
      name: "Stream Events Gewinner-Finale Overlay",
      version: "0.2.6",
      heartbeatIntervalMs: 5000,
      capabilities: [
        "overlay.heartbeat",
        "stream_events.winner_finale_display",
        "stream_events.winner_finale",
        "ack"
      ],
      meta: {
        overlay: "event_winner_overlay.html",
        communication: "communication_bus",
        owner: "stream_events",
        step: "EVS47.1"
      }
    };
  </script>

  <script>
    (function () {
      "use strict";

      const qs = new URLSearchParams(window.location.search);
      const DEBUG = /[?&]debug=1\b/.test(window.location.search);
      const demo = String(qs.get("demo") || "").trim().toLowerCase();
      const speed = String(qs.get("speed") || "normal").trim().toLowerCase();
      const eventUid = String(qs.get("eventUid") || qs.get("event_uid") || "").trim();
      const finaleRoute = eventUid ? `/api/stream-events/events/${encodeURIComponent(eventUid)}/finale` : "";
      const fastMode = speed === "fast" || speed === "test" || qs.get("fast") === "1";
      const timeline = fastMode
        ? { intro: 1300, honor: 2700, honorGap: 420, top: 4300, final: 13500, emptyHonor: 900 }
        : { intro: 5200, honor: 12500, honorGap: 1250, top: 24000, final: 80000, emptyHonor: 2600 };
      const autoHideMs = Math.max(10000, Math.min(420000, Number(qs.get("hideMs") || (fastMode ? 90000 : 330000))));

      const els = {
        stage: document.getElementById("stage"),
        phaseText: document.getElementById("phaseText"),
        mainTitle: document.getElementById("mainTitle"),
        leadText: document.getElementById("leadText"),
        focusCard: document.getElementById("focusCard"),
        focusAvatar: document.getElementById("focusAvatar"),
        focusKicker: document.getElementById("focusKicker"),
        focusName: document.getElementById("focusName"),
        focusMeta: document.getElementById("focusMeta"),
        focusReward: document.getElementById("focusReward"),
        top3Grid: document.getElementById("top3Grid"),
        card1: document.getElementById("card1"),
        card2: document.getElementById("card2"),
        card3: document.getElementById("card3"),
        honorRail: document.getElementById("honorRail"),
        honorList: document.getElementById("honorList"),
        footer: document.getElementById("footer"),
        confetti: document.getElementById("confetti"),
        debug: document.getElementById("debug")
      };

      let timers = [];
      let hideTimer = null;
      let currentFinaleUid = "";

      if (DEBUG) document.body.classList.add("debug");

      function log(value) {
        if (!DEBUG) return;
        try {
          els.debug.textContent = typeof value === "string" ? value : JSON.stringify(value, null, 2);
        } catch (err) {
          els.debug.textContent = String(value);
        }
      }

      function defer(fn, ms) {
        const timer = window.setTimeout(fn, ms);
        timers.push(timer);
        return timer;
      }

      function clearTimers() {
        timers.forEach((timer) => window.clearTimeout(timer));
        timers = [];
        if (hideTimer) window.clearTimeout(hideTimer);
        hideTimer = null;
      }

      function showStage() {
        els.stage.classList.remove("hidden-hard");
        window.requestAnimationFrame(() => els.stage.classList.add("visible"));
      }

      function hideStage() {
        els.focusCard.classList.remove("visible");
        els.stage.classList.remove("visible");
        hideTimer = window.setTimeout(() => {
          els.stage.classList.add("hidden-hard");
          clearConfetti();
        }, 700);
      }

      function cleanText(value, fallback) {
        const text = String(value == null ? "" : value).trim();
        return text || fallback || "";
      }

      function cleanNumber(value, fallback) {
        const n = Number(value);
        return Number.isFinite(n) ? n : Number(fallback || 0);
      }

      function formatInt(value) {
        return cleanNumber(value, 0).toLocaleString("de-DE");
      }

      function pointsLabel(points) {
        const n = cleanNumber(points, 0);
        return `${formatInt(n)} ${n === 1 ? "Punkt" : "Punkte"}`;
      }

      function crumbsLabel(value) {
        const n = cleanNumber(value, 0);
        return `+${formatInt(n)} Kekskrümel extra`;
      }

      function firstExisting(row, keys, fallback) {
        for (const key of keys) {
          if (row && row[key] != null && String(row[key]).trim() !== "") return row[key];
        }
        return fallback;
      }

      function avatarUrl(row) {
        return cleanText(firstExisting(row, [
          "avatarUrl", "avatar_url", "profileImageUrl", "profile_image_url", "profileImage", "profile_image", "userAvatar", "user_avatar", "avatar"
        ], ""), "");
      }

      function normalizeRow(row, index) {
        const src = row && typeof row === "object" ? row : {};
        const rank = cleanNumber(firstExisting(src, ["rank", "place", "position"], index + 1), index + 1);
        const login = cleanText(firstExisting(src, ["userLogin", "user_login", "login", "username", "userName", "user_name"], ""), "");
        const display = cleanText(firstExisting(src, ["userDisplayName", "user_display_name", "displayName", "display_name", "name"], login), login || `Platz ${rank}`);
        return {
          rank,
          userLogin: login,
          userDisplayName: display,
          points: cleanNumber(firstExisting(src, ["points", "total_points", "score", "totalScore", "total_score"], 0), 0),
          entries: cleanNumber(firstExisting(src, ["entries", "entry_count", "answerCount", "answer_count", "solved", "solvedCount"], 0), 0),
          avatarUrl: avatarUrl(src),
          rewardLabel: cleanText(firstExisting(src, ["rewardLabel", "reward_label", "prizeLabel", "prize_label", "prize"], ""), ""),
          rewardValue: cleanText(firstExisting(src, ["rewardValue", "reward_value", "prizeValue", "prize_value"], ""), ""),
          crumbBonus: cleanNumber(firstExisting(src, ["crumbBonus", "crumb_bonus", "kekskruemel", "cookieCrumbs", "cookie_crumbs"], 0), 0)
        };
      }

      function rowKey(row) {
        return String(row.userLogin || row.userDisplayName || "").trim().toLowerCase();
      }

      function uniqueRows(rows) {
        const seen = new Set();
        return rows.filter((row) => {
          const key = rowKey(row) || `rank_${row.rank}`;
          if (seen.has(key)) return false;
          seen.add(key);
          return true;
        });
      }

      function normalizeFinale(input) {
        const root = input && typeof input === "object" ? input : {};
        const finale = root.finale && typeof root.finale === "object" ? root.finale : root;
        const preview = root.preview && typeof root.preview === "object" ? root.preview : {};
        const event = root.event || preview.event || finale.event || {};
        const rawWinner = finale.winner || preview.winner || {};

        const rankingSources = [
          finale.ranking, finale.top10, finale.topTen, finale.leaderboard, finale.results, finale.rows,
          preview.ranking, preview.top10, preview.topTen, preview.leaderboard, preview.topCandidates, preview.results
        ];
        let ranking = [];
        for (const source of rankingSources) {
          if (Array.isArray(source) && source.length) {
            ranking = source.map(normalizeRow);
            break;
          }
        }

        const top3Source = Array.isArray(finale.top3) ? finale.top3 : (Array.isArray(preview.top3) ? preview.top3 : []);
        const top3 = top3Source.map(normalizeRow);
        const candidates = (Array.isArray(finale.candidates) ? finale.candidates : (Array.isArray(preview.topCandidates) ? preview.topCandidates : [])).map(normalizeRow);
        const winner = normalizeRow(rawWinner && Object.keys(rawWinner).length ? rawWinner : (top3[0] || ranking[0] || candidates[0] || {}), 0);
        if (!ranking.length) ranking = uniqueRows([winner, ...top3, ...candidates]).filter((row) => row.userDisplayName);

        ranking = uniqueRows(ranking).sort((a, b) => {
          if (a.rank !== b.rank) return a.rank - b.rank;
          return b.points - a.points;
        });

        let podiumRows = ranking.filter((row) => row.rank >= 1 && row.rank <= 3).slice(0, 3);
        if (podiumRows.length < 3 && top3.length) podiumRows = uniqueRows([...podiumRows, ...top3]).slice(0, 3);
        if (podiumRows.length < 3) podiumRows = uniqueRows([winner, ...podiumRows, ...ranking]).slice(0, 3);
        podiumRows = podiumRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 1) || index + 1 })).sort((a, b) => a.rank - b.rank).slice(0, 3);

        const podiumKeys = new Set(podiumRows.map(rowKey));
        let honorRows = ranking.filter((row) => row.rank >= 4 && row.rank <= 10 && !podiumKeys.has(rowKey(row)));
        if (!honorRows.length && ranking.length > 3) honorRows = ranking.slice(3, 10);
        honorRows = honorRows.map((row, index) => ({ ...row, rank: cleanNumber(row.rank, index + 4) || index + 4 })).sort((a, b) => b.rank - a.rank).slice(0, 7);

        const crumbDefaults = { 10: 4000, 9: 5000, 8: 6000, 7: 7000, 6: 8000, 5: 9000, 4: 10000 };
        honorRows = honorRows.map((row) => ({ ...row, crumbBonus: row.crumbBonus || crumbDefaults[row.rank] || 0, rewardLabel: row.rewardLabel || "Kekskrümel extra" }));

        const defaultPrizeByRank = { 1: "Amazon-Gutschein", 2: "Amazon-Gutschein", 3: "Amazon-Gutschein" };
        podiumRows = podiumRows.map((row) => ({ ...row, rewardLabel: row.rewardLabel || defaultPrizeByRank[row.rank] || "Amazon-Gutschein" }));

        return {
          finaleUid: cleanText(finale.finaleUid || finale.uid || preview.finaleUid, `demo_${Date.now()}`),
          eventUid: cleanText(finale.eventUid || event.eventUid || event.uid || preview.eventUid, ""),
          eventName: cleanText(finale.eventName || event.name || preview.eventName, "Event-Finale"),
          message: cleanText(finale.message || preview.message, "Die Heimleitung zählt die letzten Kekskrümel."),
          winner: podiumRows.find((row) => row.rank === 1) || winner,
          honorRows,
          podiumRows,
          rankingCount: cleanNumber(finale.rankingCount || preview.rankingCount || ranking.length, ranking.length),
          rawRankingCount: ranking.length
        };
      }

      function initials(name) {
        const text = cleanText(name, "CGN").replace(/[^\p{L}\p{N}\s_-]/gu, "").trim();
        const parts = text.split(/[\s_-]+/).filter(Boolean);
        if (parts.length >= 2) return `${parts[0][0]}${parts[1][0]}`.toUpperCase();
        return text.slice(0, 2).toUpperCase() || "CG";
      }

      function renderAvatar(container, row) {
        container.innerHTML = "";
        const url = cleanText(row && row.avatarUrl, "");
        if (url) {
          const img = document.createElement("img");
          img.alt = "";
          img.decoding = "async";
          img.referrerPolicy = "no-referrer";
          img.src = url;
          img.onerror = () => { container.textContent = initials(row && row.userDisplayName); };
          container.appendChild(img);
          return;
        }
        container.textContent = initials(row && row.userDisplayName);
      }

      function textSizeClass(text) {
        const len = cleanText(text, "").length;
        if (len > 30) return "xlong";
        if (len > 20) return "long";
        return "";
      }

      function pulseHeader() {
        els.mainTitle.classList.remove("pulse");
        els.leadText.classList.remove("pulse");
        void els.mainTitle.offsetWidth;
        els.mainTitle.classList.add("pulse");
        els.leadText.classList.add("pulse");
      }

      function setHeader(phase, title, lead) {
        els.phaseText.textContent = phase || "";
        els.mainTitle.textContent = title || "";
        els.leadText.textContent = lead || "";
        pulseHeader();
      }

      function setFooter(text, visible) {
        els.footer.textContent = text || "";
        els.footer.classList.toggle("visible", !!visible);
      }

      function clearConfetti() { els.confetti.innerHTML = ""; }

      function makeConfetti(amount) {
        clearConfetti();
        const count = Math.max(20, Math.min(110, amount || 60));
        for (let i = 0; i < count; i += 1) {
          const piece = document.createElement("i");
          piece.style.left = `${Math.random() * 100}%`;
          piece.style.animationDuration = `${4.3 + Math.random() * 4.9}s`;
          piece.style.animationDelay = `${Math.random() * 1.4}s`;
          piece.style.transform = `translateY(-70px) rotate(${Math.random() * 360}deg)`;
          piece.style.width = `${7 + Math.random() * 7}px`;
          piece.style.height = `${12 + Math.random() * 15}px`;
          els.confetti.appendChild(piece);
        }
      }

      function rewardText(row) {
        if (!row) return "Amazon-Gutschein";
        return row.rewardValue ? `${row.rewardLabel} · ${row.rewardValue}` : row.rewardLabel;
      }

      function showFocus(row, opts) {
        const options = opts || {};
        els.focusKicker.textContent = options.kicker || `Platz ${row.rank}`;
        els.focusName.textContent = row.userDisplayName;
        els.focusName.className = `focus-name ${textSizeClass(row.userDisplayName)}`.trim();
        els.focusMeta.textContent = options.meta || pointsLabel(row.points);
        els.focusReward.textContent = options.reward || rewardText(row);
        renderAvatar(els.focusAvatar, row);
        els.focusCard.classList.remove("visible", "hide-soft");
        void els.focusCard.offsetWidth;
        els.focusCard.classList.add("visible");
      }

      function hideFocus() {
        els.focusCard.classList.add("hide-soft");
        els.focusCard.classList.remove("visible");
      }

      function escapeHtml(value) {
        return String(value == null ? "" : value)
          .replace(/&/g, "&amp;")
          .replace(/</g, "&lt;")
          .replace(/>/g, "&gt;")
          .replace(/"/g, "&quot;");
      }

      function renderAwardCard(slot, row) {
        if (!row) {
          slot.innerHTML = "";
          slot.classList.remove("revealed", "focused", "dimmed");
          return;
        }
        const nameClass = textSizeClass(row.userDisplayName);
        slot.innerHTML = `
          <div class="card-head">
            <div class="card-avatar"><div class="avatar"></div></div>
            <div style="min-width:0;">
              <div class="rank-label">Platz ${escapeHtml(row.rank)}</div>
            </div>
          </div>
          <div class="card-name ${escapeHtml(nameClass)}"></div>
          <div class="card-points">${escapeHtml(pointsLabel(row.points))}</div>
          <div class="card-reward">${escapeHtml(rewardText(row))}</div>
        `;
        slot.querySelector(".card-name").textContent = row.userDisplayName;
        renderAvatar(slot.querySelector(".avatar"), row);
      }

      function revealAwardCard(slot) {
        slot.classList.add("revealed", "focused");
        [els.card1, els.card2, els.card3].forEach((item) => {
          if (item !== slot && item.classList.contains("revealed")) item.classList.add("dimmed");
        });
        defer(() => {
          slot.classList.remove("focused");
          [els.card1, els.card2, els.card3].forEach((item) => item.classList.remove("dimmed"));
        }, fastMode ? 1200 : 2800);
      }

      function buildHonorChip(row) {
        const chip = document.createElement("div");
        chip.className = "honor-chip";
        chip.innerHTML = `
          <div class="chip-place">Platz ${escapeHtml(row.rank)}</div>
          <div class="chip-name"></div>
          <div class="chip-reward">🍪 ${escapeHtml(crumbsLabel(row.crumbBonus))}</div>
        `;
        chip.querySelector(".chip-name").textContent = row.userDisplayName;
        return chip;
      }

      function revealHonor(row) {
        els.honorRail.classList.add("visible");
        const chip = buildHonorChip(row);
        els.honorList.appendChild(chip);
        window.requestAnimationFrame(() => chip.classList.add("revealed"));
      }

      function resetView(finale) {
        setHeader("CGN Event-Finale", "Preisverleihung", finale.message || "Die Heimleitung sortiert die letzten Kekskrümel.");
        els.focusCard.classList.remove("visible", "hide-soft");
        els.top3Grid.classList.remove("visible");
        [els.card1, els.card2, els.card3].forEach((slot) => {
          slot.innerHTML = "";
          slot.classList.remove("revealed", "focused", "dimmed");
        });
        els.honorRail.classList.remove("visible");
        els.honorList.innerHTML = "";
        setFooter("", false);
        clearConfetti();
      }

      function playFinale(rawFinale, options) {
        const finale = normalizeFinale(rawFinale);
        if (!finale.podiumRows.length && !finale.honorRows.length) return;
        if (!(options && options.force) && currentFinaleUid && currentFinaleUid === finale.finaleUid) return;
        currentFinaleUid = finale.finaleUid;
        clearTimers();
        resetView(finale);
        log({ speed, fastMode, timeline, finale });
        showStage();

        let at = 350;
        defer(() => {
          setHeader("Top-10 Ehrenrunde", "Plätze 10 bis 4", "Die extra Kekskrümel werden nacheinander vergeben.");
          setFooter("Die Ehrenleiste füllt sich erst nach jeder Vorstellung.", true);
        }, at);

        at += timeline.intro;
        const honorRows = finale.honorRows || [];
        if (honorRows.length) {
          honorRows.forEach((row) => {
            defer(() => {
              setHeader("Top-10 Ehrenrunde", `Platz ${row.rank}`, `${row.userDisplayName} bekommt ${crumbsLabel(row.crumbBonus)}.`);
              showFocus(row, {
                kicker: `Top 10 · Platz ${row.rank}`,
                meta: pointsLabel(row.points),
                reward: crumbsLabel(row.crumbBonus)
              });
              makeConfetti(fastMode ? 20 : 34);
            }, at);
            at += timeline.honor;
            defer(() => {
              hideFocus();
              revealHonor(row);
            }, at);
            at += timeline.honorGap;
          });
        } else {
          defer(() => {
            setHeader("Top-10 Ehrenrunde", "Keine Plätze 10 bis 4", "Die Preisverleihung startet direkt.");
          }, at);
          at += timeline.emptyHonor;
        }

        const podiumByRank = new Map((finale.podiumRows || []).map((row) => [row.rank, row]));
        const row1 = podiumByRank.get(1) || finale.podiumRows[0];
        const row2 = podiumByRank.get(2) || finale.podiumRows[1];
        const row3 = podiumByRank.get(3) || finale.podiumRows[2];

        defer(() => {
          hideFocus();
          setHeader("Preisverleihung", "Finale Top 3", "Platz 3 links, Platz 1 in der Mitte, Platz 2 rechts.");
          setFooter("Alle Finalplätze bleiben sichtbar. Keine Karte liegt über einer anderen.", true);
          renderAwardCard(els.card3, row3);
          renderAwardCard(els.card1, row1);
          renderAwardCard(els.card2, row2);
          els.top3Grid.classList.add("visible");
        }, at);
        at += timeline.intro;

        const revealOrder = [
          { rank: 3, row: row3, slot: els.card3, title: "Platz 3" },
          { rank: 2, row: row2, slot: els.card2, title: "Platz 2" },
          { rank: 1, row: row1, slot: els.card1, title: "Platz 1" }
        ];

        revealOrder.forEach((item) => {
          if (!item.row) return;
          defer(() => {
            setHeader("Preisverleihung", item.title, `${item.row.userDisplayName} sichert sich ${rewardText(item.row)}.`);
            revealAwardCard(item.slot);
            makeConfetti(item.rank === 1 ? (fastMode ? 56 : 96) : (fastMode ? 28 : 48));
          }, at);
          at += timeline.top;
        });

        defer(() => {
          const winner = row1 || finale.winner;
          setHeader("CGN Event-Gewinner", "Platz 1", winner ? `${winner.userDisplayName} gewinnt das Event-Finale.` : "Das Event-Finale ist entschieden.");
          setFooter("Glückwunsch an alle Top-10-Plätze. Die Heimleitung hat gesprochen.", true);
          [els.card1, els.card2, els.card3].forEach((slot) => slot.classList.remove("dimmed", "focused"));
          if (els.card1) els.card1.classList.add("focused");
          makeConfetti(fastMode ? 82 : 120);
        }, at);
        at += timeline.final;

        const totalRun = Math.max(at + 1000, Math.min(autoHideMs, at + 3000));
        defer(() => hideStage(), totalRun);
      }

      function demoFinale(kind) {
        const long = kind === "long";
        const rows = [
          { rank: 1, userDisplayName: long ? "ForrestCGN_mit_dem_sehr_langen_Gewinnernamen" : "ForrestCGN", points: 120, entries: 12, rewardLabel: "Amazon-Gutschein" },
          { rank: 2, userDisplayName: long ? "EngelCGN_Silbername_mit_Extra_Laenge" : "EngelCGN", points: 108, entries: 11, rewardLabel: "Amazon-Gutschein" },
          { rank: 3, userDisplayName: long ? "HeimleitungHD" : "HeimleitungHD", points: 96, entries: 9, rewardLabel: "Amazon-Gutschein" },
          { rank: 4, userDisplayName: "KaffeeKoenig", points: 88, entries: 8, crumbBonus: 10000 },
          { rank: 5, userDisplayName: "OpaRollator", points: 82, entries: 8, crumbBonus: 9000 },
          { rank: 6, userDisplayName: "RentnerRambo", points: 76, entries: 7, crumbBonus: 8000 },
          { rank: 7, userDisplayName: "KeksKommando", points: 70, entries: 7, crumbBonus: 7000 },
          { rank: 8, userDisplayName: "BingoBerta", points: 64, entries: 6, crumbBonus: 6000 },
          { rank: 9, userDisplayName: "PuddingPanzer", points: 58, entries: 5, crumbBonus: 5000 },
          { rank: 10, userDisplayName: "ZiviMitHerz", points: 52, entries: 5, crumbBonus: 4000 }
        ];
        return {
          finale: {
            finaleUid: `demo_${kind || "single"}_${Date.now()}`,
            eventUid: "demo_event",
            eventName: long ? "1 Jahr Twitch - Langer Namenstest im Wohnbereich" : "1 Jahr Twitch - Sound-Schnipsel Finale",
            mode: "ranked_finale",
            winner: rows[0],
            top3: rows.slice(0, 3),
            ranking: rows,
            rankingCount: rows.length,
            message: "Top-10 Finale mit Kekskrümeln und Gutscheinplätzen."
          }
        };
      }

      async function loadExistingFinale() {
        if (!finaleRoute) return;
        try {
          const res = await fetch(finaleRoute, { cache: "no-store" });
          if (!res.ok) throw new Error(`HTTP ${res.status}`);
          const data = await res.json();
          log(data);
          if (data && data.existingFinale) {
            playFinale({ finale: data.existingFinale, preview: data, event: data.event }, { force: true });
          }
        } catch (err) {
          log({ error: err.message || String(err), route: finaleRoute });
        }
      }

      function extractBusPayload(detail) {
        const msg = detail && typeof detail === "object" ? detail : {};
        const payload = msg.payload && typeof msg.payload === "object" ? msg.payload : msg;
        return { msg, payload };
      }

      function handleBusMessage(event) {
        if (demo) return;
        const { msg, payload } = extractBusPayload(event && event.detail);
        const channel = String(msg.channel || payload.channel || "").toLowerCase();
        const action = String(msg.action || payload.action || "").toLowerCase();
        const hasFinale = payload && (payload.finale || payload.preview || payload.eventUid || payload.event || payload.ranking || payload.top3 || payload.winner);
        const isFinale = channel === "stream_events.winner_finale" || channel.indexOf("winner_finale") >= 0 || action.indexOf("winner_finale") >= 0 || action === "started" || action === "replay_requested";
        if (!isFinale || !hasFinale) return;
        const finale = payload.finale ? payload : { finale: payload, preview: payload.preview, event: payload.event };
        playFinale(finale, { force: action === "replay_requested" });
      }

      if (demo) {
        window.setTimeout(() => playFinale(demoFinale(demo), { force: true }), 350);
      } else {
        loadExistingFinale();
      }

      window.addEventListener("cgn:overlay-bus-message", handleBusMessage);
      window.addEventListener("focus", loadExistingFinale);
      window.addEventListener("beforeunload", clearTimers);
    })();
  </script>

  <script
    src="/overlays/shared/overlay_bus_client.js"
    data-overlay-id="stream_events_winner_overlay"
    data-client-type="overlay"
    data-mode="obs_overlay"
    data-module="stream_events"
    data-name="Stream Events Gewinner-Finale Overlay"
    data-version="0.2.6"
    data-heartbeat-ms="5000"
  ></script>
</body>
