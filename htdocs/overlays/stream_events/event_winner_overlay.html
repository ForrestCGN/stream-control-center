<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=1920,height=1080,initial-scale=1" />
  <title>CGN Event Gewinner-Finale EVS42.6 Fresh Rebuild</title>
  <style>

    .frame:after{content:"";position:absolute;left:52px;right:52px;bottom:22px;height:3px;border-radius:6px;background:linear-gradient(90deg,rgba(168,85,247,.15),rgba(54,231,255,.45),rgba(168,85,247,.12));box-shadow:0 0 18px rgba(54,231,255,.28)}

    .runner.r1{top:53px;left:80px}.runner.r2{bottom:54px;right:90px;animation-name:runnerBottom;animation-delay:-2.8s}.runner.r3{top:140px;right:42px;width:4px;height:210px;animation:runnerSide 7.5s linear infinite;opacity:.42}
    @keyframes runnerTop{0%{transform:translateX(-280px)}100%{transform:translateX(1740px)}}
    @keyframes runnerBottom{0%{transform:translateX(280px)}100%{transform:translateX(-1740px)}}
    @keyframes runnerSide{0%{transform:translateY(-240px)}100%{transform:translateY(900px)}}
    .content{position:absolute;z-index:6;inset:58px 72px 64px;display:grid;grid-template-rows:112px 1fr 150px;gap:16px}
    .top{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:28px}.pill{justify-self:start;display:inline-flex;align-items:center;gap:12px;padding:12px 24px;border-radius:999px;background:linear-gradient(135deg,rgba(54,231,255,.14),rgba(168,85,247,.22));border:1px solid rgba(192,234,255,.22);box-shadow:0 0 24px rgba(168,85,247,.20);font-size:22px;font-weight:900;text-transform:uppercase;letter-spacing:.16em}.pill i{width:12px;height:12px;border-radius:50%;background:var(--gold);box-shadow:0 0 16px var(--gold)}

    .main{position:relative;min-height:0}.titleBlock{position:absolute;top:0;left:0;right:0;text-align:center;transition:opacity .45s ease,transform .55s ease}.titleBlock h1{margin:0;font-size:68px;line-height:.96;font-weight:950;text-transform:uppercase;letter-spacing:.04em;text-shadow:0 0 18px rgba(255,255,255,.22),0 0 34px rgba(54,231,255,.34),0 0 56px rgba(168,85,247,.34)}.titleBlock p{margin:12px auto 0;max-width:1040px;font-size:25px;line-height:1.25;font-weight:800;color:rgba(247,251,255,.74)}
    .stage{position:absolute;left:50%;top:54%;width:1180px;height:560px;transform:translate(-50%,-50%);border-radius:42px;background:linear-gradient(135deg,rgba(9,12,38,.75),rgba(17,10,48,.72));border:1px solid rgba(160,224,255,.18);box-shadow:inset 0 0 60px rgba(54,231,255,.045),0 0 50px rgba(168,85,247,.14);overflow:hidden}.stage:before{content:"";position:absolute;inset:-30%;background:radial-gradient(circle at 50% 50%,rgba(54,231,255,.10),transparent 26%),radial-gradient(circle at 35% 48%,rgba(168,85,247,.13),transparent 28%),radial-gradient(circle at 68% 50%,rgba(255,229,107,.08),transparent 24%);animation:pulse 3.4s ease-in-out infinite}.stage:after{content:"";position:absolute;left:-38%;top:-15%;width:34%;height:135%;transform:skewX(-18deg);background:linear-gradient(90deg,transparent,rgba(54,231,255,.12),rgba(255,255,255,.08),rgba(255,79,216,.08),transparent);animation:scan 6s linear infinite}@keyframes scan{to{left:124%}}@keyframes pulse{50%{filter:brightness(1.25);opacity:.92}}

    .placeBox{height:310px;border-radius:36px;display:grid;place-items:center;background:linear-gradient(135deg,rgba(124,58,237,.60),rgba(20,10,52,.75));border:1px solid rgba(221,196,255,.20);box-shadow:inset 0 0 50px rgba(255,255,255,.04),0 0 42px rgba(168,85,247,.34);position:relative;overflow:hidden}.placeBox:before{content:"";position:absolute;inset:-20px;background:radial-gradient(circle at 50% 25%,rgba(255,255,255,.18),transparent 34%)}.placeBox .small{position:relative;z-index:2;font-size:28px;letter-spacing:.20em;text-transform:uppercase;font-weight:900;color:rgba(255,255,255,.68)}.placeBox .num{position:relative;z-index:2;font-size:128px;line-height:.9;font-weight:950;text-shadow:0 0 34px rgba(255,255,255,.30)}
    .avatar{width:220px;height:220px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,rgba(54,231,255,.22),rgba(168,85,247,.30));border:4px solid rgba(151,224,255,.42);box-shadow:0 0 34px rgba(54,231,255,.26),0 0 54px rgba(168,85,247,.20);font-size:86px;font-weight:950;text-shadow:0 0 24px rgba(255,255,255,.24)}.avatar img{width:100%;height:100%;object-fit:cover;display:block}.info{min-width:0}.rankline{font-size:30px;text-transform:uppercase;font-weight:950;letter-spacing:.16em;color:var(--gold);text-shadow:0 0 16px rgba(255,229,107,.24)}.name{margin-top:16px;font-size:62px;line-height:1;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;text-shadow:0 0 28px rgba(54,231,255,.22)}.points{margin-top:16px;font-size:46px;font-weight:950}.badgePrize{margin-top:22px;display:inline-flex;align-items:center;gap:12px;max-width:100%;padding:12px 22px;border-radius:999px;background:linear-gradient(135deg,rgba(255,229,107,.16),rgba(54,231,255,.12));border:1px solid rgba(255,229,107,.28);box-shadow:0 0 20px rgba(255,229,107,.12);font-size:24px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.note{margin-top:24px;max-width:700px;font-size:24px;line-height:1.32;font-weight:800;color:rgba(247,251,255,.72)}
    .honorWall{position:absolute;left:10px;right:10px;bottom:0;height:150px;display:grid;grid-template-columns:repeat(7,1fr);gap:10px;align-items:end}.mini{height:112px;border-radius:18px;background:linear-gradient(135deg,rgba(12,12,42,.82),rgba(28,13,66,.72));border:1px solid rgba(168,85,247,.24);box-shadow:0 0 18px rgba(168,85,247,.14);padding:10px;display:grid;grid-template-columns:44px 42px 1fr;gap:9px;align-items:center;opacity:0;transform:translateY(36px) scale(.82);transition:opacity .65s ease,transform .75s cubic-bezier(.2,1,.22,1)}.mini.on{opacity:1;transform:translateY(0) scale(1)}.mini .mRank{font-size:25px;font-weight:950;color:var(--gold)}.mini .mAvatar{width:40px;height:40px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:rgba(54,231,255,.16);border:1px solid rgba(116,231,255,.35);font-weight:900}.mini img{width:100%;height:100%;object-fit:cover}.mini .mName{font-size:17px;font-weight:900;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.mini .mPts{font-size:14px;color:rgba(247,251,255,.66);font-weight:800}.mini .mPrize{font-size:12px;color:var(--gold);font-weight:850;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .podium{position:absolute;inset:178px 10px 10px;display:grid;grid-template-columns:1fr 1.22fr 1fr;gap:24px;align-items:end;opacity:0;transition:opacity .45s ease}.podium.on{opacity:1}.podCard{position:relative;min-height:378px;border-radius:34px;background:linear-gradient(135deg,rgba(11,14,45,.86),rgba(20,10,52,.80));border:1px solid rgba(178,229,255,.20);box-shadow:0 0 40px rgba(54,231,255,.13);padding:26px 24px;text-align:center;opacity:0;transform:translateY(55px) scale(.88);transition:opacity .75s ease,transform .9s cubic-bezier(.16,1,.22,1),filter .7s ease;overflow:hidden}.podCard.on{opacity:1;transform:translateY(0) scale(1)}.podCard.winner{min-height:450px;border-color:rgba(255,229,107,.50);box-shadow:0 0 60px rgba(255,184,61,.35),0 0 80px rgba(168,85,247,.18)}.podCard.third{border-color:rgba(215,154,95,.36)}.podCard.second{border-color:rgba(219,238,255,.42)}.podCard:before{content:"";position:absolute;inset:-40%;background:radial-gradient(circle at 50% 20%,rgba(255,255,255,.15),transparent 25%);animation:podLight 3s ease-in-out infinite}@keyframes podLight{50%{transform:scale(1.08);opacity:.72}}.podRank{position:relative;font-size:24px;font-weight:950;letter-spacing:.15em;text-transform:uppercase;color:var(--gold)}.podNum{position:relative;font-size:82px;line-height:.95;font-weight:950;margin:2px 0 8px}.podAvatar{position:relative;margin:8px auto 12px;width:140px;height:140px;border-radius:50%;display:grid;place-items:center;overflow:hidden;background:linear-gradient(135deg,rgba(54,231,255,.18),rgba(168,85,247,.24));border:4px solid rgba(155,226,255,.42);box-shadow:0 0 32px rgba(54,231,255,.22);font-size:58px;font-weight:950}.winner .podAvatar{width:178px;height:178px;border-color:rgba(255,229,107,.70);box-shadow:0 0 40px rgba(255,229,107,.38),0 0 70px rgba(255,184,61,.20)}.podAvatar img{width:100%;height:100%;object-fit:cover}.podName{position:relative;font-size:34px;line-height:1.05;font-weight:950;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.winner .podName{font-size:44px}.podPts{position:relative;margin-top:8px;font-size:30px;font-weight:950}.winner .podPts{font-size:42px;color:var(--gold)}.podGift{position:relative;margin-top:14px;display:inline-flex;align-items:center;justify-content:center;padding:10px 18px;border-radius:999px;background:rgba(255,229,107,.11);border:1px solid rgba(255,229,107,.28);font-size:18px;font-weight:900;color:#fff}.finalTitle{position:absolute;top:110px;left:0;right:0;text-align:center;opacity:0;transform:translateY(-18px);transition:opacity .65s ease,transform .7s ease}.finalTitle.on{opacity:1;transform:translateY(0)}.finalTitle h2{margin:0;font-size:62px;font-weight:950;letter-spacing:.06em;text-transform:uppercase;color:var(--gold);text-shadow:0 0 25px rgba(255,229,107,.30),0 0 55px rgba(255,184,61,.18)}.finalTitle p{margin:8px 0 0;font-size:24px;font-weight:850;color:rgba(247,251,255,.76)}
    .confetti{position:absolute;inset:0;pointer-events:none;z-index:20;overflow:hidden}.confetti i{position:absolute;width:9px;height:18px;border-radius:3px;background:var(--gold);opacity:0;animation:confetti 2.8s ease-in forwards}.confetti i:nth-child(3n){background:var(--cyan)}.confetti i:nth-child(3n+1){background:var(--violet)}@keyframes confetti{0%{opacity:1;transform:translateY(-20px) rotate(0)}100%{opacity:0;transform:translateY(900px) rotate(540deg)}}
    .debugBox{position:absolute;z-index:50;left:18px;bottom:18px;max-width:980px;padding:9px 12px;border-radius:10px;background:rgba(0,0,0,.62);border:1px solid rgba(255,255,255,.14);font:13px Consolas,monospace;color:#c8ffdf;white-space:pre-wrap;display:none}body.debug .debugBox{display:block}.hidden{display:none!important}.dim .titleBlock{opacity:.18;transform:translateY(-20px) scale(.96)}
  </style>
</head>
<body>
<div id="app">
  <div class="bg"></div><div class="stars"></div><div class="frame"></div><div class="runner r1"></div><div class="runner r2"></div><div class="runner r3"></div>
  <div class="content">
    <div class="top"><div class="pill" id="phasePill"><i></i><span>CGN Finale</span></div><div class="logo">CGN</div><div class="event" id="eventName">Event Gewinner-Finale</div></div>
    <div class="main" id="main">
      <div class="titleBlock" id="titleBlock"><h1 id="headline">DAS GROSSE CGN-FINALE</h1><p id="subline">Die Heimleitung zählt aus. Alle Plätze bekommen ihren Moment.</p></div>
      <div class="stage" id="stage"><div class="current" id="current"></div><div class="podium" id="podium"><div class="podCard third" id="pod3"></div><div class="podCard winner" id="pod1"></div><div class="podCard second" id="pod2"></div></div><div class="finalTitle" id="finalTitle"><h2>GEWINNER DES EVENTS</h2><p>Die Heimleitung gratuliert. Der Gold-Gutschein ist offiziell vergeben.</p></div></div>
    </div>
    <div class="honorWall" id="honorWall"></div>
  </div>
  <div class="confetti" id="confetti"></div><div class="debugBox" id="debugBox"></div>
</div>
<script src="/overlays/shared/overlay_bus_client.js" data-overlay-id="stream_events_winner_overlay" data-client-type="overlay" data-mode="obs_overlay" data-module="stream_events" data-name="Stream Events Gewinner-Finale Overlay" data-version="0.6.0" data-heartbeat-ms="5000"></script>
<script>
(function(){
  'use strict';
  const VERSION='EVS42.6 Fresh Rebuild';
  const qs=new URLSearchParams(location.search);
  const demo=qs.get('demo');
  const debug=qs.get('debug')==='1'||qs.get('debug')==='true';
  const speed=(qs.get('speed')||'show').toLowerCase();
  if(demo) document.body.classList.add('demo');
  if(debug) document.body.classList.add('debug');
  if(!demo) document.body.classList.add('live-wait');
  const $=id=>document.getElementById(id);
  const els={app:$('app'),main:$('main'),stage:$('stage'),current:$('current'),wall:$('honorWall'),podium:$('podium'),pod1:$('pod1'),pod2:$('pod2'),pod3:$('pod3'),finalTitle:$('finalTitle'),headline:$('headline'),subline:$('subline'),eventName:$('eventName'),phasePill:$('phasePill'),debug:$('debugBox'),confetti:$('confetti')};
  const times={fast:{intro:900,hold:1600,move:650,between:350,topHold:2400,final:6500},normal:{intro:4200,hold:6500,move:1000,between:900,topHold:9000,final:18000},slow:{intro:9000,hold:12500,move:1300,between:1300,topHold:16000,final:30000},show:{intro:15000,hold:19000,move:1500,between:1800,topHold:26000,final:60000}}[speed]||{intro:15000,hold:19000,move:1500,between:1800,topHold:26000,final:60000};
  let running=false; let timers=[];
  function log(msg){console.log('[winner_overlay '+VERSION+'] '+msg); if(debug&&els.debug){els.debug.textContent=VERSION+'\n'+msg+'\nURL: '+location.href+'\nspeed='+speed+' demo='+demo;}}
  function sleep(ms){return new Promise(r=>{const t=setTimeout(r,ms);timers.push(t);});}
  function clearTimers(){timers.forEach(clearTimeout);timers=[];}
  function safeText(v,f=''){return String(v??f??'').trim();}
  function initials(name){const n=safeText(name,'?'); return n.split(/\s+/).map(x=>x[0]).join('').slice(0,2).toUpperCase()||'?';}
  function imgOrInitial(url,name,cls){const u=safeText(url); if(u) return '<div class="'+cls+'"><img src="'+escapeHtml(u)+'" onerror="this.remove();this.parentNode.textContent=\''+initials(name)+'\';"></div>'; return '<div class="'+cls+'">'+initials(name)+'</div>';}
  function escapeHtml(s){return String(s??'').replace(/[&<>"']/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m]));}
  function fmt(n){const x=Number(n||0);return Number.isFinite(x)?x.toLocaleString('de-DE'):String(n||0);}
  function prize(p){if(p===1)return '🎟️ Gold-Gutschein der Heimleitung'; if(p===2)return '🎟️ Silber-Gutschein der Heimleitung'; if(p===3)return '🎟️ Bronze-Gutschein der Heimleitung'; if(p===4)return '🍪 Ehrenkeks kurz vorm Treppchen'; return '🍪 '+Math.max(1,11-p)+' Ehrenkrümel';}
  function note(p){if(p===1)return 'Der goldene Platz in der Mitte. Die Heimleitung steht kurz auf, setzt sich aber sofort wieder hin.'; if(p===2)return 'Silber mit Würde. Der Gutschein wurde glatt gestrichen und ordentlich übergeben.'; if(p===3)return 'Bronze, aber mit Applaus. Der erste Gutscheinplatz ist offiziell geehrt.'; if(p===4)return 'Fast auf dem Treppchen. Die Heimleitung hebt respektvoll die Kaffeetasse.'; return 'Top 10 erreicht. Keine Verabschiedung, sondern eine Ehrenrunde mit Krümelbonus.';}
  function normalize(input){
    const p=input&&typeof input==='object'?input:{};
    const raw=p.ranking||p.top||p.top10||p.players||p.entries||p.items||[];
    let arr=Array.isArray(raw)?raw.slice():[];
    arr=arr.map((x,i)=>({
      place:Number(x.place||x.rank||x.position||i+1),
      userDisplayName:safeText(x.userDisplayName||x.displayName||x.name||x.userLogin||('Platz'+(i+1))),
      userLogin:safeText(x.userLogin||x.login||x.userDisplayName||x.displayName||x.name||''),
      userAvatarUrl:safeText(x.userAvatarUrl||x.avatarUrl||x.avatar||x.profileImageUrl||''),
      points:Number(x.points||x.score||x.totalPoints||0)
    })).sort((a,b)=>a.place-b.place);
    if(!arr.length) arr=demoData(false).ranking;
    for(let i=1;i<=10;i++){if(!arr.some(x=>x.place===i)){arr.push({place:i,userDisplayName:'Platz '+i,userLogin:'platz'+i,userAvatarUrl:'',points:Math.max(5,110-i*7)});}}
    arr=arr.sort((a,b)=>a.place-b.place).slice(0,10);
    return {eventName:safeText(p.eventName||p.name||p.event?.name||'Event Gewinner-Finale'),ranking:arr};
  }
  function demoData(tie){
    const names=['ForrestCGN','EngelCGN','RoxxyFoxxy','AkiGhosty','NoctyraxCGN','Tadesso','Rollimann','KeksKalle','MiezMampf','PflegePunk'];
    const pts=tie?[120,120,96,82,74,68,60,52,45,38]:[146,124,96,82,74,68,60,52,45,38];
    return {eventName:'1 Jahr Twitch · Sound-Schnipsel Finale',ranking:names.map((n,i)=>({place:i+1,userDisplayName:n,userLogin:n.toLowerCase(),userAvatarUrl:'',points:pts[i]}))};
  }
  function renderCurrent(item,mode){
    const p=item.place; const isTop=p<=3;
    els.current.className='current';
    els.current.innerHTML='<div class="placeBox"><div><div class="small">Platz</div><div class="num">'+p+'</div></div></div>'+imgOrInitial(item.userAvatarUrl,item.userDisplayName,'avatar')+'<div class="info"><div class="rankline">'+(isTop?'Gutscheinplatz':'Top-10 Ehrenrunde')+' · Platz '+p+'</div><div class="name">'+escapeHtml(item.userDisplayName)+'</div><div class="points">'+fmt(item.points)+' Punkte</div><div class="badgePrize">'+escapeHtml(prize(p))+'</div><div class="note">'+escapeHtml(note(p))+'</div></div>';
    requestAnimationFrame(()=>els.current.classList.add('on'));
  }
  function addMini(item){
    const d=document.createElement('div');d.className='mini';d.innerHTML='<div class="mRank">#'+item.place+'</div>'+imgOrInitial(item.userAvatarUrl,item.userDisplayName,'mAvatar')+'<div><div class="mName">'+escapeHtml(item.userDisplayName)+'</div><div class="mPts">'+fmt(item.points)+' Punkte</div><div class="mPrize">'+escapeHtml(prize(item.place))+'</div></div>';els.wall.appendChild(d);requestAnimationFrame(()=>d.classList.add('on'));
  }
  function podHtml(item){return '<div class="podRank">Platz</div><div class="podNum">'+item.place+'</div>'+imgOrInitial(item.userAvatarUrl,item.userDisplayName,'podAvatar')+'<div class="podName">'+escapeHtml(item.userDisplayName)+'</div><div class="podPts">'+fmt(item.points)+' Punkte</div><div class="podGift">'+escapeHtml(prize(item.place))+'</div>';}
  function setPhase(label,head,sub){els.phasePill.querySelector('span').textContent=label;els.headline.textContent=head;els.subline.textContent=sub;}
  function confetti(count){els.confetti.innerHTML='';for(let i=0;i<count;i++){const c=document.createElement('i');c.style.left=(Math.random()*100)+'%';c.style.top=(-40-Math.random()*120)+'px';c.style.animationDelay=(Math.random()*1.2)+'s';c.style.transform='rotate('+(Math.random()*180)+'deg)';els.confetti.appendChild(c);} }
  async function play(payload){
    if(running)return; running=true; clearTimers(); document.body.classList.remove('live-wait'); els.wall.innerHTML=''; els.podium.classList.remove('on'); els.finalTitle.classList.remove('on'); [els.pod1,els.pod2,els.pod3].forEach(e=>{e.classList.remove('on');e.innerHTML='';});
    const data=normalize(payload); els.eventName.textContent=data.eventName; log('Show startet: '+data.eventName);
    setPhase('Top-10 Ehrenrunde','CGN-EHRENRUNDE','Plätze 10 bis 4 bekommen ihren eigenen Moment und wandern danach in die Ehrenwand.');
    await sleep(times.intro);
    const byPlace=Object.fromEntries(data.ranking.map(x=>[x.place,x]));
    for(let p=10;p>=4;p--){const item=byPlace[p]; if(!item) continue; setPhase('Platz '+p,'TOP-10 EHRENRUNDE','Platz '+p+' wird geehrt und zieht danach in die Ehrenwand.'); renderCurrent(item,'honor'); await sleep(times.hold); els.current.classList.add('leaving'); await sleep(times.move); addMini(item); els.current.className='current'; els.current.innerHTML=''; await sleep(times.between);}
    setPhase('Gutscheinplätze','DAS TREPPCHEN BEGINNT','Die Ehrenrunde steht. Jetzt baut sich das Podium auf: Platz 3 links, Platz 2 rechts, Platz 1 in der Mitte.'); await sleep(times.intro*.75);
    els.podium.classList.add('on');
    for(const p of [3,2,1]){const item=byPlace[p]; if(!item) continue; setPhase('Platz '+p,(p===1?'DER GOLD-GUTSCHEIN':'GUTSCHEINPLATZ '+p),p===1?'Jetzt kommt der Gewinner des Events.':'Der nächste Gutscheinplatz wird aufgebaut.'); renderCurrent(item,'top'); await sleep(times.topHold*.55); els.current.classList.add('leaving'); await sleep(times.move); const target=p===1?els.pod1:(p===2?els.pod2:els.pod3); target.innerHTML=podHtml(item); target.classList.add('on'); els.current.className='current'; els.current.innerHTML=''; if(p===1){confetti(90);els.finalTitle.classList.add('on');} await sleep(times.between+(p===1?times.topHold*.35:times.topHold*.15));}
    setPhase('Finalbild','GEWINNER DES EVENTS','Top 10 geehrt. Top 3 auf dem Podium. Die Heimleitung gratuliert.');
    log('Finalbild sichtbar. Demo/Debug bleibt stehen.');
    if(!demo&&!debug){await sleep(times.final); document.body.classList.add('live-wait');}
    running=false;
  }
  window.CGNWinnerOverlay={play,version:VERSION,demo:()=>play(demoData(false)),tie:()=>play(demoData(true))};
  window.addEventListener('cgn:overlay-bus-message',ev=>{const d=ev.detail||{};const t=String(d.type||d.topic||d.event||'');if(t.includes('stream_events.winner_finale')||t.includes('winner_finale')||t.includes('event.winner')){play(d.payload||d.data||d.state||d);}});
  window.addEventListener('error',e=>log('ERROR: '+(e.error&&e.error.stack?e.error.stack:e.message)));
  window.addEventListener('unhandledrejection',e=>log('PROMISE ERROR: '+(e.reason&&e.reason.stack?e.reason.stack:e.reason)));
  document.addEventListener('DOMContentLoaded',()=>{log('DOM ready. '+VERSION); if(demo){play(demoData(demo==='tie'));} else {log('Live-Wartezustand. Bus-Event startet Show.');}});
})();
</script>
</body>
</html>
