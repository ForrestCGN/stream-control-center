<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Master Overlay Bus Test</title>
  <style>
    :root{
      --purple:#c35cff; --cyan:#39e6ff; --bg:rgba(4,6,18,.0); --panel:#070918; --text:#f7f8ff; --muted:#c7d2fe;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,"Segoe UI",Arial,sans-serif;color:var(--text)}
    body{background:var(--bg)}
    .master-stage{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .debug{position:fixed;left:14px;bottom:14px;z-index:1000;min-width:420px;max-width:760px;padding:10px 12px;border:1px solid rgba(57,230,255,.35);border-radius:14px;background:rgba(5,7,22,.78);box-shadow:0 0 24px rgba(195,92,255,.20);font-size:12px;line-height:1.35;opacity:.0;transition:.25s;pointer-events:none}
    body[data-debug="1"] .debug{opacity:1}
    .debug b{color:#8ff4ff}.debug .warn{color:#ffd36a}.debug .ok{color:#8df5c8}.debug .bad{color:#fb7185}.debug .muted{color:#aab4d4}
    .debug-row{display:grid;grid-template-columns:126px 1fr;gap:8px;margin-top:3px}.debug-row span:first-child{color:#aab4d4}.debug code{font-family:"Cascadia Mono","Consolas",monospace;font-size:11px;color:#dff7ff;word-break:break-all}
    .mirror-badge{position:fixed;right:18px;bottom:18px;z-index:1000;padding:7px 11px;border-radius:999px;border:1px solid rgba(195,92,255,.45);background:rgba(7,9,26,.72);font-size:12px;color:#eee;opacity:.0}
    body[data-debug="1"] .mirror-badge{opacity:1}
    .alert-card{position:absolute;left:50%;top:50%;width:min(1120px,calc(100vw - 80px));min-height:210px;transform:translate(-50%,calc(-50% + 34px)) scale(.94);opacity:0;filter:blur(6px);transition:opacity .46s ease, transform .7s cubic-bezier(.16,1,.3,1), filter .46s ease;z-index:50}
    .alert-card.show{opacity:1;filter:blur(0);transform:translate(-50%,-50%) scale(1)}
    .alert-card.hide{opacity:0;filter:blur(4px);transform:translate(-50%,calc(-50% - 28px)) scale(.965)}
    .shell{position:relative;border-radius:56px;padding:34px 52px;background:linear-gradient(135deg,#070918,#0b1022 52%,#050716) padding-box,linear-gradient(180deg,#8ff4ff,#c45cff 36%,#c45cff) border-box;border:5px solid transparent;box-shadow:0 0 42px rgba(195,92,255,.52), inset 0 0 38px rgba(57,230,255,.08);overflow:hidden}
    .shell:before{content:"";position:absolute;inset:18px 24px;border-radius:42px;border:2px solid rgba(195,92,255,.75);box-shadow:inset 0 0 22px rgba(57,230,255,.06);z-index:0}
    .shell:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(57,230,255,.12),rgba(255,255,255,.08),rgba(195,92,255,.16),transparent);transform:translateX(-140%);animation:runner 4.8s linear infinite;z-index:1;opacity:.45}
    @keyframes runner{to{transform:translateX(140%)}}
    .content{position:relative;z-index:4;display:grid;grid-template-columns:auto minmax(0,1fr);gap:24px;align-items:center}
    .avatar{width:112px;height:112px;border-radius:50%;padding:6px;background:linear-gradient(135deg,var(--cyan),var(--purple));box-shadow:0 0 26px rgba(57,230,255,.25),0 0 36px rgba(195,92,255,.35)}
    .avatar-inner{width:100%;height:100%;border-radius:inherit;background:#080a18;display:grid;place-items:center;overflow:hidden;border:2px solid rgba(255,255,255,.86);font-size:42px;font-weight:950;color:#eafaff;text-shadow:0 0 14px rgba(57,230,255,.6)}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit}
    .text{min-width:0}.tag{display:inline-flex;margin-bottom:8px;padding:4px 10px;border-radius:999px;border:1px solid rgba(57,230,255,.24);background:rgba(57,230,255,.08);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#dff7ff;font-weight:800}
    .headline{margin:0;font-size:42px;line-height:1.04;font-weight:950;color:transparent;background:linear-gradient(90deg,var(--cyan),#fff,var(--purple));-webkit-background-clip:text;background-clip:text;text-shadow:0 0 18px rgba(57,230,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .value{margin-top:8px;font-size:27px;font-weight:900;color:#fff;text-shadow:0 0 16px rgba(195,92,255,.36);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .message{margin-top:8px;font-size:18px;font-weight:700;line-height:1.25;color:#dce7ff;max-width:92%;overflow-wrap:anywhere}
    .preview-watermark{position:absolute;right:24px;top:18px;z-index:6;padding:5px 10px;border-radius:999px;background:rgba(255,211,106,.14);border:1px solid rgba(255,211,106,.35);color:#ffd36a;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="master-stage" id="stage"></div>
  <div class="debug" id="debug">
    <b>Master Overlay Bus Test</b>
    <div class="debug-row"><span>Status</span><strong id="status">boot</strong></div>
    <div class="debug-row"><span>Client</span><code id="debugClient">-</code></div>
    <div class="debug-row"><span>Verbindung</span><code id="debugConnection">-</code></div>
    <div class="debug-row"><span>Reconnects</span><code id="debugReconnect">-</code></div>
    <div class="debug-row"><span>Hello/Heartbeat</span><code id="debugBusAcks">-</code></div>
    <div class="debug-row"><span>Watchdog</span><code id="debugWatchdog">-</code></div>
    <div class="debug-row"><span>Replay/Resync</span><code id="debugReplay">-</code></div>
    <div class="debug-row"><span>Event</span><code id="debugEvent">-</code></div>
    <div class="debug-row"><span>ACK</span><code id="debugAck">-</code></div>
    <div class="debug-row"><span>Letzte Msg</span><code id="debugMsg">-</code></div>
  </div>
  <div class="mirror-badge">BUS MIRROR / REPLAY TEST · nicht produktiv</div>
<script>
(() => {
  'use strict';

  const MODULE_META = {
    name: 'overlay_master_test',
    version: '0.1.3',
    description: 'Master overlay Communication Bus mirror test client with reconnect watchdog'
  };

  const CLIENT_ID = 'overlay_master_test';
  const CLIENT_TYPE = 'overlay';
  const CLIENT_MODULE = 'master_overlay_test';
  const CLIENT_MODE = 'mirror_preview';
  const HEARTBEAT_MS = 5000;
  const RECONNECT_MS = 1500;
  const HELLO_ACK_TIMEOUT_MS = 8000;
  const HEARTBEAT_ACK_TIMEOUT_MS = 12000;
  const STALE_CHECK_MS = 3000;

  const CAPABILITIES = [
    'communication.test',
    'test.ping',
    'visual.alert.play',
    'visual.alert.clear',
    'visual.alert.resync',
    'ack',
    'heartbeat',
    'reconnect.test',
    'replay.test',
    'resync.test',
    'hello.timeout.watchdog',
    'heartbeat.ack.watchdog'
  ];

  const qs = new URLSearchParams(location.search);
  if (qs.get('debug') === '1' || qs.has('debug')) document.body.dataset.debug = '1';

  const stage = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  const debugClientEl = document.getElementById('debugClient');
  const debugConnectionEl = document.getElementById('debugConnection');
  const debugReconnectEl = document.getElementById('debugReconnect');
  const debugBusAcksEl = document.getElementById('debugBusAcks');
  const debugWatchdogEl = document.getElementById('debugWatchdog');
  const debugReplayEl = document.getElementById('debugReplay');
  const debugEventEl = document.getElementById('debugEvent');
  const debugAckEl = document.getElementById('debugAck');
  const debugMsgEl = document.getElementById('debugMsg');

  let ws = null;
  let reconnectTimer = null;
  let heartbeatTimer = null;
  let staleCheckTimer = null;
  let currentTimer = null;
  let currentEventId = '';
  let currentChannel = '';
  let currentAction = '';
  let lastAck = '';
  let sessionId = '';
  let connectCount = 0;
  let disconnectCount = 0;
  let forcedReconnectCount = 0;
  let replayCount = 0;
  let lastReplayEventAt = '';
  let lastReplayEventId = '';
  let lastConnectedAt = '';
  let lastDisconnectedAt = '';
  let lastHelloSentAt = '';
  let lastHeartbeatSentAt = '';
  let lastHelloAckAt = '';
  let lastHeartbeatAckAt = '';
  let lastForcedReconnectAt = '';
  let lastForcedReconnectReason = '';
  let reconnectScheduledAt = '';
  let connecting = false;

  setDebugClient();
  updateConnectionDebug();
  updateReplayDebug();
  updateWatchdogDebug();

  function nowIso() { return new Date().toISOString(); }
  function asMs(value) {
    const n = value ? Date.parse(value) : 0;
    return Number.isFinite(n) ? n : 0;
  }
  function shortTime(value) {
    if (!value) return '-';
    try { return new Date(value).toLocaleTimeString('de-DE', { hour: '2-digit', minute: '2-digit', second: '2-digit' }); }
    catch (_) { return value; }
  }
  function createSessionId() { return `oms_${Date.now().toString(36)}_${Math.random().toString(36).slice(2, 8)}`; }

  function setStatus(text, cls) {
    if (!statusEl) return;
    statusEl.textContent = text || '';
    statusEl.className = cls || '';
  }

  function setDebugClient(extra) {
    if (!debugClientEl) return;
    debugClientEl.textContent = `${CLIENT_ID} · ${CLIENT_TYPE} · v${MODULE_META.version}${extra ? ' · ' + extra : ''}`;
  }

  function updateConnectionDebug() {
    if (debugConnectionEl) debugConnectionEl.textContent = `session=${sessionId || '-'} · connected=${shortTime(lastConnectedAt)} · disconnected=${shortTime(lastDisconnectedAt)}`;
    if (debugReconnectEl) debugReconnectEl.textContent = `connects=${connectCount} · disconnects=${disconnectCount} · forced=${forcedReconnectCount} · next=${shortTime(reconnectScheduledAt)}`;
    if (debugBusAcksEl) debugBusAcksEl.textContent = `hello=${shortTime(lastHelloAckAt)} · heartbeat=${shortTime(lastHeartbeatAckAt)}`;
  }

  function updateWatchdogDebug() {
    if (!debugWatchdogEl) return;
    debugWatchdogEl.textContent = `last=${shortTime(lastForcedReconnectAt)} · reason=${lastForcedReconnectReason || '-'} · heartbeatSent=${shortTime(lastHeartbeatSentAt)}`;
  }

  function updateReplayDebug() {
    if (debugReplayEl) debugReplayEl.textContent = `events=${replayCount} · last=${shortTime(lastReplayEventAt)} · id=${lastReplayEventId || '-'}`;
  }

  function setDebugEvent(text) { if (debugEventEl) debugEventEl.textContent = text || '-'; }
  function setDebugAck(text) { if (debugAckEl) debugAckEl.textContent = text || '-'; }
  function setDebugMsg(text) { if (debugMsgEl) debugMsgEl.textContent = text || '-'; }

  function stopHeartbeat() {
    clearInterval(heartbeatTimer);
    heartbeatTimer = null;
  }
  function startHeartbeat() {
    stopHeartbeat();
    heartbeatTimer = setInterval(heartbeat, HEARTBEAT_MS);
    heartbeat();
  }
  function stopStaleCheck() {
    clearInterval(staleCheckTimer);
    staleCheckTimer = null;
  }
  function startStaleCheck() {
    stopStaleCheck();
    staleCheckTimer = setInterval(checkConnectionFreshness, STALE_CHECK_MS);
  }

  function busSend(payload) {
    if (!ws || ws.readyState !== WebSocket.OPEN) return false;
    try { ws.send(JSON.stringify(payload)); return true; }
    catch (_) { return false; }
  }

  function hello() {
    lastHelloSentAt = nowIso();
    lastHelloAckAt = '';
    const sent = busSend({
      type: 'hello',
      clientId: CLIENT_ID,
      clientType: CLIENT_TYPE,
      module: CLIENT_MODULE,
      name: 'Master Overlay Bus Test',
      mode: CLIENT_MODE,
      version: MODULE_META.version,
      capabilities: CAPABILITIES,
      meta: {
        sessionId,
        connectCount,
        disconnectCount,
        forcedReconnectCount,
        replayCount,
        mirror: true,
        preview: true,
        productionTarget: false,
        userAgent: navigator.userAgent || ''
      }
    });
    if (sent) setStatus('hello gesendet · warte auf Bus', 'warn');
    updateWatchdogDebug();
  }

  function heartbeat() {
    lastHeartbeatSentAt = nowIso();
    busSend({
      type: 'heartbeat',
      clientId: CLIENT_ID,
      clientType: CLIENT_TYPE,
      module: CLIENT_MODULE,
      version: MODULE_META.version,
      capabilities: CAPABILITIES,
      status: 'online',
      sessionId,
      connectCount,
      disconnectCount,
      forcedReconnectCount,
      replayCount,
      ts: lastHeartbeatSentAt
    });
    updateWatchdogDebug();
  }

  function ack(eventId, status, details) {
    const id = String(eventId || currentEventId || '').trim();
    if (!id) return false;
    const cleanStatus = String(status || 'received').trim() || 'received';
    const ok = busSend({
      type: 'ack',
      eventId: id,
      clientId: CLIENT_ID,
      status: cleanStatus,
      details: {
        channel: currentChannel,
        action: currentAction,
        sessionId,
        connectCount,
        disconnectCount,
        forcedReconnectCount,
        replayCount,
        mirror: true,
        preview: true,
        productionTarget: false,
        ...(details || {})
      }
    });
    if (ok) {
      lastAck = `${cleanStatus} · ${id}`;
      setDebugAck(lastAck);
    }
    return ok;
  }

  function forceReconnect(reason) {
    const cleanReason = String(reason || 'forced_reconnect').trim() || 'forced_reconnect';
    forcedReconnectCount += 1;
    lastForcedReconnectAt = nowIso();
    lastForcedReconnectReason = cleanReason;
    setStatus(`reconnect: ${cleanReason}`, 'bad');
    setDebugMsg(`forced reconnect: ${cleanReason}`);
    updateConnectionDebug();
    updateWatchdogDebug();

    stopHeartbeat();
    stopStaleCheck();

    if (ws && (ws.readyState === WebSocket.OPEN || ws.readyState === WebSocket.CONNECTING)) {
      try { ws.close(); }
      catch (_) { scheduleReconnect(cleanReason); }
      return;
    }
    scheduleReconnect(cleanReason);
  }

  function scheduleReconnect(reason) {
    if (reconnectTimer) return;
    reconnectScheduledAt = new Date(Date.now() + RECONNECT_MS).toISOString();
    lastForcedReconnectReason = reason || lastForcedReconnectReason || 'scheduled_reconnect';
    updateConnectionDebug();
    updateWatchdogDebug();
    reconnectTimer = setTimeout(connect, RECONNECT_MS);
  }

  function checkConnectionFreshness() {
    if (!ws || ws.readyState !== WebSocket.OPEN) return;
    const now = Date.now();
    const connectedAt = asMs(lastConnectedAt);
    const helloSentAt = asMs(lastHelloSentAt);
    const heartbeatSentAt = asMs(lastHeartbeatSentAt);
    const helloAckAt = asMs(lastHelloAckAt);
    const heartbeatAckAt = asMs(lastHeartbeatAckAt);

    if (helloSentAt && !helloAckAt && now - helloSentAt > HELLO_ACK_TIMEOUT_MS) {
      forceReconnect('hello_ack_timeout');
      return;
    }

    const freshestAck = Math.max(helloAckAt, heartbeatAckAt, connectedAt);
    if (heartbeatSentAt && freshestAck && now - freshestAck > HEARTBEAT_ACK_TIMEOUT_MS) {
      forceReconnect('heartbeat_ack_stale');
    }
  }

  function connect() {
    clearTimeout(reconnectTimer);
    reconnectTimer = null;
    reconnectScheduledAt = '';
    sessionId = createSessionId();
    connecting = true;
    lastHelloSentAt = '';
    lastHeartbeatSentAt = '';
    lastHelloAckAt = '';
    lastHeartbeatAckAt = '';
    stopHeartbeat();
    stopStaleCheck();
    updateConnectionDebug();
    updateWatchdogDebug();

    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host);

    ws.addEventListener('open', () => {
      connecting = false;
      connectCount += 1;
      lastConnectedAt = nowIso();
      reconnectScheduledAt = '';
      setStatus('verbunden · registriere Bus-Client', 'warn');
      clearAlert('ws_reconnect_open', false);
      setDebugClient(`session=${sessionId}`);
      updateConnectionDebug();
      updateWatchdogDebug();
      hello();
      startHeartbeat();
      startStaleCheck();
    });

    ws.addEventListener('message', ev => {
      let msg;
      try { msg = JSON.parse(ev.data); } catch (_) { return; }
      handleMessage(msg);
    });

    ws.addEventListener('close', () => {
      connecting = false;
      disconnectCount += 1;
      lastDisconnectedAt = nowIso();
      setStatus('getrennt · reconnect geplant', 'bad');
      stopHeartbeat();
      stopStaleCheck();
      clearAlert('ws_close', false);
      updateConnectionDebug();
      updateWatchdogDebug();
      scheduleReconnect('ws_close');
    });

    ws.addEventListener('error', () => {
      setStatus('websocket fehler · reconnect', 'bad');
      try { ws.close(); } catch (_) { forceReconnect('websocket_error'); }
    });
  }

  function handleMessage(msg) {
    if (!msg || typeof msg !== 'object') return;

    if (msg.type === 'hello_ack') {
      lastHelloAckAt = nowIso();
      setStatus('registriert · Bus bereit', 'ok');
      setDebugClient(`bus=${msg.bus || 'cgn'} · session=${sessionId}`);
      updateConnectionDebug();
      updateWatchdogDebug();
      return;
    }

    if (msg.type === 'heartbeat_ack') {
      lastHeartbeatAckAt = nowIso();
      setStatus(msg.ok ? 'online · heartbeat ok' : 'heartbeat problem', msg.ok ? 'ok' : 'warn');
      updateConnectionDebug();
      updateWatchdogDebug();
      return;
    }

    if (msg.type === 'ack_ack') {
      setDebugAck(`${msg.ok ? 'ack ok' : 'ack fail'} · ${msg.status || '-'} · ${msg.eventId || '-'}`);
      return;
    }

    if (!isBusEvent(msg)) {
      setDebugMsg(`ignoriert: ${msg.type || msg.op || 'unknown'}`);
      return;
    }

    handleBusEvent(msg);
  }

  function isBusEvent(msg) { return !!(msg && msg.id && msg.channel && msg.action && msg.payload && typeof msg.payload === 'object'); }
  function isLikelyReplayEvent(msg) { return msg.meta?.replayable === true && msg.deliveredTo === undefined; }

  function handleBusEvent(msg) {
    currentEventId = String(msg.id || '');
    currentChannel = String(msg.channel || '');
    currentAction = String(msg.action || '');

    if (isLikelyReplayEvent(msg)) {
      replayCount += 1;
      lastReplayEventAt = nowIso();
      lastReplayEventId = currentEventId;
      updateReplayDebug();
    }

    setDebugEvent(`${currentChannel}.${currentAction} · ${currentEventId}`);
    setDebugMsg(JSON.stringify({ channel: currentChannel, action: currentAction, source: msg.source || {}, meta: msg.meta || {}, sessionId }).slice(0, 420));
    ack(currentEventId, 'received', { phase: 'message_received', replayLike: isLikelyReplayEvent(msg) });

    if (currentChannel === 'visual.alert' && currentAction === 'clear') {
      clearAlert('bus_clear', false);
      ack(currentEventId, 'finished', { phase: 'clear_handled' });
      return;
    }

    if (currentChannel === 'visual.alert' && (currentAction === 'play' || currentAction === 'resync')) {
      const alert = normalizeAlertPayload(msg);
      playCard(alert, msg);
      return;
    }

    if (currentChannel === 'test' || currentChannel === 'communication' || msg.meta?.preview === true || msg.payload?.test === true) {
      playCard(normalizeTestPayload(msg), msg);
      return;
    }

    setStatus(`Bus-Event empfangen, nicht angezeigt: ${currentChannel}.${currentAction}`, 'warn');
    ack(currentEventId, 'ignored', { phase: 'not_a_mirror_display_event' });
  }

  function normalizeAlertPayload(msg) {
    const payload = msg.payload || {};
    const alert = payload.alert && typeof payload.alert === 'object' ? payload.alert : payload;
    return {
      source: alert.source || alert.provider || msg.source?.module || msg.source?.id || msg.channel,
      type: alert.type || msg.action,
      headline: alert.headline || alert.userDisplayName || alert.user || alert.title || 'Alert Preview',
      value: alert.value || alert.amountFormatted || '',
      message: alert.message || alert.subline || payload.message || '',
      avatarUrl: alert.avatarUrl || alert.avatar_url || '',
      durationMs: alert.durationMs || payload.durationMs || 7000
    };
  }

  function normalizeTestPayload(msg) {
    const payload = msg.payload || {};
    const message = payload.message || payload.text || 'Communication Bus Testevent empfangen';
    return {
      source: msg.source?.module || msg.source?.id || 'communication_bus',
      type: `${msg.channel}.${msg.action}`,
      headline: msg.meta?.replayable === true ? 'Communication Bus Replay Test' : 'Communication Bus Test',
      value: msg.id || '',
      message,
      avatarUrl: '',
      durationMs: payload.durationMs || 5000
    };
  }

  function playCard(alert, msg) {
    if (!alert || typeof alert !== 'object') return;
    clearAlert('replace', false);
    ack(msg.id, 'rendering', { phase: 'before_dom_append' });

    const card = document.createElement('div');
    card.className = 'alert-card';
    const headline = alert.headline || 'Bus Preview';
    const value = alert.value || '';
    const message = alert.message || '';
    const avatar = alert.avatarUrl || '';
    const initial = String(headline || '★').trim().slice(0,1).toUpperCase() || '★';
    const tag = `${alert.source || 'bus'} · ${alert.type || 'test'}`;
    const initialForOnError = escapeAttr(initial);

    card.innerHTML = `
      <div class="shell">
        <div class="preview-watermark">Bus Mirror</div>
        <div class="content">
          <div class="avatar"><div class="avatar-inner">${avatar ? `<img src="${escapeAttr(avatar)}" alt="" onerror="this.remove();this.parentElement.textContent='${initialForOnError}'">` : escapeHtml(initial)}</div></div>
          <div class="text">
            <div class="tag">${escapeHtml(tag)}</div>
            <h1 class="headline" title="${escapeAttr(headline)}">${escapeHtml(headline)}</h1>
            ${value ? `<div class="value">${escapeHtml(value)}</div>` : ''}
            ${message ? `<div class="message">${escapeHtml(message)}</div>` : ''}
          </div>
        </div>
      </div>`;

    stage.appendChild(card);
    requestAnimationFrame(() => {
      card.classList.add('show');
      ack(msg.id, 'rendered', { phase: 'card_visible' });
    });

    const duration = Math.max(1000, Number(alert.durationMs || 5000));
    currentTimer = setTimeout(() => clearAlert('finished', true), duration);
    setStatus(`Bus Mirror angezeigt: ${currentChannel}.${currentAction}`, 'ok');
  }

  function clearAlert(reason, sendFinished) {
    clearTimeout(currentTimer);
    currentTimer = null;
    [...stage.querySelectorAll('.alert-card')].forEach(card => {
      card.classList.remove('show');
      card.classList.add('hide');
      setTimeout(() => card.remove(), 760);
    });

    if (sendFinished && currentEventId) ack(currentEventId, 'finished', { phase: 'display_finished', reason: reason || 'finished' });
  }

  function escapeHtml(v) { return String(v ?? '').replace(/[&<>"]/g, c => ({ '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;' }[c])); }
  function escapeAttr(v) { return escapeHtml(v).replace(/'/g, '&#39;'); }

  window.addEventListener('beforeunload', () => {
    stopHeartbeat();
    stopStaleCheck();
    clearTimeout(reconnectTimer);
    if (ws && ws.readyState === WebSocket.OPEN) {
      try { ws.close(); } catch (_) {}
    }
  });

  connect();
})();
</script>
</body>
</html>
