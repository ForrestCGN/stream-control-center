<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Master Overlay Test</title>
  <style>
    :root{
      --purple:#c35cff; --cyan:#39e6ff; --bg:rgba(4,6,18,.0); --panel:#070918; --text:#f7f8ff; --muted:#c7d2fe;
    }
    *{box-sizing:border-box}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Inter,"Segoe UI",Arial,sans-serif;color:var(--text)}
    body{background:var(--bg)}
    .master-stage{position:fixed;inset:0;pointer-events:none;overflow:hidden}
    .debug{position:fixed;left:14px;bottom:14px;z-index:1000;min-width:290px;max-width:520px;padding:10px 12px;border:1px solid rgba(57,230,255,.35);border-radius:14px;background:rgba(5,7,22,.78);box-shadow:0 0 24px rgba(195,92,255,.20);font-size:12px;line-height:1.35;opacity:.0;transition:.25s;pointer-events:none}
    body[data-debug="1"] .debug{opacity:1}
    .debug b{color:#8ff4ff}.debug .warn{color:#ffd36a}.debug .ok{color:#8df5c8}
    .mirror-badge{position:fixed;right:18px;bottom:18px;z-index:1000;padding:7px 11px;border-radius:999px;border:1px solid rgba(195,92,255,.45);background:rgba(7,9,26,.72);font-size:12px;color:#eee;opacity:.0}
    body[data-debug="1"] .mirror-badge{opacity:1}
    .alert-card{position:absolute;left:50%;top:50%;width:min(1120px,calc(100vw - 80px));min-height:210px;transform:translate(-50%,calc(-50% + 34px)) scale(.94);opacity:0;filter:blur(6px);transition:opacity .46s ease, transform .7s cubic-bezier(.16,1,.3,1), filter .46s ease;z-index:50}
    .alert-card.show{opacity:1;filter:blur(0);transform:translate(-50%,-50%) scale(1)}
    .alert-card.hide{opacity:0;filter:blur(4px);transform:translate(-50%,calc(-50% - 28px)) scale(.965)}
    .shell{position:relative;border-radius:56px;padding:34px 52px;background:linear-gradient(135deg,#070918,#0b1022 52%,#050716) padding-box,linear-gradient(180deg,#8ff4ff,#c45cff 36%,#c45cff) border-box;border:5px solid transparent;box-shadow:0 0 42px rgba(195,92,255,.52), inset 0 0 38px rgba(57,230,255,.08);overflow:hidden}
    .shell:before{content:"";position:absolute;inset:18px 24px;border-radius:42px;border:2px solid rgba(195,92,255,.75);box-shadow:inset 0 0 22px rgba(57,230,255,.06);z-index:0}
    .shell:after{content:"";position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(57,230,255,.12),rgba(255,255,255,.08),rgba(195,92,255,.16),transparent);transform:translateX(-140%);animation:runner 4.8s linear infinite;z-index:1;opacity:.45}
    @keyframes runner{to{transform:translateX(140%)}}
    .content{position:relative;z-index:4;display:grid;grid-template-columns:auto minmax(0,1fr);gap:24px;align-items:center}
    .avatar{width:112px;height:112px;border-radius:50%;padding:6px;background:linear-gradient(135deg,var(--cyan),var(--purple));box-shadow:0 0 26px rgba(57,230,255,.25),0 0 36px rgba(195,92,255,.35)}
    .avatar-inner{width:100%;height:100%;border-radius:inherit;background:#080a18;display:grid;place-items:center;overflow:hidden;border:2px solid rgba(255,255,255,.86);font-size:42px;font-weight:950;color:#eafaff;text-shadow:0 0 14px rgba(57,230,255,.6)}
    .avatar img{width:100%;height:100%;object-fit:cover;display:block;border-radius:inherit}
    .text{min-width:0}.tag{display:inline-flex;margin-bottom:8px;padding:4px 10px;border-radius:999px;border:1px solid rgba(57,230,255,.24);background:rgba(57,230,255,.08);font-size:11px;letter-spacing:.14em;text-transform:uppercase;color:#dff7ff;font-weight:800}
    .headline{margin:0;font-size:42px;line-height:1.04;font-weight:950;color:transparent;background:linear-gradient(90deg,var(--cyan),#fff,var(--purple));-webkit-background-clip:text;background-clip:text;text-shadow:0 0 18px rgba(57,230,255,.28);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .value{margin-top:8px;font-size:27px;font-weight:900;color:#fff;text-shadow:0 0 16px rgba(195,92,255,.36);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
    .message{margin-top:8px;font-size:18px;font-weight:700;line-height:1.25;color:#dce7ff;max-width:92%;overflow-wrap:anywhere}
    .preview-watermark{position:absolute;right:24px;top:18px;z-index:6;padding:5px 10px;border-radius:999px;background:rgba(255,211,106,.14);border:1px solid rgba(255,211,106,.35);color:#ffd36a;font-size:12px;font-weight:900;letter-spacing:.12em;text-transform:uppercase}
  </style>
</head>
<body>
  <div class="master-stage" id="stage"></div>
  <div class="debug" id="debug"><b>Master Overlay Test</b><br><span id="status">boot</span></div>
  <div class="mirror-badge">MIRROR / PREVIEW · nicht produktiv</div>
<script>
(() => {
  'use strict';
  const OP = 'overlay_master_test';
  const CLIENT_ID = 'overlay_master_test';
  const qs = new URLSearchParams(location.search);
  if (qs.get('debug') === '1' || qs.has('debug')) document.body.dataset.debug = '1';
  const stage = document.getElementById('stage');
  const statusEl = document.getElementById('status');
  let ws = null;
  let reconnectTimer = null;
  let heartbeatTimer = null;
  let currentTimer = null;
  let currentAlertId = '';
  let currentSourceEventId = '';

  function setStatus(text){ if(statusEl) statusEl.textContent = text || ''; }
  function send(payload){ try{ if(ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify({ op: OP, client: CLIENT_ID, clientId: CLIENT_ID, ...payload })); } catch(_){} }
  function ack(status, extra){ send({ event:'ack', ackStatus:status, alertId:currentAlertId, sourceEventId:currentSourceEventId, mirror:true, preview:true, ...(extra||{}) }); }
  function connect(){
    clearTimeout(reconnectTimer);
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    ws = new WebSocket(proto + '//' + location.host);
    ws.addEventListener('open', () => {
      setStatus('verbunden · registriere Master-Testoverlay');
      send({ event:'hello', mode:'mirror_preview', capabilities:['visual.alert.play','visual.alert.clear','visual.alert.resync','ack','heartbeat'] });
      clearInterval(heartbeatTimer);
      heartbeatTimer = setInterval(() => send({ event:'heartbeat', status:'online', ts:new Date().toISOString() }), 5000);
    });
    ws.addEventListener('message', ev => { let msg; try{ msg = JSON.parse(ev.data); } catch(_){ return; } handleMessage(msg); });
    ws.addEventListener('close', () => { setStatus('getrennt · reconnect'); clearInterval(heartbeatTimer); reconnectTimer = setTimeout(connect, 1500); });
    ws.addEventListener('error', () => { try{ ws.close(); } catch(_){} });
  }
  function handleMessage(msg){
    if(!msg || msg.op !== OP) return;
    if(msg.event === 'hello'){ setStatus('bereit · Mirror wartet'); return; }
    if(msg.event === 'visual.alert.clear' || msg.action === 'clear'){ clearAlert('clear', false); return; }
    if(msg.event === 'visual.alert.play' || (msg.channel === 'visual.alert' && msg.action === 'play')){
      playAlert(msg.alert || (msg.payload && msg.payload.alert) || msg.payload || {});
    }
  }
  function playAlert(alert){
    if(!alert || typeof alert !== 'object') return;
    clearAlert('replace', false);
    currentAlertId = String(alert.id || alert.alertId || '');
    currentSourceEventId = String(alert.sourceEventId || alert.id || '');
    ack('received');
    const card = document.createElement('div');
    card.className = 'alert-card';
    const headline = alert.headline || alert.userDisplayName || alert.user || alert.title || 'Alert Preview';
    const value = alert.value || alert.amountFormatted || '';
    const message = alert.message || alert.subline || '';
    const avatar = alert.avatarUrl || alert.avatar_url || '';
    const initial = String(headline || '★').trim().slice(0,1).toUpperCase() || '★';
    card.innerHTML = `
      <div class="shell">
        <div class="preview-watermark">Preview Mirror</div>
        <div class="content">
          <div class="avatar"><div class="avatar-inner">${avatar ? `<img src="${escapeAttr(avatar)}" alt="" onerror="this.remove();this.parentElement.textContent='${escapeHtml(initial)}'">` : escapeHtml(initial)}</div></div>
          <div class="text">
            <div class="tag">${escapeHtml((alert.source || alert.provider || 'alert') + ' · ' + (alert.type || 'preview'))}</div>
            <h1 class="headline" title="${escapeAttr(headline)}">${escapeHtml(headline)}</h1>
            ${value ? `<div class="value">${escapeHtml(value)}</div>` : ''}
            ${message ? `<div class="message">${escapeHtml(message)}</div>` : ''}
          </div>
        </div>
      </div>`;
    stage.appendChild(card);
    requestAnimationFrame(() => { card.classList.add('show'); ack('rendered'); });
    const duration = Math.max(1000, Number(alert.durationMs || 7000));
    currentTimer = setTimeout(() => clearAlert('finished', true), duration);
    setStatus('Alert Mirror angezeigt: ' + (currentSourceEventId || currentAlertId || 'unknown'));
  }
  function clearAlert(reason, sendFinished){
    clearTimeout(currentTimer); currentTimer = null;
    [...stage.querySelectorAll('.alert-card')].forEach(card => { card.classList.remove('show'); card.classList.add('hide'); setTimeout(()=>card.remove(), 760); });
    if(sendFinished && currentAlertId) send({ event:'finished', ackStatus:'finished', alertId:currentAlertId, sourceEventId:currentSourceEventId, reason: reason || 'finished', mirror:true, preview:true });
    currentAlertId = ''; currentSourceEventId = '';
  }
  function escapeHtml(v){ return String(v ?? '').replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c])); }
  function escapeAttr(v){ return escapeHtml(v).replace(/'/g, '&#39;'); }
  connect();
})();
</script>
</body>
</html>
