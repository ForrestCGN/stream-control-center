<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birthday Overlay</title>
  <style>
    :root{
      --bg:#050713;--panel:#0b1024;--white:#fff;--muted:#cbd5e1;
      --pink:#ff4fd8;--cyan:#40e8ff;--violet:#8c5bff;--gold:#ffd166;--heart:#ff5ba7;
      --green:#7dff9e;--orange:#ff9f43;--deep:#02030b;
    }
    *{box-sizing:border-box}
    html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Montserrat,Inter,Arial,sans-serif;color:var(--white)}
    #root{position:fixed;inset:0;opacity:0;pointer-events:none;transition:opacity .55s ease}
    #root.active{opacity:1}
    .stage{position:absolute;inset:0;overflow:hidden;display:grid;place-items:center}

    /* Intro: bewusst ruhig. Keine Party-Eskalation während des Videos. */
    .intro-wrap{position:absolute;inset:0;display:grid;place-items:center;background:
      radial-gradient(circle at 50% 42%,rgba(64,232,255,.16),transparent 34%),
      radial-gradient(circle at 50% 65%,rgba(140,91,255,.14),transparent 42%),
      linear-gradient(180deg,rgba(1,3,12,.68),rgba(0,0,0,.92));}
    .intro-box{position:relative;border:1px solid rgba(64,232,255,.34);border-radius:34px;padding:30px 44px;background:linear-gradient(135deg,rgba(7,10,25,.62),rgba(12,18,40,.52));box-shadow:0 0 36px rgba(64,232,255,.22),inset 0 0 22px rgba(255,255,255,.04);font-size:clamp(26px,3vw,48px);font-weight:1000;letter-spacing:.09em;text-transform:uppercase;color:#e6fbff;text-shadow:0 0 18px rgba(64,232,255,.45)}
    .intro-box:before,.intro-box:after{content:"";position:absolute;left:10%;right:10%;height:1px;background:linear-gradient(90deg,transparent,var(--cyan),transparent);opacity:.65}.intro-box:before{top:-10px}.intro-box:after{bottom:-10px}

    .party{position:absolute;inset:0;display:grid;place-items:center;padding:4.5vw;text-align:center;--style-bg:
      radial-gradient(circle at 50% 42%,rgba(140,91,255,.40),rgba(6,8,23,.82) 42%,rgba(0,0,0,.96));background:var(--style-bg)}
    .party.classic_party{--pink:#ff5ba7;--cyan:#59dfff;--violet:#a36bff;--gold:#ffd166;--heart:#ff4f8b;--style-bg:radial-gradient(circle at 50% 42%,rgba(255,91,167,.32),rgba(15,23,42,.82) 43%,rgba(3,7,18,.95))}
    .party.cgn_neon{--pink:#ff4fd8;--cyan:#40e8ff;--violet:#8c5bff;--gold:#ffd166;--heart:#ff5bbd;--style-bg:radial-gradient(circle at 50% 38%,rgba(64,232,255,.18),transparent 28%),radial-gradient(circle at 50% 58%,rgba(140,91,255,.48),rgba(6,8,23,.84) 43%,rgba(0,0,0,.96))}
    .party.epic_party{--pink:#ff2fb8;--cyan:#00f0ff;--violet:#7c3cff;--gold:#ffe066;--heart:#ff3366;--style-bg:radial-gradient(circle at 50% 50%,rgba(255,224,102,.20),transparent 22%),radial-gradient(circle at 50% 42%,rgba(124,60,255,.55),rgba(3,7,18,.86) 44%,rgba(0,0,0,.98))}
    .party.heimaufsicht_fun{--pink:#ff6aa7;--cyan:#7dd3fc;--violet:#9333ea;--gold:#fbbf24;--heart:#fb7185;--style-bg:radial-gradient(circle at 50% 44%,rgba(251,191,36,.22),rgba(30,20,38,.84) 42%,rgba(10,8,18,.97))}
    .party.cute_soft{--pink:#ff9bd2;--cyan:#a5f3fc;--violet:#c4b5fd;--gold:#fde68a;--heart:#ff7ab6;--style-bg:radial-gradient(circle at 50% 44%,rgba(255,155,210,.42),rgba(42,28,56,.76) 44%,rgba(7,8,18,.94))}

    .layer{position:absolute;inset:-10%;pointer-events:none}.orbs,.hearts,.confetti,.balloons,.sparkles,.ribbons,.bursts,.bokeh,.rings,.side-cards,.floating-words{position:absolute;inset:-10%;pointer-events:none}
    .gridlines{position:absolute;inset:0;background-image:linear-gradient(rgba(64,232,255,.07) 1px,transparent 1px),linear-gradient(90deg,rgba(255,79,216,.06) 1px,transparent 1px);background-size:72px 72px;mask-image:radial-gradient(circle at center,black,transparent 72%);opacity:.36;animation:gridMove 18s linear infinite}
    .orb{position:absolute;width:30vw;height:30vw;border-radius:999px;filter:blur(38px);opacity:.28;animation:floatOrb 14s ease-in-out infinite}.orb.o1{left:1%;top:1%;background:var(--pink)}.orb.o2{right:0;bottom:-2%;background:var(--cyan);animation-delay:-5s}.orb.o3{left:38%;bottom:-9%;background:var(--violet);animation-delay:-9s}.orb.o4{right:30%;top:-10%;background:var(--gold);animation-delay:-12s;opacity:.18}
    .beam{position:absolute;width:30vw;height:170vh;top:-35vh;background:linear-gradient(90deg,transparent,rgba(255,255,255,.14),transparent);filter:blur(2px);transform-origin:center;animation:sweep 4.8s ease-in-out infinite}.beam.b1{left:5vw;transform:rotate(24deg)}.beam.b2{right:8vw;animation-delay:-2.3s;transform:rotate(-25deg)}.beam.b3{left:42vw;animation-delay:-1.1s;transform:rotate(4deg);opacity:.55}

    .card{position:relative;width:min(1160px,86vw);min-height:500px;border:2px solid rgba(255,255,255,.20);border-radius:44px;background:linear-gradient(135deg,rgba(17,24,39,.82),rgba(34,10,64,.70));box-shadow:0 0 55px rgba(140,91,255,.68), inset 0 0 50px rgba(64,232,255,.08);backdrop-filter:blur(13px);padding:46px 64px 50px;display:grid;grid-template-columns:minmax(160px,230px) 1fr;align-items:center;gap:34px;overflow:hidden;animation:cardPulse 6s ease-in-out infinite}
    .card:before{content:"";position:absolute;inset:-4px;border-radius:48px;background:conic-gradient(from 0deg,var(--pink),var(--cyan),var(--gold),var(--violet),var(--pink));filter:blur(18px);opacity:.44;z-index:-1;animation:spin 7s linear infinite}.card:after{content:"";position:absolute;inset:0;background:linear-gradient(115deg,transparent 15%,rgba(255,255,255,.10) 45%,transparent 70%);transform:translateX(-120%);animation:shine 6.5s ease-in-out infinite}
    .avatar-zone{position:relative;display:grid;place-items:center;align-self:center}.avatar-wrap{position:relative;width:clamp(132px,13vw,222px);height:clamp(132px,13vw,222px);border-radius:999px;padding:7px;background:conic-gradient(from 0deg,var(--pink),var(--cyan),var(--gold),var(--violet),var(--pink));box-shadow:0 0 34px var(--pink),0 0 70px rgba(64,232,255,.45);animation:avatarPulse 3.2s ease-in-out infinite}.avatar-wrap:before{content:"";position:absolute;inset:-20px;border-radius:999px;border:2px solid rgba(255,255,255,.16);box-shadow:0 0 32px rgba(255,255,255,.14)}.avatar-wrap:after{content:"";position:absolute;inset:-34px;border-radius:999px;border:1px dashed rgba(255,255,255,.22);animation:spin 12s linear infinite}.avatar{width:100%;height:100%;border-radius:999px;object-fit:cover;border:4px solid rgba(8,12,28,.96);background:#111827}.avatar-fallback{display:grid;place-items:center;width:100%;height:100%;border-radius:999px;border:4px solid rgba(8,12,28,.96);background:linear-gradient(135deg,var(--violet),var(--pink));font-size:clamp(56px,7vw,104px);font-weight:1000}
    .crown{position:absolute;top:-30px;left:50%;transform:translateX(-50%) rotate(-5deg);font-size:48px;filter:drop-shadow(0 0 18px var(--gold));animation:crownBounce 3.3s ease-in-out infinite}.content{position:relative;z-index:2;display:flex;flex-direction:column;align-items:flex-start;justify-content:center;text-align:left;gap:13px;min-width:0}.pill{font-size:clamp(15px,1.2vw,23px);font-weight:1000;letter-spacing:.16em;text-transform:uppercase;color:#e9fbff;border:1px solid rgba(64,232,255,.47);border-radius:999px;padding:10px 18px;background:rgba(64,232,255,.10);box-shadow:0 0 24px rgba(64,232,255,.30)}
    h1{font-size:clamp(54px,7vw,122px);line-height:.88;margin:0;text-transform:uppercase;letter-spacing:.035em;text-shadow:0 0 20px rgba(255,79,216,.92),0 0 50px rgba(64,232,255,.65);animation:titlePop 900ms cubic-bezier(.2,1.35,.35,1)}.name{font-size:clamp(46px,5.8vw,96px);font-weight:1000;color:var(--gold);text-shadow:0 0 20px rgba(255,209,102,.92),0 0 38px rgba(255,79,216,.50);animation:nameFloat 4s ease-in-out infinite}.msg{font-size:clamp(24px,2.3vw,42px);font-weight:850;color:#f8fafc;text-shadow:0 0 15px rgba(255,255,255,.35);max-width:920px}.party-title{position:absolute;top:2.1vh;left:50%;transform:translateX(-50%);font-size:16px;font-weight:1000;letter-spacing:.20em;text-transform:uppercase;color:rgba(255,255,255,.78);text-shadow:0 0 18px var(--cyan)}
    .timer-ribbon{position:absolute;right:2.2vw;bottom:2.4vh;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;background:rgba(0,0,0,.34);font-size:13px;font-weight:900;color:rgba(255,255,255,.76);letter-spacing:.08em;text-transform:uppercase}.style-badge{position:absolute;left:2.2vw;bottom:2.4vh;border:1px solid rgba(255,255,255,.16);border-radius:999px;padding:8px 14px;background:rgba(0,0,0,.34);font-size:13px;font-weight:900;color:rgba(255,255,255,.76);letter-spacing:.08em;text-transform:uppercase}

    .piece{position:absolute;width:12px;height:20px;border-radius:3px;background:var(--pink);top:-30px;animation:fall linear infinite}.piece:nth-child(3n){background:var(--cyan)}.piece:nth-child(4n){background:var(--gold)}.piece:nth-child(5n){background:var(--violet)}.heart{position:absolute;top:105%;font-size:clamp(22px,2.9vw,58px);color:var(--heart);text-shadow:0 0 18px var(--heart);animation:heartRise linear infinite;filter:drop-shadow(0 0 10px var(--heart))}.balloon{position:absolute;top:110%;width:44px;height:58px;border-radius:50% 50% 46% 46%;background:var(--pink);box-shadow:inset -10px -10px 18px rgba(0,0,0,.18),0 0 18px rgba(255,255,255,.20);animation:balloonRise linear infinite}.balloon:after{content:"";position:absolute;left:50%;top:56px;width:1px;height:72px;background:rgba(255,255,255,.35)}.spark{position:absolute;width:5px;height:5px;border-radius:999px;background:var(--gold);box-shadow:0 0 15px var(--gold);animation:sparkle 2.8s ease-in-out infinite}.bokeh-dot{position:absolute;border-radius:999px;background:rgba(255,255,255,.18);box-shadow:0 0 18px rgba(255,255,255,.18);animation:bokehFloat linear infinite}.ring{position:absolute;border-radius:999px;border:2px solid rgba(255,255,255,.14);box-shadow:0 0 22px rgba(255,255,255,.14);animation:ringPulse 4.2s ease-in-out infinite}.burst{position:absolute;width:10px;height:10px;border-radius:999px;background:var(--gold);box-shadow:0 0 22px var(--gold);animation:burst 1.8s ease-out infinite}.float-word{position:absolute;font-size:clamp(20px,2vw,36px);font-weight:1000;color:rgba(255,255,255,.55);text-shadow:0 0 16px var(--cyan);animation:wordFloat linear infinite;white-space:nowrap}.ribbon{position:absolute;height:6px;border-radius:999px;background:linear-gradient(90deg,transparent,var(--pink),var(--cyan),var(--gold),transparent);filter:blur(.2px);animation:ribbonSlide linear infinite;opacity:.58}

    .scene-heart_rain .card,.scene-soft_hearts .card{box-shadow:0 0 65px rgba(255,91,167,.70), inset 0 0 52px rgba(255,255,255,.11)}.scene-heart_rain .avatar-wrap,.scene-soft_hearts .avatar-wrap{box-shadow:0 0 44px var(--heart),0 0 90px rgba(255,91,167,.45)}
    .scene-confetti_storm .piece{width:16px;height:25px}.scene-confetti_storm .card{animation:cardPulse 3.2s ease-in-out infinite}
    .scene-name_spotlight .card,.scene-spotlight .card{transform:scale(1.035);box-shadow:0 0 75px rgba(255,224,102,.55), inset 0 0 55px rgba(255,255,255,.10)}.scene-name_spotlight h1,.scene-spotlight h1{opacity:.58}.scene-name_spotlight .name,.scene-spotlight .name{font-size:clamp(62px,8vw,136px)}
    .scene-heimleitung .pill:before{content:'🧓 ';}.scene-cake_alarm .pill:before{content:'🍰 ';}.scene-cake_alarm .float-word:nth-child(odd):before{content:'🍰 '}.scene-final_burst .burst{animation-duration:1.05s}.scene-final_burst .card{transform:scale(1.06)}
    .classic_party .pill:before{content:'🎂 '}.cgn_neon .pill:before{content:'CGN ✦ '}.epic_party .pill:before{content:'⚡ '}.heimaufsicht_fun .pill:before{content:'📋 '}.cute_soft .pill:before{content:'💜 '}
    .heimaufsicht_fun .pill{border-color:rgba(251,191,36,.5);box-shadow:0 0 24px rgba(251,191,36,.28)}.heimaufsicht_fun h1{font-size:clamp(48px,6.2vw,100px)}.heimaufsicht_fun .card{background:linear-gradient(135deg,rgba(35,20,20,.82),rgba(63,29,76,.70))}.cute_soft .card{border-radius:58px;background:linear-gradient(135deg,rgba(36,22,56,.78),rgba(72,32,84,.66))}.classic_party .card{background:linear-gradient(135deg,rgba(18,30,55,.78),rgba(60,22,54,.68))}

    .debug{position:absolute;left:12px;bottom:12px;font:12px/1.35 monospace;color:#b6c2d4;background:rgba(0,0,0,.58);padding:8px 10px;border-radius:10px;display:none;white-space:pre;max-width:520px;text-align:left}.debug.show{display:block}
    @media(max-width:900px){.card{grid-template-columns:1fr;text-align:center;min-height:0;padding:42px 34px}.content{text-align:center;align-items:center}.avatar-zone{margin-top:10px}.style-badge,.timer-ribbon{display:none}}

    @keyframes spin{to{transform:rotate(360deg)}}@keyframes sweep{0%,100%{opacity:.10;transform:translateX(-8vw) rotate(22deg)}50%{opacity:.46;transform:translateX(8vw) rotate(32deg)}}@keyframes fall{to{transform:translateY(122vh) rotate(780deg)}}@keyframes heartRise{to{transform:translateY(-132vh) rotate(28deg);opacity:.04}}@keyframes balloonRise{to{transform:translateY(-138vh) translateX(4vw);opacity:.08}}@keyframes sparkle{0%,100%{opacity:.18;transform:scale(.38)}50%{opacity:1;transform:scale(1.45)}}@keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vw,-3vh) scale(1.18)}}@keyframes cardPulse{0%,100%{filter:brightness(1);transform:translateY(0)}50%{filter:brightness(1.14);transform:translateY(-4px)}}@keyframes titlePop{from{transform:translateY(18px) scale(.74);opacity:0}to{transform:translateY(0) scale(1);opacity:1}}@keyframes nameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-9px)}}@keyframes shine{0%,72%{transform:translateX(-120%)}100%{transform:translateX(120%)}}@keyframes avatarPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.048);filter:brightness(1.2)}}@keyframes crownBounce{0%,100%{transform:translateX(-50%) rotate(-5deg) translateY(0)}50%{transform:translateX(-50%) rotate(7deg) translateY(-8px)}}@keyframes gridMove{to{background-position:72px 72px}}@keyframes bokehFloat{to{transform:translateY(-120vh) translateX(5vw);opacity:.02}}@keyframes ringPulse{0%,100%{transform:scale(.85);opacity:.08}50%{transform:scale(1.28);opacity:.36}}@keyframes burst{0%{transform:scale(.3);opacity:1}100%{transform:scale(7);opacity:0}}@keyframes wordFloat{to{transform:translateY(-120vh) rotate(-6deg);opacity:.02}}@keyframes ribbonSlide{from{transform:translateX(-40vw)}to{transform:translateX(120vw)}}
  </style>
</head>
<body>
  <div id="root"><div class="stage" id="stage"></div><div id="debug" class="debug"></div></div>
  <script>
    const root=document.getElementById('root');const stage=document.getElementById('stage');const debug=document.getElementById('debug');
    const params=new URLSearchParams(location.search);const debugMode=params.get('debug')==='1';if(debugMode)debug.classList.add('show');
    let lastKey='';let lastPollOk=0;
    function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function fmtMs(ms){const n=Math.max(0,Number(ms||0));const s=Math.floor(n/1000);const m=Math.floor(s/60);const r=s%60;return `${String(m).padStart(2,'0')}:${String(r).padStart(2,'0')}`}
    function defaultEffects(style){
      const key=String(style||'cgn_neon');
      if(key==='epic_party')return{hearts:'strong',confetti:'strong',balloons:'medium',glitter:'strong',lights:'strong',bokeh:'medium',words:'medium',bursts:'strong',ribbons:'medium'};
      if(key==='cute_soft')return{hearts:'strong',confetti:'medium',balloons:'low',glitter:'medium',lights:'low',bokeh:'strong',words:'low',bursts:'medium',ribbons:'low'};
      if(key==='heimaufsicht_fun')return{hearts:'medium',confetti:'medium',balloons:'medium',glitter:'low',lights:'medium',bokeh:'low',words:'medium',bursts:'medium',ribbons:'low'};
      if(key==='classic_party')return{hearts:'medium',confetti:'strong',balloons:'strong',glitter:'medium',lights:'medium',bokeh:'low',words:'low',bursts:'medium',ribbons:'medium'};
      return{hearts:'strong',confetti:'strong',balloons:'medium',glitter:'strong',lights:'strong',bokeh:'medium',words:'medium',bursts:'strong',ribbons:'strong'};
    }
    function mergeEffects(style,e){return {...defaultEffects(style),...(e&&typeof e==='object'?e:{})}}
    function intensityCount(value, low, med, high){const v=String(value||'medium');if(v==='off'||v==='none'||v==='false')return 0;if(v==='low'||v==='soft')return low;if(v==='high'||v==='strong'||v==='full')return high;return med}
    function seeded(i,mod){return ((i*9301+49297)%233280)/233280*mod}
    function confetti(e){const n=intensityCount(e.confetti,55,95,160);let html='<div class="confetti">';for(let i=0;i<n;i++){const l=seeded(i+11,100),d=2.6+seeded(i+7,4.6),delay=-seeded(i+17,8),rot=seeded(i+21,360);html+=`<i class="piece" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s;transform:rotate(${rot}deg)"></i>`}return html+'</div>'}
    function hearts(e){const n=intensityCount(e.hearts,20,42,76);let html='<div class="hearts">';const chars=['♥','💜','💙','💖','💕','💗'];for(let i=0;i<n;i++){const l=seeded(i+31,100),d=6+seeded(i+43,8),delay=-seeded(i+51,14),ch=chars[i%chars.length];html+=`<i class="heart" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s">${ch}</i>`}return html+'</div>'}
    function balloons(e){const n=intensityCount(e.balloons,5,11,20);let html='<div class="balloons">';for(let i=0;i<n;i++){const l=seeded(i+61,100),d=11+seeded(i+73,13),delay=-seeded(i+81,20);html+=`<i class="balloon" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s;background:${i%3===0?'var(--cyan)':i%3===1?'var(--pink)':'var(--gold)'}"></i>`}return html+'</div>'}
    function sparkles(e){const n=intensityCount(e.glitter,50,90,155);let html='<div class="sparkles">';for(let i=0;i<n;i++){const l=seeded(i+91,100),t=seeded(i+93,100),delay=-seeded(i+97,4);html+=`<i class="spark" style="left:${l}%;top:${t}%;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function bokeh(e){const n=intensityCount(e.bokeh,10,18,34);let html='<div class="bokeh">';for(let i=0;i<n;i++){const l=seeded(i+101,100),size=10+seeded(i+102,34),d=10+seeded(i+103,14),delay=-seeded(i+104,18),op=.08+seeded(i+105,.18);html+=`<i class="bokeh-dot" style="left:${l}%;top:110%;width:${size}px;height:${size}px;opacity:${op};animation-duration:${d}s;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function rings(e){const n=intensityCount(e.lights,3,5,9);let html='<div class="rings">';for(let i=0;i<n;i++){const l=18+seeded(i+111,64),t=13+seeded(i+112,74),s=110+seeded(i+113,220),delay=-seeded(i+114,5);html+=`<i class="ring" style="left:${l}%;top:${t}%;width:${s}px;height:${s}px;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function bursts(e){const n=intensityCount(e.bursts,5,9,18);let html='<div class="bursts">';for(let i=0;i<n;i++){const l=12+seeded(i+121,76),t=10+seeded(i+122,78),delay=-seeded(i+123,3.5);html+=`<i class="burst" style="left:${l}%;top:${t}%;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function ribbons(e){const n=intensityCount(e.ribbons,3,6,10);let html='<div class="ribbons">';for(let i=0;i<n;i++){const t=10+seeded(i+131,80),d=8+seeded(i+132,11),delay=-seeded(i+133,10),w=24+seeded(i+134,34);html+=`<i class="ribbon" style="top:${t}%;width:${w}vw;animation-duration:${d}s;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function words(style,e){const n=intensityCount(e.words,4,8,13);let html='<div class="floating-words">';const base=style==='heimaufsicht_fun'?['Kuchenfreigabe','Heimleitung','Rollator ready','Party erlaubt','Ehrengast']:['Happy Birthday','Party','Cheers','Birthday Star','Alles Gute','Celebrate'];for(let i=0;i<n;i++){const l=seeded(i+141,88),d=10+seeded(i+142,14),delay=-seeded(i+143,18),w=base[i%base.length];html+=`<i class="float-word" style="left:${l}%;top:110%;animation-duration:${d}s;animation-delay:${delay}s">${esc(w)}</i>`}return html+'</div>'}
    function sceneList(s){if(Array.isArray(s.scenes)&&s.scenes.length)return s.scenes;const style=String(s.styleKey||'cgn_neon');if(style==='epic_party')return['final_burst','name_spotlight','heart_rain','confetti_storm','spotlight'];if(style==='cute_soft')return['soft_hearts','heart_rain','name_spotlight','sparkle_cloud'];if(style==='heimaufsicht_fun')return['heimleitung','cake_alarm','heart_rain','confetti_storm'];if(style==='classic_party')return['confetti_storm','heart_rain','balloon_wave','name_spotlight'];return['headline','heart_rain','confetti_storm','name_spotlight','final_burst']}
    function currentScene(s){const scenes=sceneList(s);const dur=Math.max(7000,Number(s.sceneDurationMs||18000));const idx=Math.floor(Math.max(0,Date.now()-Number(s.phaseStartedAt||Date.now()))/dur)%scenes.length;return scenes[idx]||'headline'}
    function renderIntro(s){stage.innerHTML=`<div class="intro-wrap"><div class="intro-box">${esc(s.videoQuietPhaseLabel||'Intro läuft')}</div></div>`}
    function avatarBlock(s){const url=String(s.targetAvatarUrl||s.avatarUrl||'');const name=String(s.targetDisplayName||s.targetLogin||'?');if(url)return `<div class="avatar-zone"><div class="crown">👑</div><div class="avatar-wrap"><img class="avatar" src="${esc(url)}" alt=""></div></div>`;return `<div class="avatar-zone"><div class="crown">👑</div><div class="avatar-wrap"><div class="avatar-fallback">${esc(name.slice(0,1).toUpperCase())}</div></div></div>`}
    function renderParty(s){const style=esc(s.styleKey||'cgn_neon');const scene=esc(currentScene(s));const e=mergeEffects(style,s.effects);const display=String(s.targetDisplayName||s.targetLogin||'');const cleanName=display.startsWith('@')?display.slice(1):display;stage.innerHTML=`<div class="party ${style} scene-${scene}"><div class="gridlines"></div><div class="orbs"><i class="orb o1"></i><i class="orb o2"></i><i class="orb o3"></i><i class="orb o4"></i></div><div class="beam b1"></div><div class="beam b2"></div><div class="beam b3"></div>${ribbons(e)}${bokeh(e)}${rings(e)}${bursts(e)}${confetti(e)}${hearts(e)}${balloons(e)}${sparkles(e)}${words(style,e)}<div class="party-title">${esc(s.partyTitle||'Birthday Party')}</div><div class="style-badge">${esc((s.styleKey||'cgn_neon').replace(/_/g,' '))}</div><div class="timer-ribbon">Party: ${fmtMs(s.remainingMs||s.totalRemainingMs)}</div><div class="card">${avatarBlock(s)}<div class="content"><div class="pill">Geburtstagsalarm</div><h1>${esc(s.headline||'Happy Birthday!')}</h1><div class="name">${esc(cleanName)}</div><div class="msg">${esc(s.message||'Alles Gute zum Geburtstag!')}</div></div></div></div>`}
    function renderIdle(){stage.innerHTML=''}
    function applyState(data){const s=data&&data.state||{};lastPollOk=Date.now();debug.textContent=JSON.stringify({active:s.active,phase:s.phase,party:s.partyKey,style:s.styleKey,scene:s.active?currentScene(s):'',target:s.targetDisplayName,avatar:!!(s.targetAvatarUrl||s.avatarUrl),remainingMs:s.remainingMs,queue:Array.isArray(s.queue)?s.queue.length:0},null,2);if(!s.active){root.classList.remove('active');if(lastKey!=='idle'){renderIdle();lastKey='idle'}return}root.classList.add('active');const scene=s.phase==='party'?currentScene(s):'';const key=`${s.requestId}:${s.phase}:${s.styleKey||''}:${scene}:${s.targetAvatarUrl||s.avatarUrl||''}`;if(key===lastKey)return;lastKey=key;if(s.phase==='video')renderIntro(s);else if(s.phase==='starting_song')renderIntro({videoQuietPhaseLabel:'Song startet...'});else renderParty(s)}
    async function poll(){try{const r=await fetch('/api/birthday/show/state',{cache:'no-store'});applyState(await r.json())}catch(e){debug.textContent=String(e)}}
    poll();setInterval(poll,500);
  </script>
</body>
