<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birthday Overlay</title>
  <style>
    :root{--bg:#060817;--pink:#ff4fd8;--cyan:#40e8ff;--violet:#8c5bff;--gold:#ffd166;--heart:#ff5ba7;--white:#fff}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Montserrat,Inter,Arial,sans-serif;color:var(--white)}
    #root{position:fixed;inset:0;display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity .45s ease}#root.active{opacity:1}
    .stage{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,rgba(140,91,255,.35),rgba(6,8,23,.78) 38%,rgba(0,0,0,.92));overflow:hidden}
    .intro-wrap{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 50%,rgba(64,232,255,.12),rgba(0,0,0,.84) 55%,rgba(0,0,0,.96));}.intro-box{border:1px solid rgba(64,232,255,.32);border-radius:28px;padding:28px 38px;background:rgba(7,10,25,.62);box-shadow:0 0 32px rgba(64,232,255,.18);font-size:clamp(26px,3vw,48px);font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#dff9ff}
    .party{position:absolute;inset:0;display:grid;place-items:center;padding:5vw;text-align:center}.party.classic_party{--pink:#ff5ba7;--cyan:#59dfff;--violet:#a36bff;--gold:#ffd166;--heart:#ff4f8b}.party.cgn_neon{--pink:#ff4fd8;--cyan:#40e8ff;--violet:#8c5bff;--gold:#ffd166;--heart:#ff5bbd}.party.epic_party{--pink:#ff2fb8;--cyan:#00f0ff;--violet:#7c3cff;--gold:#ffe066;--heart:#ff3366}.party.heimaufsicht_fun{--pink:#ff6aa7;--cyan:#7dd3fc;--violet:#9333ea;--gold:#fbbf24;--heart:#fb7185}.party.cute_soft{--pink:#ff9bd2;--cyan:#a5f3fc;--violet:#c4b5fd;--gold:#fde68a;--heart:#ff7ab6}
    .bg-orbs,.hearts,.confetti,.balloons,.sparkles{position:absolute;inset:-10%;pointer-events:none}.orb{position:absolute;width:28vw;height:28vw;border-radius:999px;filter:blur(34px);opacity:.30;animation:floatOrb 13s ease-in-out infinite}.orb.o1{left:2%;top:4%;background:var(--pink)}.orb.o2{right:3%;bottom:0;background:var(--cyan);animation-delay:-5s}.orb.o3{left:38%;bottom:-8%;background:var(--violet);animation-delay:-9s}
    .card{position:relative;width:min(1120px,84vw);min-height:430px;border:2px solid rgba(255,255,255,.18);border-radius:38px;background:linear-gradient(135deg,rgba(17,24,39,.80),rgba(34,10,64,.68));box-shadow:0 0 45px rgba(140,91,255,.65), inset 0 0 42px rgba(64,232,255,.08);backdrop-filter:blur(12px);padding:54px 64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;overflow:hidden;animation:cardPulse 6s ease-in-out infinite}.card:before{content:"";position:absolute;inset:-3px;border-radius:40px;background:conic-gradient(from 0deg,var(--pink),var(--cyan),var(--gold),var(--violet),var(--pink));filter:blur(16px);opacity:.42;z-index:-1;animation:spin 5s linear infinite}.card:after{content:"";position:absolute;inset:0;background:linear-gradient(120deg,transparent,rgba(255,255,255,.08),transparent);transform:translateX(-120%);animation:shine 6s ease-in-out infinite}
    .avatar-wrap{position:relative;width:clamp(108px,12vw,178px);height:clamp(108px,12vw,178px);border-radius:999px;padding:6px;background:conic-gradient(from 0deg,var(--pink),var(--cyan),var(--gold),var(--violet),var(--pink));box-shadow:0 0 28px var(--pink),0 0 52px rgba(64,232,255,.42);animation:avatarPulse 3.2s ease-in-out infinite}.avatar-wrap:before{content:"";position:absolute;inset:-16px;border-radius:999px;border:2px solid rgba(255,255,255,.16);box-shadow:0 0 30px rgba(255,255,255,.14)}.avatar{width:100%;height:100%;border-radius:999px;object-fit:cover;border:4px solid rgba(8,12,28,.96);background:#111827}.avatar-fallback{display:grid;place-items:center;width:100%;height:100%;border-radius:999px;border:4px solid rgba(8,12,28,.96);background:linear-gradient(135deg,var(--violet),var(--pink));font-size:clamp(46px,7vw,96px);font-weight:1000}
    h1{font-size:clamp(54px,8vw,128px);line-height:.95;margin:0;text-transform:uppercase;letter-spacing:.035em;text-shadow:0 0 20px rgba(255,79,216,.9),0 0 48px rgba(64,232,255,.65);animation:titlePop 900ms cubic-bezier(.2,1.35,.35,1)}.name{font-size:clamp(42px,6vw,92px);font-weight:900;color:var(--gold);text-shadow:0 0 18px rgba(255,209,102,.9),0 0 36px rgba(255,79,216,.45);animation:nameFloat 4s ease-in-out infinite}.msg{font-size:clamp(24px,2.4vw,42px);font-weight:800;color:#f8fafc;text-shadow:0 0 14px rgba(255,255,255,.35)}.pill{font-size:22px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#dff9ff;border:1px solid rgba(64,232,255,.45);border-radius:999px;padding:10px 18px;background:rgba(64,232,255,.08);box-shadow:0 0 20px rgba(64,232,255,.28)}.party-title{position:absolute;top:2.2vh;left:50%;transform:translateX(-50%);font-size:16px;font-weight:900;letter-spacing:.18em;text-transform:uppercase;color:rgba(255,255,255,.78);text-shadow:0 0 16px var(--cyan)}
    .piece{position:absolute;width:12px;height:20px;border-radius:3px;background:var(--pink);top:-30px;animation:fall linear infinite}.piece:nth-child(3n){background:var(--cyan)}.piece:nth-child(4n){background:var(--gold)}.piece:nth-child(5n){background:var(--violet)}.heart{position:absolute;top:105%;font-size:clamp(20px,2.8vw,54px);color:var(--heart);text-shadow:0 0 18px var(--heart);animation:heartRise linear infinite}.balloon{position:absolute;top:110%;width:44px;height:58px;border-radius:50% 50% 46% 46%;background:var(--pink);box-shadow:inset -10px -10px 18px rgba(0,0,0,.18),0 0 18px rgba(255,255,255,.18);animation:balloonRise linear infinite}.balloon:after{content:"";position:absolute;left:50%;top:56px;width:1px;height:60px;background:rgba(255,255,255,.35)}.spark{position:absolute;width:5px;height:5px;border-radius:999px;background:var(--gold);box-shadow:0 0 14px var(--gold);animation:sparkle 2.8s ease-in-out infinite}.beam{position:absolute;width:32vw;height:160vh;top:-30vh;background:linear-gradient(90deg,transparent,rgba(255,255,255,.11),transparent);filter:blur(2px);transform-origin:center;animation:sweep 4.5s ease-in-out infinite}.beam.b1{left:6vw;transform:rotate(24deg)}.beam.b2{right:10vw;animation-delay:-2s;transform:rotate(-25deg)}
    .scene-heart_rain .card,.scene-soft_hearts .card{box-shadow:0 0 55px rgba(255,91,167,.66), inset 0 0 42px rgba(255,255,255,.10)}.scene-confetti_storm .piece{width:16px;height:24px}.scene-name_spotlight .card,.scene-spotlight .card{transform:scale(1.04)}.scene-heimleitung .pill:before{content:'🧓 ';}.scene-cake_alarm .pill:before{content:'🍰 ';}
    .debug{position:absolute;left:12px;bottom:12px;font:12px/1.35 monospace;color:#b6c2d4;background:rgba(0,0,0,.55);padding:8px 10px;border-radius:10px;display:none}.debug.show{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes sweep{0%,100%{opacity:.12;transform:translateX(-8vw) rotate(22deg)}50%{opacity:.45;transform:translateX(8vw) rotate(32deg)}}@keyframes fall{to{transform:translateY(120vh) rotate(720deg)}}@keyframes heartRise{to{transform:translateY(-130vh) rotate(28deg);opacity:.05}}@keyframes balloonRise{to{transform:translateY(-135vh) translateX(4vw);opacity:.08}}@keyframes sparkle{0%,100%{opacity:.2;transform:scale(.4)}50%{opacity:1;transform:scale(1.35)}}@keyframes floatOrb{0%,100%{transform:translate(0,0) scale(1)}50%{transform:translate(4vw,-3vh) scale(1.18)}}@keyframes cardPulse{0%,100%{filter:brightness(1)}50%{filter:brightness(1.12)}}@keyframes titlePop{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}@keyframes nameFloat{0%,100%{transform:translateY(0)}50%{transform:translateY(-8px)}}@keyframes shine{0%,75%{transform:translateX(-120%)}100%{transform:translateX(120%)}}@keyframes avatarPulse{0%,100%{transform:scale(1);filter:brightness(1)}50%{transform:scale(1.045);filter:brightness(1.18)}}
  </style>
</head>
<body>
  <div id="root"><div class="stage" id="stage"></div><div id="debug" class="debug"></div></div>
  <script>
    const root=document.getElementById('root');const stage=document.getElementById('stage');const debug=document.getElementById('debug');
    const params=new URLSearchParams(location.search);const debugMode=params.get('debug')==='1';if(debugMode)debug.classList.add('show');
    let lastKey='';
    function esc(v){return String(v??'').replace(/[&<>"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function intensityCount(value, low, med, high){const v=String(value||'medium');if(v==='off'||v==='none')return 0;if(v==='low'||v==='soft')return low;if(v==='high'||v==='strong')return high;return med}
    function confetti(e){const n=intensityCount(e.confetti,55,90,145);let html='<div class="confetti">';for(let i=0;i<n;i++){const l=Math.random()*100,d=2.4+Math.random()*4.4,delay=Math.random()*-8,rot=Math.random()*360;html+=`<i class="piece" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s;transform:rotate(${rot}deg)"></i>`}return html+'</div>'}
    function hearts(e){const n=intensityCount(e.hearts,18,34,62);let html='<div class="hearts">';const chars=['♥','💜','💙','💖','💕'];for(let i=0;i<n;i++){const l=Math.random()*100,d=6+Math.random()*7,delay=Math.random()*-12,ch=chars[i%chars.length];html+=`<i class="heart" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s">${ch}</i>`}return html+'</div>'}
    function balloons(e){const n=intensityCount(e.balloons,5,10,18);let html='<div class="balloons">';for(let i=0;i<n;i++){const l=Math.random()*100,d=10+Math.random()*12,delay=Math.random()*-18;html+=`<i class="balloon" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s;background:${i%3===0?'var(--cyan)':i%3===1?'var(--pink)':'var(--gold)'}"></i>`}return html+'</div>'}
    function sparkles(e){const n=intensityCount(e.glitter,45,80,140);let html='<div class="sparkles">';for(let i=0;i<n;i++){const l=Math.random()*100,t=Math.random()*100,delay=Math.random()*-4;html+=`<i class="spark" style="left:${l}%;top:${t}%;animation-delay:${delay}s"></i>`}return html+'</div>'}
    function currentScene(s){const scenes=Array.isArray(s.scenes)&&s.scenes.length?s.scenes:['headline','hearts','confetti','spotlight'];const dur=Math.max(6000,Number(s.sceneDurationMs||18000));const idx=Math.floor(Math.max(0,Date.now()-Number(s.phaseStartedAt||Date.now()))/dur)%scenes.length;return scenes[idx]||'headline'}
    function renderIntro(s){stage.innerHTML=`<div class="intro-wrap"><div class="intro-box">${esc(s.videoQuietPhaseLabel||'Intro läuft')}</div></div>`}
    function avatarBlock(s){const url=String(s.targetAvatarUrl||s.avatarUrl||'');const name=String(s.targetDisplayName||s.targetLogin||'?');if(url)return `<div class="avatar-wrap"><img class="avatar" src="${esc(url)}" alt=""></div>`;return `<div class="avatar-wrap"><div class="avatar-fallback">${esc(name.slice(0,1).toUpperCase())}</div></div>`}
    function renderParty(s){const style=esc(s.styleKey||'cgn_neon');const scene=esc(currentScene(s));const e=s.effects||{};stage.innerHTML=`<div class="party ${style} scene-${scene}"><div class="bg-orbs"><i class="orb o1"></i><i class="orb o2"></i><i class="orb o3"></i></div><div class="beam b1"></div><div class="beam b2"></div>${confetti(e)}${hearts(e)}${balloons(e)}${sparkles(e)}<div class="party-title">${esc(s.partyTitle||'Birthday Party')}</div><div class="card"><div class="pill">CGN Geburtstagsalarm</div>${avatarBlock(s)}<h1>${esc(s.headline||'Happy Birthday!')}</h1><div class="name">@${esc(s.targetDisplayName||s.targetLogin||'')}</div><div class="msg">${esc(s.message||'Alles Gute zum Geburtstag!')}</div></div></div>`}
    function renderIdle(){stage.innerHTML=''}
    function applyState(data){const s=data&&data.state||{};debug.textContent=JSON.stringify({active:s.active,phase:s.phase,party:s.partyKey,style:s.styleKey,scene:currentScene(s),target:s.targetDisplayName,remainingMs:s.remainingMs},null,2);if(!s.active){root.classList.remove('active');if(lastKey!=='idle'){renderIdle();lastKey='idle'}return}root.classList.add('active');const scene=s.phase==='party'?currentScene(s):'';const key=`${s.requestId}:${s.phase}:${s.styleKey||''}:${scene}`;if(key===lastKey)return;lastKey=key;if(s.phase==='video')renderIntro(s);else if(s.phase==='starting_song')renderIntro({videoQuietPhaseLabel:'Song startet...'});else renderParty(s)}
    async function poll(){try{const r=await fetch('/api/birthday/show/state',{cache:'no-store'});applyState(await r.json())}catch(e){debug.textContent=String(e)}}
    poll();setInterval(poll,500);
  </script>
</body>
</html>
