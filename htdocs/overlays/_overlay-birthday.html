<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Birthday Overlay</title>
  <style>
    :root{--bg:#060817;--pink:#ff4fd8;--cyan:#40e8ff;--violet:#8c5bff;--gold:#ffd166;--white:#fff}
    *{box-sizing:border-box}html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;font-family:Montserrat,Inter,Arial,sans-serif;color:var(--white)}
    #root{position:fixed;inset:0;display:grid;place-items:center;opacity:0;pointer-events:none;transition:opacity .45s ease}
    #root.active{opacity:1}.stage{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 45%,rgba(140,91,255,.35),rgba(6,8,23,.78) 38%,rgba(0,0,0,.92));overflow:hidden}
    .intro-wrap{position:absolute;inset:0;display:grid;place-items:center;background:radial-gradient(circle at 50% 50%,rgba(64,232,255,.12),rgba(0,0,0,.84) 55%,rgba(0,0,0,.96));}.intro-box{border:1px solid rgba(64,232,255,.32);border-radius:28px;padding:28px 38px;background:rgba(7,10,25,.62);box-shadow:0 0 32px rgba(64,232,255,.18);font-size:clamp(26px,3vw,48px);font-weight:900;letter-spacing:.08em;text-transform:uppercase;color:#dff9ff}.party{position:absolute;inset:0;display:grid;place-items:center;padding:5vw;text-align:center}
    .card{position:relative;width:min(1100px,82vw);min-height:430px;border:2px solid rgba(255,255,255,.18);border-radius:38px;background:linear-gradient(135deg,rgba(17,24,39,.78),rgba(34,10,64,.66));box-shadow:0 0 45px rgba(140,91,255,.65), inset 0 0 42px rgba(64,232,255,.08);backdrop-filter:blur(12px);padding:54px 64px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:22px;overflow:hidden}
    .card:before{content:"";position:absolute;inset:-3px;border-radius:40px;background:conic-gradient(from 0deg,var(--pink),var(--cyan),var(--gold),var(--violet),var(--pink));filter:blur(16px);opacity:.42;z-index:-1;animation:spin 5s linear infinite}
    h1{font-size:clamp(54px,8vw,128px);line-height:.95;margin:0;text-transform:uppercase;letter-spacing:.035em;text-shadow:0 0 20px rgba(255,79,216,.9),0 0 48px rgba(64,232,255,.65)}
    .name{font-size:clamp(42px,6vw,92px);font-weight:900;color:var(--gold);text-shadow:0 0 18px rgba(255,209,102,.9),0 0 36px rgba(255,79,216,.45)}.msg{font-size:clamp(24px,2.4vw,42px);font-weight:800;color:#f8fafc;text-shadow:0 0 14px rgba(255,255,255,.35)}
    .pill{font-size:22px;font-weight:900;letter-spacing:.14em;text-transform:uppercase;color:#dff9ff;border:1px solid rgba(64,232,255,.45);border-radius:999px;padding:10px 18px;background:rgba(64,232,255,.08);box-shadow:0 0 20px rgba(64,232,255,.28)}
    .confetti{position:absolute;inset:-10%;pointer-events:none}.piece{position:absolute;width:12px;height:20px;border-radius:3px;background:var(--pink);top:-30px;animation:fall linear infinite}.piece:nth-child(3n){background:var(--cyan)}.piece:nth-child(4n){background:var(--gold)}.piece:nth-child(5n){background:var(--violet)}
    .beam{position:absolute;width:32vw;height:160vh;top:-30vh;background:linear-gradient(90deg,transparent,rgba(255,255,255,.10),transparent);filter:blur(2px);transform-origin:center;animation:sweep 4.5s ease-in-out infinite}.beam.b1{left:6vw;transform:rotate(24deg)}.beam.b2{right:10vw;animation-delay:-2s;transform:rotate(-25deg)}
    .debug{position:absolute;left:12px;bottom:12px;font:12px/1.35 monospace;color:#b6c2d4;background:rgba(0,0,0,.55);padding:8px 10px;border-radius:10px;display:none}.debug.show{display:block}
    @keyframes spin{to{transform:rotate(360deg)}}@keyframes sweep{0%,100%{opacity:.12;transform:translateX(-8vw) rotate(22deg)}50%{opacity:.42;transform:translateX(8vw) rotate(32deg)}}@keyframes fall{to{transform:translateY(120vh) rotate(720deg)}}
  </style>
</head>
<body>
  <div id="root"><div class="stage" id="stage"></div><div id="debug" class="debug"></div></div>
  <script>
    const root=document.getElementById('root');const stage=document.getElementById('stage');const debug=document.getElementById('debug');
    const params=new URLSearchParams(location.search);const debugMode=params.get('debug')==='1';if(debugMode)debug.classList.add('show');
    let lastKey='';
    function esc(v){return String(v??'').replace(/[&<>\"]/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]))}
    function confetti(){let html='<div class="confetti">';for(let i=0;i<90;i++){const l=Math.random()*100;const d=2.4+Math.random()*3.6;const delay=Math.random()*-6;const rot=Math.random()*360;html+=`<i class="piece" style="left:${l}%;animation-duration:${d}s;animation-delay:${delay}s;transform:rotate(${rot}deg)"></i>`}return html+'</div>'}
    function renderIntro(s){stage.innerHTML=`<div class="intro-wrap"><div class="intro-box">${esc(s.videoQuietPhaseLabel||'Intro läuft')}</div></div>`}
    function renderParty(s){stage.innerHTML=`<div class="beam b1"></div><div class="beam b2"></div>${confetti()}<div class="party"><div class="card"><div class="pill">CGN Geburtstagsalarm</div><h1>${esc(s.headline||'Happy Birthday!')}</h1><div class="name">@${esc(s.targetDisplayName||s.targetLogin||'')}</div><div class="msg">${esc(s.message||'Alles Gute zum Geburtstag!')}</div></div></div>`}
    function renderIdle(){stage.innerHTML=''}
    function applyState(data){const s=data&&data.state||{};debug.textContent=JSON.stringify({active:s.active,phase:s.phase,target:s.targetDisplayName,remainingMs:s.remainingMs},null,2);if(!s.active){root.classList.remove('active');if(lastKey!=='idle'){renderIdle();lastKey='idle'}return}root.classList.add('active');const key=`${s.requestId}:${s.phase}`;if(key===lastKey)return;lastKey=key;if(s.phase==='video')renderIntro(s);else if(s.phase==='starting_song')renderIntro({videoQuietPhaseLabel:'Song startet...'});else renderParty(s)}
    async function poll(){try{const r=await fetch('/api/birthday/show/state',{cache:'no-store'});applyState(await r.json())}catch(e){debug.textContent=String(e)}}
    poll();setInterval(poll,500);
  </script>
</body>
</html>
