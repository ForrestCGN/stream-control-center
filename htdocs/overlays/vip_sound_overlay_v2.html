<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=1920, height=1080" />
  <title>VIP Sound Overlay V2</title>
  <style>
    :root {
      --card-w: 610px;
      --card-h: 148px;
      --right: 52px;
      --bottom: 52px;
      --radius: 26px;
      --intro-ms: 520ms;
      --outro-ms: 420ms;
      --neon-cyan: #55d6ff;
      --neon-blue: #5c8cff;
      --neon-purple: #a875ff;
      --neon-pink: #ff5eea;
      --glass-bg: rgba(10, 13, 28, 0.82);
      --glass-bg-2: rgba(34, 18, 72, 0.72);
      --text-main: #ffffff;
      --text-soft: #dce7ff;
      --text-muted: #9fb4d8;
      --hidden-x: calc(var(--card-w) + var(--right) + 160px);
    }

    html, body {
      margin: 0;
      padding: 0;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
      color: var(--text-main);
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body[data-debug="1"] #vip-debug {
      display: block;
    }

    #vip-debug {
      position: absolute;
      left: 18px;
      top: 18px;
      z-index: 99999;
      display: none;
      min-width: 460px;
      max-width: 820px;
      padding: 10px 12px;
      border-radius: 12px;
      border: 1px solid rgba(85, 214, 255, 0.84);
      background: rgba(3, 6, 18, 0.86);
      color: #dff7ff;
      font: 13px/1.35 Consolas, monospace;
      white-space: pre-wrap;
      box-shadow: 0 0 18px rgba(85, 214, 255, 0.25);
      pointer-events: none;
    }

    #vip-root {
      position: absolute;
      right: var(--right);
      bottom: var(--bottom);
      width: var(--card-w);
      height: var(--card-h);
      opacity: 0;
      visibility: hidden;
      transform: translateX(var(--hidden-x)) scale(0.98);
      transform-origin: right bottom;
      pointer-events: none;
      will-change: transform, opacity;
    }

    #vip-root.is-visible {
      visibility: visible;
    }

    #vip-root.enter {
      animation: vipEnter var(--intro-ms) cubic-bezier(.17,.85,.24,1) forwards;
    }

    #vip-root.exit {
      animation: vipExit var(--outro-ms) cubic-bezier(.58,.08,.76,.22) forwards;
    }

    @keyframes vipEnter {
      from { opacity: 0; transform: translateX(var(--hidden-x)) scale(0.98); filter: blur(2px); }
      to   { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
    }

    @keyframes vipExit {
      from { opacity: 1; transform: translateX(0) scale(1); filter: blur(0); }
      to   { opacity: 0; transform: translateX(var(--hidden-x)) scale(0.98); filter: blur(1px); }
    }

    .vip-card {
      position: relative;
      width: var(--card-w);
      height: var(--card-h);
      border-radius: var(--radius);
      overflow: hidden;
      background:
        radial-gradient(circle at 18% 22%, rgba(168, 117, 255, 0.38), transparent 36%),
        radial-gradient(circle at 88% 14%, rgba(85, 214, 255, 0.24), transparent 34%),
        linear-gradient(135deg, var(--glass-bg), var(--glass-bg-2));
      box-shadow:
        0 18px 44px rgba(0, 0, 0, 0.56),
        0 0 26px rgba(92, 140, 255, 0.18),
        inset 0 0 22px rgba(255, 255, 255, 0.055);
    }

    .vip-card::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 2px;
      background: linear-gradient(120deg,
        rgba(85, 214, 255, 0.95),
        rgba(168, 117, 255, 0.92),
        rgba(255, 94, 234, 0.48),
        rgba(85, 214, 255, 0.95));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
      filter: drop-shadow(0 0 7px rgba(85, 214, 255, 0.55));
      z-index: 5;
    }

    .vip-card::after {
      content: "";
      position: absolute;
      inset: -70px;
      background:
        linear-gradient(90deg, transparent 0%, rgba(85, 214, 255, 0.08) 42%, rgba(255, 255, 255, 0.18) 50%, rgba(168, 117, 255, 0.08) 58%, transparent 100%);
      transform: translateX(-70%);
      animation: sheen 4.8s linear infinite;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes sheen {
      0% { transform: translateX(-78%) rotate(7deg); }
      100% { transform: translateX(78%) rotate(7deg); }
    }

    .runner {
      position: absolute;
      left: 22px;
      right: 22px;
      top: 13px;
      height: 2px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--neon-cyan), var(--neon-purple), transparent);
      opacity: 0.82;
      box-shadow: 0 0 10px rgba(85, 214, 255, 0.58), 0 0 18px rgba(168, 117, 255, 0.35);
      z-index: 6;
    }

    .runner::before {
      content: "";
      position: absolute;
      top: -2px;
      left: -30%;
      width: 30%;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.85), transparent);
      filter: blur(1px);
      animation: runnerMove 2.8s linear infinite;
    }

    @keyframes runnerMove {
      from { transform: translateX(0); }
      to   { transform: translateX(460%); }
    }

    .content {
      position: relative;
      z-index: 7;
      height: 100%;
      display: grid;
      grid-template-columns: 112px 1fr;
      gap: 18px;
      align-items: center;
      padding: 24px 26px;
      box-sizing: border-box;
    }

    .avatar-shell {
      position: relative;
      width: 96px;
      height: 96px;
      display: grid;
      place-items: center;
    }

    .avatar-ring {
      position: absolute;
      inset: 0;
      border-radius: 999px;
      background:
        conic-gradient(from 0deg, var(--neon-cyan), var(--neon-purple), var(--neon-pink), var(--neon-cyan));
      filter: drop-shadow(0 0 9px rgba(85, 214, 255, 0.45));
      animation: spin 4.4s linear infinite;
    }

    .avatar-ring::after {
      content: "";
      position: absolute;
      inset: 5px;
      border-radius: inherit;
      background: rgba(8, 10, 24, 0.95);
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .avatar-frame {
      position: relative;
      z-index: 2;
      width: 82px;
      height: 82px;
      border-radius: 999px;
      overflow: hidden;
      background: #11182d;
      box-shadow: inset 0 0 10px rgba(0,0,0,0.45);
    }

    #avatar-img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #avatar-fallback {
      width: 100%;
      height: 100%;
      display: grid;
      place-items: center;
      font-size: 31px;
      font-weight: 900;
      color: #fff;
      background: radial-gradient(circle at 30% 25%, rgba(85,214,255,0.45), rgba(168,117,255,0.36) 45%, rgba(12,14,30,1));
    }

    .text-block {
      min-width: 0;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .eyebrow {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--text-muted);
      font-weight: 800;
    }

    .dot {
      width: 8px;
      height: 8px;
      border-radius: 999px;
      background: var(--neon-cyan);
      box-shadow: 0 0 12px rgba(85,214,255,0.9);
    }

    #display-name {
      font-size: 34px;
      line-height: 1;
      font-weight: 900;
      max-width: 430px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      color: #fff;
      text-shadow:
        0 0 12px rgba(85,214,255,0.22),
        0 0 18px rgba(168,117,255,0.22);
    }

    #message {
      font-size: 19px;
      line-height: 1.18;
      font-weight: 750;
      color: var(--text-soft);
      max-width: 430px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .meta-row {
      display: flex;
      align-items: center;
      gap: 10px;
      color: var(--text-muted);
      font-size: 12px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .pill {
      padding: 3px 8px;
      border-radius: 999px;
      background: rgba(85, 214, 255, 0.11);
      border: 1px solid rgba(85, 214, 255, 0.28);
      color: #bfeeff;
    }
  </style>
</head>
<body>
  <div id="vip-debug">VIP V2 debug boot...</div>

  <div id="vip-root" aria-hidden="true">
    <div class="vip-card">
      <div class="runner"></div>
      <div class="content">
        <div class="avatar-shell">
          <div class="avatar-ring"></div>
          <div class="avatar-frame">
            <img id="avatar-img" alt="Avatar" />
            <div id="avatar-fallback">?</div>
          </div>
        </div>

        <div class="text-block">
          <div class="eyebrow"><span class="dot"></span><span id="headline">VIP Sound</span></div>
          <div id="display-name">ForrestCGN</div>
          <div id="message">Danke, dass du da bist.</div>
          <div class="meta-row"><span class="pill" id="type-pill">VIP</span><span>Sound-System Visual</span></div>
        </div>
      </div>
    </div>
  </div>

  <script>
    const SOUND_STATUS_URL = "/api/sound/status";
    const SOUND_POLL_MS = 500;
    const INTRO_MS = 520;
    const OUTRO_MS = 420;

    const root = document.getElementById("vip-root");
    const nameEl = document.getElementById("display-name");
    const msgEl = document.getElementById("message");
    const headlineEl = document.getElementById("headline");
    const typePillEl = document.getElementById("type-pill");
    const avatarImg = document.getElementById("avatar-img");
    const avatarFallback = document.getElementById("avatar-fallback");
    const debugEl = document.getElementById("vip-debug");

    const params = new URLSearchParams(location.search);
    const debugEnabled = params.get("debug") === "1";
    if (debugEnabled) document.body.dataset.debug = "1";

    let ws = null;
    let reconnectTimer = null;
    let pollTimer = null;
    let hideTimer = null;
    let currentRequestId = "";
    let visible = false;
    let lastSoundRequestId = "";

    function setDebug(lines) {
      if (!debugEnabled || !debugEl) return;
      const arr = Array.isArray(lines) ? lines : [String(lines || "")];
      debugEl.textContent = arr.join("\n");
    }

    function safeString(value, fallback = "") {
      const text = String(value == null ? "" : value).trim();
      return text || fallback;
    }

    function initials(name) {
      const n = safeString(name, "?");
      const parts = n.split(/\s+/).filter(Boolean);
      if (parts.length === 1) return parts[0].slice(0, 1).toUpperCase();
      return (parts[0][0] + parts[1][0]).toUpperCase();
    }

    function isVipItem(item) {
      const visual = item && item.visual ? item.visual : {};
      return safeString(visual.module).toLowerCase() === "vip_sound_overlay";
    }

    function overlayFromItem(item) {
      const visual = item && item.visual ? item.visual : {};
      const displayName = safeString(visual.displayName || visual.userDisplayName || item.requestedBy, "VIP");
      const type = safeString(visual.type || item.category, "vip").toLowerCase();
      return {
        requestId: safeString(visual.requestId || item.requestId),
        soundRequestId: safeString(item.requestId),
        displayName,
        login: safeString(visual.login || item.requestedBy),
        avatarUrl: safeString(visual.avatarUrl),
        title: safeString(visual.title, type === "mod" || type === "crew" ? "Mod Sound" : "VIP Sound"),
        text: safeString(visual.text, type === "mod" || type === "crew" ? "Danke fuer deinen Support als Mod." : "Danke, dass du da bist."),
        type
      };
    }

    function setAvatar(url, displayName) {
      avatarFallback.textContent = initials(displayName);
      avatarImg.onload = () => {
        avatarImg.style.display = "block";
        avatarFallback.style.display = "none";
      };
      avatarImg.onerror = () => {
        avatarImg.style.display = "none";
        avatarFallback.style.display = "grid";
      };

      if (!url) {
        avatarImg.removeAttribute("src");
        avatarImg.style.display = "none";
        avatarFallback.style.display = "grid";
        return;
      }

      avatarImg.src = url;
    }

    function showOverlay(overlay, reason) {
      if (!overlay || !overlay.requestId) return;
      if (overlay.soundRequestId && overlay.soundRequestId === lastSoundRequestId && visible) return;

      clearTimeout(hideTimer);
      currentRequestId = overlay.requestId;
      lastSoundRequestId = overlay.soundRequestId || overlay.requestId;
      visible = true;

      headlineEl.textContent = overlay.title || "VIP Sound";
      nameEl.textContent = overlay.displayName || "VIP";
      msgEl.textContent = overlay.text || "Danke, dass du da bist.";
      typePillEl.textContent = overlay.type === "crew" || overlay.type === "mod" ? "MOD" : "VIP";
      setAvatar(overlay.avatarUrl || "", overlay.displayName || "");

      root.style.setProperty("--intro-ms", INTRO_MS + "ms");
      root.classList.remove("exit");
      root.classList.add("is-visible", "enter");
      root.setAttribute("aria-hidden", "false");

      setDebug([
        "SHOW VIP V2",
        "reason=" + reason,
        "requestId=" + overlay.requestId,
        "soundRequestId=" + overlay.soundRequestId,
        "displayName=" + overlay.displayName,
        "type=" + overlay.type
      ]);
    }

    function hideOverlay(reason) {
      if (!visible) return;
      visible = false;

      root.style.setProperty("--outro-ms", OUTRO_MS + "ms");
      root.classList.remove("enter");
      root.classList.add("is-visible", "exit");

      clearTimeout(hideTimer);
      hideTimer = setTimeout(() => {
        root.classList.remove("enter", "exit", "is-visible");
        root.setAttribute("aria-hidden", "true");
        currentRequestId = "";
      }, OUTRO_MS + 80);

      setDebug([
        "HIDE VIP V2",
        "reason=" + reason,
        "lastSoundRequestId=" + lastSoundRequestId
      ]);
    }

    function handleSoundItem(item, reason) {
      if (!item || !isVipItem(item)) return false;
      showOverlay(overlayFromItem(item), reason || "sound_item");
      return true;
    }

    function handleSoundSystemEvent(payload) {
      if (!payload || payload.op !== "sound_system") return;
      const reason = safeString(payload.reason);
      const data = payload.data || payload.payload || {};
      const item = payload.item || data.item || data.current || null;
      const visual = item && item.visual ? item.visual : {};

      setDebug([
        "SOUND EVENT",
        "reason=" + reason,
        "hasItem=" + (!!item),
        "itemId=" + safeString(item && item.requestId),
        "category=" + safeString(item && item.category),
        "visual.module=" + safeString(visual.module),
        "vipItem=" + (item ? isVipItem(item) : false),
        "visible=" + visible
      ]);

      const startReasons = ["started", "device_play_started", "item_started", "item_starting", "play_stream", "next_started", "interrupted_started", "parallel_started", "resumed"];
      const stopReasons = ["auto_finished", "finished", "device_play_finished", "device_play_stopped", "manual_stop", "manual_skip", "stop_stream", "skip_stream", "stopped", "reset"];

      if (startReasons.includes(reason)) {
        handleSoundItem(item, reason);
        return;
      }

      if (stopReasons.includes(reason)) {
        hideOverlay(reason);
      }
    }

    async function pollSoundStatus() {
      try {
        const res = await fetch(SOUND_STATUS_URL, { cache: "no-store" });
        if (!res.ok) return;
        const state = await res.json();
        if (!state || !state.ok) return;

        const cur = state.current || null;
        if (cur && isVipItem(cur)) {
          handleSoundItem(cur, "status_poll");
          return;
        }

        if (!cur && visible) hideOverlay("status_poll_empty");
      } catch (_) {}
    }

    function connectWs() {
      clearTimeout(reconnectTimer);
      const protocol = location.protocol === "https:" ? "wss:" : "ws:";
      ws = new WebSocket(protocol + "//" + location.host);

      setDebug(["VIP V2 WS connecting", "host=" + location.host]);

      ws.addEventListener("open", () => {
        setDebug(["VIP V2 WS open", "host=" + location.host]);
      });

      ws.addEventListener("message", (event) => {
        try { handleSoundSystemEvent(JSON.parse(event.data)); } catch (_) {}
      });

      ws.addEventListener("close", () => {
        setDebug(["VIP V2 WS closed", "reconnect in 1500ms"]);
        reconnectTimer = setTimeout(connectWs, 1500);
      });

      ws.addEventListener("error", () => {
        try { ws.close(); } catch (_) {}
      });
    }

    function init() {
      connectWs();
      pollSoundStatus();
      pollTimer = setInterval(pollSoundStatus, SOUND_POLL_MS);
    }

    window.addEventListener("beforeunload", () => {
      clearTimeout(reconnectTimer);
      clearInterval(pollTimer);
      clearTimeout(hideTimer);
      try { if (ws) ws.close(); } catch (_) {}
    });

    init();
  </script>
</body>
</html>
