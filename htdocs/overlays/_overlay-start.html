<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Start Overlay â€“ v16 (3s Gaps)</title>
  <style>
    :root{
      --c-purple:#5a3fc0;
      --c-blue:#1e90ff;
      --w:1600px;
      --h:800px;
    }
    html, body {
      margin:0;padding:0;background:transparent;overflow:hidden;width:100vw;height:100vh;
      display:flex;align-items:center;justify-content:center;font-family:'Segoe UI',system-ui,Arial;
    }
    #container {
      position:relative;width:var(--w);height:var(--h);
      border:6px solid var(--c-purple);border-radius:40px;
      box-shadow:0 0 60px var(--c-purple),0 0 120px var(--c-blue),inset 0 0 40px var(--c-purple);
      background:rgba(10,10,30,.85);overflow:hidden;
      background-size:cover;background-position:center;
    }
    /* NEON Dots */
    .neon-dot{position:absolute;width:14px;height:14px;border-radius:50%;
      background:var(--c-blue);box-shadow:0 0 6px var(--c-blue),0 0 14px var(--c-blue);
      offset-path:path("M 43,3 L 1557,3 A 37 37 0 0 1 1597,43 L 1597,757 A 37 37 0 0 1 1557,797 L 43,797 A 37 37 0 0 1 3,757 L 3,43 A 37 37 0 0 1 43,3");
      offset-rotate:0deg;z-index:2;top:0;left:0;animation:orbitUnified 12s linear infinite}
    #dot2{animation-delay:-6s}
    @keyframes orbitUnified{0%{offset-distance:0%}100%{offset-distance:100%}}
    /* Avatar */
    #avatarWrap{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:360px;height:360px;display:grid;place-items:center;z-index:3}
    #avatar{width:350px;height:350px;border-radius:50%;border:4px solid #fff;object-fit:cover;box-shadow:0 0 40px #fff,0 0 60px var(--c-purple);animation:pulseGlow 4s ease-in-out infinite}
    @keyframes pulseGlow{0%,100%{transform:scale(1);box-shadow:0 0 40px #fff,0 0 60px var(--c-purple)}50%{transform:scale(1.05);box-shadow:0 0 60px #fff,0 0 100px var(--c-purple)}}
    /* Counter framed */
    #counterBox{position:absolute;left:50%;transform:translateX(-50%);padding:6px 18px;border-radius:16px;min-width:220px;text-align:center;font-size:42px;font-weight:700;color:#fff;background:rgba(10,10,30,.45);box-shadow:0 0 10px var(--c-purple),inset 0 0 12px var(--c-blue);text-shadow:0 0 10px var(--c-purple),0 0 20px var(--c-blue);z-index:5}
    #counterLabel{display:block;font-size:14px;font-weight:600;opacity:.9;margin-bottom:2px}
    #counterTime{display:block;font-size:42px;font-weight:700}
    /* Subline */
    #subline{position:absolute;top:calc(50% + 175px + 60px);left:0;white-space:nowrap;font-size:80px;font-weight:500;color:#fff;text-shadow:0 0 8px var(--c-purple),0 0 15px var(--c-purple),0 0 20px var(--c-blue),0 0 30px var(--c-blue);z-index:3;will-change:transform}
    /* TwisterTwins video top-right when title contains 'TwisterTwins' */
    #ttWrap{position:absolute;top:24px;right:24px;width:300px;height:300px;display:none;z-index:5;pointer-events:none;filter:drop-shadow(0 0 12px var(--c-purple)) drop-shadow(0 0 24px var(--c-blue))}
    #ttVideo{width:100%;height:100%;object-fit:contain;border-radius:16px}
    /* Hidden measuring span */
    #measure{position:absolute;visibility:hidden;white-space:nowrap;font:inherit;font-size:80px;font-weight:500}
    /* Optional overlays */
    #nowPlaying{position:absolute;top:18px;left:18px;z-index:6;color:#fff;font:16px/1.4 Segoe UI,Arial;background:rgba(0,0,0,.45);padding:8px 10px;border-radius:10px;display:none;box-shadow:0 0 8px var(--c-purple),0 0 14px var(--c-blue)}
    #debug{position:absolute;bottom:12px;left:12px;max-width:90%;font:18px/1.5 monospace;color:#fff;background:rgba(0,0,0,.7);padding:10px 12px;border-radius:10px;display:none;white-space:pre-wrap}
  </style>
</head>
<body>
  <div id="container">
    <div class="neon-dot" id="dot1"></div><div class="neon-dot" id="dot2"></div>
    <div id="avatarWrap"><img id="avatar" src="/assets/images/avatar_forrest.png" alt="Avatar"/></div>
    <div id="ttWrap"><video id="ttVideo" muted loop playsinline preload="auto"></video></div>
    <div id="counterBox"><span id="counterLabel">Stream startet in</span><span id="counterTime">12:30</span></div>
    <div id="subline"></div><div id="measure"></div>
    <div id="nowPlaying"></div>
    <div id="debug"></div>
  </div>
  <audio id="playlistAudio" preload="auto" muted autoplay></audio>

  <script>
    // === CONFIG ===
    const OVERLAY_DATA_URL="/api/overlay/start-data";
    const DEFAULT_GAME="Minecraft";
    const IMAGES_BASE="/assets/images/";
    const VIDEOS_BASE="/assets/videos/";
    const TT_VIDEO_FILE="tt-muenze.webm";
    // absolute JSON per your setup
    const SOUNDLIST_URL="http://localhost:8080/assets/sounds/start/startsoundlist.json";
    // Timings
    const REFRESH_MS=15000, MARQUEE_SPEED=200, PAUSE_S=2;
    const MIN_SECONDS=750, EXTRA_LONG=150; // 12:30 min minimum, +2:30 if music >= 12:30
    const GAP_SECONDS=3; // NEW: 3s between songs
    // Toggles
    const DEBUG = new URLSearchParams(location.search).get("debug")==="1";
    const SHOW_NP = new URLSearchParams(location.search).get("np")==="1";

    // === STATE ===
    let gameBackgrounds={}, animFrame=null, stopMarquee=false, nextText=null, runningText=null, counterTimer=null, audioStarted=false;
    const qid=(id)=>document.getElementById(id);
    const cacheBust=(u)=>u+(u.includes("?")?"&":"?")+"t="+Date.now();
    const dlog=(...a)=>{ if(!DEBUG) return; const box=qid("debug"); box.style.display="block"; box.textContent+=a.join(" ")+"\\n"; };
    function setNowPlaying(n){ const el=qid("nowPlaying"); if(!SHOW_NP) return; el.style.display="block"; el.textContent="Now Playing: "+n; }

    // === Layout helpers ===
    function placeCounter(){
      const cont=qid("container").getBoundingClientRect(), av=qid("avatar").getBoundingClientRect();
      const mid=(av.top-cont.top)/2; const box=qid("counterBox"); box.style.top=(Math.round(mid-box.offsetHeight/2))+"px";
    }
    function formatTime(s){ s=Math.max(0,Math.ceil(s)); const m=Math.floor(s/60), sec=s%60; return (m<10?"0":"")+m+":"+(sec<10?"0":"")+sec; }
    function startCounter(totalSeconds){
      const el=qid("counterTime"); if(counterTimer) clearInterval(counterTimer);
      let end=performance.now()+totalSeconds*1000; el.textContent=formatTime(totalSeconds);
      counterTimer=setInterval(()=>{ let left=(end-performance.now())/1000; el.textContent=formatTime(left); if(left<=0){clearInterval(counterTimer); el.textContent="00:00";} }, 500);
      placeCounter();
    }

    // === Data fetch ===
    async function safeJson(u){
      const url=cacheBust(u);
      try{
        const r=await fetch(url,{cache:"no-store"}); if(!r.ok) return null;
        return await r.json();
      }catch{ return null; }
    }
    async function fetchOverlayData(){
      const j=await safeJson(OVERLAY_DATA_URL);
      return {
        stream: j?.stream || {},
        backgrounds: j?.backgrounds || {}
      };
    }
    async function fetchStreamInfo(){
      const data = await fetchOverlayData();
      gameBackgrounds = data.backgrounds || {};
      return {
        title: data.stream?.title ?? null,
        game: data.stream?.game_name ?? null
      };
    }
    async function fetchBackgrounds(){
      const data = await fetchOverlayData();
      if(data.backgrounds && typeof data.backgrounds === "object") gameBackgrounds = data.backgrounds;
    }

    // === Visuals ===
    function setBackgroundForGame(g){
      const f=g||DEFAULT_GAME; const bg=IMAGES_BASE+(gameBackgrounds?.[f]||gameBackgrounds?.[DEFAULT_GAME]||"");
      qid("container").style.backgroundImage=`url("${bg}")`;
    }
    function toggleTT(title){
      const w=qid("ttWrap"), v=qid("ttVideo");
      const show=!!(title && title.toLowerCase().includes("twistertwins"));
      if(show){ w.style.display="block"; const src=cacheBust(VIDEOS_BASE+TT_VIDEO_FILE); if(v.getAttribute("src")!==src) v.setAttribute("src",src); v.play().catch(()=>{}); }
      else { w.style.display="none"; try{ v.pause(); }catch{} }
    }
    // Marquee with queue: finish current before switching
    function runMarquee(text){
      const sub=qid("subline"), measure=qid("measure"), cw=parseInt(getComputedStyle(document.documentElement).getPropertyValue("--w"));
      if(runningText===text) return; if(runningText!==null){ nextText=text; return; }
      measure.textContent=text; sub.textContent=text; const w=measure.offsetWidth||sub.offsetWidth||1000;
      const startX=cw, endX=-w, distance=startX-endX, dur=(distance/MARQUEE_SPEED)*1000; let startT=null; runningText=text; stopMarquee=false;
      function step(ts){ if(stopMarquee){runningText=null;return} if(startT===null) startT=ts; let t=(ts-startT)/dur; if(t>1) t=1; let x=startX+(endX-startX)*t; sub.style.transform=`translateX(${x}px)`;
        if(t<1){ animFrame=requestAnimationFrame(step); } else { setTimeout(()=>{ runningText=null; if(nextText){ const nt=nextText; nextText=null; runMarquee(nt); } else { runMarquee(text); } }, PAUSE_S*1000); } }
      cancelAnimationFrame(animFrame); animFrame=requestAnimationFrame(step);
    }

    // === Audio from startsoundlist.json (schema with durations) ===
    // Schema: { base_url, files:[{name, duration}], fixed_tracks:{third, end}, exclude_from_random:[] }
    function buildSequence(schema){
      if(!schema) return {urls:[], names:[], total:0};
      const base = schema.base_url || "/assets/sounds/start/";
      const files = Array.isArray(schema.files)?schema.files:[];
      const exclude = new Set(schema.exclude_from_random || []);
      const pool = files.filter(f=>f && f.name && !exclude.has(f.name));
      function pickTwo(arr){ if(arr.length<=1) return arr.slice(0,1); const i=Math.floor(Math.random()*arr.length); let j=Math.floor(Math.random()*arr.length); if(j===i) j=(j+1)%arr.length; return [arr[i],arr[j]]; }
      const chosen = pickTwo(pool);
      const thirdName = schema.fixed_tracks?.third || null;
      const endName = schema.fixed_tracks?.end || null;
      const third = files.find(f=>f.name===thirdName);
      const end = files.find(f=>f.name===endName);
      const seq = [...chosen]; if(third) seq.push(third); if(end) seq.push(end);
      const names = seq.map(s=>s.name);
      const urls  = seq.map(s=> encodeURI((schema.base_url||base) + s.name));
      const total = seq.reduce((a,s)=> a + (s.duration||0), 0);
      return {urls, names, total};
    }
    async function startAudioOnce(){
      if(audioStarted) return; audioStarted=true;
      const schema = await safeJson(SOUNDLIST_URL);
      if(!schema){ return; }
      const {urls, names, total} = buildSequence(schema);
      if(!urls.length){ return; }

      // Include 3s gaps between tracks for timing/alignment
      const gapsCount = Math.max(0, urls.length - 1);
      const totalWithGaps = total + gapsCount * GAP_SECONDS;

      // Counter total & start delay so music (+gaps) finishes at 00:00
      const finalSeconds = totalWithGaps >= MIN_SECONDS ? Math.round(totalWithGaps + EXTRA_LONG) : MIN_SECONDS;
      const delayBeforeStart = Math.max(0, finalSeconds - totalWithGaps);
      dlog("MusicTotal=", total.toFixed(2), "Tracks=", urls.length, "Gaps=", gapsCount, "TotalWithGaps=", totalWithGaps, "FinalCounter=", finalSeconds, "DelayBeforeStart=", delayBeforeStart);
      startCounter(finalSeconds);

      const player=qid("playlistAudio"); player.volume=1.0; player.muted=true;
      let idx=0, unmuted=false;

      function playIndex(i){
        if(i>=urls.length){ return; }
        const src=cacheBust(urls[i]); const nice=decodeURI(names[i]||urls[i]).split('/').pop();
        setNowPlaying(nice);
        player.src=src; player.load();
        player.play().then(()=>{ if(!unmuted){ setTimeout(()=>{ try{ player.muted=false; unmuted=true; }catch(e){} }, 400);} })
          .catch(()=>{ setTimeout(()=>player.play().catch(()=>{}), 300); });
      }

      function playNextWithGap(){
        idx++;
        if(idx>=urls.length){ return; }
        setTimeout(()=> playIndex(idx), GAP_SECONDS*1000);
      }

      player.onended=()=>{ playNextWithGap(); };
      player.onerror=()=>{ playNextWithGap(); };

      // start after delay so last track ends at 00:00
      setTimeout(()=>{
        let tries=0; const watch=setInterval(()=>{ if(player.paused && player.currentTime===0 && tries<8){ tries++; player.play().catch(()=>{}); } else if(!player.paused || tries>=8){ clearInterval(watch); } }, 500);
        playIndex(idx);
      }, delayBeforeStart*1000);
    }

    // === Main loop ===
    async function updateOverlay(){
      const j=await fetchStreamInfo();
      const text = j.title || "Herzlich Willkommen";
      setBackgroundForGame(j.game);
      toggleTT(j.title);
      runMarquee(text);
      startAudioOnce();
    }
    async function init(){
      await fetchBackgrounds();
      await updateOverlay();
      setInterval(updateOverlay, REFRESH_MS);
      window.addEventListener('resize', placeCounter);
      placeCounter();
    }
    window.addEventListener('beforeunload', ()=>{
      stopMarquee=true; cancelAnimationFrame(animFrame); if(counterTimer) clearInterval(counterTimer);
      try{ qid("ttVideo")?.pause(); }catch{}
    });
    init();
  </script>
</body>
</html>
