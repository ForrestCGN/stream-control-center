<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Sound-System Overlay</title>
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: Arial, sans-serif; }
    #videoPlayer {
      position: fixed;
      left: 50%;
      top: 50%;
      width: auto;
      height: auto;
      max-width: 1920px;
      max-height: 1080px;
      transform: translate(-50%, -50%);
      object-fit: contain;
      background: transparent;
      display: none;
      pointer-events: none;
    }
    #status {
      position: fixed; left: 16px; bottom: 16px; padding: 8px 12px;
      border: 1px solid rgba(180, 90, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.7); background: rgba(10, 8, 20, .45);
      box-shadow: 0 0 24px rgba(140, 80, 255, .18); font-size: 12px;
      opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease; pointer-events: none;
    }
    #unlock {
      position: fixed; right: 16px; bottom: 16px; padding: 9px 13px;
      border: 1px solid rgba(130, 230, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.88); background: rgba(10, 18, 35, .72);
      box-shadow: 0 0 24px rgba(70, 200, 255, .18); font-size: 12px;
      cursor: pointer; opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease;
    }
    body[data-debug="1"] #status, body[data-debug="1"] #unlock { opacity: 1; transform: translateY(0); }
    body[data-audio-unlocked="1"] #unlock { display: none; }
  </style>
</head>
<body>
  <audio id="player" preload="auto"></audio>
  <video id="videoPlayer" preload="auto" playsinline></video>
  <div id="status">Sound-System Overlay</div>
  <button id="unlock" type="button">Audio aktivieren</button>

  <script>
    (function(){
      'use strict';

      const API = '/api/sound';
      const player = document.getElementById('player');
      const videoPlayer = document.getElementById('videoPlayer');
      const status = document.getElementById('status');
      const unlockBtn = document.getElementById('unlock');
      const qs = new URLSearchParams(location.search);
      if (qs.get('debug') === '1') document.body.dataset.debug = '1';

      let currentRequestId = '';
      let lastSeenRequestId = '';
      let ws = null;
      let reconnectTimer = null;
      let audioContext = null;
      let beepNodes = [];
      let audioUnlocked = false;
      let pollingBusy = false;
      let videoFallbackTimer = null;

      const STOP_REASONS = new Set([
        'manual_stop',
        'manual_skip',
        'stop_stream',
        'skip_stream',
        'reset',
        'stopped',
        'skipped',
        'queue_cleared'
      ]);

      function setStatus(text){ if (status) status.textContent = text || 'Sound-System Overlay'; }

      async function post(path, payload){
        try {
          await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload || {}) });
        } catch (_) {}
      }

      async function getJson(path){
        const res = await fetch(API + path, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      }

      function stopBeep(){
        for (const node of beepNodes) {
          try { node.stop(0); } catch (_) {}
          try { node.disconnect(); } catch (_) {}
        }
        beepNodes = [];
      }

      function clearVideoFallbackTimer(){
        if (videoFallbackTimer) clearTimeout(videoFallbackTimer);
        videoFallbackTimer = null;
      }

      function hideVideo(){
        clearVideoFallbackTimer();
        try {
          videoPlayer.pause();
          videoPlayer.removeAttribute('src');
          videoPlayer.load();
          videoPlayer.style.display = 'none';
        } catch (_) {}
      }

      function stopAudio(){
        stopBeep();
        hideVideo();
        try { player.pause(); player.removeAttribute('src'); player.load(); } catch (_) {}
        currentRequestId = '';
      }

      function stopIfBackendIsIdle(reason){
        if (!currentRequestId) return false;
        stopAudio();
        setStatus(reason || 'Gestoppt');
        return true;
      }

      function normalizeVolume(value){
        const n = Number(value);
        if (!Number.isFinite(n)) return 0.85;
        return Math.max(0, Math.min(1, n > 1 ? n / 100 : n));
      }

      function shouldPlayInOverlay(item){
        const target = String(item && item.outputTarget || '').toLowerCase();
        return target === 'overlay' || target === 'both';
      }

      function isVideoItem(item){
        const mediaType = String(item && (item.mediaType || item.type) || '').toLowerCase();
        return mediaType === 'video' || !!(item && (item.videoUrl || (item.mediaUrl && mediaType === 'video')));
      }

      function cacheBust(url, requestId){
        const clean = String(url || '');
        if (!clean) return '';
        return clean + (clean.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(requestId || Date.now());
      }

      function getAudioContext(){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        if (!audioContext) audioContext = new AudioCtx();
        return audioContext;
      }

      async function unlockAudio(){
        const ctx = getAudioContext();
        if (!ctx) { setStatus('AudioContext nicht verfügbar'); return false; }
        try {
          if (ctx.state === 'suspended') await ctx.resume();
          const buffer = ctx.createBuffer(1, 1, 22050);
          const source = ctx.createBufferSource();
          const gain = ctx.createGain();
          gain.gain.value = 0.0001;
          source.buffer = buffer;
          source.connect(gain);
          gain.connect(ctx.destination);
          source.start(0);
          audioUnlocked = ctx.state === 'running';
          document.body.dataset.audioUnlocked = audioUnlocked ? '1' : '0';
          setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Audio noch blockiert');
          return audioUnlocked;
        } catch (err) {
          setStatus('Audio blockiert: ' + (err && err.message ? err.message : String(err)));
          return false;
        }
      }

      async function playGeneratedBeep(item){
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        setStatus('Spiele: ' + (item.label || item.soundId || 'Generated Beep'));

        const ctx = getAudioContext();
        if (!ctx) { await post('/client/error', { requestId: currentRequestId, error: 'audio_context_unavailable' }); return; }

        try {
          if (ctx.state === 'suspended') {
            await ctx.resume();
            if (ctx.state === 'suspended') {
              setStatus('Audio blockiert · Button klicken');
              await post('/client/error', { requestId: currentRequestId, error: 'audio_context_suspended' });
              return;
            }
          }

          const durationSeconds = Math.max(0.05, Number(item.durationMs || 350) / 1000);
          const frequency = Math.max(80, Math.min(2000, Number(item.frequency || 880)));
          const volume = normalizeVolume(item.volume) * 0.35;
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(frequency, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), now + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSeconds);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + durationSeconds + 0.03);
          beepNodes = [osc, gain];
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
          setTimeout(async () => {
            const requestId = currentRequestId;
            currentRequestId = '';
            stopBeep();
            setStatus('Sound beendet');
            await post('/client/audio-ended', { requestId });
          }, Math.round(durationSeconds * 1000) + 80);
        } catch (err) {
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      async function playFileSound(item){
        if (!item || !item.audioUrl || !item.requestId) return;
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        player.volume = normalizeVolume(item.volume);
        player.src = cacheBust(item.audioUrl, item.requestId);
        setStatus('Spiele: ' + (item.label || item.soundId || item.audioUrl));

        try {
          await player.play();
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
        } catch (err) {
          setStatus('Audio blockiert · Button klicken');
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      async function playVideoFile(item){
        const url = item && (item.videoUrl || item.mediaUrl || item.audioUrl);
        if (!item || !url || !item.requestId) return;
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        videoPlayer.volume = normalizeVolume(item.volume);
        videoPlayer.src = cacheBust(url, item.requestId);
        videoPlayer.style.display = 'block';
        setStatus('Video: ' + (item.label || item.soundId || url));

        try {
          await videoPlayer.play();
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId, mediaType: 'video' });

          const durationMs = Number(item.durationMs || 0);
          const fallbackMs = durationMs > 0 ? Math.max(5000, durationMs + 5000) : 300000;
          clearVideoFallbackTimer();
          videoFallbackTimer = setTimeout(async () => {
            const requestId = currentRequestId;
            currentRequestId = '';
            hideVideo();
            setStatus('Video beendet (Fallback)');
            await post('/client/audio-ended', { requestId, mediaType: 'video', fallback: true });
          }, fallbackMs);
        } catch (err) {
          setStatus('Video blockiert/fehlerhaft');
          await post('/client/error', { requestId: currentRequestId, mediaType: 'video', error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      async function playSound(item){
        if (!item || !item.requestId) return;
        if (!shouldPlayInOverlay(item)) return;
        if (item.requestId === lastSeenRequestId && currentRequestId === item.requestId) return;
        if (isVideoItem(item)) return playVideoFile(item);
        if (String(item.type || '').toLowerCase() === 'generated_beep') return playGeneratedBeep(item);
        return playFileSound(item);
      }

      player.addEventListener('ended', async () => {
        const requestId = currentRequestId;
        currentRequestId = '';
        setStatus('Sound beendet');
        await post('/client/audio-ended', { requestId });
      });

      player.addEventListener('error', async () => {
        const requestId = currentRequestId;
        await post('/client/error', { requestId, error: 'audio_error' });
        stopAudio();
      });

      videoPlayer.addEventListener('ended', async () => {
        const requestId = currentRequestId;
        currentRequestId = '';
        hideVideo();
        setStatus('Video beendet');
        await post('/client/audio-ended', { requestId, mediaType: 'video' });
      });

      videoPlayer.addEventListener('error', async () => {
        const requestId = currentRequestId;
        await post('/client/error', { requestId, mediaType: 'video', error: 'video_error' });
        stopAudio();
      });

      function handleMessage(message){
        const payload = message && (message.data || message);
        if (!payload) return;
        const op = payload.op || payload.type || '';
        const reason = payload.reason || '';
        const data = payload.data || payload.payload || {};
        if (op !== 'sound_system') return;

        const current = data.current || null;
        if ((reason === 'started' || reason === 'play_stream' || reason === 'interrupted_started' || reason === 'next_started' || reason === 'resumed') && current) {
          playSound(current);
          return;
        }

        if (STOP_REASONS.has(reason) && !current) {
          stopIfBackendIsIdle('Gestoppt');
        }
      }

      async function pollStatus(){
        if (pollingBusy) return;
        pollingBusy = true;
        try {
          const state = await getJson('/status');
          const cur = state && state.current ? state.current : null;
          if (!cur && currentRequestId) {
            stopIfBackendIsIdle('Gestoppt (Backend idle)');
            return;
          }
          if (cur && cur.requestId && cur.requestId !== lastSeenRequestId) {
            setStatus('Polling: ' + (cur.label || cur.soundId || cur.requestId));
            await playSound(cur);
          }
        } catch (_) {
        } finally {
          pollingBusy = false;
        }
      }

      function connect(){
        clearTimeout(reconnectTimer);
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host);
        ws.addEventListener('open', () => { setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Verbunden · Audio aktivieren'); post('/client/ready', { overlay: 'sound_system_overlay' }); });
        ws.addEventListener('message', (event) => { try { handleMessage(JSON.parse(event.data)); } catch (_) {} });
        ws.addEventListener('close', () => { setStatus('Getrennt - reconnect'); reconnectTimer = setTimeout(connect, 1500); });
        ws.addEventListener('error', () => { try { ws.close(); } catch (_) {} });
      }

      unlockBtn?.addEventListener('click', unlockAudio);
      document.body.addEventListener('pointerdown', () => { if (!audioUnlocked) unlockAudio(); }, { passive: true });

      connect();
      post('/client/ready', { overlay: 'sound_system_overlay', boot: true });
      setInterval(pollStatus, 250);
    })();
  </script>
</body>
</html>
