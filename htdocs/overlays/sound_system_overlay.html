<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Sound-System Overlay - CAN44_24_SHOUTOUT_H15_LAYOUT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: Arial, sans-serif; }

    #videoPlayer {
      position: fixed;
      left: 50%;
      top: 50%;
      width: auto;
      height: auto;
      max-width: 1920px;
      max-height: 1080px;
      transform: translate(-50%, -50%);
      object-fit: contain;
      background: transparent;
      display: none;
      pointer-events: none;
    }


    /* CAN44.24_SHOUTOUT_H15_LAYOUT
       Integriert auf Basis des gewählten V12 H15 Designs.
       Wichtige Regeln:
       - Sound-System-Overlay/Queue/Bus/Playback bleiben erhalten.
       - Clip-Player bleibt 16:9: 496 x 279.
       - Außenabstände der Kacheln bleiben gleichmäßig.
    */

    #clipCard {
      position: fixed;
      left: 50%;
      top: 50%;
      width: 758px;
      height: 430px;
      transform: translate(-50%, -50%);
      opacity: 0;
      pointer-events: none;
      display: none;
      color: #f8fbff;
      font-family: "Segoe UI", system-ui, -apple-system, BlinkMacSystemFont, Arial, sans-serif;
    }

    #clipCard.show { display: block; animation: clipIntro .9s cubic-bezier(.16,1,.3,1) forwards; }
    #clipCard.hide { display: block; animation: clipOutro .7s ease-in forwards; }

    @keyframes clipIntro {
      from { opacity: 0; transform: translate(-50%, calc(-50% + 26px)) scale(.92); filter: blur(8px); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
    }

    @keyframes clipOutro {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); filter: blur(0); }
      to   { opacity: 0; transform: translate(-50%, calc(-50% - 24px)) scale(.94); filter: blur(5px); }
    }

    .clip-panel {
      position: relative;
      width: 758px;
      height: 430px;
      border-radius: 25px;
      background: linear-gradient(140deg, rgba(8,10,27,.985), rgba(26,10,52,.975));
      box-shadow:
        0 0 0 1px rgba(255,255,255,.08),
        0 0 40px rgba(168,85,247,.44),
        0 26px 72px rgba(0,0,0,.74);
      overflow: hidden;
    }

    .clip-panel::before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 3px;
      background: linear-gradient(120deg, rgba(34,211,238,.92), rgba(168,85,247,.9), rgba(232,121,249,.72), rgba(34,211,238,.92));
      -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      -webkit-mask-composite: xor;
      mask-composite: exclude;
      pointer-events: none;
    }

    .clip-main {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      z-index: 2;
      display: grid;
      grid-template-columns: 182px 496px;
      gap: 16px;
      width: 694px;
      height: 366px;
    }

    .clip-left {
      width: 182px;
      height: 366px;
      border-radius: 21px;
      background: linear-gradient(180deg, rgba(255,255,255,.06), rgba(255,255,255,.03));
      border: 1px solid rgba(255,255,255,.11);
      padding: 16px 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .clip-avatar-wrap {
      width: 122px;
      height: 122px;
      padding: 5px;
      border-radius: 999px;
      background: conic-gradient(from 210deg,#22d3ee,#a855f7,#e879f9,#3b82f6,#22d3ee);
      box-shadow:
        0 0 24px rgba(168,85,247,.82),
        0 0 34px rgba(34,211,238,.26);
      flex: 0 0 auto;
    }

    .clip-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      background: radial-gradient(circle at 35% 25%, #eef7ff, #8b5cf6 34%, #27114b 70%);
      border: 4px solid rgba(9,7,22,.96);
      position: relative;
    }

    #clipAvatarImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #clipAvatarPh {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 47px;
      font-weight: 900;
      color: white;
      text-shadow: 0 0 8px rgba(168,85,247,.72);
    }

    .clip-left-label {
      margin-top: 19px;
      color: #b8c7e6;
      font-size: 10px;
      letter-spacing: .06em;
      text-transform: uppercase;
      text-align: center;
      flex: 0 0 auto;
    }

    .clip-name-box {
      margin-top: 8px;
      width: 156px;
      height: 26px;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      flex: 0 0 auto;
    }

    #clipName {
      white-space: nowrap;
      font-size: 18px;
      font-weight: 900;
      color: #fff;
      transform-origin: center center;
      text-shadow: 0 0 8px rgba(168,85,247,.72);
    }

    .clip-right {
      width: 496px;
      height: 366px;
      min-width: 0;
      display: grid;
      grid-template-rows: 279px 16px 71px;
    }

    .clip-video-frame {
      width: 496px;
      height: 279px; /* 16:9 */
      border-radius: 21px;
      padding: 4px;
      background: linear-gradient(135deg, rgba(34,211,238,.9), rgba(168,85,247,.84), rgba(59,130,246,.76));
      box-shadow:
        0 0 20px rgba(34,211,238,.22),
        0 0 30px rgba(168,85,247,.18);
      overflow: hidden;
    }

    .clip-video-inner {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 18px;
      overflow: hidden;
      background: linear-gradient(135deg, rgba(4,8,18,.95), rgba(15,7,33,.98));
    }

    .clip-video-inner::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 40%, rgba(34,211,238,.18), transparent 24%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0 1px, transparent 1px 7px);
      pointer-events: none;
      z-index: 0;
    }

    #clipVideoPlayer {
      position: relative;
      z-index: 1;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 250ms ease-in-out;
      background: black;
      display: block;
    }

    .clip-caption {
      position: absolute;
      left: 14px;
      right: 14px;
      bottom: 10px;
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: #eaf6ff;
      text-shadow: 0 0 10px #000;
      pointer-events: none;
      z-index: 2;
    }

    .clip-text-card {
      width: 496px;
      height: 71px;
      border-radius: 18px;
      background: linear-gradient(90deg, rgba(255,255,255,.065), rgba(34,211,238,.06));
      border: 1px solid rgba(255,255,255,.12);
      padding: 10px 16px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      position: relative;
      overflow: hidden;
    }

    #clipHeadline {
      margin: 0;
      font-size: 24px;
      line-height: 1.02;
      letter-spacing: -.035em;
      font-weight: 800;
      color: #fff;
      text-shadow: 0 0 14px rgba(168,85,247,.58);
      white-space: nowrap;
      padding-right: 110px;
    }

    #clipSubline {
      margin-top: 6px;
      color: #b8c7e6;
      font-size: 12px;
      line-height: 1.15;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      padding-right: 110px;
    }

    .clip-brand {
      position: absolute;
      right: 10px;
      bottom: 8px;
      font-size: 9px;
      color: rgba(243,232,255,.76);
      border: 1px solid rgba(168,85,247,.22);
      background: rgba(168,85,247,.10);
      border-radius: 999px;
      padding: 4px 8px;
      line-height: 1;
      white-space: nowrap;
    }

    #status {
      position: fixed; left: 16px; bottom: 16px; padding: 8px 12px;
      border: 1px solid rgba(180, 90, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.7); background: rgba(10, 8, 20, .45);
      box-shadow: 0 0 24px rgba(140, 80, 255, .18); font-size: 12px;
      opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease; pointer-events: none;
    }

    #unlock {
      position: fixed; right: 16px; bottom: 16px; padding: 9px 13px;
      border: 1px solid rgba(130, 230, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.88); background: rgba(10, 18, 35, .72);
      box-shadow: 0 0 24px rgba(70, 200, 255, .18); font-size: 12px;
      cursor: pointer; opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease;
    }

    body[data-debug="1"] #status, body[data-debug="1"] #unlock { opacity: 1; transform: translateY(0); }
    body[data-audio-unlocked="1"] #unlock { display: none; }
  
    /* CAN44.23c_SHOUTOUT_V9_PROPORTIONAL_SMALLER
       Basis: funktionierendes CAN44.22 / V9.
       Ziel:
       - komplettes Overlay proportional ca. 10% kleiner
       - Ratio / Charakter von V9 beibehalten
       - Overlay mittiger platzieren
       - rechts am Player etwas mehr Luft
       - keine Änderungen an Playback/Queue/Bus/Audio-Finish
    */
    #clipCard {
      top: 50%;
      width: 1062px;
    }

    .clip-panel {
      min-height: 504px;
      border-radius: 34px;
      padding: 22px;
      background:
        radial-gradient(circle at 16% 22%, rgba(168,85,247,.18), transparent 36%),
        linear-gradient(140deg, rgba(12,15,34,.965), rgba(28,11,55,.955));
    }

    .clip-panel::before {
      padding: 3px;
    }

    .clip-corner-dot {
      width: 13px;
      height: 13px;
    }

    .clip-corner-dot.a {
      left: 27px;
      top: 27px;
    }

    .clip-corner-dot.b {
      right: 27px;
      bottom: 27px;
    }

    .clip-header {
      gap: 22px;
      padding: 5px 9px 20px;
    }

    .clip-kicker {
      gap: 9px;
      padding: 7px 14px;
      font-size: 16px;
    }

    .clip-live-pill {
      padding: 7px 13px;
      font-size: 15px;
    }

    .clip-main {
      grid-template-columns: 288px 1fr;
      gap: 23px;
    }

    .clip-left {
      gap: 20px;
      padding: 20px 16px;
      border-radius: 27px;
    }

    .clip-avatar-wrap {
      width: 169px;
      height: 169px;
      padding: 7px;
    }

    #clipAvatarPh {
      font-size: 67px;
    }

    .clip-label-small {
      font-size: 14px;
      margin-bottom: 9px;
    }

    .clip-user-name-box {
      width: 225px;
      height: 34px;
    }

    #clipName {
      font-size: 25px;
      line-height: 31px;
    }

    .clip-right {
      gap: 16px;
      min-width: 0;
    }

    .clip-video-frame {
      height: 351px;
      border-radius: 27px;
      padding: 4px;
      margin-right: 12px;
    }

    .clip-video-frame > #clipVideoPlayer {
      border-radius: 23px;
    }

    .clip-bottom-panel {
      min-height: 135px;
      padding: 20px 25px;
      border-radius: 23px;
      margin-right: 12px;
    }

    #clipHeadline {
      font-size: 36px;
    }

    #clipSubline {
      margin-top: 9px;
      font-size: 20px;
      max-width: 810px;
    }

  </style>
</head>
<body>
  <audio id="player" preload="auto"></audio>
  <video id="videoPlayer" preload="auto" playsinline></video>

  <div id="clipCard">
    <div class="clip-panel">
      <div class="clip-main">
        <div class="clip-left">
          <div class="clip-avatar-wrap">
            <div class="clip-avatar-inner">
              <img id="clipAvatarImg" alt="avatar">
              <div id="clipAvatarPh">?</div>
            </div>
          </div>
          <div class="clip-left-label">Heute auf Sendung</div>
          <div class="clip-name-box"><div id="clipName">User</div></div>
        </div>

        <div class="clip-right">
          <div class="clip-video-frame">
            <div class="clip-video-inner">
              <video id="clipVideoPlayer" preload="auto" playsinline></video>
              <div class="clip-caption">
                <span><b>Clip:</b> <span id="clipCaptionTitle">Rentnerkino Deluxe</span></span>
                <span id="clipDuration">00:18</span>
              </div>
            </div>
          </div>

          <div></div>

          <div class="clip-text-card">
            <div id="clipHeadline">Schaut gerne mal vorbei!</div>
            <div id="clipSubline">Heute im Altersheim-TV: User</div>
            <div class="clip-brand">CGN Altersheim-TV</div>
          </div>
        </div>
      </div>
    </div>
  </div>

  <div id="status">Sound-System Overlay</div>
  <button id="unlock" type="button">Audio aktivieren</button>

  <script>
    (function(){
      'use strict';

      const API = '/api/sound';
      const BUILD = 'CAN44.24.00';
      const TWITCH_CLIENT_ID = 'kimne78kx3ncx6brgo4mv6wki5h1ko';
      const TWITCH_CLIP_PERSISTED_HASH = '36b89d2507fce29e5ca551df756d27c1cfe079e2609642b4390aa4c35796eb11';
      const player = document.getElementById('player');
      const videoPlayer = document.getElementById('videoPlayer');
      const clipVideoPlayer = document.getElementById('clipVideoPlayer');
      const clipCard = document.getElementById('clipCard');
      const clipAvatarImg = document.getElementById('clipAvatarImg');
      const clipAvatarPh = document.getElementById('clipAvatarPh');
      const clipName = document.getElementById('clipName');
      const clipSubline = document.getElementById('clipSubline');
      const clipHeadline = document.getElementById('clipHeadline');
      const clipCaptionTitle = document.getElementById('clipCaptionTitle');
      const clipDuration = document.getElementById('clipDuration');
      const status = document.getElementById('status');
      const unlockBtn = document.getElementById('unlock');
      const qs = new URLSearchParams(location.search);
      if (qs.get('debug') === '1') document.body.dataset.debug = '1';

      // STEP455_SOUND_SYSTEM_OVERLAY_BUS_CONSUMER_REPLACEMENT
      // Das Overlay versteht ab jetzt zusätzlich Communication-Bus-Envelopes
      // für den Sound-System-Ausgang. Der alte op:sound_system-Weg und das
      // /api/sound/status-Polling bleiben als Sicherheitsnetz erhalten.
      const BUS_CLIENT_ID = 'sound_system_overlay_bus_consumer';
      const BUS_HEARTBEAT_MS = 5000;
      const BUS_CHANNEL = 'sound';
      const BUS_CAPABILITIES = [
        'sound.event_output',
        'sound.started',
        'sound.finished',
        'sound.stopped',
        'sound.skipped',
        'sound.cleared',
        'sound.failed',
        'sound.queue.updated',
        'sound.state.updated'
      ];

      let currentRequestId = '';
      let lastSeenRequestId = '';
      let ws = null;
      let reconnectTimer = null;
      let busHeartbeatTimer = null;
      let audioContext = null;
      let beepNodes = [];
      let audioUnlocked = false;
      let pollingBusy = false;
      let videoFallbackTimer = null;
      let activeVideoElement = null;
      let activeVideoItem = null;
      let videoResetSuppressUntil = 0;
      let videoErrorGraceUntil = 0;
      let videoRetryInProgress = false;
      let videoPlaybackStartedAt = 0;

      const STOP_REASONS = new Set([
        'manual_stop',
        'manual_skip',
        'stop_stream',
        'skip_stream',
        'reset',
        'stopped',
        'skipped',
        'queue_cleared'
      ]);

      function setStatus(text){ if (status) status.textContent = text || 'Sound-System Overlay'; }

      async function post(path, payload){
        try {
          await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload || {}) });
        } catch (_) {}
      }

      async function getJson(path){
        const res = await fetch(API + path, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      }

      function visualOf(item) {
        return item && item.visual && typeof item.visual === 'object' ? item.visual : {};
      }

      function isClipShoutout(item) {
        const visual = visualOf(item);
        return String(visual.module || '').toLowerCase() === 'clip_shoutout' || String(visual.layout || '').toLowerCase() === 'vip30';
      }

      function stopBeep(){
        for (const node of beepNodes) {
          try { node.stop(0); } catch (_) {}
          try { node.disconnect(); } catch (_) {}
        }
        beepNodes = [];
      }

      function clearVideoFallbackTimer(){
        if (videoFallbackTimer) clearTimeout(videoFallbackTimer);
        videoFallbackTimer = null;
      }

      function hideClipCard(silent){
        try {
          if (silent === true) {
            clipCard.classList.remove('show', 'hide');
            clipCard.style.display = 'none';
            return;
          }
          clipCard.classList.remove('show');
          clipCard.classList.add('hide');
          setTimeout(() => {
            if (clipCard.classList.contains('hide')) {
              clipCard.classList.remove('hide');
              clipCard.style.display = 'none';
            }
          }, 750);
        } catch (_) {}
      }

      function hideVideo(options){
        const opts = options || {};
        clearVideoFallbackTimer();
        videoResetSuppressUntil = Date.now() + 300;
        for (const video of [videoPlayer, clipVideoPlayer]) {
          try {
            video.pause();
            video.removeAttribute('src');
            video.load();
            video.style.opacity = '';
            video.style.display = video === videoPlayer ? 'none' : '';
          } catch (_) {}
        }
        hideClipCard(opts.silentClipCard === true);
        activeVideoElement = null;
        activeVideoItem = null;
        videoRetryInProgress = false;
        videoPlaybackStartedAt = 0;
      }

      function stopAudio(options){
        const opts = options || {};
        stopBeep();
        hideVideo({ silentClipCard: opts.silentClipCard === true });
        try { player.pause(); player.removeAttribute('src'); player.load(); } catch (_) {}
        currentRequestId = '';
      }

      function stopIfBackendIsIdle(reason){
        if (!currentRequestId) return false;
        stopAudio();
        setStatus(reason || 'Gestoppt');
        return true;
      }

      function normalizeVolume(value){
        const n = Number(value);
        if (!Number.isFinite(n)) return 0.85;
        return Math.max(0, Math.min(1, n > 1 ? n / 100 : n));
      }

      function shouldPlayInOverlay(item){
        const target = String(item && item.outputTarget || '').toLowerCase();
        return target === 'overlay' || target === 'both';
      }

      function isTwitchClipItem(item){
        const mediaType = String(item && (item.mediaType || item.type) || '').toLowerCase();
        const meta = item && item.meta && typeof item.meta === 'object' ? item.meta : {};
        return mediaType === 'twitch_clip' || mediaType === 'clip_twitch' || !!(item && (item.clipId || meta.clipId) && meta.clipShoutout);
      }

      function isVideoItem(item){
        const mediaType = String(item && (item.mediaType || item.type) || '').toLowerCase();
        return isTwitchClipItem(item) || mediaType === 'video' || !!(item && (item.videoUrl || (item.mediaUrl && mediaType === 'video')));
      }

      function cacheBust(url, requestId){
        const clean = String(url || '');
        if (!clean) return '';
        return clean + (clean.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(requestId || Date.now());
      }

      function getAudioContext(){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        if (!audioContext) audioContext = new AudioCtx();
        return audioContext;
      }

      async function unlockAudio(){
        const ctx = getAudioContext();
        if (!ctx) { setStatus('AudioContext nicht verfügbar'); return false; }
        try {
          if (ctx.state === 'suspended') await ctx.resume();
          const buffer = ctx.createBuffer(1, 1, 22050);
          const source = ctx.createBufferSource();
          const gain = ctx.createGain();
          gain.gain.value = 0.0001;
          source.buffer = buffer;
          source.connect(gain);
          gain.connect(ctx.destination);
          source.start(0);
          audioUnlocked = ctx.state === 'running';
          document.body.dataset.audioUnlocked = audioUnlocked ? '1' : '0';
          setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Audio noch blockiert');
          return audioUnlocked;
        } catch (err) {
          setStatus('Audio blockiert: ' + (err && err.message ? err.message : String(err)));
          return false;
        }
      }

      async function playGeneratedBeep(item){
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        setStatus('Spiele: ' + (item.label || item.soundId || 'Generated Beep'));

        const ctx = getAudioContext();
        if (!ctx) { await post('/client/error', { requestId: currentRequestId, error: 'audio_context_unavailable' }); return; }

        try {
          if (ctx.state === 'suspended') {
            await ctx.resume();
            if (ctx.state === 'suspended') {
              setStatus('Audio blockiert · Button klicken');
              await post('/client/error', { requestId: currentRequestId, error: 'audio_context_suspended' });
              return;
            }
          }

          const durationSeconds = Math.max(0.05, Number(item.durationMs || 350) / 1000);
          const frequency = Math.max(80, Math.min(2000, Number(item.frequency || 880)));
          const volume = normalizeVolume(item.volume) * 0.35;
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(frequency, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), now + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSeconds);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + durationSeconds + 0.03);
          beepNodes = [osc, gain];
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
          setTimeout(async () => {
            const requestId = currentRequestId;
            currentRequestId = '';
            stopBeep();
            setStatus('Sound beendet');
            await post('/client/audio-ended', { requestId });
          }, Math.round(durationSeconds * 1000) + 80);
        } catch (err) {
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      async function playFileSound(item){
        if (!item || !item.audioUrl || !item.requestId) return;
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        player.volume = normalizeVolume(item.volume);
        player.src = cacheBust(item.audioUrl, item.requestId);
        setStatus('Spiele: ' + (item.label || item.soundId || item.audioUrl));

        try {
          await player.play();
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
        } catch (err) {
          setStatus('Audio blockiert · Button klicken');
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      function sanitizeHttpUrl(value) {
        const clean = String(value ?? '').trim();
        if (!clean) return '';
        const lower = clean.toLowerCase();
        if (['false', 'null', 'undefined', 'nan', '0', 'none'].includes(lower)) return '';
        if (!/^https?:\/\//i.test(clean)) return '';
        return clean;
      }

      function pickAvatarUrlFromUserinfo(data) {
        if (!data || typeof data !== 'object') return '';
        const rows = Array.isArray(data.data) ? data.data : [];
        const row = rows[0] || data.user || data;
        const candidates = [
          row.avatarUrl,
          row.avatar_url,
          row.profileImageUrl,
          row.profile_image_url,
          row.imageUrl,
          row.image_url
        ];
        for (const candidate of candidates) {
          const avatar = sanitizeHttpUrl(candidate);
          if (avatar) return avatar;
        }
        return '';
      }

      async function lookupAvatarUrl(login) {
        const clean = String(login || '').replace(/^@+/, '').trim().toLowerCase();
        if (!clean) return '';
        const endpoints = [
          '/userinfo?login=' + encodeURIComponent(clean),
          '/api/twitch/user?login=' + encodeURIComponent(clean)
        ];
        for (const endpoint of endpoints) {
          try {
            const res = await fetch(endpoint, { cache: 'no-store' });
            if (!res.ok) continue;
            const data = await res.json();
            const avatar = pickAvatarUrlFromUserinfo(data);
            if (avatar) return avatar;
          } catch (_) {}
        }
        return '';
      }

      function resetAvatar(displayName, login) {
        const first = (displayName || login || '?').slice(0, 1).toUpperCase();
        clipAvatarPh.textContent = first || '?';
        clipAvatarImg.removeAttribute('src');
        clipAvatarImg.onload = null;
        clipAvatarImg.onerror = null;
        clipAvatarImg.style.display = 'none';
        clipAvatarPh.style.display = 'flex';
      }

      function applyAvatarUrl(url) {
        const clean = sanitizeHttpUrl(url);
        if (!clean) return false;
        clipAvatarImg.onload = () => {
          clipAvatarImg.style.display = 'block';
          clipAvatarPh.style.display = 'none';
        };
        clipAvatarImg.onerror = () => {
          clipAvatarImg.style.display = 'none';
          clipAvatarPh.style.display = 'flex';
        };
        clipAvatarImg.src = clean;
        return true;
      }

      function fitTextToBox(el, selector, minScale) {
        if (!el) return;
        const box = selector ? el.closest(selector) : el.parentElement;
        if (!box) return;
        el.style.transform = 'scale(1)';
        requestAnimationFrame(() => {
          try {
            const boxWidth = box.clientWidth || 1;
            const rawWidth = el.scrollWidth || el.getBoundingClientRect().width || 1;
            const scale = Math.max(minScale || 0.66, Math.min(1, boxWidth / rawWidth));
            el.style.transform = 'scale(' + scale.toFixed(3) + ')';
          } catch (_) {}
        });
      }

      function fitClipTexts() {
        fitTextToBox(clipName, '.clip-name-box', 0.55);
      }

      function formatClipDuration(ms) {
        const totalSeconds = Math.max(0, Math.round(Number(ms || 0) / 1000));
        const mins = Math.floor(totalSeconds / 60);
        const secs = totalSeconds % 60;
        return String(mins).padStart(2, '0') + ':' + String(secs).padStart(2, '0');
      }

      function setupClipCard(item, options) {
        const opts = options || {};
        const visual = visualOf(item);
        const meta = item && item.meta && typeof item.meta === 'object' ? item.meta : {};
        const rawLogin = visual.login || visual.targetLogin || meta.targetLogin || item.targetLogin || item.login || visual.user || visual.displayName || meta.targetDisplayName || 'User';
        const rawDisplay = visual.displayName || visual.user || meta.targetDisplayName || item.targetDisplayName || rawLogin || 'User';
        const login = String(rawLogin || 'User').replace(/^@+/, '').trim();
        const displayName = String(rawDisplay || login || 'User').replace(/^@+/, '').trim();
        const avatarUrl = sanitizeHttpUrl(visual.avatarUrl || meta.avatarUrl || item.avatarUrl || '');
        const headline = String(visual.headline || meta.headline || 'Schaut gerne mal vorbei!').trim() || 'Schaut gerne mal vorbei!';
        const subline = String(visual.subline || meta.subline || ('Heute im Altersheim-TV: ' + (displayName || login || 'User'))).trim() || ('Heute im Altersheim-TV: ' + (displayName || login || 'User'));

        clipName.textContent = displayName || login || 'User';
        if (clipHeadline) clipHeadline.textContent = headline;
        clipSubline.textContent = subline;
        if (clipCaptionTitle) clipCaptionTitle.textContent = String((item && (item.label || item.title || item.clipTitle)) || (meta && meta.clipTitle) || 'Rentnerkino Deluxe');
        if (clipDuration) clipDuration.textContent = formatClipDuration(item && item.durationMs || 0);
        resetAvatar(displayName, login);
        fitClipTexts();

        if (!applyAvatarUrl(avatarUrl) && login) {
          lookupAvatarUrl(login).then((foundAvatar) => {
            if (currentRequestId !== (item && item.requestId)) return;
            applyAvatarUrl(foundAvatar);
          });
        }

        if (opts.show !== false) {
          showClipCard();
        }
      }

      function showClipCard() {
        clipCard.style.display = 'block';
        clipCard.classList.remove('hide', 'show');
        void clipCard.offsetWidth;
        clipCard.classList.add('show');
      }
      function getTwitchClipId(item) {
        const meta = item && item.meta && typeof item.meta === 'object' ? item.meta : {};
        const visual = visualOf(item);
        const direct = String((item && item.clipId) || meta.clipId || visual.clipId || '').trim();
        if (direct) return direct;
        const soundId = String(item && item.soundId || '').trim();
        const match = soundId.match(/^twitch_clip_(.+)$/i);
        return match ? match[1] : '';
      }

      async function twitchGql(body, label) {
        const res = await fetch('https://gql.twitch.tv/gql', {
          method: 'POST',
          headers: {
            'Content-Type': 'text/plain;charset=UTF-8',
            'Client-ID': TWITCH_CLIENT_ID
          },
          body: JSON.stringify(body)
        });

        const text = await res.text();
        let json = null;
        try { json = text ? JSON.parse(text) : null; }
        catch (_) { throw new Error(label + ' invalid_json http=' + res.status + ' body=' + text.slice(0, 300)); }

        if (!res.ok) throw new Error(label + ' http=' + res.status + ' body=' + text.slice(0, 500));
        if (json && Array.isArray(json.errors) && json.errors.length) {
          throw new Error(label + ' gql_errors=' + JSON.stringify(json.errors).slice(0, 700));
        }
        return json;
      }

      function extractTwitchClipPlayback(json, label) {
        const clip = json && json.data && json.data.clip ? json.data.clip : null;
        if (!clip) throw new Error(label + ' clip missing');

        const qualities = Array.isArray(clip.videoQualities) ? clip.videoQualities.slice() : [];
        if (!qualities.length) throw new Error(label + ' no qualities');

        const token = clip.playbackAccessToken || clip.accessToken || null;
        if (!token || !token.signature || !token.value) throw new Error(label + ' token missing');

        qualities.sort((a, b) => Number(b.quality || 0) - Number(a.quality || 0));
        const best = qualities.find(q => q && q.sourceURL) || qualities[0];
        if (!best || !best.sourceURL) throw new Error(label + ' sourceURL missing');

        return {
          url: best.sourceURL + '?sig=' + encodeURIComponent(token.signature) + '&token=' + encodeURIComponent(token.value),
          label,
          quality: best.quality || 'source',
          clip
        };
      }

      async function loadTwitchClipWithExplicitQuery(clipId) {
        const label = 'explicit_query';
        const json = await twitchGql({
          operationName: 'ClipPlayerAccessTokenQuery',
          query: `query ClipPlayerAccessTokenQuery($slug: ID!) {
            clip(slug: $slug) {
              id
              slug
              title
              videoQualities {
                quality
                frameRate
                sourceURL
              }
              playbackAccessToken(params: { platform: "web", playerBackend: "mediaplayer", playerType: "site" }) {
                signature
                value
              }
            }
          }`,
          variables: { slug: clipId }
        }, label);
        return extractTwitchClipPlayback(json, label);
      }

      async function loadTwitchClipWithPersistedQuery(clipId, version) {
        const label = 'persisted_v' + version;
        const json = await twitchGql({
          operationName: 'VideoAccessToken_Clip',
          variables: { slug: clipId },
          extensions: {
            persistedQuery: {
              version,
              sha256Hash: TWITCH_CLIP_PERSISTED_HASH
            }
          }
        }, label);
        return extractTwitchClipPlayback(json, label);
      }

      async function resolveTwitchClipVideoUrl(clipId) {
        const cleanClipId = String(clipId || '').trim();
        if (!cleanClipId) throw new Error('twitch_clip_id_missing');

        const attempts = [];
        const methods = [
          () => loadTwitchClipWithExplicitQuery(cleanClipId),
          () => loadTwitchClipWithPersistedQuery(cleanClipId, 1),
          () => loadTwitchClipWithPersistedQuery(cleanClipId, 2)
        ];

        for (const method of methods) {
          try {
            return await method();
          } catch (err) {
            const message = err && err.message ? err.message : String(err);
            attempts.push(message);
            console.warn('[sound-overlay][twitch_clip] playback attempt failed:', message);
          }
        }

        const error = new Error(attempts.join(' | '));
        error.attempts = attempts;
        throw error;
      }

      async function waitForVideoCanPlay(video, timeoutMs) {
        if (video.readyState >= 3) return;
        await new Promise((resolve, reject) => {
          const timer = setTimeout(() => cleanup(() => reject(new Error('video canplay timeout'))), timeoutMs || 9000);
          function cleanup(done) {
            clearTimeout(timer);
            video.removeEventListener('canplay', onCanPlay);
            video.removeEventListener('loadeddata', onCanPlay);
            video.removeEventListener('error', onError);
            done();
          }
          function onCanPlay() { cleanup(resolve); }
          function onError() {
            const err = video.error;
            cleanup(() => reject(new Error('video error code=' + (err ? err.code : 'unknown'))));
          }
          video.addEventListener('canplay', onCanPlay, { once: true });
          video.addEventListener('loadeddata', onCanPlay, { once: true });
          video.addEventListener('error', onError, { once: true });
        });
      }

      async function playResolvedTwitchClipVideo(video, item, playback) {
        try {
          video.pause();
          video.removeAttribute('src');
          video.load();
        } catch (_) {}

        videoRetryInProgress = true;
        videoErrorGraceUntil = Date.now() + 1800;
        video.muted = false;
        video.defaultMuted = false;
        video.volume = normalizeVolume(item.volume);
        video.src = playback.url;
        try { video.load(); } catch (_) {}

        setStatus('Twitch-Clip vorbereitet: ' + (item.label || item.soundId || playback.label));
        await waitForVideoCanPlay(video, 9000);

        let mutedFallback = false;
        try {
          await video.play();
        } catch (err) {
          console.warn('[sound-overlay][twitch_clip] autoplay with audio failed, trying muted:', err);
          video.muted = true;
          video.defaultMuted = true;
          video.volume = 0;
          mutedFallback = true;
          await video.play();
        }

        videoRetryInProgress = false;
        videoErrorGraceUntil = Date.now() + 500;
        return { mutedFallback, src: playback.url };
      }

      async function playTwitchClipItem(item) {
        if (!item || !item.requestId) return;
        const clipId = getTwitchClipId(item);
        if (!clipId) {
          await post('/client/error', { requestId: item.requestId, mediaType: 'twitch_clip', error: 'twitch_clip_id_missing' });
          return;
        }

        stopAudio({ silentClipCard: true });
        await new Promise(resolve => setTimeout(resolve, 80));
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        activeVideoElement = clipVideoPlayer;
        activeVideoItem = item;
        videoPlaybackStartedAt = 0;

        setupClipCard(item, { show: false });
        clipCard.classList.remove('show', 'hide');
        clipCard.style.display = 'none';
        videoPlayer.style.display = 'none';
        clipVideoPlayer.style.opacity = '0';
        setStatus('Twitch-Clip wird geladen: ' + (item.label || clipId));

        let playback;
        try {
          playback = await resolveTwitchClipVideoUrl(clipId);
        } catch (err) {
          const message = err && err.message ? err.message : String(err);
          setStatus('Twitch-Clip konnte nicht geladen werden: ' + message);
          await post('/client/error', {
            requestId: currentRequestId,
            mediaType: 'twitch_clip',
            clipId,
            error: 'twitch_clip_resolve_failed',
            message,
            attempts: err && err.attempts ? err.attempts : []
          });
          stopAudio();
          return;
        }

        let result;
        try {
          result = await playResolvedTwitchClipVideo(clipVideoPlayer, item, playback);
        } catch (err) {
          const message = err && err.message ? err.message : String(err);
          setStatus('Twitch-Clip konnte nicht starten: ' + message);
          await post('/client/error', {
            requestId: currentRequestId,
            mediaType: 'twitch_clip',
            clipId,
            error: 'twitch_clip_play_failed',
            message,
            code: videoErrorCode(clipVideoPlayer),
            src: clipVideoPlayer.currentSrc || clipVideoPlayer.src || ''
          });
          stopAudio();
          return;
        }

        showClipCard();
        clipVideoPlayer.style.opacity = '1';
        audioUnlocked = true;
        document.body.dataset.audioUnlocked = '1';
        videoPlaybackStartedAt = Date.now();
        const meta = item.meta && typeof item.meta === 'object' ? item.meta : {};
        const visual = visualOf(item);
        const baseHeadline = visual.headline || meta.headline || 'Schaut gerne mal vorbei!';
        const baseSubline = visual.subline || meta.subline || 'Heute im Altersheim-TV: ' + (visual.displayName || meta.targetDisplayName || item.targetDisplayName || visual.login || item.login || 'User');
        if (clipHeadline) clipHeadline.textContent = String(baseHeadline);
        clipSubline.textContent = String(baseSubline);
        fitClipTexts();

        await post('/client/audio-started', {
          requestId: currentRequestId,
          mediaType: 'twitch_clip',
          clipId,
          mutedFallback: result.mutedFallback === true,
          src: result.src,
          resolver: playback.label,
          quality: playback.quality
        });

        if (result.mutedFallback === true) {
          setStatus('Twitch-Clip läuft stumm (Autoplay-Fallback): ' + (item.label || clipId));
        } else {
          setStatus('Twitch-Clip läuft: ' + (item.label || clipId));
        }

        const durationMs = Number(item.durationMs || 0);
        if (clipDuration) clipDuration.textContent = formatClipDuration(durationMs);
        const fallbackMs = durationMs > 0 ? Math.max(1200, durationMs + 350) : 30000;
        clearVideoFallbackTimer();
        videoFallbackTimer = setTimeout(async () => {
          await finishVideoPlayback('Twitch-Clip beendet', {
            fallback: true,
            mediaType: 'twitch_clip',
            clipId,
            mutedFallback: result.mutedFallback === true,
            resolver: playback.label,
            quality: playback.quality
          });
        }, fallbackMs);
      }

      async function finishVideoPlayback(reason, extra) {
        const requestId = currentRequestId;
        currentRequestId = '';
        hideVideo();
        setStatus(reason || 'Video beendet');
        await post('/client/audio-ended', { requestId, mediaType: (extra && extra.mediaType) || 'video', ...(extra || {}) });
      }

      function buildVideoAttemptUrl(url, requestId, useCacheBust) {
        const clean = String(url || '');
        if (!clean) return '';
        return useCacheBust ? cacheBust(clean, requestId) : clean;
      }

      function videoErrorCode(video) {
        const code = video && video.error && video.error.code ? Number(video.error.code) : 0;
        if (code === 1) return 'MEDIA_ERR_ABORTED';
        if (code === 2) return 'MEDIA_ERR_NETWORK';
        if (code === 3) return 'MEDIA_ERR_DECODE';
        if (code === 4) return 'MEDIA_ERR_SRC_NOT_SUPPORTED';
        return code ? String(code) : 'UNKNOWN';
      }

      async function attemptVideoPlay(video, item, url, options) {
        const opts = options || {};
        const requestId = item.requestId;
        const src = buildVideoAttemptUrl(url, requestId, opts.cacheBust !== false);
        if (!src) throw new Error('video_url_missing');

        videoRetryInProgress = true;
        videoErrorGraceUntil = Date.now() + 1800;
        try {
          video.pause();
          video.removeAttribute('src');
          video.load();
        } catch (_) {}

        await new Promise(resolve => setTimeout(resolve, Number(opts.beforeMs || 160)));

        video.muted = opts.muted === true;
        video.defaultMuted = opts.muted === true;
        video.volume = opts.muted === true ? 0 : normalizeVolume(item.volume);
        video.src = src;
        try { video.load(); } catch (_) {}

        await new Promise(resolve => setTimeout(resolve, Number(opts.afterLoadMs || 220)));
        setStatus((opts.label || 'Video-Start') + ': ' + (item.label || item.soundId || src));
        await video.play();
        videoRetryInProgress = false;
        videoErrorGraceUntil = Date.now() + 500;
        return { muted: video.muted, src };
      }

      async function playVideoFile(item){
        const url = item && (item.videoUrl || item.mediaUrl || item.audioUrl);
        if (!item || !url || !item.requestId) return;
        stopAudio();
        await new Promise(resolve => setTimeout(resolve, 180));
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;

        const clipMode = isClipShoutout(item);
        const video = clipMode ? clipVideoPlayer : videoPlayer;
        activeVideoElement = video;
        activeVideoItem = item;
        videoPlaybackStartedAt = 0;

        if (clipMode) {
          setupClipCard(item);
          videoPlayer.style.display = 'none';
        } else {
          videoPlayer.style.display = 'block';
        }

        video.style.opacity = clipMode ? '0' : '';
        setStatus((clipMode ? 'Clip-Shoutout vorbereitet: ' : 'Video vorbereitet: ') + (item.label || item.soundId || url));

        const attempts = [
          { label: 'Video-Start', cacheBust: true, muted: false, beforeMs: 160, afterLoadMs: 220 },
          { label: 'Video-Retry ohne Cache', cacheBust: false, muted: false, beforeMs: 220, afterLoadMs: 260 },
          { label: 'Video-Retry stumm', cacheBust: false, muted: true, beforeMs: 260, afterLoadMs: 300 }
        ];

        const errors = [];
        let result = null;
        for (const attempt of attempts) {
          try {
            result = await attemptVideoPlay(video, item, url, attempt);
            break;
          } catch (err) {
            errors.push({
              label: attempt.label,
              muted: attempt.muted === true,
              cacheBust: attempt.cacheBust !== false,
              message: err && err.message ? err.message : String(err),
              code: videoErrorCode(video),
              src: video.currentSrc || video.src || ''
            });
            await new Promise(resolve => setTimeout(resolve, 220));
          }
        }

        videoRetryInProgress = false;

        if (!result) {
          const last = errors[errors.length - 1] || {};
          setStatus('Video konnte nicht starten: ' + (last.message || last.code || 'unknown'));
          if (clipMode) {
            clipCard.style.display = 'block';
            clipCard.classList.add('show');
            video.style.opacity = '0';
          }
          setTimeout(async () => {
            if (currentRequestId !== item.requestId) return;
            await post('/client/error', {
              requestId: currentRequestId,
              mediaType: 'video',
              error: 'video_play_failed_after_retries',
              attempts: errors,
              src: video.currentSrc || video.src || ''
            });
            stopAudio();
          }, 4500);
          return;
        }

        if (clipMode) video.style.opacity = '1';
        audioUnlocked = true;
        document.body.dataset.audioUnlocked = '1';
        videoPlaybackStartedAt = Date.now();
        await post('/client/audio-started', {
          requestId: currentRequestId,
          mediaType: 'video',
          mutedFallback: result.muted === true,
          src: result.src
        });

        if (result.muted === true) {
          setStatus('Clip läuft stumm (Autoplay-Fallback): ' + (item.label || item.soundId || url));
        }

        const durationMs = Number(item.durationMs || 0);
        const fallbackMs = durationMs > 0
          ? (clipMode ? Math.max(1200, durationMs + 350) : Math.max(5000, durationMs + 5000))
          : 300000;
        clearVideoFallbackTimer();
        videoFallbackTimer = setTimeout(async () => {
          await finishVideoPlayback(clipMode ? 'Clip-Shoutout beendet' : 'Video beendet (Fallback)', { fallback: true, mutedFallback: result.muted === true });
        }, fallbackMs);
      }

      async function playSound(item){
        if (!item || !item.requestId) return;
        if (!shouldPlayInOverlay(item)) return;
        if (item.requestId === lastSeenRequestId && currentRequestId === item.requestId) return;
        if (isTwitchClipItem(item)) return playTwitchClipItem(item);
        if (isVideoItem(item)) return playVideoFile(item);
        if (String(item.type || '').toLowerCase() === 'generated_beep') return playGeneratedBeep(item);
        return playFileSound(item);
      }

      player.addEventListener('ended', async () => {
        const requestId = currentRequestId;
        currentRequestId = '';
        setStatus('Sound beendet');
        await post('/client/audio-ended', { requestId });
      });

      player.addEventListener('error', async () => {
        const requestId = currentRequestId;
        await post('/client/error', { requestId, error: 'audio_error' });
        stopAudio();
      });

      function wireVideoEvents(video) {
        video.addEventListener('ended', async () => {
          if (activeVideoElement !== video) return;
          await finishVideoPlayback('Video beendet');
        });

        video.addEventListener('error', async () => {
          if (Date.now() < videoResetSuppressUntil) return;
          if (Date.now() < videoErrorGraceUntil) return;
          if (videoRetryInProgress) return;
          if (activeVideoElement !== video) return;

          const requestId = currentRequestId;
          const code = videoErrorCode(video);
          const playedLongEnough = videoPlaybackStartedAt && (Date.now() - videoPlaybackStartedAt > 1200);

          if (!playedLongEnough) {
            setStatus('Video-Fehler kurz nach Start, warte auf Retry/Fallback: ' + code);
            return;
          }

          await post('/client/error', {
            requestId,
            mediaType: 'video',
            error: 'video_runtime_error',
            code,
            src: video.currentSrc || video.src || '',
            currentTime: Number(video.currentTime || 0)
          });
          stopAudio();
        });
      }

      wireVideoEvents(videoPlayer);
      wireVideoEvents(clipVideoPlayer);

      function normalizeWsPayload(message) {
        if (!message || typeof message !== 'object') return null;
        if (message.op || message.type || message.reason || message.channel || message.action) return message;
        if (message.data && typeof message.data === 'object' && (message.data.op || message.data.type || message.data.reason || message.data.channel || message.data.action)) return message.data;
        return message;
      }

      function normalizeSoundTransportMessage(message) {
        const payload = normalizeWsPayload(message);
        if (!payload || typeof payload !== 'object') return null;

        const op = payload.op || payload.type || '';
        const data = payload.data || payload.payload || {};

        if (op === 'sound_system') {
          return {
            transport: 'legacy',
            reason: payload.reason || '',
            current: payload.item || data.current || null,
            busEventId: '',
            raw: payload
          };
        }

        return normalizeSoundBusEnvelope(payload);
      }

      function normalizeSoundBusEnvelope(message) {
        if (!message || typeof message !== 'object') return null;

        const channel = String(message.channel || '').toLowerCase();
        const action = String(message.action || message.event || '').toLowerCase();
        const meta = message.meta && typeof message.meta === 'object' ? message.meta : {};
        const target = message.target && typeof message.target === 'object' ? message.target : {};
        const payload = message.payload && typeof message.payload === 'object' ? message.payload : {};

        const isSoundChannel = channel === BUS_CHANNEL || channel === 'sound.event_output';
        const isSoundCapability = String(meta.capability || target.capability || '').toLowerCase() === 'sound.event_output';
        const isSoundSource = String(meta.module || message.source?.module || message.source?.id || '').toLowerCase() === 'sound_system';
        if (!isSoundChannel && !isSoundCapability && !isSoundSource) return null;

        const state = payload.state && typeof payload.state === 'object' ? payload.state : null;
        const current = payload.item || payload.current || (state && state.current) || null;
        const reason = String(payload.reason || meta.reason || action || 'state').trim();

        return {
          transport: 'bus',
          reason,
          current,
          busEventId: String(message.id || message.eventId || ''),
          raw: message
        };
      }

      function sendBusAck(eventId, status, details = {}) {
        const id = String(eventId || '').trim();
        if (!id) return;
        send({
          type: 'bus_ack',
          eventId: id,
          clientId: BUS_CLIENT_ID,
          status: String(status || 'received'),
          details: {
            module: 'sound_system',
            overlay: 'sound_system_overlay.html',
            mode: 'bus_consumer_with_legacy_fallback',
            ...details
          }
        });
      }

      function send(payload) {
        if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
      }

      function sendBusHeartbeat() {
        send({
          type: 'bus_heartbeat',
          clientId: BUS_CLIENT_ID,
          clientType: 'overlay',
          module: 'sound_system',
          mode: 'bus_consumer_with_legacy_fallback',
          capabilities: BUS_CAPABILITIES,
          version: 'CAN44.24.00',
          state: document.hidden ? 'hidden' : 'visible',
          meta: {
            overlay: 'sound_system_overlay.html',
            path: location.pathname,
            visible: !document.hidden,
            audioUnlocked,
            currentRequestId: currentRequestId || '',
            heartbeatAt: new Date().toISOString()
          }
        });
      }

      function startBusHeartbeat() {
        stopBusHeartbeat();
        sendBusHeartbeat();
        busHeartbeatTimer = setInterval(sendBusHeartbeat, BUS_HEARTBEAT_MS);
      }

      function stopBusHeartbeat() {
        if (busHeartbeatTimer) clearInterval(busHeartbeatTimer);
        busHeartbeatTimer = null;
      }

      function shouldStartFromReason(reason) {
        const clean = String(reason || '').toLowerCase();
        return clean === 'started' || clean === 'item_started' || clean === 'play_stream' ||
          clean === 'interrupted_started' || clean === 'next_started' || clean === 'resumed' ||
          clean === 'bundle_next_started' || clean === 'parallel_started';
      }

      function shouldStopFromReason(reason) {
        const clean = String(reason || '').toLowerCase();
        return STOP_REASONS.has(clean) || clean === 'finished' || clean === 'item_finished' ||
          clean === 'client_audio_ended' || clean === 'auto_finished' || clean === 'overlay_fallback_finished';
      }

      function handleMessage(message){
        const normalized = normalizeSoundTransportMessage(message);
        if (!normalized) return;

        if (normalized.transport === 'bus' && normalized.busEventId) {
          sendBusAck(normalized.busEventId, 'received', { reason: normalized.reason || '', hasItem: !!normalized.current });
        }

        const current = normalized.current || null;
        if (shouldStartFromReason(normalized.reason) && current) {
          playSound(current);
          if (normalized.transport === 'bus' && normalized.busEventId) {
            sendBusAck(normalized.busEventId, 'handled', { requestId: current.requestId || '', soundId: current.soundId || '' });
          }
          return;
        }

        if (shouldStopFromReason(normalized.reason) && !current) {
          stopIfBackendIsIdle('Gestoppt');
          if (normalized.transport === 'bus' && normalized.busEventId) {
            sendBusAck(normalized.busEventId, 'handled', { action: 'stop_or_finish' });
          }
        }
      }

      async function pollStatus(){
        if (pollingBusy) return;
        pollingBusy = true;
        try {
          const state = await getJson('/status');
          const cur = state && state.current ? state.current : null;
          if (!cur && currentRequestId) {
            stopIfBackendIsIdle('Gestoppt (Backend idle)');
            return;
          }
          if (cur && cur.requestId && cur.requestId !== lastSeenRequestId) {
            setStatus('Polling: ' + (cur.label || cur.soundId || cur.requestId));
            await playSound(cur);
          }
        } catch (_) {
        } finally {
          pollingBusy = false;
        }
      }

      function connect(){
        clearTimeout(reconnectTimer);
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host);
        ws.addEventListener('open', () => {
          setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Verbunden · Audio aktivieren');
          send({
            type: 'bus_hello',
            clientId: BUS_CLIENT_ID,
            clientType: 'overlay',
            module: 'sound_system',
            mode: 'bus_consumer_with_legacy_fallback',
            capabilities: BUS_CAPABILITIES,
            version: 'CAN44.24.00'
          });
          startBusHeartbeat();
          post('/client/ready', { overlay: 'sound_system_overlay', busConsumer: true });
        });
        ws.addEventListener('message', (event) => { try { handleMessage(JSON.parse(event.data)); } catch (_) {} });
        ws.addEventListener('close', () => { stopBusHeartbeat(); setStatus('Getrennt - reconnect'); reconnectTimer = setTimeout(connect, 1500); });
        ws.addEventListener('error', () => { stopBusHeartbeat(); try { ws.close(); } catch (_) {} });
      }

      unlockBtn?.addEventListener('click', unlockAudio);
      document.body.addEventListener('pointerdown', () => { if (!audioUnlocked) unlockAudio(); }, { passive: true });

      window.addEventListener('beforeunload', stopBusHeartbeat);
      window.addEventListener('pagehide', stopBusHeartbeat);

      connect();
      post('/client/ready', { overlay: 'sound_system_overlay', boot: true });
      setInterval(pollStatus, 250);
    })();
  </script>
</body>
</html>
