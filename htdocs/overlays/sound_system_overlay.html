<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Sound-System Overlay - STEP353_WS_PLAY_SIGNAL_FIX</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
  <style>
    html, body { margin: 0; width: 100%; height: 100%; overflow: hidden; background: transparent; font-family: Arial, sans-serif; }

    #videoPlayer {
      position: fixed;
      left: 50%;
      top: 50%;
      width: auto;
      height: auto;
      max-width: 1920px;
      max-height: 1080px;
      transform: translate(-50%, -50%);
      object-fit: contain;
      background: transparent;
      display: none;
      pointer-events: none;
    }

    #clipCard {
      position: fixed;
      left: 50%;
      top: 55%;
      transform: translate(-50%, -50%);
      width: 980px;
      opacity: 0;
      pointer-events: none;
      display: none;
    }

    #clipCard.show { display: block; animation: clipIntro .9s ease-out forwards; }
    #clipCard.hide { display: block; animation: clipOutro .7s ease-in forwards; }

    @keyframes clipIntro {
      from { opacity: 0; transform: translate(-130%, -50%) scale(.8); }
      to   { opacity: 1; transform: translate(-50%, -50%) scale(1); }
    }

    @keyframes clipOutro {
      from { opacity: 1; transform: translate(-50%, -50%) scale(1); }
      to   { opacity: 0; transform: translate(-50%, -60%) scale(.6); }
    }

    .clip-panel {
      display: grid;
      grid-template-columns: 190px 3px 1fr;
      gap: 0;
      padding: 22px 30px;
      border-radius: 40px;
      background: radial-gradient(circle at 15% 50%, #a580fc, #5a3fc0 55%, #28123f);
      border: 3px solid rgba(18, 8, 38, .9);
      box-shadow: 0 12px 22px rgba(0,0,0,.9);
    }

    .clip-divider {
      width: 3px;
      height: 360px;
      background: linear-gradient(180deg, transparent, #55c4ff, #a580fc, transparent);
      box-shadow: 0 0 14px rgba(165,128,252,.9);
      border-radius: 99px;
      margin: auto 0;
    }

    .clip-left {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-right: 18px;
      height: 360px;
    }

    .clip-avatar-wrap {
      width: 150px;
      height: 150px;
      padding: 7px;
      border-radius: 999px;
      background: radial-gradient(circle at 30% 20%, #a580fc, #28123f);
      box-shadow: 0 0 24px rgba(165,128,252,.95);
    }

    .clip-avatar-inner {
      width: 100%;
      height: 100%;
      border-radius: inherit;
      overflow: hidden;
      background: #140627;
      border: 3px solid #120822;
      position: relative;
    }

    .clip-avatar-inner::before {
      content: "";
      position: absolute;
      inset: 3px;
      border-radius: inherit;
      border: 3px solid #1e90ff;
      box-shadow: 0 0 14px rgba(30,144,255,.9);
      pointer-events: none;
      z-index: 2;
    }

    #clipAvatarImg {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: none;
    }

    #clipAvatarPh {
      width: 100%;
      height: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      font-weight: 800;
      color: white;
      text-shadow: 0 0 12px rgba(30,144,255,.9);
    }

    .clip-right {
      display: flex;
      flex-direction: column;
      justify-content: center;
      gap: 10px;
      padding-left: 22px;
    }

    .clip-video-frame {
      width: 100%;
      height: 360px;
      border-radius: 26px;
      overflow: hidden;
      background: black;
      box-shadow: inset 0 0 10px rgba(0,0,0,.7);
    }

    #clipVideoPlayer {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 250ms ease-in-out;
      background: black;
    }

    #clipName {
      margin-top: 10px;
      font-family: "Pacifico", cursive;
      font-size: 34px;
      color: white;
      text-shadow: 0 0 10px rgba(165,128,252,.9);
      text-align: center;
    }

    #clipSubline {
      font-size: 16px;
      color: #d0c9ff;
      text-align: center;
    }

    #status {
      position: fixed; left: 16px; bottom: 16px; padding: 8px 12px;
      border: 1px solid rgba(180, 90, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.7); background: rgba(10, 8, 20, .45);
      box-shadow: 0 0 24px rgba(140, 80, 255, .18); font-size: 12px;
      opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease; pointer-events: none;
    }

    #unlock {
      position: fixed; right: 16px; bottom: 16px; padding: 9px 13px;
      border: 1px solid rgba(130, 230, 255, .45); border-radius: 999px;
      color: rgba(255,255,255,.88); background: rgba(10, 18, 35, .72);
      box-shadow: 0 0 24px rgba(70, 200, 255, .18); font-size: 12px;
      cursor: pointer; opacity: 0; transform: translateY(8px); transition: opacity .25s ease, transform .25s ease;
    }

    body[data-debug="1"] #status, body[data-debug="1"] #unlock { opacity: 1; transform: translateY(0); }
    body[data-audio-unlocked="1"] #unlock { display: none; }
  </style>
</head>
<body>
  <audio id="player" preload="auto"></audio>
  <video id="videoPlayer" preload="auto" playsinline></video>

  <div id="clipCard">
    <div class="clip-panel">
      <div class="clip-left">
        <div class="clip-avatar-wrap">
          <div class="clip-avatar-inner">
            <img id="clipAvatarImg" alt="avatar">
            <div id="clipAvatarPh">?</div>
          </div>
        </div>
      </div>
      <div class="clip-divider"></div>
      <div class="clip-right">
        <div class="clip-video-frame">
          <video id="clipVideoPlayer" preload="auto" playsinline></video>
        </div>
        <div id="clipName">@User</div>
        <div id="clipSubline">🧓 Altersheim-TV</div>
      </div>
    </div>
  </div>

  <div id="status">Sound-System Overlay</div>
  <button id="unlock" type="button">Audio aktivieren</button>

  <script>
    (function(){
      'use strict';

      const API = '/api/sound';
      const player = document.getElementById('player');
      const videoPlayer = document.getElementById('videoPlayer');
      const clipVideoPlayer = document.getElementById('clipVideoPlayer');
      const clipCard = document.getElementById('clipCard');
      const clipAvatarImg = document.getElementById('clipAvatarImg');
      const clipAvatarPh = document.getElementById('clipAvatarPh');
      const clipName = document.getElementById('clipName');
      const clipSubline = document.getElementById('clipSubline');
      const status = document.getElementById('status');
      const unlockBtn = document.getElementById('unlock');
      const qs = new URLSearchParams(location.search);
      if (qs.get('debug') === '1') document.body.dataset.debug = '1';

      let currentRequestId = '';
      let lastSeenRequestId = '';
      let ws = null;
      let reconnectTimer = null;
      let audioContext = null;
      let beepNodes = [];
      let audioUnlocked = false;
      let pollingBusy = false;
      let videoFallbackTimer = null;
      let activeVideoElement = null;
      let activeVideoItem = null;
      let videoResetSuppressUntil = 0;
      let videoErrorGraceUntil = 0;
      let videoRetryInProgress = false;
      let videoPlaybackStartedAt = 0;

      const STOP_REASONS = new Set([
        'manual_stop',
        'manual_skip',
        'stop_stream',
        'skip_stream',
        'reset',
        'stopped',
        'skipped',
        'queue_cleared'
      ]);

      function setStatus(text){ if (status) status.textContent = text || 'Sound-System Overlay'; }

      async function post(path, payload){
        try {
          await fetch(API + path, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload || {}) });
        } catch (_) {}
      }

      async function getJson(path){
        const res = await fetch(API + path, { cache: 'no-store' });
        if (!res.ok) throw new Error('HTTP ' + res.status);
        return res.json();
      }

      function visualOf(item) {
        return item && item.visual && typeof item.visual === 'object' ? item.visual : {};
      }

      function isClipShoutout(item) {
        const visual = visualOf(item);
        return String(visual.module || '').toLowerCase() === 'clip_shoutout' || String(visual.layout || '').toLowerCase() === 'vip30';
      }

      function stopBeep(){
        for (const node of beepNodes) {
          try { node.stop(0); } catch (_) {}
          try { node.disconnect(); } catch (_) {}
        }
        beepNodes = [];
      }

      function clearVideoFallbackTimer(){
        if (videoFallbackTimer) clearTimeout(videoFallbackTimer);
        videoFallbackTimer = null;
      }

      function hideClipCard(){
        try {
          clipCard.classList.remove('show');
          clipCard.classList.add('hide');
          setTimeout(() => {
            if (clipCard.classList.contains('hide')) {
              clipCard.classList.remove('hide');
              clipCard.style.display = 'none';
            }
          }, 750);
        } catch (_) {}
      }

      function hideVideo(){
        clearVideoFallbackTimer();
        videoResetSuppressUntil = Date.now() + 300;
        for (const video of [videoPlayer, clipVideoPlayer]) {
          try {
            video.pause();
            video.removeAttribute('src');
            video.load();
            video.style.opacity = '';
            video.style.display = video === videoPlayer ? 'none' : '';
          } catch (_) {}
        }
        hideClipCard();
        activeVideoElement = null;
        activeVideoItem = null;
        videoRetryInProgress = false;
        videoPlaybackStartedAt = 0;
      }

      function stopAudio(){
        stopBeep();
        hideVideo();
        try { player.pause(); player.removeAttribute('src'); player.load(); } catch (_) {}
        currentRequestId = '';
      }

      function stopIfBackendIsIdle(reason){
        if (!currentRequestId) return false;
        stopAudio();
        setStatus(reason || 'Gestoppt');
        return true;
      }

      function normalizeVolume(value){
        const n = Number(value);
        if (!Number.isFinite(n)) return 0.85;
        return Math.max(0, Math.min(1, n > 1 ? n / 100 : n));
      }

      function shouldPlayInOverlay(item){
        const target = String(item && item.outputTarget || '').toLowerCase();
        return target === 'overlay' || target === 'both';
      }

      function isVideoItem(item){
        const mediaType = String(item && (item.mediaType || item.type) || '').toLowerCase();
        return mediaType === 'video' || !!(item && (item.videoUrl || (item.mediaUrl && mediaType === 'video')));
      }

      function cacheBust(url, requestId){
        const clean = String(url || '');
        if (!clean) return '';
        return clean + (clean.includes('?') ? '&' : '?') + 'v=' + encodeURIComponent(requestId || Date.now());
      }

      function getAudioContext(){
        const AudioCtx = window.AudioContext || window.webkitAudioContext;
        if (!AudioCtx) return null;
        if (!audioContext) audioContext = new AudioCtx();
        return audioContext;
      }

      async function unlockAudio(){
        const ctx = getAudioContext();
        if (!ctx) { setStatus('AudioContext nicht verfügbar'); return false; }
        try {
          if (ctx.state === 'suspended') await ctx.resume();
          const buffer = ctx.createBuffer(1, 1, 22050);
          const source = ctx.createBufferSource();
          const gain = ctx.createGain();
          gain.gain.value = 0.0001;
          source.buffer = buffer;
          source.connect(gain);
          gain.connect(ctx.destination);
          source.start(0);
          audioUnlocked = ctx.state === 'running';
          document.body.dataset.audioUnlocked = audioUnlocked ? '1' : '0';
          setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Audio noch blockiert');
          return audioUnlocked;
        } catch (err) {
          setStatus('Audio blockiert: ' + (err && err.message ? err.message : String(err)));
          return false;
        }
      }

      async function playGeneratedBeep(item){
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        setStatus('Spiele: ' + (item.label || item.soundId || 'Generated Beep'));

        const ctx = getAudioContext();
        if (!ctx) { await post('/client/error', { requestId: currentRequestId, error: 'audio_context_unavailable' }); return; }

        try {
          if (ctx.state === 'suspended') {
            await ctx.resume();
            if (ctx.state === 'suspended') {
              setStatus('Audio blockiert · Button klicken');
              await post('/client/error', { requestId: currentRequestId, error: 'audio_context_suspended' });
              return;
            }
          }

          const durationSeconds = Math.max(0.05, Number(item.durationMs || 350) / 1000);
          const frequency = Math.max(80, Math.min(2000, Number(item.frequency || 880)));
          const volume = normalizeVolume(item.volume) * 0.35;
          const now = ctx.currentTime;
          const osc = ctx.createOscillator();
          const gain = ctx.createGain();
          osc.type = 'sine';
          osc.frequency.setValueAtTime(frequency, now);
          gain.gain.setValueAtTime(0.0001, now);
          gain.gain.exponentialRampToValueAtTime(Math.max(0.0002, volume), now + 0.015);
          gain.gain.exponentialRampToValueAtTime(0.0001, now + durationSeconds);
          osc.connect(gain);
          gain.connect(ctx.destination);
          osc.start(now);
          osc.stop(now + durationSeconds + 0.03);
          beepNodes = [osc, gain];
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
          setTimeout(async () => {
            const requestId = currentRequestId;
            currentRequestId = '';
            stopBeep();
            setStatus('Sound beendet');
            await post('/client/audio-ended', { requestId });
          }, Math.round(durationSeconds * 1000) + 80);
        } catch (err) {
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      async function playFileSound(item){
        if (!item || !item.audioUrl || !item.requestId) return;
        stopAudio();
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;
        player.volume = normalizeVolume(item.volume);
        player.src = cacheBust(item.audioUrl, item.requestId);
        setStatus('Spiele: ' + (item.label || item.soundId || item.audioUrl));

        try {
          await player.play();
          audioUnlocked = true;
          document.body.dataset.audioUnlocked = '1';
          await post('/client/audio-started', { requestId: currentRequestId });
        } catch (err) {
          setStatus('Audio blockiert · Button klicken');
          await post('/client/error', { requestId: currentRequestId, error: err && err.message ? err.message : String(err) });
          stopAudio();
        }
      }

      function sanitizeHttpUrl(value) {
        const clean = String(value ?? '').trim();
        if (!clean) return '';
        const lower = clean.toLowerCase();
        if (['false', 'null', 'undefined', 'nan', '0', 'none'].includes(lower)) return '';
        if (!/^https?:\/\//i.test(clean)) return '';
        return clean;
      }

      function pickAvatarUrlFromUserinfo(data) {
        if (!data || typeof data !== 'object') return '';
        const rows = Array.isArray(data.data) ? data.data : [];
        const row = rows[0] || data.user || data;
        const candidates = [
          row.avatarUrl,
          row.avatar_url,
          row.profileImageUrl,
          row.profile_image_url,
          row.imageUrl,
          row.image_url
        ];
        for (const candidate of candidates) {
          const avatar = sanitizeHttpUrl(candidate);
          if (avatar) return avatar;
        }
        return '';
      }

      async function lookupAvatarUrl(login) {
        const clean = String(login || '').replace(/^@+/, '').trim().toLowerCase();
        if (!clean) return '';
        const endpoints = [
          '/userinfo?login=' + encodeURIComponent(clean),
          '/api/twitch/user?login=' + encodeURIComponent(clean)
        ];
        for (const endpoint of endpoints) {
          try {
            const res = await fetch(endpoint, { cache: 'no-store' });
            if (!res.ok) continue;
            const data = await res.json();
            const avatar = pickAvatarUrlFromUserinfo(data);
            if (avatar) return avatar;
          } catch (_) {}
        }
        return '';
      }

      function resetAvatar(displayName, login) {
        const first = (displayName || login || '?').slice(0, 1).toUpperCase();
        clipAvatarPh.textContent = first || '?';
        clipAvatarImg.removeAttribute('src');
        clipAvatarImg.onload = null;
        clipAvatarImg.onerror = null;
        clipAvatarImg.style.display = 'none';
        clipAvatarPh.style.display = 'flex';
      }

      function applyAvatarUrl(url) {
        const clean = sanitizeHttpUrl(url);
        if (!clean) return false;
        clipAvatarImg.onload = () => {
          clipAvatarImg.style.display = 'block';
          clipAvatarPh.style.display = 'none';
        };
        clipAvatarImg.onerror = () => {
          clipAvatarImg.style.display = 'none';
          clipAvatarPh.style.display = 'flex';
        };
        clipAvatarImg.src = clean;
        return true;
      }

      function setupClipCard(item) {
        const visual = visualOf(item);
        const login = String(visual.login || visual.user || visual.displayName || 'User').replace(/^@+/, '').trim();
        const displayName = String(visual.displayName || visual.user || login || 'User').replace(/^@+/, '').trim();
        const avatarUrl = sanitizeHttpUrl(visual.avatarUrl);

        clipName.textContent = '@' + (displayName || login || 'User');
        clipSubline.textContent = String(visual.subline || '🧓 Altersheim-TV');
        resetAvatar(displayName, login);

        if (!applyAvatarUrl(avatarUrl) && login) {
          lookupAvatarUrl(login).then((foundAvatar) => {
            if (currentRequestId !== (item && item.requestId)) return;
            applyAvatarUrl(foundAvatar);
          });
        }

        clipCard.style.display = 'block';
        clipCard.classList.remove('hide', 'show');
        void clipCard.offsetWidth;
        clipCard.classList.add('show');
      }

      async function finishVideoPlayback(reason, extra) {
        const requestId = currentRequestId;
        currentRequestId = '';
        hideVideo();
        setStatus(reason || 'Video beendet');
        await post('/client/audio-ended', { requestId, mediaType: 'video', ...(extra || {}) });
      }

      function buildVideoAttemptUrl(url, requestId, useCacheBust) {
        const clean = String(url || '');
        if (!clean) return '';
        return useCacheBust ? cacheBust(clean, requestId) : clean;
      }

      function videoErrorCode(video) {
        const code = video && video.error && video.error.code ? Number(video.error.code) : 0;
        if (code === 1) return 'MEDIA_ERR_ABORTED';
        if (code === 2) return 'MEDIA_ERR_NETWORK';
        if (code === 3) return 'MEDIA_ERR_DECODE';
        if (code === 4) return 'MEDIA_ERR_SRC_NOT_SUPPORTED';
        return code ? String(code) : 'UNKNOWN';
      }

      async function attemptVideoPlay(video, item, url, options) {
        const opts = options || {};
        const requestId = item.requestId;
        const src = buildVideoAttemptUrl(url, requestId, opts.cacheBust !== false);
        if (!src) throw new Error('video_url_missing');

        videoRetryInProgress = true;
        videoErrorGraceUntil = Date.now() + 1800;
        try {
          video.pause();
          video.removeAttribute('src');
          video.load();
        } catch (_) {}

        await new Promise(resolve => setTimeout(resolve, Number(opts.beforeMs || 160)));

        video.muted = opts.muted === true;
        video.defaultMuted = opts.muted === true;
        video.volume = opts.muted === true ? 0 : normalizeVolume(item.volume);
        video.src = src;
        try { video.load(); } catch (_) {}

        await new Promise(resolve => setTimeout(resolve, Number(opts.afterLoadMs || 220)));
        setStatus((opts.label || 'Video-Start') + ': ' + (item.label || item.soundId || src));
        await video.play();
        videoRetryInProgress = false;
        videoErrorGraceUntil = Date.now() + 500;
        return { muted: video.muted, src };
      }

      async function playVideoFile(item){
        const url = item && (item.videoUrl || item.mediaUrl || item.audioUrl);
        if (!item || !url || !item.requestId) return;
        stopAudio();
        await new Promise(resolve => setTimeout(resolve, 180));
        currentRequestId = item.requestId;
        lastSeenRequestId = item.requestId;

        const clipMode = isClipShoutout(item);
        const video = clipMode ? clipVideoPlayer : videoPlayer;
        activeVideoElement = video;
        activeVideoItem = item;
        videoPlaybackStartedAt = 0;

        if (clipMode) {
          setupClipCard(item);
          videoPlayer.style.display = 'none';
        } else {
          videoPlayer.style.display = 'block';
        }

        video.style.opacity = clipMode ? '0' : '';
        setStatus((clipMode ? 'Clip-Shoutout vorbereitet: ' : 'Video vorbereitet: ') + (item.label || item.soundId || url));

        const attempts = [
          { label: 'Video-Start', cacheBust: true, muted: false, beforeMs: 160, afterLoadMs: 220 },
          { label: 'Video-Retry ohne Cache', cacheBust: false, muted: false, beforeMs: 220, afterLoadMs: 260 },
          { label: 'Video-Retry stumm', cacheBust: false, muted: true, beforeMs: 260, afterLoadMs: 300 }
        ];

        const errors = [];
        let result = null;
        for (const attempt of attempts) {
          try {
            result = await attemptVideoPlay(video, item, url, attempt);
            break;
          } catch (err) {
            errors.push({
              label: attempt.label,
              muted: attempt.muted === true,
              cacheBust: attempt.cacheBust !== false,
              message: err && err.message ? err.message : String(err),
              code: videoErrorCode(video),
              src: video.currentSrc || video.src || ''
            });
            await new Promise(resolve => setTimeout(resolve, 220));
          }
        }

        videoRetryInProgress = false;

        if (!result) {
          const last = errors[errors.length - 1] || {};
          setStatus('Video konnte nicht starten: ' + (last.message || last.code || 'unknown'));
          if (clipMode) {
            clipCard.style.display = 'block';
            clipCard.classList.add('show');
            video.style.opacity = '0';
          }
          setTimeout(async () => {
            if (currentRequestId !== item.requestId) return;
            await post('/client/error', {
              requestId: currentRequestId,
              mediaType: 'video',
              error: 'video_play_failed_after_retries',
              attempts: errors,
              src: video.currentSrc || video.src || ''
            });
            stopAudio();
          }, 4500);
          return;
        }

        if (clipMode) video.style.opacity = '1';
        audioUnlocked = true;
        document.body.dataset.audioUnlocked = '1';
        videoPlaybackStartedAt = Date.now();
        await post('/client/audio-started', {
          requestId: currentRequestId,
          mediaType: 'video',
          mutedFallback: result.muted === true,
          src: result.src
        });

        if (result.muted === true) {
          setStatus('Clip läuft stumm (Autoplay-Fallback): ' + (item.label || item.soundId || url));
        }

        const durationMs = Number(item.durationMs || 0);
        const fallbackMs = durationMs > 0
          ? (clipMode ? Math.max(1200, durationMs + 350) : Math.max(5000, durationMs + 5000))
          : 300000;
        clearVideoFallbackTimer();
        videoFallbackTimer = setTimeout(async () => {
          await finishVideoPlayback(clipMode ? 'Clip-Shoutout beendet' : 'Video beendet (Fallback)', { fallback: true, mutedFallback: result.muted === true });
        }, fallbackMs);
      }

      async function playSound(item){
        if (!item || !item.requestId) return;
        if (!shouldPlayInOverlay(item)) return;
        if (item.requestId === lastSeenRequestId && currentRequestId === item.requestId) return;
        if (isVideoItem(item)) return playVideoFile(item);
        if (String(item.type || '').toLowerCase() === 'generated_beep') return playGeneratedBeep(item);
        return playFileSound(item);
      }

      player.addEventListener('ended', async () => {
        const requestId = currentRequestId;
        currentRequestId = '';
        setStatus('Sound beendet');
        await post('/client/audio-ended', { requestId });
      });

      player.addEventListener('error', async () => {
        const requestId = currentRequestId;
        await post('/client/error', { requestId, error: 'audio_error' });
        stopAudio();
      });

      function wireVideoEvents(video) {
        video.addEventListener('ended', async () => {
          if (activeVideoElement !== video) return;
          await finishVideoPlayback('Video beendet');
        });

        video.addEventListener('error', async () => {
          if (Date.now() < videoResetSuppressUntil) return;
          if (Date.now() < videoErrorGraceUntil) return;
          if (videoRetryInProgress) return;
          if (activeVideoElement !== video) return;

          const requestId = currentRequestId;
          const code = videoErrorCode(video);
          const playedLongEnough = videoPlaybackStartedAt && (Date.now() - videoPlaybackStartedAt > 1200);

          if (!playedLongEnough) {
            setStatus('Video-Fehler kurz nach Start, warte auf Retry/Fallback: ' + code);
            return;
          }

          await post('/client/error', {
            requestId,
            mediaType: 'video',
            error: 'video_runtime_error',
            code,
            src: video.currentSrc || video.src || '',
            currentTime: Number(video.currentTime || 0)
          });
          stopAudio();
        });
      }

      wireVideoEvents(videoPlayer);
      wireVideoEvents(clipVideoPlayer);

      function normalizeWsPayload(message) {
        if (!message || typeof message !== 'object') return null;
        if (message.op || message.type || message.reason) return message;
        if (message.data && typeof message.data === 'object' && (message.data.op || message.data.type || message.data.reason)) return message.data;
        return message;
      }

      function handleMessage(message){
        const payload = normalizeWsPayload(message);
        if (!payload) return;
        const op = payload.op || payload.type || '';
        const reason = payload.reason || '';
        const data = payload.data || payload.payload || {};
        if (op !== 'sound_system') return;

        const current = payload.item || data.current || null;
        if ((reason === 'started' || reason === 'play_stream' || reason === 'interrupted_started' || reason === 'next_started' || reason === 'resumed' || reason === 'bundle_next_started' || reason === 'item_started') && current) {
          playSound(current);
          return;
        }

        if (STOP_REASONS.has(reason) && !current) {
          stopIfBackendIsIdle('Gestoppt');
        }
      }

      async function pollStatus(){
        if (pollingBusy) return;
        pollingBusy = true;
        try {
          const state = await getJson('/status');
          const cur = state && state.current ? state.current : null;
          if (!cur && currentRequestId) {
            stopIfBackendIsIdle('Gestoppt (Backend idle)');
            return;
          }
          if (cur && cur.requestId && cur.requestId !== lastSeenRequestId) {
            setStatus('Polling: ' + (cur.label || cur.soundId || cur.requestId));
            await playSound(cur);
          }
        } catch (_) {
        } finally {
          pollingBusy = false;
        }
      }

      function connect(){
        clearTimeout(reconnectTimer);
        const protocol = location.protocol === 'https:' ? 'wss:' : 'ws:';
        ws = new WebSocket(protocol + '//' + location.host);
        ws.addEventListener('open', () => { setStatus(audioUnlocked ? 'Audio aktiv · Verbunden' : 'Verbunden · Audio aktivieren'); post('/client/ready', { overlay: 'sound_system_overlay' }); });
        ws.addEventListener('message', (event) => { try { handleMessage(JSON.parse(event.data)); } catch (_) {} });
        ws.addEventListener('close', () => { setStatus('Getrennt - reconnect'); reconnectTimer = setTimeout(connect, 1500); });
        ws.addEventListener('error', () => { try { ws.close(); } catch (_) {} });
      }

      unlockBtn?.addEventListener('click', unlockAudio);
      document.body.addEventListener('pointerdown', () => { if (!audioUnlocked) unlockAudio(); }, { passive: true });

      connect();
      post('/client/ready', { overlay: 'sound_system_overlay', boot: true });
      setInterval(pollStatus, 250);
    })();
  </script>
</body>
</html>
