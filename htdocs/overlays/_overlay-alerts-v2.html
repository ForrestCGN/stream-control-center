<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>ForrestCGN Alerts V2</title>
  <style>
    :root {
      --bg: rgba(4, 6, 18, 0.0);
      --panel: #050716;
      --panel-2: #0d0a22;
      --inner: #090c1f;
      --purple: #c35cff;
      --purple-2: #8f5cff;
      --cyan: #39e6ff;
      --cyan-2: #8bdfff;
      --pink: #d879ff;
      --white: #ffffff;
      --text: #f7f8ff;
      --muted: #c6d2ee;
      --shadow-purple: rgba(195, 92, 255, .48);
      --shadow-cyan: rgba(57, 230, 255, .28);
      --card-w: clamp(740px, 61vw, 1080px);
      --card-h: clamp(168px, 14.2vw, 214px);
      --badge: clamp(68px, 6.5vw, 104px);
    }

    * { box-sizing: border-box; }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
      background: transparent;
      font-family: Inter, "Segoe UI", Arial, sans-serif;
      color: var(--text);
    }

    body { background: var(--bg); }

    .stage {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      pointer-events: none;
      padding: clamp(18px, 3vw, 54px);
    }

    .alert-card {
      position: relative;
      z-index: 10;
      width: min(var(--card-w), calc(100vw - 56px));
      min-height: calc(var(--card-h) + var(--badge) * .48);
      opacity: 0;
      transform: translate(var(--anchor-x, 0), var(--anchor-y, 0)) translateY(36px) scale(.94);
      filter: blur(6px);
      transition:
        opacity .5s ease,
        transform .72s cubic-bezier(.16, 1, .3, 1),
        filter .55s ease;
    }

    .alert-card.show {
      opacity: 1;
      transform: translate(var(--anchor-x, 0), var(--anchor-y, 0)) translateY(0) scale(1);
      filter: blur(0);
    }

    .alert-card.hide {
      opacity: 0;
      transform: translate(var(--anchor-x, 0), var(--anchor-y, 0)) translateY(-28px) scale(.965);
      filter: blur(4px);
    }

    .outer-lines {
      --line-w: clamp(150px, 18vw, 320px);
      --diamond-size: clamp(24px, 2.45vw, 42px);
      position: absolute;
      left: 50%;
      top: calc(var(--badge) * .54 + var(--card-h) * .50);
      width: min(calc(100vw - 28px), calc(var(--card-w) + (var(--line-w) * 2) + clamp(36px, 5vw, 92px)));
      height: calc(var(--diamond-size) + 10px);
      transform: translate(-50%, -50%);
      pointer-events: none;
      z-index: 0;
    }

    .line {
      position: absolute;
      top: 50%;
      width: var(--line-w);
      height: 4px;
      transform: translateY(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, transparent, var(--purple), var(--cyan), var(--purple), transparent);
      box-shadow: 0 0 16px rgba(195, 92, 255, .42), 0 0 24px rgba(57, 230, 255, .18);
      opacity: .94;
    }

    .line.left { left: 0; }
    .line.right { right: 0; transform: translateY(-50%) scaleX(-1); }

    .diamond {
      position: absolute;
      top: 50%;
      width: var(--diamond-size);
      height: var(--diamond-size);
      background: var(--white);
      box-shadow: 0 0 12px rgba(255,255,255,.7), 0 0 28px rgba(195,92,255,.34);
      opacity: .94;
      will-change: transform;
    }

    .diamond.left {
      left: calc(var(--line-w) * .5);
      animation: diamondLeft 5.8s ease-in-out infinite;
    }

    .diamond.right {
      right: calc(var(--line-w) * .5);
      animation: diamondRight 5.8s ease-in-out infinite;
      animation-delay: -2.9s;
    }

    @keyframes diamondLeft {
      0%, 100% { transform: translate(-50%, -50%) rotate(45deg); opacity: .82; }
      50% { transform: translate(calc(-50% + var(--line-w) * .32), -50%) rotate(45deg); opacity: 1; }
    }

    @keyframes diamondRight {
      0%, 100% { transform: translate(50%, -50%) rotate(45deg); opacity: .82; }
      50% { transform: translate(calc(50% - var(--line-w) * .32), -50%) rotate(45deg); opacity: 1; }
    }

    .shell-wrap {
      position: relative;
      z-index: 2;
      padding-top: calc(var(--badge) * .54);
    }

    .shell {
      position: relative;
      min-height: var(--card-h);
      display: grid;
      place-items: center;
      padding: clamp(36px, 3.2vw, 54px) clamp(44px, 4.6vw, 82px) clamp(28px, 2.5vw, 42px);
      border-radius: clamp(42px, 5vw, 78px);
      background:
        radial-gradient(circle at 50% 0%, rgba(57, 230, 255, .13), transparent 36%),
        linear-gradient(180deg, var(--panel-2), var(--panel));
      border: clamp(5px, .55vw, 9px) solid var(--purple);
      box-shadow:
        0 0 34px var(--shadow-purple),
        0 0 80px rgba(57, 230, 255, .10),
        inset 0 0 40px rgba(57, 230, 255, .08),
        inset 0 -20px 52px rgba(195, 92, 255, .10);
      overflow: hidden;
      isolation: isolate;
    }

    .shell::before {
      content: "";
      position: absolute;
      inset: clamp(18px, 2vw, 30px) clamp(22px, 2.5vw, 38px);
      border-radius: clamp(30px, 4vw, 58px);
      border: clamp(2px, .22vw, 4px) solid rgba(195, 92, 255, .92);
      background:
        radial-gradient(circle at 50% 0%, rgba(57, 230, 255, .10), transparent 42%),
        linear-gradient(180deg, #090c1f, #050816);
      box-shadow: inset 0 0 30px rgba(57, 230, 255, .07), 0 0 18px rgba(195, 92, 255, .24);
      pointer-events: none;
      z-index: 0;
    }

    .shell::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, rgba(57,230,255,.13) 28%, rgba(255,255,255,.10) 47%, rgba(195,92,255,.18) 60%, transparent 78%);
      transform: translateX(-130%);
      animation: runner 4.8s linear infinite;
      opacity: .42;
      pointer-events: none;
      z-index: 2;
    }

    @keyframes runner { to { transform: translateX(130%); } }

    .badge {
      position: absolute;
      z-index: 5;
      left: 50%;
      top: 0;
      width: var(--badge);
      height: calc(var(--badge) * 1.08);
      transform: translateX(-50%);
      display: grid;
      place-items: center;
      filter: drop-shadow(0 0 16px rgba(195, 92, 255, .38)) drop-shadow(0 0 26px rgba(57, 230, 255, .18));
      animation: badgeFloat 4.8s ease-in-out infinite;
    }

    @keyframes badgeFloat {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-5px); }
    }

    .badge-shield {
      position: absolute;
      inset: 0;
      background: rgba(9, 8, 29, .94);
      clip-path: polygon(50% 0%, 94% 22%, 82% 82%, 50% 100%, 18% 82%, 6% 22%);
      border: 0;
    }

    .badge-shield::before {
      content: "";
      position: absolute;
      inset: 0;
      clip-path: polygon(50% 0%, 94% 22%, 82% 82%, 50% 100%, 18% 82%, 6% 22%);
      background: linear-gradient(135deg, var(--purple), var(--cyan-2), var(--purple));
      z-index: -2;
    }

    .badge-shield::after {
      content: "";
      position: absolute;
      inset: clamp(5px, .45vw, 8px);
      clip-path: polygon(50% 0%, 94% 22%, 82% 82%, 50% 100%, 18% 82%, 6% 22%);
      background: rgba(8, 8, 28, .96);
      z-index: -1;
    }

    .badge-visual {
      position: relative;
      width: calc(var(--badge) * .74);
      height: calc(var(--badge) * .74);
      margin-top: calc(var(--badge) * .13);
      display: grid;
      place-items: center;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.48), transparent 34%),
        linear-gradient(135deg, rgba(215,118,255,.96), rgba(195,92,255,.92));
      border: clamp(3px, .34vw, 6px) solid rgba(255,255,255,.94);
      box-shadow: inset 0 -10px 28px rgba(101, 36, 145, .22), 0 0 24px rgba(195, 92, 255, .48);
      overflow: hidden;
      font-size: clamp(30px, 3.4vw, 56px);
      line-height: 1;
      color: #f8fbff;
      text-shadow: 0 0 12px rgba(255,255,255,.46);
    }

    .badge-visual.is-avatar,
    .badge-visual.is-image { background: rgba(7, 9, 26, .92); }

    .badge-visual.is-symbol {
      background:
        radial-gradient(circle at 50% 42%, rgba(255,255,255,.34), transparent 20%),
        radial-gradient(circle at 48% 46%, rgba(57,230,255,.38), transparent 35%),
        linear-gradient(135deg, rgba(16, 20, 56, .98), rgba(116, 45, 221, .96) 52%, rgba(19, 196, 238, .84));
    }

    .badge-visual.is-symbol::before {
      content: "";
      position: absolute;
      inset: 18%;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.48);
      box-shadow: inset 0 0 16px rgba(255,255,255,.12), 0 0 18px rgba(57,230,255,.22);
    }

    .badge-visual.is-symbol::after {
      content: "";
      position: absolute;
      width: 28%;
      height: 28%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255,255,255,.96), rgba(195,92,255,.72) 42%, rgba(57,230,255,.18) 72%, transparent 74%);
      box-shadow: 0 0 16px rgba(255,255,255,.34), 0 0 26px rgba(195,92,255,.28);
      opacity: .78;
    }

    .badge-svg {
      width: 58%;
      height: 58%;
      display: none;
      color: #ffffff;
      opacity: .88;
      filter: drop-shadow(0 0 8px rgba(255,255,255,.28)) drop-shadow(0 0 14px rgba(195,92,255,.22));
    }

    .badge-svg .soft-fill { fill: currentColor; opacity: .94; }
    .badge-svg .soft-stroke {
      fill: none;
      stroke: currentColor;
      stroke-width: 8;
      stroke-linecap: round;
      stroke-linejoin: round;
      opacity: .96;
    }

    .badge-visual img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
    }

    .content {
      position: relative;
      z-index: 3;
      width: 100%;
      display: grid;
      grid-template-columns: auto minmax(0, 1fr);
      align-items: center;
      justify-content: center;
      gap: clamp(18px, 1.9vw, 30px);
      text-align: left;
      padding: 0 clamp(8px, 1vw, 18px);
    }

    .content.no-avatar {
      grid-template-columns: minmax(0, 1fr);
      text-align: center;
    }

    .content.no-avatar .text-stack {
      justify-items: center;
      text-align: center;
    }

    .avatar-slot {
      width: clamp(88px, 7.25vw, 128px);
      height: clamp(88px, 7.25vw, 128px);
      border-radius: 50%;
      padding: clamp(4px, .45vw, 8px);
      background: linear-gradient(135deg, var(--cyan), var(--purple), var(--pink));
      box-shadow: 0 0 24px rgba(57,230,255,.28), 0 0 34px rgba(195,92,255,.34);
      flex: 0 0 auto;
      position: relative;
      overflow: hidden;
    }

    .avatar-slot img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.9);
      background: rgba(7, 9, 26, .92);
      position: relative;
      z-index: 2;
    }

    .avatar-slot img.broken { display: none; }

    .avatar-slot.is-logo {
      border-radius: clamp(22px, 2vw, 34px);
      padding: clamp(6px, .55vw, 10px);
    }

    .avatar-slot.is-logo img {
      object-fit: contain;
      padding: clamp(12px, .95vw, 19px);
      border-radius: clamp(17px, 1.55vw, 28px);
      background:
        radial-gradient(circle at 30% 20%, rgba(255,255,255,.12), transparent 36%),
        #080a18;
    }

    .avatar-slot.is-logo .avatar-fallback { display: none; }

    .avatar-fallback {
      position: absolute;
      inset: clamp(4px, .45vw, 8px);
      display: grid;
      place-items: center;
      border-radius: 50%;
      border: 2px solid rgba(255,255,255,.9);
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,.14), transparent 36%),
        linear-gradient(135deg, rgba(18, 24, 54, .98), rgba(8, 9, 28, .98));
      color: #eafaff;
      font-weight: 950;
      font-size: clamp(26px, 2.4vw, 44px);
      text-shadow: 0 0 14px rgba(57,230,255,.36), 0 0 18px rgba(195,92,255,.32);
      z-index: 1;
    }

    .text-stack {
      min-width: 0;
      display: grid;
      justify-items: start;
      text-align: left;
    }

    .source {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 9px;
      min-height: 22px;
      padding: 4px 12px;
      margin-bottom: clamp(6px, .75vw, 10px);
      border-radius: 999px;
      color: #eafaff;
      background: rgba(57, 230, 255, .08);
      border: 1px solid rgba(57, 230, 255, .26);
      box-shadow: 0 0 18px rgba(57, 230, 255, .10);
      font-size: clamp(10px, .75vw, 13px);
      font-weight: 800;
      letter-spacing: .13em;
      text-transform: uppercase;
      opacity: .96;
    }

    .headline {
      margin: 0;
      max-width: 100%;
      font-size: clamp(27px, 2.55vw, 46px);
      line-height: 1.04;
      font-weight: 950;
      letter-spacing: .01em;
      color: transparent;
      background: linear-gradient(90deg, var(--cyan) 0%, #dff7ff 42%, var(--pink) 82%);
      -webkit-background-clip: text;
      background-clip: text;
      text-shadow:
        0 0 16px rgba(57, 230, 255, .33),
        0 0 24px rgba(195, 92, 255, .30);
      overflow-wrap: anywhere;
      text-wrap: balance;
    }

    .value {
      margin-top: clamp(8px, 1.1vw, 15px);
      font-size: clamp(19px, 1.65vw, 30px);
      color: var(--text);
      font-weight: 850;
      text-shadow: 0 0 18px rgba(195, 92, 255, .35);
      overflow-wrap: anywhere;
    }

    .subline {
      margin-top: clamp(5px, .7vw, 10px);
      color: #d8e4ff;
      font-size: clamp(14px, 1.02vw, 18px);
      line-height: 1.28;
      font-weight: 760;
      opacity: .96;
      overflow-wrap: anywhere;
    }

    .message {
      margin-top: clamp(6px, .9vw, 12px);
      max-width: min(72ch, 92%);
      color: var(--muted);
      font-size: clamp(14px, 1.08vw, 19px);
      line-height: 1.28;
      font-weight: 700;
      opacity: .96;
      overflow-wrap: anywhere;
    }

    .spark {
      position: absolute;
      z-index: 1;
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: var(--cyan);
      box-shadow: 0 0 18px var(--cyan);
      opacity: .65;
      animation: sparkFloat 5.2s ease-in-out infinite;
      pointer-events: none;
    }

    .spark.s1 { top: 20%; left: 8%; }
    .spark.s2 { bottom: 18%; right: 10%; animation-delay: -1.1s; background: var(--pink); box-shadow: 0 0 18px var(--pink); }
    .spark.s3 { top: 26%; right: 14%; animation-delay: -2.4s; background: var(--purple); box-shadow: 0 0 18px var(--purple); }

    @keyframes sparkFloat {
      0%, 100% { transform: translate(var(--anchor-x, 0), var(--anchor-y, 0)) translateY(0) scale(1); opacity: .46; }
      50% { transform: translateY(-18px) scale(1.42); opacity: .98; }
    }

    .tier-medium .shell {
      border-color: #c865ff;
      box-shadow:
        0 0 38px rgba(200, 101, 255, .50),
        0 0 76px rgba(57, 230, 255, .14),
        inset 0 0 44px rgba(57, 230, 255, .08);
    }

    .tier-medium .headline { font-size: clamp(29px, 2.95vw, 52px); }

    .tier-big .shell {
      border-color: #d86cff;
      box-shadow:
        0 0 44px rgba(216, 108, 255, .54),
        0 0 86px rgba(57, 230, 255, .18),
        inset 0 0 48px rgba(255,255,255,.08);
    }

    .tier-big .headline { font-size: clamp(30px, 3.1vw, 56px); }
    .tier-big .badge-visual { transform: scale(1.05); }

    .tier-small {
      --card-w: clamp(680px, 60vw, 980px);
      --card-h: clamp(160px, 14vw, 210px);
      --badge: clamp(74px, 7vw, 112px);
    }

    .tier-small .headline { font-size: clamp(25px, 2.45vw, 42px); }
    .tier-small .avatar-slot { width: clamp(76px, 6.5vw, 108px); height: clamp(76px, 6.5vw, 108px); }
    .tier-small .message { display: block; font-size: clamp(12px, .95vw, 16px); }



    .alert-card.width-compact { --card-w: clamp(620px, 50vw, 860px); --card-h: clamp(150px, 12.8vw, 194px); }
    .alert-card.width-normal { --card-w: clamp(740px, 61vw, 1080px); }
    .alert-card.width-wide { --card-w: clamp(860px, 70vw, 1260px); --card-h: clamp(178px, 15vw, 232px); }
    .alert-card.width-full { --card-w: clamp(980px, 84vw, 1500px); --card-h: clamp(184px, 15.5vw, 244px); }
    .alert-card.no-badge .badge { display:none; }
    .alert-card.no-badge .shell-wrap { padding-top: calc(var(--badge) * .18); }
    .alert-card.no-lines .outer-lines { display:none; }
    .alert-card.no-particles .spark { display:none; }
    .alert-card.glow-soft .shell { box-shadow: 0 0 20px rgba(195,92,255,.28), inset 0 0 24px rgba(57,230,255,.05); }
    .alert-card.glow-strong .shell { box-shadow: 0 0 54px rgba(195,92,255,.72), 0 0 96px rgba(57,230,255,.18), inset 0 0 50px rgba(57,230,255,.11); }
    .alert-card.avatar-pos-right .content { grid-template-columns: minmax(0,1fr) auto; }
    .alert-card.avatar-pos-right .avatar-slot { order:2; }
    .alert-card.avatar-pos-top .content,
    .alert-card.avatar-pos-bottom .content { grid-template-columns: minmax(0,1fr); justify-items:center; text-align:center; }
    .alert-card.avatar-pos-top .text-stack,
    .alert-card.avatar-pos-bottom .text-stack { justify-items:center; text-align:center; }
    .alert-card.avatar-pos-bottom .avatar-slot { order:2; }
    .alert-card.avatar-pos-hidden .avatar-slot { display:none; }
    .alert-card.avatar-pos-hidden .content { grid-template-columns:minmax(0,1fr); }
    .alert-card.avatar-pos-hidden .text-stack { justify-items:center; text-align:center; }
    .alert-card.text-center .text-stack { justify-items:center; text-align:center; }
    .alert-card.avatar-small .avatar-slot { width: clamp(68px, 5.8vw, 100px); height: clamp(68px, 5.8vw, 100px); }
    .alert-card.avatar-large .avatar-slot { width: clamp(104px, 8.5vw, 148px); height: clamp(104px, 8.5vw, 148px); }
    .alert-card.logo-round .avatar-slot.is-logo { border-radius:50%; }
    .alert-card.logo-round .avatar-slot.is-logo img { border-radius:50%; }
    .alert-card.logo-original .avatar-slot.is-logo { background:transparent; box-shadow:none; padding:0; }
    .alert-card.logo-original .avatar-slot.is-logo img { background:transparent; border:0; padding:0; }
    .alert-card .headline { font-size: calc(clamp(27px, 2.55vw, 46px) * var(--font-scale) * var(--headline-scale)); }
    .alert-card .value { font-size: calc(clamp(19px, 1.65vw, 30px) * var(--font-scale) * var(--value-scale)); }
    .alert-card .subline, .alert-card .message { font-size: calc(clamp(14px, 1.02vw, 18px) * var(--font-scale)); }
    .stage.pos-top-left { place-items: start; }
    .stage.pos-top-center { place-items: start center; }
    .stage.pos-top-right { place-items: start end; }
    .stage.pos-middle-left { place-items: center start; }
    .stage.pos-middle-center { place-items: center; }
    .stage.pos-middle-right { place-items: center end; }
    .stage.pos-bottom-left { place-items: end start; }
    .stage.pos-bottom-center { place-items: end center; }
    .stage.pos-bottom-right { place-items: end end; }
    .stage.pos-custom { display:block; }
    .stage.pos-custom .alert-card { position:absolute; left:var(--alert-x, 50%); top:var(--alert-y, 50%); --anchor-x:-50%; --anchor-y:-50%; }
    .badge-style-ring .badge-svg .soft-fill { opacity: 0; }
    .badge-style-pulse .badge-svg .soft-stroke { opacity: .28; }
    .badge-style-minimal .badge-svg .soft-stroke { opacity: .45; }
    .badge-style-minimal .badge-svg .soft-fill { opacity: .18; }
    .badge-style-dotgrid .badge-svg .soft-stroke { opacity:.55; }
    .badge-style-triad .badge-svg .soft-fill { opacity:.9; }
    .badge-style-slash .badge-svg .soft-stroke { opacity:.8; }
    .badge-style-double-ring .badge-svg .soft-stroke { opacity:.85; }

    @media (max-width: 760px) {
      :root {
        --card-w: calc(100vw - 34px);
        --card-h: 150px;
        --badge: 86px;
      }

      .stage { padding: 12px; }
      .outer-lines { display: none; }
      .shell { padding-inline: 26px; }
      .content { grid-template-columns: minmax(0, 1fr); gap: 10px; }
      .avatar-slot { display: none; }
      .source { letter-spacing: .08em; }
      .message { max-width: 98%; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        animation-duration: .001ms !important;
        animation-iteration-count: 1 !important;
        transition-duration: .001ms !important;
      }
    }
  

    /* STEP121: Größen, Fonts, Avatar und Partikel zuverlässig anwenden */
    .alert-card { --font-scale: 1; --headline-scale: 1; --value-scale: 1; }
    .alert-card.avatar-small .avatar-slot { width: calc(var(--card-h) * .34) !important; height: calc(var(--card-h) * .34) !important; }

  <div class="stage" id="stage"></div>
  <audio id="sound" preload="auto"></audio>

  <script>
    const stage = document.getElementById('stage');
    const audio = document.getElementById('sound');
    let ws;
    let currentTimer = null;
    let currentAlertId = null;
    const PREVIEW_MODE = new URLSearchParams(location.search).has('preview');

    function stageMetrics() {
      const scale = Math.max(0.05, Math.min(window.innerWidth / 1920, window.innerHeight / 1080) || 1);
      const offsetX = (window.innerWidth - 1920 * scale) / 2;
      const offsetY = (window.innerHeight - 1080 * scale) / 2;
      return { scale, offsetX, offsetY };
    }

    function applyCardRenderMetrics(card, settings) {
      if (!card || !settings) return;
      const m = stageMetrics();
      const x = Math.max(0, Math.min(100, Number(settings.positionX ?? 50) || 50));
      const y = Math.max(0, Math.min(100, Number(settings.positionY ?? 50) || 50));
      const left = m.offsetX + (x / 100) * 1920 * m.scale;
      const top = m.offsetY + (y / 100) * 1080 * m.scale;
      card.style.setProperty('--render-x', `${left}px`);
      card.style.setProperty('--render-y', `${top}px`);
      card.style.setProperty('--render-scale', String(m.scale));
      card.style.setProperty('--render-intro-scale', String(m.scale * 0.94));
      card.style.setProperty('--render-hide-scale', String(m.scale * 0.965));
    }

    function updateStageScale() {
      [...stage.querySelectorAll('.alert-card')].forEach((card) => {
        try {
          const settings = JSON.parse(card.dataset.displaySettings || '{}');
          applyCardRenderMetrics(card, settings);
        } catch (_) {}
      });
    }

    window.addEventListener('resize', updateStageScale);
    updateStageScale();

    function connect() {
      const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
      ws = new WebSocket(`${proto}//${location.host}`);
      ws.addEventListener('open', () => send({ op: 'alert_system', client: 'overlay', event: 'hello' }));
      ws.addEventListener('message', ev => {
        let data;
        try { data = JSON.parse(ev.data); } catch (_) { return; }
        if (!data || data.op !== 'alert_system') return;
        if (data.event === 'play' && data.alert) playAlert(data.alert);
        if (data.event === 'clear') clearAlert('clear');
      });
      ws.addEventListener('close', () => setTimeout(connect, 1500));
    }

    function send(payload) {
      if (ws && ws.readyState === WebSocket.OPEN) ws.send(JSON.stringify(payload));
    }

    function playAlert(alert) {
      clearAlert('replace', false);
      currentAlertId = alert.id;

      const card = document.createElement('div');

      const avatar = chooseAvatar(alert);
      const source = buildSource(alert);
      const display = buildDisplay(alert);
      const settings = displaySettings(alert);
      const image = chooseBadgeImage(alert, settings);
      stage.className = 'stage';
      const badgeSvg = chooseBadgeSvg(alert, settings);
      const badgeStyleClass = 'badge-symbol-' + escapeCss(settings.badgeStyle || 'core');
      const visualClass = image ? 'is-image' : ('is-symbol ' + badgeStyleClass);
      const showBadge = false; // STEP143: badges removed completely
      card.className = `alert-card tier-${escapeCss(alert.tier || 'normal')} alert-source-${escapeCss(alert.source || alert.provider || 'generic')} alert-type-${escapeCss(alert.type || alert.type_key || 'generic')} ${displayClasses(settings)}`;
      card.style.setProperty('--card-w', cardWidth(settings));
      card.style.setProperty('--card-h', cardHeight(settings));

    function buildSource(alert) {
      const parts = [];
      if (alert.source) parts.push(String(alert.source).toUpperCase());

      return parts.length ? parts.join(' · ') : 'ALERT';

    function buildDisplay(alert) {
      const title = alert.title || buildSource(alert);
      let headline = alert.headline || alert.user || alert.userDisplayName || defaultTitle(alert);
      let value = alert.value || alert.amountFormatted || amountText(alert);
      const subline = alert.subline || '';
      const message = alert.message || '';

      // STEP123: Bits/Cheer optisch als 3 klare Zeilen:
      // 1) Name, 2) cheert X Bits, 3) Nachricht/Subline.
      const type = String(alert.type || alert.type_key || '').toLowerCase();
      const source = String(alert.source || alert.provider || '').toLowerCase();
      if (source === 'twitch' && type === 'bits') {
        const displayName = alert.userDisplayName || alert.user || alert.user_display || alert.userLogin || '';
        const oldHeadline = String(headline || '');
        const oldValue = String(value || '');
        if (oldHeadline.toLowerCase().includes('cheer')) {
          headline = displayName || oldHeadline.replace(/cheer.?t/i, '').trim();
          if (!/^cheer|^cheert/i.test(oldValue)) value = `cheert ${oldValue}`.trim();
        } else if (!/^cheer|^cheert/i.test(oldValue)) {
          headline = displayName || headline;
          value = `cheert ${oldValue}`.trim();
        }
      }
      return { title, headline, value, subline, message };
    }

    function amountText(alert) {
      const amount = alert.amount || '';
      if (!amount) return '';
      const type = String(alert.type || '').toLowerCase();
      if (type.includes('bits')) return `${amount} Bits`;
      if (type.includes('raid')) return Number(amount) === 1 ? '1 Person' : `${amount} Leute`;
      return String(amount);
    }

    function defaultTitle(alert) {
      const type = String(alert.type || '').toLowerCase();
      if (type.includes('follow')) return 'Neuer Follower';
      if (type.includes('sub')) return 'Neuer Sub';
      if (type.includes('raid')) return 'Raid Incoming';
      if (type.includes('bits') || type.includes('cheer')) return 'Bits Alert';
      if (type.includes('donation')) return 'Donation Alert';
      return 'Alert';
    }


    function buildCelebrationLayer(alert) {

        alert.meta?.celebration ||
        alert.display?.settings?.previewCelebration ||
        alert.display?.settings?.preview_celebration ||
        'none'
      );
      if (!selected || selected === 'none' || selected === 'off') return null;
      const strength = normalizeCelebrationStrength(
        alert.celebrationStrength ||
        alert.celebration_strength ||
        alert.display?.settings?.celebrationStrength ||
        alert.display?.settings?.celebration_strength ||
        'medium'
      );
      const strengthCfg = {
        soft: { countMul: 0.36, sizeMul: 0.70, alphaMul: 0.54, speedMul: 1.30, driftMul: 0.72, maxHeart: 24, maxStar: 30 },
        medium: { countMul: 0.78, sizeMul: 0.90, alphaMul: 0.80, speedMul: 1.08, driftMul: 1.00, maxHeart: 48, maxStar: 58 },
        strong: { countMul: 1.02, sizeMul: 1.00, alphaMul: 0.90, speedMul: 1.02, driftMul: 1.15, maxHeart: 64, maxStar: 76 }
      }[strength] || { countMul: 1, sizeMul: 1, alphaMul: 1, speedMul: 1, driftMul: 1, maxHeart: 76, maxStar: 88 };
      const durationMs = Math.max(1200, Math.min(120000, Number(alert.durationMs || alert.duration_ms || 7000) || 7000));
      const layer = document.createElement('div');
      layer.className = `alert-celebration ${escapeCss(selected)} strength-${escapeCss(strength)}`;
      layer.style.setProperty('--celebration-duration', `${durationMs}ms`);

      const palettes = {
        heart_rain: ['#ff6fb7','#d77cff','#ff9ad5','#ffffff','#c45cff'],
        sparkle_rain: ['#8ff4ff','#ffffff','#c45cff','#b9f7ff','#d77cff']
      };
      const symbols = {
        heart_rain: ['♥','❤','♡','♥','❤'],
        sparkle_rain: ['✦','✧','✶','⋆','✨']
      };
      const html = [];
      const baseCount = selected === 'heart_rain' ? Math.ceil(durationMs / 330) : Math.ceil(durationMs / 250);
      const count = selected === 'heart_rain'
        ? Math.max(strength === 'soft' ? 8 : 18, Math.min(strengthCfg.maxHeart || 78, Math.round(baseCount * strengthCfg.countMul)))
        : Math.max(strength === 'soft' ? 10 : 22, Math.min(strengthCfg.maxStar || 92, Math.round(baseCount * strengthCfg.countMul)));
      const baseDuration = Math.round((selected === 'heart_rain' ? 9800 : 7600) * strengthCfg.speedMul);
      const baseSize = selected === 'heart_rain' ? 24 : 15;
      const sizeRange = selected === 'heart_rain' ? 26 : 18;
      const colorList = palettes[selected] || palettes.sparkle_rain;
      const symbolList = symbols[selected] || symbols.sparkle_rain;

      for (let i = 0; i < count; i++) {
        const lane = (i * 37 + 13) % 100;
        const x = Math.max(2, Math.min(98, lane + (((i * 17) % 13) - 6)));
        const dx = Math.round(((((i * 19) % 29) - 14) * (strengthCfg.driftMul || 1)) * 10) / 10;
        const dx1 = Math.round(((((i * 23) % 21) - 10) * (strengthCfg.driftMul || 1)) * 10) / 10;
        const dx2 = Math.round(((((i * 29) % 25) - 12) * (strengthCfg.driftMul || 1)) * 10) / 10;
        const dx3 = Math.round(((((i * 31) % 23) - 11) * (strengthCfg.driftMul || 1)) * 10) / 10;
        const delay = -Math.round((i / count) * baseDuration) - ((i * 113) % 900);
        const dur = baseDuration + ((i * 197) % (selected === 'heart_rain' ? 2600 : 2100));
        const size = Math.round((baseSize + ((i * 11) % sizeRange)) * strengthCfg.sizeMul);
        const scale = Math.round((0.78 + ((i * 7) % 34) / 100) * 100) / 100;
        const rotStart = -18 + ((i * 5) % 37);
        const rotEnd = rotStart + (-24 + ((i * 13) % 49));
        const sway = Math.round((4 + ((i * 7) % 15)) * (strengthCfg.driftMul || 1));
        const floatDur = 2200 + ((i * 137) % 1800);
        const floatDelay = -((i * 97) % 1600);
        const alphaBase = selected === 'heart_rain' ? (0.78 + ((i * 3) % 18) / 100) : (0.68 + ((i * 5) % 25) / 100);
        const alpha = Math.min(1, Math.round(alphaBase * strengthCfg.alphaMul * 100) / 100);
        const c = colorList[i % colorList.length];
        const glyph = symbolList[(i * 3 + 1) % symbolList.length];
        html.push(`<span class="celebration-piece" style="--x:${x}vw;--dx:${dx}vw;--dx1:${dx1}vw;--dx2:${dx2}vw;--dx3:${dx3}vw;--delay:${delay}ms;--dur:${dur}ms;--size:${size}px;--rot-start:${rotStart}deg;--rot-end:${rotEnd}deg;--scale:${scale};--sway:${sway}px;--floatdur:${floatDur}ms;--floatdelay:${floatDelay}ms;--alpha:${alpha};--c:${c}"><span class="glyph">${glyph}</span></span>`);
      }

      layer.innerHTML = html.join('');
      setTimeout(() => layer.remove(), durationMs + 900);
      return layer;
    }

    function normalizeCelebrationStrength(value) {
      const v = String(value || 'medium').toLowerCase();
      if (v === 'dezent' || v === 'soft' || v === 'leicht' || v === 'low') return 'soft';
      if (v === 'stark' || v === 'strong' || v === 'hoch' || v === 'high') return 'strong';
      return ['soft','medium','strong'].includes(v) ? v : 'medium';
    }

    function normalizeCelebrationType(value) {
      const v = String(value || 'none').toLowerCase();
      const aliases = {
        confetti:'sparkle_rain', burst:'sparkle_rain', screen:'sparkle_rain', mega:'sparkle_rain',
        fireworks:'sparkle_rain', mega_fireworks:'sparkle_rain', firework:'sparkle_rain',
        hearts:'heart_rain', heart:'heart_rain', stars:'sparkle_rain', starfall:'sparkle_rain',
        coins:'sparkle_rain', bits_rain:'sparkle_rain', comets:'sparkle_rain', ribbons:'sparkle_rain',
        sparkle:'sparkle_rain', sparkles:'sparkle_rain', soft_confetti:'sparkle_rain', edge_pulse:'sparkle_rain'
      };
      const out = aliases[v] || v;
      return ['none','heart_rain','sparkle_rain'].includes(out) ? out : 'none';
    }

    function clearAlert(reason, ack = true) {
      clearTimeout(currentTimer);
      currentTimer = null;

      const cards = [...stage.querySelectorAll('.alert-card')];
      [...document.querySelectorAll('.alert-celebration')].forEach(el => el.remove());
      cards.forEach(card => {
        card.classList.remove('show');
        card.classList.add('hide');
        setTimeout(() => card.remove(), 720);
      });

      audio.pause();
      audio.removeAttribute('src');

      if (ack && currentAlertId) send({ op: 'alert_system', client: 'overlay', event: 'finished', alertId: currentAlertId, reason });
      currentAlertId = null;
    }

    function escapeHtml(v) {
      return String(v ?? '').replace(/[&<>"]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[c]));
    }

    function escapeAttr(v) {
      return escapeHtml(v).replace(/'/g, '&#39;');
    }

    function escapeCss(v) {
      return String(v || '').replace(/[^a-z0-9_-]/gi, '');
    }

    window.addEventListener('message', (ev) => {
      const data = ev.data || {};
      if (!data || data.op !== 'cgn_alert_preview') return;
      if (data.event === 'clear') return clearAlert('preview-clear', false);
      if (data.event === 'render' && data.alert) {
        const alert = Object.assign({}, data.alert, { id: data.alert.id || 'dashboard_preview', durationMs: data.alert.durationMs || 3600000 });
        playAlert(alert);
      }
    });

    if (!PREVIEW_MODE) connect();

    if (new URLSearchParams(location.search).has('demo')) {
      setTimeout(() => playAlert({
        id: 'demo_alert_neon_badge_v11',
        source: 'twitch',
        type: 'bits',
        tier: 'big',
        title: 'TWITCH BITS',
        headline: 'ForrestCGN cheer’t',
        value: '100 Bits',
        subline: '',
        message: 'Danke für deinen Support in der CGN-Community!',
        user: 'ForrestCGN',
        amount: 100,
        avatarUrl: 'https://static-cdn.jtvnw.net/jtv_user_pictures/bd8363e2-eacf-4805-831f-7a1bce3cc514-profile_image-300x300.png',
        imageMode: 'avatar_icon',
        durationMs: 9000
      }), 450);
    }
  </script>
