<!doctype html>
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CGN Loyalty Wheel Overlay</title>
  <style>
    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: transparent;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      opacity: 0;
      visibility: hidden;
      pointer-events: none;
      transition: opacity 420ms ease, visibility 0s linear 420ms;
    }

    body.is-visible {
      opacity: 1;
      visibility: visible;
      transition: opacity 420ms ease, visibility 0s linear 0s;
    }

    .stage {
      position: relative;
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      transform-origin: top left;
      background:
        radial-gradient(circle at 50% 45%, rgba(0, 216, 255, 0.12), transparent 31%),
        radial-gradient(circle at 36% 50%, rgba(208, 60, 255, 0.13), transparent 35%),
        linear-gradient(135deg, rgba(5, 6, 19, .94) 0%, rgba(9, 13, 34, .94) 44%, rgba(3, 21, 37, .94) 100%);
    }

    .stage::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        linear-gradient(90deg, transparent 0%, rgba(208,60,255,.16) 23%, transparent 34%, transparent 66%, rgba(24,216,255,.14) 78%, transparent 100%),
        repeating-linear-gradient(0deg, rgba(255,255,255,.025) 0px, rgba(255,255,255,.025) 1px, transparent 2px, transparent 36px);
      opacity: .45;
      pointer-events: none;
    }

    .asset {
      position: absolute;
      pointer-events: none;
      user-select: none;
      background-repeat: no-repeat;
      background-size: contain;
      background-position: center;
    }

    .wheel-wrapper {
      position: absolute;
      left: 560px;
      top: 55px;
      width: 800px;
      height: 800px;
      filter: drop-shadow(0 0 18px rgba(128, 90, 255, .32));
    }

    .segments-rotor {
      position: absolute;
      inset: 0;
      transform: rotate(0deg);
      transform-origin: center center;
      will-change: transform;
      z-index: 1;
    }

    .segments-layer {
      position: absolute;
      inset: 0;
    }

    .segments-svg {
      width: 100%;
      height: 100%;
      display: block;
    }

    .wheel-ring {
      inset: 0;
      width: 800px;
      height: 800px;
      background-image: url("../../assets/images/loyalty/wheel/wheel_ring.png");
      z-index: 3;
    }

    .wheel-center {
      left: 250px;
      top: 250px;
      width: 300px;
      height: 300px;
      background-image: url("../../assets/images/loyalty/wheel/wheel_center.png");
      z-index: 4;
    }

    .pointer {
      left: 895px;
      top: 0;
      width: 130px;
      height: 130px;
      background-image: url("../../assets/images/loyalty/wheel/pointer.png");
      z-index: 6;
      filter: drop-shadow(0 0 12px rgba(255,255,255,.26));
    }

    .winner-banner {
      left: 510px;
      top: 820px;
      width: 900px;
      height: 150px;
      background-image: url("../../assets/images/loyalty/wheel/winner_banner.png");
      background-position: center center;
      z-index: 2;
    }

    .winner-text {
      position: absolute;
      left: 560px;
      top: 825px;
      z-index: 7;
      width: 800px;
      height: 145px;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      color: rgba(255,255,255,.94);
      font-weight: 900;
      text-transform: uppercase;
      letter-spacing: .055em;
      font-size: clamp(22px, 1.85vw, 34px);
      line-height: .98;
      text-shadow: 0 0 10px rgba(208,60,255,.85), 0 0 18px rgba(24,216,255,.65);
      pointer-events: none;
      overflow: hidden;
      padding: 0 28px;
      box-sizing: border-box;
    }

    .winner-text .wrap {
      display: block;
      max-width: 100%;
    }

    .winner-text .main {
      display: block;
      overflow: hidden;
      overflow-wrap: anywhere;
    }

    .winner-text .winner-line {
      display: block;
      white-space: nowrap;
    }

    .winner-text.is-long {
      font-size: clamp(20px, 1.55vw, 29px);
      letter-spacing: .04em;
      line-height: .96;
    }

    .winner-text.is-very-long {
      font-size: clamp(18px, 1.35vw, 25px);
      letter-spacing: .032em;
      line-height: .94;
    }

    .winner-text .sub {
      display: block;
      margin-top: 6px;
      font-size: 14px;
      line-height: 1;
      letter-spacing: .14em;
      color: rgba(255,255,255,.72);
      font-weight: 800;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .winner-text.is-very-long .sub {
      margin-top: 5px;
      font-size: 12px;
    }

    .status-panel {
      display: none;
      position: absolute;
      left: 80px;
      top: 75px;
      z-index: 10;
      color: rgba(255,255,255,.9);
      opacity: .88;
      text-shadow: 0 0 18px rgba(145, 225, 255, .38);
    }

    .status-title {
      font-weight: 900;
      font-size: 42px;
      text-transform: uppercase;
      letter-spacing: .18em;
    }

    .status-sub {
      margin-top: 8px;
      color: rgba(255,255,255,.62);
      font-weight: 700;
      font-size: 18px;
      text-transform: uppercase;
      letter-spacing: .24em;
    }

    .connection {
      margin-top: 30px;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      padding: 10px 14px;
      background: rgba(10,20,38,.42);
      border: 1px solid rgba(76,207,255,.24);
      border-radius: 999px;
      box-shadow: 0 0 22px rgba(52,187,255,.12);
      color: rgba(255,255,255,.66);
      font-size: 14px;
      letter-spacing: .12em;
      text-transform: uppercase;
    }

    .dot {
      width: 9px;
      height: 9px;
      border-radius: 999px;
      background: #ff486a;
      box-shadow: 0 0 10px rgba(255,72,106,.9);
    }

    .connection.is-open .dot {
      background: #35e8ff;
      box-shadow: 0 0 10px rgba(53,232,255,.9);
    }

    @media (max-aspect-ratio: 16/9) {
      .stage { transform: scale(calc(100vw / 1920)); }
    }

    @media (min-aspect-ratio: 16/9) {
      .stage { transform: scale(calc(100vh / 1080)); }
    }
  </style>
</head>
<body>
  <div class="stage is-idle" id="stage">
    <div class="status-panel">
      <div class="status-title">Glücksrad</div>
      <div class="status-sub" id="statusSub">Warte auf Loyalty-Event</div>
      <div class="connection" id="connection"><span class="dot"></span><span id="connectionText">WS verbindet...</span></div>
    </div>

    <div class="wheel-wrapper">
      <div class="segments-rotor" id="segmentsRotor">
        <div class="segments-layer" id="segmentsLayer"></div>
      </div>
      <div class="asset wheel-ring"></div>
      <div class="asset wheel-center"></div>
    </div>

    <div class="asset pointer"></div>
    <div class="asset winner-banner"></div>
    <div class="winner-text" id="winnerText"><span class="wrap"><span class="main"><span class="winner-line">Bereit</span></span></span></div>
  </div>

  <script>
    (() => {
      const OVERLAY_BUILD = "LWG-WHEEL-TEXT-RADIAL-3";
      const RESULT_HOLD_MS = 11000;
      const RESET_HIDE_MS = 300;

      const stage = document.getElementById("stage");
      const rotor = document.getElementById("segmentsRotor");
      const segmentsLayer = document.getElementById("segmentsLayer");
      const winnerText = document.getElementById("winnerText");
      const statusSub = document.getElementById("statusSub");
      const connection = document.getElementById("connection");
      const connectionText = document.getElementById("connectionText");

      const DEFAULT_FIELDS = [
        { id: "vip_1_day", label: "VIP", sub: "1 Tag", weight: 1, colorA: "#d03cff", colorB: "#18d6ff" },
        { id: "points_1000", label: "1000", sub: "Punkte", weight: 1, colorA: "#18d6ff", colorB: "#d03cff" },
        { id: "bonus_spin_1", label: "Bonus", sub: "Dreh", weight: 1, colorA: "#d03cff", colorB: "#18d6ff" },
        { id: "coupon_20", label: "20€", sub: "Gutschein", weight: 1, colorA: "#18d6ff", colorB: "#d03cff" },
        { id: "sound_free", label: "Sound", sub: "frei", weight: 1, colorA: "#d03cff", colorB: "#18d6ff" },
        { id: "miss_1", label: "Niete", sub: "", weight: 2, colorA: "#7d27b8", colorB: "#124b72" },
        { id: "game_key", label: "Key", sub: "Game", weight: 1, colorA: "#18d6ff", colorB: "#d03cff" },
        { id: "points_500", label: "500", sub: "Punkte", weight: 1, colorA: "#d03cff", colorB: "#18d6ff" }
      ];

      let ws = null;
      let reconnectTimer = null;
      let heartbeatTimer = null;
      let hideTimer = null;
      let finishFallbackTimer = null;
      let currentRotation = 0;
      let running = false;
      let currentFields = DEFAULT_FIELDS;

      function esc(value) {
        return String(value ?? "")
          .replaceAll("&", "&amp;")
          .replaceAll("<", "&lt;")
          .replaceAll(">", "&gt;")
          .replaceAll('"', "&quot;");
      }

      function fixTextEncoding(value) {
        let text = String(value ?? "");
        text = text
          .replaceAll("â‚¬", "€")
          .replaceAll("\u20ac", "€")
          .replace(/(\d)\s*\?\s*(?=(Steam|Gutschein|Amazon|Wunsch|PayPal|Paypal|PSC|Paysafe|Euro|Guthaben)\b)/gi, "$1€ ")
          .replace(/(\d)\s*EUR\b/gi, "$1€")
          .replace(/(\d)\s*Euro\b/gi, "$1€");
        return text;
      }

      function normalizeDeg(deg) {
        let value = Number(deg || 0) % 360;
        if (value < 0) value += 360;
        return value;
      }

      function polar(cx, cy, r, deg) {
        const rad = deg * Math.PI / 180;
        return [cx + r * Math.cos(rad), cy + r * Math.sin(rad)];
      }

      function arcPathSegment(cx, cy, rOuter, rInner, a0, a1) {
        const [x0o, y0o] = polar(cx, cy, rOuter, a0);
        const [x1o, y1o] = polar(cx, cy, rOuter, a1);
        const [x1i, y1i] = polar(cx, cy, rInner, a1);
        const [x0i, y0i] = polar(cx, cy, rInner, a0);
        const large = ((a1 - a0) % 360) > 180 ? 1 : 0;
        return `M ${x0o.toFixed(2)} ${y0o.toFixed(2)} A ${rOuter} ${rOuter} 0 ${large} 1 ${x1o.toFixed(2)} ${y1o.toFixed(2)} L ${x1i.toFixed(2)} ${y1i.toFixed(2)} A ${rInner} ${rInner} 0 ${large} 0 ${x0i.toFixed(2)} ${y0i.toFixed(2)} Z`;
      }

      function showOverlay() {
        clearTimeout(hideTimer);
        document.body.classList.add("is-visible");
      }

      function hideOverlay(delayMs = 0) {
        clearTimeout(hideTimer);
        hideTimer = setTimeout(() => {
          document.body.classList.remove("is-visible");
        }, Math.max(0, Number(delayMs || 0)));
      }

      function scheduleResultHide() {
        hideOverlay(RESULT_HOLD_MS);
      }

      function normalizeFields(fields) {
        const list = Array.isArray(fields) ? fields : [];
        const clean = list
          .filter(Boolean)
          .map((field, index) => ({
            index,
            id: String(field.id || field.fieldUid || `field_${index + 1}`),
            fieldUid: String(field.fieldUid || field.id || `field_${index + 1}`),
            label: fixTextEncoding(field.label || field.id || `Feld ${index + 1}`),
            sub: fixTextEncoding(field.sub || field.subLabel || field.subtitle || ""),
            colorA: String(field.colorA || (index % 2 ? "#18d6ff" : "#d03cff")),
            colorB: String(field.colorB || (index % 2 ? "#d03cff" : "#18d6ff")),
            weight: Number(field.weight || 1)
          }));
        return clean.length ? clean : DEFAULT_FIELDS;
      }

      function shortenWord(word, max) {
        const raw = fixTextEncoding(word || "");
        if (raw.length <= max) return raw;
        return raw.slice(0, Math.max(1, max - 1)) + "…";
      }

      function pushWrappedWords(lines, text, maxLines, maxChars) {
        const words = fixTextEncoding(text || "").replace(/\s+/g, " ").trim().split(" ").filter(Boolean);
        let current = "";
        for (const wordRaw of words) {
          if (lines.length >= maxLines) break;
          const word = shortenWord(wordRaw, Math.max(6, maxChars));
          const next = current ? `${current} ${word}` : word;
          if (next.length <= maxChars || !current) {
            current = next;
          } else {
            lines.push(current);
            current = word;
          }
        }
        if (current && lines.length < maxLines) lines.push(current);
      }

      function splitLabel(label, maxLines = 3, maxChars = 15) {
        const raw = fixTextEncoding(label || "").replace(/\s+/g, " ").trim();
        if (!raw) return [""];
        const lines = [];

        if (raw.includes(":")) {
          const parts = raw.split(":");
          const head = `${parts.shift().trim()}:`;
          const rest = parts.join(":").trim();
          if (head.length <= maxChars + 2) {
            lines.push(head);
            pushWrappedWords(lines, rest, maxLines, maxChars);
          } else {
            pushWrappedWords(lines, head, maxLines, maxChars);
            pushWrappedWords(lines, rest, maxLines, maxChars);
          }
        } else {
          pushWrappedWords(lines, raw, maxLines, maxChars);
        }

        if (!lines.length) return [shortenWord(raw, maxChars)];
        const joined = lines.join(" ").replace(/…/g, "");
        if (raw.length > joined.length + 2 && lines.length >= maxLines) {
          const last = lines.length - 1;
          lines[last] = shortenWord(lines[last], Math.max(6, maxChars));
          if (!lines[last].endsWith("…")) lines[last] = shortenWord(`${lines[last]}…`, maxChars);
        }
        return lines.slice(0, maxLines);
      }

      function buildSegmentsSvg(fields) {
        const list = normalizeFields(fields);
        const n = list.length;
        const cx = 400;
        const cy = 400;
        const rOuter = 385;
        const rInner = 150;
        const rText = n <= 8 ? 252 : n <= 12 ? 258 : 266;
        const step = 360 / n;
        const startBoundary = -90 - step / 2;
        const maxChars = n <= 8 ? 15 : n <= 12 ? 14 : 11;
        const maxLines = n <= 12 ? 3 : 2;
        const fontSize = n <= 8 ? 19 : n <= 12 ? 16 : 14;
        const subSize = n <= 8 ? 11 : n <= 12 ? 9 : 8;

        let svg = `
<svg class="segments-svg" viewBox="0 0 800 800" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="2.4" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
`;

        list.forEach((field, i) => {
          const a0 = startBoundary + i * step;
          const a1 = a0 + step;
          const path = arcPathSegment(cx, cy, rOuter, rInner, a0, a1);
          const gradId = `segFill_${i}`;
          svg += `
  <defs>
    <linearGradient id="${gradId}" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="${esc(field.colorA)}" stop-opacity="0.22"/>
      <stop offset="100%" stop-color="${esc(field.colorB)}" stop-opacity="0.09"/>
    </linearGradient>
  </defs>
  <path d="${path}" fill="url(#${gradId})" stroke="none"/>
`;
        });

        svg += `  <circle cx="400" cy="400" r="${rOuter}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
`;
        svg += `  <circle cx="400" cy="400" r="${rInner}" fill="none" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>
`;

        list.forEach((field, i) => {
          const a = startBoundary + i * step;
          const [x0, y0] = polar(cx, cy, rInner, a);
          const [x1, y1] = polar(cx, cy, rOuter, a);
          const stroke = i % 2 ? "#18d6ff" : "#d03cff";
          svg += `<line x1="${x0.toFixed(2)}" y1="${y0.toFixed(2)}" x2="${x1.toFixed(2)}" y2="${y1.toFixed(2)}" stroke="${stroke}" stroke-width="3" stroke-linecap="round" filter="url(#glow)" opacity="0.92"/>
`;
        });

        list.forEach((field, i) => {
          const a = startBoundary + i * step + step / 2;
          const [tx, ty] = polar(cx, cy, rText, a);
          const rotate = a;
          const lines = splitLabel(field.label, maxLines, maxChars);
          const sub = shortenWord(field.sub || "", Math.max(9, maxChars));
          const totalLines = lines.length + (sub ? 1 : 0);
          const lineHeight = fontSize * .94;
          const startY = -((totalLines - 1) * lineHeight) / 2;
          svg += `<g transform="translate(${tx.toFixed(2)} ${ty.toFixed(2)}) rotate(${rotate.toFixed(2)})">`;
          lines.forEach((line, idx) => {
            const y = startY + idx * lineHeight;
            svg += `<text x="0" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.96)" font-family="Arial, Helvetica, sans-serif" font-size="${fontSize}" font-weight="900" letter-spacing=".35" paint-order="stroke" stroke="rgba(5,6,19,.58)" stroke-width="4" stroke-linejoin="round">${esc(line)}</text>`;
          });
          if (sub) {
            const y = startY + lines.length * lineHeight + 2;
            svg += `<text x="0" y="${y.toFixed(1)}" text-anchor="middle" dominant-baseline="middle" fill="rgba(255,255,255,0.76)" font-family="Arial, Helvetica, sans-serif" font-size="${subSize}" font-weight="800" letter-spacing=".65" paint-order="stroke" stroke="rgba(5,6,19,.58)" stroke-width="3" stroke-linejoin="round">${esc(sub)}</text>`;
          }
          svg += `</g>
`;
        });

        svg += "</svg>";
        return svg;
      }

      function renderFields(fields) {
        currentFields = normalizeFields(fields);
        segmentsLayer.innerHTML = buildSegmentsSvg(currentFields);
      }

      function buildWinnerLines(label) {
        const raw = fixTextEncoding(label || "").replace(/\s+/g, " ").trim();
        if (!raw) return [""];
        const maxLines = raw.length > 28 || raw.includes(":") ? 3 : 2;
        const maxChars = raw.length > 34 ? 18 : 22;
        return splitLabel(raw, maxLines, maxChars);
      }

      function setWinnerText(field, fallbackLabel = "Bereit") {
        const label = field && field.label ? fixTextEncoding(field.label) : fixTextEncoding(fallbackLabel);
        const subValue = field && field.sub ? fixTextEncoding(field.sub) : "";
        const lines = buildWinnerLines(label);
        winnerText.classList.remove("is-long", "is-very-long");
        if (lines.length >= 3 || label.length > 34) winnerText.classList.add("is-very-long");
        else if (lines.length >= 2 || label.length > 22) winnerText.classList.add("is-long");
        const main = lines.map(line => `<span class="winner-line">${esc(line)}</span>`).join("");
        const sub = subValue ? `<span class="sub">${esc(subValue)}</span>` : "";
        winnerText.innerHTML = `<span class="wrap"><span class="main">${main}</span>${sub}</span>`;
      }

      function finishSpin(selected, data = {}) {
        currentRotation = Number(data.finalRotation || currentRotation || 0);
        running = false;
        statusSub.textContent = "Gewinn ermittelt";
        setWinnerText(selected, data.selectedFieldLabel || "Gewinn");
        scheduleResultHide();
      }

      function handleSpin(data) {
        clearTimeout(finishFallbackTimer);
        showOverlay();
        const fields = normalizeFields(data.fields);
        const selectedIndex = Math.max(0, Math.min(fields.length - 1, Number.parseInt(data.selectedFieldIndex || 0, 10) || 0));
        const selected = fields[selectedIndex] || data.selectedField || {};
        const durationMs = Math.max(2500, Number.parseInt(data.durationMs || data.duration || 7000, 10) || 7000);
        const extraTurns = Math.max(1, Number.parseInt(data.extraTurns || 6, 10) || 6);
        const step = 360 / fields.length;

        renderFields(fields);
        stage.classList.remove("is-idle");
        statusSub.textContent = data.user && data.user.displayName
          ? `Spin für ${data.user.displayName}`
          : "Spin läuft";
        winnerText.classList.remove("is-long", "is-very-long");
        winnerText.innerHTML = `<span class="wrap"><span class="main"><span class="winner-line">Dreht...</span></span></span>`;

        const targetNormalized = normalizeDeg(-selectedIndex * step);
        const currentNormalized = normalizeDeg(currentRotation);
        let delta = targetNormalized - currentNormalized;
        if (delta < 0) delta += 360;
        const finalRotation = currentRotation + extraTurns * 360 + delta;

        running = true;
        rotor.style.transition = "none";
        rotor.getBoundingClientRect();
        rotor.style.transition = `transform ${durationMs}ms cubic-bezier(0.12, 0.82, 0.12, 1)`;
        rotor.style.transform = `rotate(${finalRotation}deg)`;

        const onDone = () => {
          rotor.removeEventListener("transitionend", onDone);
          currentRotation = finalRotation;
          finishSpin(selected, { ...data, finalRotation });
        };

        rotor.addEventListener("transitionend", onDone, { once: true });
        finishFallbackTimer = setTimeout(() => {
          if (!running) return;
          rotor.removeEventListener("transitionend", onDone);
          currentRotation = finalRotation;
          finishSpin(selected, { ...data, finalRotation });
        }, durationMs + 900);
      }

      function handleReset() {
        clearTimeout(finishFallbackTimer);
        running = false;
        statusSub.textContent = "Zurückgesetzt";
        winnerText.classList.remove("is-long", "is-very-long");
        winnerText.innerHTML = `<span class="wrap"><span class="main"><span class="winner-line">Bereit</span></span></span>`;
        rotor.style.transition = "transform 800ms ease";
        rotor.style.transform = `rotate(${currentRotation}deg)`;
        hideOverlay(RESET_HIDE_MS);
      }

      function handleFinished(data) {
        showOverlay();
        if (!running) {
          statusSub.textContent = "Spin beendet";
          if (data && data.selectedFieldLabel) {
            setWinnerText({ label: data.selectedFieldLabel, sub: data.selectedFieldSub || "" }, data.selectedFieldLabel);
          }
          scheduleResultHide();
        }
      }

      function handleOverlayShow(data) {
        showOverlay();
        statusSub.textContent = data && data.statusText ? String(data.statusText) : "Manuell eingeblendet";
      }

      function handleOverlayHide() {
        hideOverlay(0);
      }

      function handleMessage(raw) {
        let data = null;
        try { data = JSON.parse(raw.data || raw); } catch (_) { return; }
        if (!data || typeof data !== "object") return;

        const type = String(data.type || "");
        if (type === "loyalty.wheel.spin") handleSpin(data);
        if (type === "loyalty.wheel.reset") handleReset(data);
        if (type === "loyalty.wheel.finished") handleFinished(data);
        if (type === "loyalty.wheel.overlay.show" || type === "overlay.loyalty.wheel.show") handleOverlayShow(data);
        if (type === "loyalty.wheel.overlay.hide" || type === "overlay.loyalty.wheel.hide") handleOverlayHide(data);
      }

      function sendHello() {
        try {
          if (ws && ws.readyState === WebSocket.OPEN) {
            ws.send(JSON.stringify({ type: "overlay.hello", overlay: "loyalty.wheel", build: OVERLAY_BUILD, ts: new Date().toISOString() }));
          }
        } catch (_) {}
      }

      function startHeartbeat() {
        stopHeartbeat();
        heartbeatTimer = setInterval(() => {
          try {
            if (ws && ws.readyState === WebSocket.OPEN) {
              ws.send(JSON.stringify({ type: "overlay.ping", overlay: "loyalty.wheel", ts: new Date().toISOString() }));
            }
          } catch (_) {}
        }, 30000);
      }

      function stopHeartbeat() {
        if (heartbeatTimer) clearInterval(heartbeatTimer);
        heartbeatTimer = null;
      }

      function connectWs() {
        clearTimeout(reconnectTimer);
        const protocol = location.protocol === "https:" ? "wss:" : "ws:";
        const url = `${protocol}//${location.host}`;
        try {
          ws = new WebSocket(url);
        } catch (err) {
          connection.classList.remove("is-open");
          connectionText.textContent = "WS Fehler";
          reconnectTimer = setTimeout(connectWs, 2500);
          return;
        }

        ws.addEventListener("open", () => {
          connection.classList.add("is-open");
          connectionText.textContent = "WS verbunden";
          sendHello();
          startHeartbeat();
        });

        ws.addEventListener("message", handleMessage);

        ws.addEventListener("close", () => {
          stopHeartbeat();
          connection.classList.remove("is-open");
          connectionText.textContent = "WS getrennt";
          reconnectTimer = setTimeout(connectWs, 2500);
        });

        ws.addEventListener("error", () => {
          stopHeartbeat();
          connection.classList.remove("is-open");
          connectionText.textContent = "WS Fehler";
        });
      }

      renderFields(DEFAULT_FIELDS);
      connectWs();
      hideOverlay(0);
    })();
  </script>
</body>
</html>
