<!doctype html>
<!-- STEP274I_DEPRECATED: Dieses Test-Overlay ist nicht mehr der offizielle Media-Playback-Weg. Offiziell: /overlays/sound_system_overlay.html + /api/sound/play-media. Datei bleibt nur aus Kompatibilitaetsgruenden erhalten. -->
<html lang="de">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>CGN Media Player Overlay</title>
  <style>
    :root{color-scheme:dark;--bg:transparent;--glow:rgba(168,85,247,.35)}
    html,body{margin:0;width:100%;height:100%;overflow:hidden;background:transparent;font-family:Montserrat,Arial,sans-serif}
    #stage{position:fixed;inset:0;display:flex;align-items:center;justify-content:center;background:transparent;opacity:0;transition:opacity .22s ease;pointer-events:none}
    #stage.active{opacity:1}
    #backdrop{position:absolute;inset:0;background:transparent;transition:background .2s ease}
    video{position:relative;max-width:100vw;max-height:100vh;width:100vw;height:100vh;object-fit:contain;filter:drop-shadow(0 0 22px var(--glow));background:transparent}
    #label{position:absolute;left:24px;bottom:18px;padding:8px 12px;border:1px solid rgba(168,85,247,.45);border-radius:12px;background:rgba(9,12,24,.56);color:#f8fafc;font-size:14px;font-weight:800;letter-spacing:.02em;box-shadow:0 0 24px rgba(56,189,248,.16);opacity:0;transform:translateY(8px);transition:opacity .2s ease,transform .2s ease}
    #stage.active.show-label #label{opacity:1;transform:translateY(0)}
  </style>
</head>
<body>
  <div id="stage">
    <div id="backdrop"></div>
    <video id="player" playsinline preload="auto"></video>
    <div id="label"></div>
  </div>
  <script>
    (function(){
      'use strict';
      const stateUrl = '/api/video/media-player/state';
      const endedUrl = '/api/video/media-player/ended';
      const stage = document.getElementById('stage');
      const player = document.getElementById('player');
      const label = document.getElementById('label');
      const backdrop = document.getElementById('backdrop');
      let currentId = '';
      let polling = null;
      let lastStateAt = 0;

      function applyFit(fit){
        player.style.objectFit = fit === 'cover' ? 'cover' : (fit === 'fill' ? 'fill' : 'contain');
      }

      function hide(){
        stage.classList.remove('active','show-label');
        currentId = '';
        try { player.pause(); } catch(_) {}
        player.removeAttribute('src');
        player.load();
      }

      function show(item){
        if (!item || !item.url) { hide(); return; }
        if (item.requestId !== currentId) {
          currentId = item.requestId;
          player.src = item.url;
          player.volume = Math.max(0, Math.min(1, Number(item.volume || 80) / 100));
          player.loop = !!item.loop;
          player.muted = !!item.muted;
          applyFit(item.fit || 'contain');
          backdrop.style.background = item.background && item.background !== 'transparent' ? item.background : 'transparent';
          label.textContent = item.label || '';
          stage.classList.toggle('show-label', !!item.label && item.label.length > 0);
          stage.classList.add('active');
          player.play().catch(()=>{});
        }
      }

      async function reportEnded(){
        const requestId = currentId;
        if (!requestId) return;
        try {
          await fetch(endedUrl, { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ requestId }) });
        } catch(_) {}
      }

      async function poll(){
        try {
          const res = await fetch(stateUrl + '?_=' + Date.now(), { cache:'no-store' });
          const data = await res.json();
          lastStateAt = Date.now();
          if (data && data.current) show(data.current);
          else hide();
        } catch(_) {}
      }

      player.addEventListener('ended', reportEnded);
      player.addEventListener('error', reportEnded);
      polling = setInterval(poll, 500);
      poll();
      window.addEventListener('beforeunload', () => { if (polling) clearInterval(polling); });
    })();
  </script>
</body>
</html>
